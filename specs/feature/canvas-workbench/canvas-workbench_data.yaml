---
spec:
  name: canvas-workbench-data
  level: 5_data
  version: "0.1.0"
  status: draft
  parent: "canvas-workbench-feature"

content:
  entities:
    # ── WorkbenchNode ─────────────────────────────────────────
    - entity: "WorkbenchNode"
      description: "Canvas 画布上的一个节点（对应 ReactFlow node）"
      storage: "canvasStore.nodes[] (memory)"
      persistence: "position 仅内存，节点数据由上游 Store 提供"
      fields:
        - name: "id"
          type: "string"
          pk: true
          required: true
          description: "节点唯一 ID（格式：'{type}:{sourceId}'，如 'run:abc123'）"
        - name: "type"
          type: "string"
          required: true
          description: "节点类型"
          enum_values:
            - "thread"
            - "run"
            - "tool"
            - "artifact"
            - "message"
        - name: "position"
          type: "json"
          required: true
          default: "{ x: 0, y: 0 }"
          description: "节点在画布上的坐标（px）"
          constraints:
            x_min: null
            x_max: null
            y_min: null
            y_max: null
        - name: "width"
          type: "number"
          required: false
          description: "节点宽度（px），由 ReactFlow 自动测量"
        - name: "height"
          type: "number"
          required: false
          description: "节点高度（px）"
        - name: "data"
          type: "json"
          required: true
          description: "节点业务数据（类型相关，见下）"
        - name: "selected"
          type: "boolean"
          required: true
          default: false
          description: "是否被选中"
        - name: "dragging"
          type: "boolean"
          required: true
          default: false
          description: "是否正在拖拽"
        - name: "expanded"
          type: "boolean"
          required: true
          default: false
          description: "节点是否展开详情"
        - name: "zIndex"
          type: "number"
          required: false
          description: "渲染层级（用于模态浮层优先级）"
        - name: "parentId"
          type: "string"
          required: false
          description: "父节点 ID（用于分组，future use）"
        - name: "createdAt"
          type: "datetime"
          required: true
          description: "节点创建时间"

    # ── ThreadNodeData ─────────────────────────────────────────
    - entity: "ThreadNodeData"
      description: "Thread 节点的 data 字段内容"
      storage: "in-memory (WorkbenchNode.data)"
      fields:
        - name: "threadId"
          type: "string"
          required: true
          description: "关联 Thread ID"
        - name: "title"
          type: "string"
          required: false
          description: "Thread 标题（来自 threadStore.threadMeta）"
        - name: "goal"
          type: "string"
          required: true
          description: "Thread 目标文本（截断至 100 字符）"
        - name: "runCount"
          type: "number"
          required: true
          default: 0
          description: "关联 Run 数量"
        - name: "status"
          type: "string"
          required: true
          default: "active"
          description: "thread / archived"
        - name: "createdAt"
          type: "datetime"
          required: true
          description: "创建时间"
        - name: "updatedAt"
          type: "datetime"
          required: false
          description: "最后更新时间"

    # ── RunNodeData ────────────────────────────────────────────
    - entity: "RunNodeData"
      description: "Run 节点的 data 字段内容"
      storage: "in-memory (WorkbenchNode.data)"
      fields:
        - name: "runId"
          type: "string"
          required: true
          description: "关联 Run ID"
        - name: "threadId"
          type: "string"
          required: true
          description: "所属 Thread ID"
        - name: "goal"
          type: "string"
          required: true
          description: "Run 目标（截断至 80 字符）"
        - name: "status"
          type: "string"
          required: true
          default: "queued"
          description: "queued | planning | executing | paused | completed | failed | cancelled"
        - name: "stage"
          type: "string"
          required: false
          description: "当前阶段描述（如 'Thinking...'）"
        - name: "toolCount"
          type: "number"
          required: true
          default: 0
          description: "关联 ToolInvocation 数量"
        - name: "artifactCount"
          type: "number"
          required: true
          default: 0
          description: "关联 Artifact 数量"
        - name: "progress"
          type: "number"
          required: true
          default: 0
          description: "进度百分比（0–100）"
          constraints:
            min: 0
            max: 100
        - name: "createdAt"
          type: "datetime"
          required: true
        - name: "startedAt"
          type: "datetime"
          required: false
        - name: "finishedAt"
          type: "datetime"
          required: false

    # ── ToolNodeData ───────────────────────────────────────────
    - entity: "ToolNodeData"
      description: "ToolInvocation 节点的 data 字段内容"
      storage: "in-memory (WorkbenchNode.data)"
      fields:
        - name: "toolInvocationId"
          type: "string"
          required: true
          description: "工具调用 ID"
        - name: "runId"
          type: "string"
          required: true
          description: "所属 Run ID"
        - name: "toolName"
          type: "string"
          required: true
          description: "工具名称（如 read_file / terminal / search_files）"
        - name: "toolDisplayName"
          type: "string"
          required: false
          description: "人类可读工具名称"
        - name: "toolIcon"
          type: "string"
          required: false
          description: "工具图标名称（Lucide icon）"
        - name: "status"
          type: "string"
          required: true
          default: "pending"
          description: "pending | running | completed | failed"
        - name: "args"
          type: "json"
          required: false
          description: "工具调用参数（layer=3 时显示）"
        - name: "result"
          type: "json"
          required: false
          description: "工具返回结果（layer=3 时显示）"
        - name: "error"
          type: "string"
          required: false
          description: "失败错误信息"
        - name: "summary"
          type: "string"
          required: false
          description: "工具调用摘要（layer=1 时显示的压缩描述）"
        - name: "order"
          type: "number"
          required: false
          description: "同 Run 内的调用序号"
        - name: "startedAt"
          type: "datetime"
          required: false
        - name: "finishedAt"
          type: "datetime"
          required: false
        - name: "durationMs"
          type: "number"
          required: false
          description: "执行耗时（毫秒）"

    # ── ArtifactNodeData ───────────────────────────────────────
    - entity: "ArtifactNodeData"
      description: "Artifact 节点的 data 字段内容"
      storage: "canvasStore.nodes[] (memory) + artifactStore (source of truth)"
      fields:
        - name: "artifactId"
          type: "string"
          required: true
          description: "Artifact 唯一 ID"
        - name: "name"
          type: "string"
          required: true
          description: "Artifact 名称"
        - name: "mimeType"
          type: "string"
          required: true
          description: "MIME 类型"
          enum_values:
            - "image/png"
            - "image/jpeg"
            - "image/webp"
            - "application/pdf"
            - "text/html"
            - "text/css"
            - "text/javascript"
            - "text/typescript"
            - "text/markdown"
            - "text/plain"
            - "application/json"
            - "application/zip"
        - name: "previewUrl"
          type: "string"
          required: false
          description: "缩略图 URL（来自 artifactStore.previews）"
        - name: "runId"
          type: "string"
          required: false
          description: "产出该 Artifact 的 Run ID"
        - name: "toolInvocationId"
          type: "string"
          required: false
          description: "产出该 Artifact 的 ToolInvocation ID"
        - name: "sizeBytes"
          type: "number"
          required: false
          description: "文件大小（bytes）"
        - name: "language"
          type: "string"
          required: false
          description: "代码语言（用于代码类 Artifact）"
        - name: "createdAt"
          type: "datetime"
          required: true

    # ── MessageNodeData ─────────────────────────────────────────
    - entity: "MessageNodeData"
      description: "Message 节点的 data 字段内容（对应 LLM 流式消息）"
      storage: "in-memory (WorkbenchNode.data)"
      fields:
        - name: "messageId"
          type: "string"
          required: true
        - name: "runId"
          type: "string"
          required: true
        - name: "role"
          type: "string"
          required: true
          description: "user | assistant | system | tool"
        - name: "content"
          type: "string"
          required: true
          description: "累积的消息文本"
        - name: "isStreaming"
          type: "boolean"
          required: true
          default: false
          description: "是否正在流式接收"
        - name: "toolCallId"
          type: "string"
          required: false
          description: "若 role=tool，关联的 ToolInvocation ID"
        - name: "isFinal"
          type: "boolean"
          required: true
          default: false
          description: "消息是否已完整（end 事件到达）"
        - name: "attachments"
          type: "json"
          required: true
          default: "[]"
          description: "附件 artifactId[]"

    # ── WorkbenchEdge ──────────────────────────────────────────
    - entity: "WorkbenchEdge"
      description: "Canvas 画布上两个节点之间的边（对应 ReactFlow edge）"
      storage: "canvasStore.edges[] (memory)"
      fields:
        - name: "id"
          type: "string"
          pk: true
          required: true
          description: "边唯一 ID（格式：'{sourceId}→{targetId}'）"
        - name: "source"
          type: "string"
          required: true
          description: "源节点 ID"
        - name: "target"
          type: "string"
          required: true
          description: "目标节点 ID"
        - name: "type"
          type: "string"
          required: true
          default: "causal"
          description: "causal | reference | streaming"
        - name: "label"
          type: "string"
          required: false
          description: "边标签文本（如工具名）"
        - name: "animated"
          type: "boolean"
          required: true
          default: false
          description: "是否动画（用于 streaming 边）"
        - name: "style"
          type: "json"
          required: false
          description: "额外样式（stroke / strokeWidth / strokeDasharray）"
        - name: "markerEnd"
          type: "string"
          required: false
          description: "终点箭头类型"
        - name: "selected"
          type: "boolean"
          required: true
          default: false
        - name: "zIndex"
          type: "number"
          required: false
          default: 0

    # ── Viewport ────────────────────────────────────────────────
    - entity: "Viewport"
      description: "Canvas 视口状态（对应 ReactFlow viewport）"
      storage: "canvasStore.viewport (memory)"
      fields:
        - name: "x"
          type: "number"
          required: true
          default: 0
          description: "视口左上角 X 坐标（画布空间）"
        - name: "y"
          type: "number"
          required: true
          default: 0
          description: "视口左上角 Y 坐标（画布空间）"
        - name: "zoom"
          type: "number"
          required: true
          default: 1
          description: "缩放比例"
          constraints:
            min: 0.1
            max: 3.0

    # ── Command (Undo/Redo) ─────────────────────────────────────
    - entity: "Command"
      description: "Undo/Redo 命令记录"
      storage: "canvasStore.commandHistory[] (memory, 最大 50 条)"
      fields:
        - name: "id"
          type: "string"
          pk: true
          required: true
          description: "命令唯一 ID"
        - name: "type"
          type: "string"
          required: true
          description: "add_node | remove_node | update_node | add_edge | remove_edge | batch"
        - name: "payload"
          type: "json"
          required: true
          description: "命令携带的数据（变化前后）"
        - name: "timestamp"
          type: "datetime"
          required: true
          description: "命令执行时间"

  enums:
    - name: "CanvasNodeType"
      description: "Canvas 节点类型枚举"
      values:
        - value: "thread"
          description: "Thread 节点"
        - value: "run"
          description: "Run 节点"
        - value: "tool"
          description: "ToolInvocation 节点"
        - value: "artifact"
          description: "Artifact 节点"
        - value: "message"
          description: "LLM 消息节点"

    - name: "CanvasEdgeType"
      description: "Canvas 边类型枚举"
      values:
        - value: "causal"
          description: "因果边（执行关系）"
        - value: "reference"
          description: "引用边（引用/链接关系）"
        - value: "streaming"
          description: "流式边（数据流方向）"

    - name: "RunStatus"
      description: "Run 节点状态枚举（与 runStore.Run.status 一致）"
      values:
        - value: "queued"
          color: "#94a3b8"
          description: "等待执行"
        - value: "planning"
          color: "#a78bfa"
          description: "规划阶段"
        - value: "executing"
          color: "#3b82f6"
          description: "执行中"
        - value: "paused"
          color: "#f59e0b"
          description: "已暂停"
        - value: "completed"
          color: "#22c55e"
          description: "执行完成"
        - value: "failed"
          color: "#ef4444"
          description: "执行失败"
        - value: "cancelled"
          color: "#6b7280"
          description: "已取消"

    - name: "ToolStatus"
      description: "工具调用状态枚举"
      values:
        - value: "pending"
          color: "#94a3b8"
          description: "等待执行"
        - value: "running"
          color: "#3b82f6"
          description: "执行中"
        - value: "completed"
          color: "#22c55e"
          description: "执行成功"
        - value: "failed"
          color: "#ef4444"
          description: "执行失败"

  store_schema:
    description: "canvasStore 的完整 TypeScript 类型定义"
    canvasStore:
      nodes: "WorkbenchNode[]"
      edges: "WorkbenchEdge[]"
      viewport: "Viewport"
      selectedNodeIds: "string[]"
      selectedEdgeIds: "string[]"
      commandHistory: "Command[]"
      commandHistoryIndex: "number"
      isSelecting: "boolean"
      selectionBox: "SelectionBox | null"
      visibleNodeTypes: "CanvasNodeType[]"
      layoutAlgorithm: "'dagre' | 'elkjs'"
      layoutDirection: "'TB' | 'LR'"
      autoLayoutEnabled: "boolean"

  store_integration:
    description: "canvasStore 与其他模块 Store 的同步关系"
    sync_rules:
      - from: "runStore.runs"
        to: "canvasStore.nodes (type=run)"
        direction: "reactive"
        description: "runStore 新增/更新/删除 Run 时，canvas-sync 同步 WorkbenchNode"
      - from: "runStore.toolInvocations"
        to: "canvasStore.nodes (type=tool)"
        direction: "reactive"
        description: "tool.called/tool.completed/tool.failed 事件触发 ToolNode 增/改"
      - from: "artifactStore.artifacts"
        to: "canvasStore.nodes (type=artifact)"
        direction: "reactive"
        description: "artifact.created 事件新增 ArtifactNode"
      - from: "threadStore.threads"
        to: "canvasStore.nodes (type=thread)"
        direction: "reactive"
        description: "thread.created 事件新增 ThreadNode"
      - from: "uiStore.toolVisibilityLayer"
        to: "canvasStore (layer-aware rendering)"
        direction: "unidirectional"
        description: "uiStore 改变 ToolNode 渲染粒度，不反向同步"
      - from: "canvasStore.selectedNodeIds"
        to: "uiStore.selectedArtifactId / selectedToolInvocationId"
        direction: "bidirectional"
        description: "Canvas 选中 Artifact/Tool 时同步到 uiStore；反之亦然"

  indexes:
    description: "canvasStore 内存索引（用于高效查询）"
    indices:
      - name: "by-id"
        target: "canvasStore.nodes"
        keyPath: "id"
        unique: true
      - name: "by-type"
        target: "canvasStore.nodes"
        keyPath: "type"
        description: "按类型筛选节点"
      - name: "by-threadId"
        target: "canvasStore.nodes"
        keyPath: "data.threadId"
        description: "按 Thread ID 筛选（type=run/tool/artifact）"
      - name: "by-runId"
        target: "canvasStore.nodes"
        keyPath: "data.runId"
        description: "按 Run ID 筛选（type=tool/artifact/message）"
      - name: "by-parent-thread"
        target: "canvasStore.nodes"
        keyPath: "data.threadId"
        description: "筛选属于某 Thread 的所有节点（用于 Thread 隔离视图）"

  persistence_policy:
    description: "Canvas 数据持久化策略"
    rules:
      - scope: "canvasStore.nodes[].position"
        persist: false
        rationale: "位置信息仅内存，刷新后重排（M2 阶段简化）"
      - scope: "canvasStore.viewport"
        persist: false
        rationale: "视口状态不持久化"
      - scope: "canvasStore.selectedNodeIds"
        persist: false
        rationale: "选中状态不持久化"
      - scope: "threadStore / runStore / artifactStore"
        persist: true
        storage: "Dexie.js IndexedDB"
        rationale: "业务实体持久化由对应模块负责"

derived_from:
  - parent: "canvas-workbench-feature"
    rationale: "canvasStore 及 WorkbenchNode/Edge 数据结构定义"
  - parent: "vibex-workbench-architecture"
    rationale: "store_architecture.canvasStore 字段细化"

updated_by: "hermes"
updated_at: "2026-04-19T20:10:00Z"
