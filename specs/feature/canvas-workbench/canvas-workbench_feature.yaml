---
spec:
  name: canvas-workbench-feature
  level: 4_feature
  version: "0.1.0"
  status: draft
  parent: "vibex-workbench-architecture"

content:
  feature_name: "canvas-workbench"
  feature_tagline: "Canvas Orchestration 可视化层"
  milestone_ref: "M2"

  overview: |
    canvas-workbench 是 VibeX Workbench 的画布可视化模块（M2 里程碑）。
    负责在 main-canvas 区域渲染 Thread/Run/Artifact/Tool 四类节点，
    通过边（Edge）表达它们之间的因果和引用关系，
    并与 runStore / artifactStore / threadStore 保持双向同步。
    底层渲染复用 VibeX 已有 canvas_feature 的 ReactFlow 逻辑，
    仅做节点/边类型和 Store 适配层的适配。

  component_tree:
    description: "组件树，root 为 CanvasRenderer"
    root: "canvas-workbench"
    nodes:
      - id: "canvas-workbench"
        name: "CanvasRenderer"
        type: "layout"
        file: "src/lib/components/canvas-workbench/CanvasRenderer.svelte"
        description: "根画布组件，封装 ReactFlow，驱动 canvasStore 状态"
        children:
          - "canvas-toolbar"
          - "canvas-viewport-wrapper"
          - "canvas-minimap"
          - "canvas-selection-box"
        props:
          threadId: "string (from URL param)"
        responsibilities:
          - "初始化 ReactFlow 实例，配置节点/边类型"
          - "订阅 canvasStore.nodes[] / edges[] / viewport 并渲染"
          - "监听 pan/zoom/select 事件并同步回 canvasStore"
          - "消费 runStore 事件，将 Run/ToolInvocation 映射为 Canvas 节点"
        events: []

      - id: "canvas-toolbar"
        name: "CanvasToolbar"
        type: "action"
        file: "src/lib/components/canvas-workbench/CanvasToolbar.svelte"
        description: "画布工具栏：缩放控制 + 布局按钮 + 可见性过滤"
        children: []
        props:
          zoomLevel: "number (0.1–3.0)"
          showMinimap: "boolean"
          selectedCount: "number"
        responsibilities:
          - "放大 / 缩小 / 适应画布 / 重置视图按钮"
          - "MiniMap 切换"
          - "节点类型可见性过滤（显示/隐藏特定类型节点）"
          - "导出画布截图"
        events:
          - name: "canvas.zoom"
            payload: "delta: number"
          - name: "canvas.reset-view"
          - name: "canvas.fit-view"
          - name: "canvas.toggle-minimap"
          - name: "canvas.filter-nodes"
            payload: "types: CanvasNodeType[]"

      - id: "canvas-viewport-wrapper"
        name: "CanvasViewportWrapper"
        type: "display"
        file: "src/lib/components/canvas-workbench/CanvasViewportWrapper.svelte"
        description: "ReactFlow 视口包装，传递节点和边数据"
        children: []
        props:
          nodes: "WorkbenchNode[]"
          edges: "WorkbenchEdge[]"
          viewport: "ViewportState"
        responsibilities:
          - "渲染 ReactFlow，绑定节点/边组件"
          - "处理拖拽、缩放、框选交互"
          - "转发 ReactFlow 事件到 canvasStore"
        events: []

      - id: "canvas-minimap"
        name: "CanvasMinimap"
        type: "display"
        file: "src/lib/components/canvas-workbench/CanvasMinimap.svelte"
        description: "MiniMap 导航小窗"
        children: []
        props:
          visible: "boolean"
        responsibilities:
          - "显示全图缩略图"
          - "点击小地图跳转视口"
        events: []

      - id: "canvas-selection-box"
        name: "CanvasSelectionBox"
        type: "action"
        file: "src/lib/components/canvas-workbench/CanvasSelectionBox.svelte"
        description: "框选交互状态指示器"
        children: []
        props:
          isSelecting: "boolean"
        responsibilities:
          - "框选模式下显示半透明矩形选区"
          - "选区结束后触发批量选中节点"
        events:
          - name: "canvas.nodes-selected"
            payload: "nodeIds: string[]"

      # ── Node 类型组件 ────────────────────────────────────────

      - id: "node-thread"
        name: "ThreadNode"
        type: "display"
        file: "src/lib/components/canvas-workbench/nodes/ThreadNode.svelte"
        description: "Thread 画布节点"
        children: []
        props:
          data: "ThreadNodeData"
          selected: "boolean"
        responsibilities:
          - "显示 Thread 标题 + goal 摘要"
          - "展示关联 Run 数量 Badge"
          - "hover 显示展开预览"
          - "点击进入 Thread 详情"
        events:
          - name: "node.thread.click"
            payload: "threadId: string"
          - name: "node.thread.drag"
            payload: "threadId: string; position: {x,y}"

      - id: "node-run"
        name: "RunNode"
        type: "display"
        file: "src/lib/components/canvas-workbench/nodes/RunNode.svelte"
        description: "Run 画布节点"
        children: []
        props:
          data: "RunNodeData"
          selected: "boolean"
        responsibilities:
          - "显示 Run 状态（queued/planning/executing/completed/failed）"
          - "状态颜色编码 + 动画指示（running 时脉冲）"
          - "展示 goal 截断文本"
          - "显示关联 ToolInvocation 数量"
        events:
          - name: "node.run.click"
            payload: "runId: string"
          - name: "node.run.expand"
            payload: "runId: string"

      - id: "node-artifact"
        name: "ArtifactNode"
        type: "display"
        file: "src/lib/components/canvas-workbench/nodes/ArtifactNode.svelte"
        description: "Artifact 画布节点"
        children: []
        props:
          data: "ArtifactNodeData"
          selected: "boolean"
        responsibilities:
          - "根据 mimeType 差异化显示（图片缩略图 / PDF 图标 / 代码文本片段）"
          - "拖拽到 Composer 引用"
          - "双击打开详情预览"
        events:
          - name: "node.artifact.click"
            payload: "artifactId: string"
          - name: "node.artifact.drag-start"
            payload: "artifactId: string"
          - name: "node.artifact.open"
            payload: "artifactId: string"

      - id: "node-tool"
        name: "ToolNode"
        type: "display"
        file: "src/lib/components/canvas-workbench/nodes/ToolNode.svelte"
        description: "ToolInvocation 画布节点"
        children: []
        props:
          data: "ToolNodeData"
          selected: "boolean"
        responsibilities:
          - "显示工具名（icon + name）+ 调用状态"
          - "layer=1 时：折叠为单行自然语言摘要"
          - "layer=2 时：显示工具名 + 参数摘要"
          - "layer=3 时：显示完整 args / result"
          - "状态颜色：pending=灰 / running=蓝 / completed=绿 / failed=红"
        events:
          - name: "node.tool.click"
            payload: "toolInvocationId: string"
          - name: "node.tool.expand"
            payload: "toolInvocationId: string; layer: 1|2|3"

      - id: "node-message"
        name: "MessageNode"
        type: "display"
        file: "src/lib/components/canvas-workbench/nodes/MessageNode.svelte"
        description: "LLM 消息节点（message.delta 流式）"
        children: []
        props:
          data: "MessageNodeData"
          selected: "boolean"
        responsibilities:
          - "流式渲染 LLM 回复文本（逐字追加）"
          - "显示 role 标签（user/assistant/system）"
          - "支持 Markdown 渲染"
        events:
          - name: "node.message.click"
            payload: "messageId: string"

  modules:
    - name: "canvas-state"
      description: "Canvas 状态管理（Svelte 5 $state）"
      responsibilities:
        - "维护 canvasStore.nodes[] / edges[] / viewport"
        - "提供 addNode / removeNode / updateNode / addEdge / removeEdge API"
        - "处理节点位置序列化（position 持久化到 canvasStore）"
        - "支持 Undo/Redo（command history stack）"

    - name: "canvas-sync"
      description: "Canvas ↔ runStore 双向同步桥"
      responsibilities:
        - "消费 runStore SSE 事件 → 映射为 Canvas 节点"
        - "run.started → ThreadNode 旁新增 RunNode"
        - "tool.called → RunNode 下方追加 ToolNode"
        - "artifact.created → 新增 ArtifactNode"
        - "run.completed/failed → 更新 RunNode 状态"
        - "tool.completed/failed → 更新 ToolNode 状态"
        - "响应 canvasStore 节点拖拽 → 持久化 position"

    - name: "node-renderer"
      description: "节点类型注册 + ReactFlow 节点工厂"
      responsibilities:
        - "注册 nodeTypes: thread / run / artifact / tool / message"
        - "将 canvasStore nodes[] 转为 ReactFlow node[]"
        - "处理节点展开/折叠状态"

    - name: "edge-renderer"
      description: "边类型注册 + 自动布局"
      responsibilities:
        - "注册 edgeTypes: causal / reference / streaming"
        - "因果边（causal）：Thread→Run、Run→ToolInvocation，灰色实线箭头"
        - "引用边（reference）：Artifact→Artifact/Thread，蓝色虚线"
        - "流式边（streaming）：Run→Message，绿色渐变虚线"
        - "自动布局算法：dagre / elkjs（可配置）"

    - name: "viewport-controller"
      description: "视口状态管理"
      responsibilities:
        - "维护 viewport: { x, y, zoom }"
        - "响应 pan/zoom 事件"
        - "支持 fit-view / zoom-to-nodes / reset-view"
        - "MiniMap 同步"

  public_api:
    stores:
      - store: "canvasStore"
        description: "Canvas 状态 Store"
        fields:
          - name: "nodes"
            type: "WorkbenchNode[]"
          - name: "edges"
            type: "WorkbenchEdge[]"
          - name: "viewport"
            type: "Viewport"
          - name: "selectedNodeIds"
            type: "string[]"
          - name: "commandHistory"
            type: "Command[]"
          - name: "commandHistoryIndex"
            type: "number"

    functions:
      - name: "addNode"
        signature: "(node: WorkbenchNode) => void"
        description: "向 canvas 添加节点"
      - name: "removeNode"
        signature: "(nodeId: string) => void"
        description: "从 canvas 移除节点"
      - name: "updateNode"
        signature: "(nodeId: string, patch: Partial<WorkbenchNode>) => void"
        description: "更新节点数据/位置"
      - name: "addEdge"
        signature: "(edge: WorkbenchEdge) => void"
        description: "添加边"
      - name: "removeEdge"
        signature: "(edgeId: string) => void"
        description: "移除边"
      - name: "selectNodes"
        signature: "(nodeIds: string[]) => void"
        description: "批量选中节点"
      - name: "clearCanvas"
        signature: "() => void"
        description: "清空画布"
      - name: "fitView"
        signature: "(options?: FitViewOptions) => void"
        description: "适应视图"
      - name: "undo"
        signature: "() => void"
        description: "撤销上一步操作"
      - name: "redo"
        signature: "() => void"
        description: "重做"
      - name: "exportCanvas"
        signature: "(format: 'png' | 'svg') => Blob"
        description: "导出画布为图片"

  node_types:
    description: "5 种 WorkbenchNode 类型及其生成规则"
    types:
      - type: "thread"
        label: "Thread"
        color: "#6366f1"
        icon: "message-square"
        creation_trigger: "thread.created SSE 事件"
        data_fields: ["threadId", "title", "goal", "runCount", "createdAt"]
        deletable: false
        resizable: false

      - type: "run"
        label: "Run"
        color: "#8b5cf6"
        icon: "play-circle"
        creation_trigger: "run.started SSE 事件"
        data_fields: ["runId", "threadId", "goal", "status", "stage", "toolCount", "createdAt"]
        deletable: false
        resizable: true

      - type: "tool"
        label: "Tool"
        color: "#06b6d4"
        icon: "tool"
        creation_trigger: "tool.called SSE 事件"
        data_fields: ["toolInvocationId", "runId", "toolName", "toolDisplayName", "status", "args", "result", "error"]
        deletable: false
        resizable: true

      - type: "artifact"
        label: "Artifact"
        color: "#10b981"
        icon: "file-text"
        creation_trigger: "artifact.created SSE 事件"
        data_fields: ["artifactId", "name", "mimeType", "previewUrl", "runId"]
        deletable: true
        resizable: true

      - type: "message"
        label: "Message"
        color: "#f59e0b"
        icon: "message-circle"
        creation_trigger: "message.delta SSE 事件"
        data_fields: ["messageId", "runId", "role", "content", "toolCallId"]
        deletable: false
        resizable: false

  edge_types:
    description: "3 种 WorkbenchEdge 类型及其定义"
    types:
      - type: "causal"
        label: "因果边"
        color: "#94a3b8"
        style: "solid"
        animated: false
        arrow: true
        connects: ["thread→run", "run→tool", "run→artifact"]
        description: "表示执行因果关系"

      - type: "reference"
        label: "引用边"
        color: "#3b82f6"
        style: "dashed"
        animated: false
        arrow: false
        connects: ["artifact→thread", "artifact→artifact"]
        description: "表示 Artifact 引用/链接关系"

      - type: "streaming"
        label: "流式边"
        color: "#22c55e"
        style: "dashed"
        animated: true
        arrow: false
        connects: ["run→message", "tool→artifact"]
        description: "表示数据流方向（streaming / result 产出）"

  interaction_spec:
    description: "Canvas 全局交互规范"
    mouse:
      - action: "单击节点"
        behavior: "选中节点，高亮并显示详情到 SidebarRight"
      - action: "双击节点"
        behavior: "展开节点详情面板 / 打开 Artifact 预览"
      - action: "拖拽节点"
        behavior: "移动节点位置，释放后持久化到 canvasStore"
      - action: "框选"
        behavior: "按住鼠标拖拽，释放后批量选中框内节点"
      - action: "滚轮缩放"
        behavior: "缩放画布（0.1x – 3x）"
      - action: "中键拖拽 / 右键拖拽"
        behavior: "平移画布"
      - action: "节点悬停"
        behavior: "显示 Tooltip（工具名 / 状态 / 时间）"
    keyboard_shortcuts:
      - key: "Delete / Backspace"
        action: "删除选中节点（仅 ArtifactNode 可删除）"
      - key: "Ctrl+A"
        action: "全选节点"
      - key: "Escape"
        action: "取消选中"
      - key: "Ctrl+Z"
        action: "canvas.undo"
      - key: "Ctrl+Shift+Z"
        action: "canvas.redo"
      - key: "Space + 拖拽"
        action: "平移画布（临时手型）"
      - key: "F"
        action: "canvas.fit-view"
      - key: "Ctrl+E"
        action: "canvas.export"

  layout_engine:
    description: "自动布局配置"
    algorithm: "dagre (默认) / elkjs (可选)"
    direction: "TB (top-to-bottom)"
    spacing:
      node_spacing: 60
      rank_spacing: 80
    presets:
      - name: "compact"
        description: "最小间距，适合大量节点"
        node_spacing: 40
        rank_spacing: 60
      - name: "spacious"
        description: "宽松间距，适合演示"
        node_spacing: 100
        rank_spacing: 120

  boundaries:
    upstream: ["thread-manager", "run-engine", "artifact-registry"]
    downstream: []
    data_deps:
      - "run-engine (Run / ToolInvocation 事件)"
      - "thread-manager (Thread 数据)"
      - "artifact-registry (Artifact 数据)"
      - "workbench-shell (uiStore 可见性层级)"

  non_goals:
    - "不实现多画布/多 Tab 页（M3 里程碑）"
    - "不实现节点分组/文件夹（M3 里程碑）"
    - "不实现画布协作编辑（future work）"
    - "不实现无限画布虚拟化渲染（M3 里程碑考虑）"
    - "不实现自定义节点类型注册机制（以 Spec 内置 5 类为限）"

derived_from:
  - parent: "vibex-workbench-architecture"
    rationale: "canvas-workbench 模块的详细功能规格"
  - source: "vibex-spec canvas_feature"
    key_insight: "复用 ReactFlow 渲染逻辑，仅做 Workbench 适配"

linked_data_spec: "canvas-workbench_data"

updated_by: "hermes"
updated_at: "2026-04-19T20:10:00Z"
