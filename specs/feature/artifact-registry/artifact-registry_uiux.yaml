# ============================================================
# Level 5 — Artifact Registry UI/UX 规格
# UI/UX Specification
# ============================================================
# 从属于: artifact-registry_feature.yaml (L4)
# 下层依赖: artifact-registry_data.yaml (L5c), artifact-registry_service.yaml (L5a)

spec:
  version: "0.1.0"
  level: "5b_uiux"
  name: "artifact-registry_uiux"
  parent: "artifact-registry"

meta:
  feature: "artifact-registry"
  owner: "frontend"
  generated_from: "artifact-registry_feature.yaml"

content:
  # ── UI 组件概览 ─────────────────────────────────────────────
  overview:
    description: "Artifact Registry UI 包含 Artifact 浏览器侧边栏、Artifact 详情查看器（支持多类型渲染）、创建/编辑模态框、版本历史面板、搜索过滤栏和存储空间指示器"
    component_locations:
      - name: "ArtifactBrowserPanel"
        location: "主视图左侧或右侧 Sidebar"
        description: "Artifact 列表浏览器，支持搜索和过滤"
      - name: "ArtifactDetailViewer"
        location: "主视图中央区域"
        description: "Artifact 内容渲染（代码/Markdown/JSON/图片等）"
      - name: "ArtifactSearchBar"
        location: "ArtifactBrowserPanel 顶部"
        description: "全文搜索输入框"
      - name: "ArtifactFilterBar"
        location: "ArtifactBrowserPanel 搜索框下方"
        description: "类型/标签/状态过滤控件"
      - name: "ArtifactCreateModal"
        location: "模态框浮层"
        description: "新建 Artifact 表单"
      - name: "ArtifactVersionPanel"
        location: "ArtifactDetailViewer 右侧抽屉"
        description: "版本历史列表与对比"
      - name: "StorageIndicator"
        location: "Sidebar 底部"
        description: "存储空间使用进度条"
      - name: "ArtifactContextMenu"
        location: "右键菜单浮层"
        description: "Artifact 操作快捷菜单"

  # ── 组件规格 ─────────────────────────────────────────────
  components:
    # ── ArtifactBrowserPanel ─────────────────────────────────────
    ArtifactBrowserPanel:
      description: "Artifact 列表浏览器侧边栏"
      location: "右侧 Sidebar（可收起）"
      width: "320px"
      max_height: "calc(100vh - 120px)"
      overflow: "auto"
      background: "#ffffff"
      border_left: "1px solid #e5e7eb"

      header:
        title: "Artifact"
        icon: "📦"
        count_badge: "filteredArtifacts.length"
        action_buttons:
          - icon: "+"
            tooltip: "新建 Artifact"
            handler: "openArtifactCreateModal()"
          - icon: "↻"
            tooltip: "刷新列表"
            handler: "refreshArtifacts()"

      search_bar:
        placeholder: "搜索 Artifact..."
        icon: "🔍"
        debounce_ms: 300
        clear_button: true
        height: "36px"

      filter_bar:
        height: "auto"
        padding: "8px 12px"
        background: "#f9fafb"
        border_bottom: "1px solid #e5e7eb"

        filter_chips:
          - name: "type"
            label: "类型"
            icon: "🏷"
            options:
              - value: "all"
                label: "全部"
              - value: "code"
                label: "代码"
              - value: "markdown"
                label: "文档"
              - value: "json"
                label: "JSON"
              - value: "image"
                label: "图片"
              - value: "data"
                label: "数据"
              - value: "diagram"
                label: "图表"

          - name: "status"
            label: "状态"
            icon: "⚡"
            options:
              - value: "active"
                label: "活跃"
              - value: "archived"
                label: "归档"
              - value: "deleted"
                label: "已删除"

      list_item:
        height: "auto"
        min_height: "64px"
        padding: "12px 16px"
        border_bottom: "1px solid #f3f4f6"
        hover_background: "#f9fafb"
        cursor: "pointer"
        selected_background: "#eff6ff"
        selected_border_left: "3px solid #3b82f6"

        layout:
          top:
            - component: "ArtifactTypeIcon"
              width: "20px"
              height: "20px"
            - component: "ArtifactName"
              font_size: "13px"
              font_weight: "500"
              color: "#111827"
              truncate_length: 28
            - component: "ArtifactVersionBadge"
              font_size: "10px"
              background: "#f3f4f6"
              border_radius: "4px"
              padding: "1px 4px"
              color: "#6b7280"
          bottom:
            - component: "ArtifactMetaRow"
              font_size: "11px"
              color: "#9ca3af"
              items:
                - "artifact.language"
                - "artifact.size_bytes (formatted)"
                - "artifact.updated_at (relative)"

        ArtifactTypeIcon:
          type_icons:
            code: { icon: "📄", color: "#3b82f6" }
            markdown: { icon: "📝", color: "#10b981" }
            json: { icon: "{ }", color: "#f59e0b" }
            image: { icon: "🖼", color: "#8b5cf6" }
            data: { icon: "📊", color: "#06b6d4" }
            generic: { icon: "📦", color: "#6b7280" }
            diagram: { icon: "🔀", color: "#ec4899" }

      empty_state:
        icon: "📦"
        title: "暂无 Artifact"
        description: "AI 生成的文件、代码、文档将显示在这里"
        action: null

    # ── ArtifactDetailViewer ─────────────────────────────────────
    ArtifactDetailViewer:
      description: "Artifact 内容渲染与操作区"
      location: "主视图中央"
      padding: "0"
      background: "#ffffff"

      toolbar:
        height: "48px"
        background: "#f9fafb"
        border_bottom: "1px solid #e5e7eb"
        padding: "0 16px"

        left:
          - component: "ArtifactTitle"
            font_size: "16px"
            font_weight: "600"
            color: "#111827"
            max_width: "400px"
            truncate: true
            tooltip: true

          - component: "ArtifactLanguageBadge"
            font_size: "11px"
            background: "#e0e7ff"
            color: "#3730a3"
            border_radius: "4px"
            padding: "2px 8px"

          - component: "ArtifactVersionChip"
            font_size: "11px"
            background: "#f3f4f6"
            color: "#6b7280"
            border_radius: "4px"
            padding: "2px 8px"

        right:
          - component: "ArtifactActionButtons"
            gap: "8px"
            buttons:
              - name: "edit"
                icon: "✏️"
                tooltip: "编辑"
                visibility: "type == code | markdown | json"
              - name: "versions"
                icon: "📜"
                tooltip: "版本历史"
              - name: "export"
                icon: "⬇"
                tooltip: "导出"
              - name: "more"
                icon: "⋯"
                tooltip: "更多操作"

      content_area:
        padding: "16px 24px"
        overflow: "auto"
        max_height: "calc(100vh - 200px)"

      empty_state:
        icon: "👆"
        title: "选择一个 Artifact"
        description: "从左侧列表选择一个 Artifact 以预览内容"
        action: null

    # ── ArtifactSearchBar ─────────────────────────────────────
    ArtifactSearchBar:
      description: "全文检索输入框"
      location: "ArtifactBrowserPanel 顶部"
      height: "36px"
      margin: "12px"
      border: "1px solid #e5e7eb"
      border_radius: "8px"
      background: "#ffffff"
      focus_border_color: "#3b82f6"
      focus_box_shadow: "0 0 0 3px rgba(59,130,246,0.1)"
      transition: "all 0.2s ease"

      input:
        placeholder: "搜索 Artifact 内容、名称..."
        font_size: "13px"
        color: "#374151"
        padding: "0 32px 0 36px"
        background: "transparent"
        border: "none"
        outline: "none"
        width: "100%"

      search_icon:
        position: "absolute"
        left: "10px"
        top: "50%"
        transform: "translateY(-50%)"
        color: "#9ca3af"
        font_size: "14px"

      clear_button:
        position: "absolute"
        right: "8px"
        top: "50%"
        transform: "translateY(-50%)"
        color: "#9ca3af"
        font_size: "12px"
        cursor: "pointer"
        hover_color: "#6b7280"
        visibility: "searchQuery.length > 0"

      loading_indicator:
        position: "absolute"
        right: "8px"
        top: "50%"
        transform: "translateY(-50%)"
        spinner: true
        size: "14px"
        color: "#3b82f6"

    # ── ArtifactCreateModal ─────────────────────────────────────
    ArtifactCreateModal:
      description: "新建 Artifact 模态框"
      overlay:
        background: "rgba(0,0,0,0.5)"
        backdrop_filter: "blur(2px)"

      modal:
        width: "560px"
        max_height: "90vh"
        border_radius: "12px"
        background: "#ffffff"
        box_shadow: "0 20px 60px rgba(0,0,0,0.15)"
        overflow: "hidden"

      header:
        height: "56px"
        padding: "0 24px"
        border_bottom: "1px solid #e5e7eb"
        title: "新建 Artifact"
        close_button: true

      body:
        padding: "24px"
        overflow: "auto"

        form_fields:
          - name: "name"
            label: "名称"
            type: "text"
            required: true
            placeholder: "例如: src/utils/helper.ts"
            max_length: 500
            validation: "name 不能为空"

          - name: "type"
            label: "类型"
            type: "select"
            required: true
            options: ["code", "markdown", "json", "image", "data", "generic", "diagram"]
            default: "code"

          - name: "language"
            label: "语言"
            type: "select"
            required: false
            options: ["typescript", "javascript", "python", "bash", "yaml", "json", "sql", "html", "css", "go", "rust", "java", "other"]
            visibility: "type == code"

          - name: "content"
            label: "内容"
            type: "textarea"
            required: true
            placeholder: "输入 Artifact 内容..."
            min_height: "300px"
            font_family: "monospace"
            font_size: "13px"
            line_height: "1.6"
            validation: "content 不能为空"

          - name: "tags"
            label: "标签"
            type: "tag-input"
            placeholder: "添加标签（回车确认）"
            description: "按回车添加标签"

      footer:
        height: "64px"
        padding: "0 24px"
        border_top: "1px solid #e5e7eb"
        display: "flex"
        justify_content: "flex-end"
        gap: "12px"

        cancel_button:
          label: "取消"
          variant: "secondary"
          handler: "closeModal()"

        submit_button:
          label: "创建"
          variant: "primary"
          handler: "createArtifact()"
          loading_state: "isCreating"

    # ── ArtifactVersionPanel ─────────────────────────────────────
    ArtifactVersionPanel:
      description: "版本历史侧边抽屉"
      location: "ArtifactDetailViewer 右侧（Drawer 形式）"
      width: "320px"
      max_height: "calc(100vh - 200px)"
      background: "#ffffff"
      border_left: "1px solid #e5e7eb"
      box_shadow: "-4px 0 12px rgba(0,0,0,0.05)"

      header:
        title: "版本历史"
        count_badge: "versions.length"
        close_button: true

      version_list_item:
        padding: "12px 16px"
        border_bottom: "1px solid #f3f4f6"
        cursor: "pointer"
        hover_background: "#f9fafb"
        selected_background: "#eff6ff"

        layout:
          left:
            - component: "VersionBadge"
              description: "v{version}"
              font_size: "12px"
              font_weight: "600"
              background: "#e5e7eb"
              border_radius: "4px"
              padding: "2px 6px"
          center:
            - component: "VersionDate"
              font_size: "12px"
              color: "#6b7280"
            - component: "VersionSummary"
              font_size: "11px"
              color: "#9ca3af"
              truncate_length: 30
          right:
            - component: "ViewVersionButton"
              icon: "👁"
              tooltip: "查看此版本"

      diff_button:
        label: "对比版本"
        icon: "↔"
        handler: "openDiffView()"
        visibility: "versions.length >= 2"

    # ── StorageIndicator ─────────────────────────────────────
    StorageIndicator:
      description: "存储空间使用进度条"
      location: "ArtifactBrowserPanel 底部"
      padding: "12px 16px"
      background: "#f9fafb"
      border_top: "1px solid #e5e7eb"

      layout:
        top:
          - component: "StorageLabel"
            text: "存储空间"
            font_size: "12px"
            color: "#6b7280"
          - component: "StorageUsage"
            text: "{usedMB} / {quotaMB} MB"
            font_size: "12px"
            font_weight: "500"
            color: "#374151"
            align: "right"

      progress_bar:
        height: "6px"
        border_radius: "3px"
        background: "#e5e7eb"
        overflow: "hidden"
        margin_top: "8px"

        fill:
          normal: { color: "#3b82f6", width: "{percentage}%" }
          warning: { color: "#f59e0b", width: "{percentage}%", threshold: ">80%" }
          critical: { color: "#ef4444", width: "{percentage}%", threshold: ">95%" }

      action:
        label: "清理空间"
        icon: "🗑"
        handler: "openPruneModal()"
        font_size: "11px"
        color: "#3b82f6"
        cursor: "pointer"
        visibility: "percentage > 50%"

    # ── Renderer Components ─────────────────────────────────────
    code_renderer:
      description: "代码类型渲染器"
      font_family: "'JetBrains Mono', 'Fira Code', monospace"
      font_size: "13px"
      line_height: "1.6"
      background: "#fafafa"
      border: "1px solid #e5e7eb"
      border_radius: "8px"
      overflow: "auto"
      max_height: "calc(100vh - 250px)"

      line_numbers:
        display: true
        width: "48px"
        color: "#9ca3af"
        background: "#f3f4f6"
        padding: "16px 0"
        text_align: "right"
        font_size: "12px"

      toolbar:
        height: "36px"
        background: "#f3f4f6"
        border_bottom: "1px solid #e5e7eb"
        padding: "0 12px"
        buttons:
          - icon: "📋"
            tooltip: "复制代码"
            handler: "copyToClipboard()"
          - icon: "⬇"
            tooltip: "下载文件"
            handler: "exportArtifact()"
          - icon: "⊟"
            tooltip: "全屏"
            handler: "enterFullscreen()"

    markdown_renderer:
      description: "Markdown 类型渲染器"
      padding: "16px 24px"
      font_size: "14px"
      line_height: "1.7"
      color: "#374151"
      max_width: "800px"
      background: "#ffffff"

      heading_styles:
        h1: { font_size: "28px", font_weight: "700", margin: "24px 0 12px", border_bottom: "1px solid #e5e7eb", padding_bottom: "8px" }
        h2: { font_size: "22px", font_weight: "600", margin: "20px 0 10px" }
        h3: { font_size: "18px", font_weight: "600", margin: "16px 0 8px" }

      code_blocks:
        background: "#f6f8fa"
        border: "1px solid #e5e7eb"
        border_radius: "6px"
        padding: "12px 16px"
        font_size: "13px"
        overflow_x: "auto"
        margin: "12px 0"

      inline_code:
        background: "#f3f4f6"
        color: "#d63384"
        padding: "2px 6px"
        border_radius: "4px"
        font_size: "13px"
        font_family: "monospace"

    json_renderer:
      description: "JSON 类型树形渲染器"
      padding: "16px"
      background: "#fafafa"
      border: "1px solid #e5e7eb"
      border_radius: "8px"
      font_family: "monospace"
      font_size: "13px"

      key_color: "#2563eb"
      string_color: "#059669"
      number_color: "#d97706"
      boolean_color: "#7c3aed"
      null_color: "#9ca3af"

      toggle_icon:
        collapsed: "▶"
        expanded: "▼"
        font_size: "10px"
        color: "#9ca3af"
        cursor: "pointer"

    image_renderer:
      description: "图片类型渲染器"
      display: "flex"
      flex_direction: "column"
      align_items: "center"
      padding: "16px"

      thumbnail:
        max_width: "200px"
        max_height: "200px"
        object_fit: "contain"
        border_radius: "8px"
        border: "1px solid #e5e7eb"
        cursor: "zoom-in"
        handler: "openImageViewer()"

      full_viewer:
        modal: true
        background: "rgba(0,0,0,0.9)"
        image_max_width: "90vw"
        image_max_height: "90vh"
        close_button: true
        download_button: true

  # ── Context Menu ─────────────────────────────────────────────
  context_menu:
    description: "Artifact 右键快捷菜单"
    items:
      - name: "view"
        label: "查看"
        icon: "👁"
        shortcut: "Enter"
      - name: "edit"
        label: "编辑"
        icon: "✏️"
        shortcut: "E"
        visibility: "type == code | markdown | json"
      - separator: true
      - name: "copy"
        label: "复制内容"
        icon: "📋"
        shortcut: "Ctrl+C"
      - name: "copy_name"
        label: "复制名称"
        icon: "🏷"
      - separator: true
      - name: "add_tag"
        label: "添加标签"
        icon: "+"
      - name: "archive"
        label: "归档"
        icon: "📁"
        visibility: "status == active"
      - name: "restore"
        label: "恢复"
        icon: "↻"
        visibility: "status == deleted"
      - separator: true
      - name: "delete"
        label: "删除"
        icon: "🗑"
        color: "#ef4444"
        shortcut: "Delete"

  # ── Toast 通知 ─────────────────────────────────────────────
  toast_notifications:
    artifact_created:
      type: "success"
      icon: "✅"
      message: "Artifact 已创建：{name}"
      duration_ms: 3000

    artifact_updated:
      type: "info"
      icon: "✏️"
      message: "Artifact 已更新"
      duration_ms: 2000

    artifact_deleted:
      type: "info"
      icon: "🗑"
      message: "Artifact 已删除"
      duration_ms: 2000

    quota_warning:
      type: "warning"
      icon: "⚠️"
      message: "存储空间使用超过 80%"
      duration_ms: 5000
      action:
        label: "清理"
        handler: "openPruneModal()"

    quota_exceeded:
      type: "error"
      icon: "❌"
      message: "存储空间已满，无法保存"
      duration_ms: 8000
      persistent: true

    export_success:
      type: "success"
      icon: "⬇"
      message: "Artifact 已导出"
      duration_ms: 2000

  # ── 动画规格 ─────────────────────────────────────────────
  animations:
    panel_slide_in:
      selector: ".artifact-panel"
      animation: "slideIn 0.3s ease"
      keyframes:
        - "0% { transform: translateX(100%); opacity: 0 }"
        - "100% { transform: translateX(0); opacity: 1 }"

    modal_fade_in:
      selector: ".artifact-modal-overlay"
      animation: "fadeIn 0.2s ease"
      keyframes:
        - "0% { opacity: 0 }"
        - "100% { opacity: 1 }"

    modal_scale_in:
      selector: ".artifact-modal"
      animation: "scaleIn 0.2s ease"
      keyframes:
        - "0% { transform: scale(0.95); opacity: 0 }"
        - "100% { transform: scale(1); opacity: 1 }"

    list_item_hover:
      selector: ".artifact-list-item"
      transition: "background 0.15s ease"
      keyframes:
        - "hover: background → #f9fafb"
        - "active: background → #eff6ff"

    toast_slide_in:
      selector: ".toast"
      animation: "slideInBottom 0.3s ease"
      keyframes:
        - "0% { transform: translateY(20px); opacity: 0 }"
        - "100% { transform: translateY(0); opacity: 1 }"

  # ── 空状态 ─────────────────────────────────────────────
  empty_states:
    no_artifacts:
      icon: "📦"
      title: "暂无 Artifact"
      description: "AI 生成的文件、代码、文档将显示在这里"
      action: null

    no_search_results:
      icon: "🔍"
      title: "未找到匹配结果"
      description: "尝试使用不同的关键词或调整过滤器"
      action:
        label: "清除搜索"
        handler: "clearSearch()"

    no_versions:
      icon: "📜"
      title: "暂无历史版本"
      description: "更新 Artifact 后将自动保存历史版本"

  # ── 加载状态 ─────────────────────────────────────────────
  loading_states:
    artifacts_loading:
      skeleton: true
      skeleton_items: 5
      item_height: "64px"
      message: "加载 Artifact 列表..."

    artifact_detail_loading:
      skeleton: true
      lines: 10
      message: "加载 Artifact 内容..."

    search_loading:
      spinner: true
      overlay: true

  # ── 错误状态 UI ─────────────────────────────────────────────
  error_states:
    artifact_not_found:
      icon: "❓"
      title: "Artifact 不存在"
      description: "此 Artifact 可能已被删除"
      action:
        label: "返回列表"
        handler: "clearSelection()"

    load_failed:
      icon: "⚠️"
      title: "加载失败"
      description: "无法加载 Artifact 内容"
      action:
        label: "重试"
        handler: "retryLoad()"

    save_failed:
      icon: "❌"
      title: "保存失败"
      description: "无法保存 Artifact，请检查存储空间"
      action:
        label: "清理空间"
        handler: "openPruneModal()"

  # ── 响应式断点 ─────────────────────────────────────────────
  responsive_breakpoints:
    desktop:
      min_width: "1024px"
      panel_width: "320px"
      viewer_max_width: "900px"

    tablet:
      min_width: "768px"
      max_width: "1023px"
      panel_width: "280px"
      viewer_max_width: "100%"
      panel_collapsed_by_default: true

    mobile:
      max_width: "767px"
      panel_visibility: "drawer"
      panel_drawer_width: "85vw"
      viewer_max_width: "100%"
      toolbar_compact: true
      version_panel: "fullscreen_modal"

  # ── 无障碍（Accessibility） ─────────────────────────────────────────────
  accessibility:
    keyboard_navigation:
      ArtifactBrowserPanel:
        - "↑/↓: 在列表项间移动"
        - "Enter: 选中并打开详情"
        - "Escape: 取消选择"
        - "Ctrl+F: 聚焦搜索框"
