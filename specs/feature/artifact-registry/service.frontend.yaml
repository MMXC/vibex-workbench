# ============================================================
# Level 5 — Artifact Registry Service 规格
# Service Specification
# ============================================================
# 从属于: artifact-registry_feature.yaml (L4)
# 下层依赖: artifact-registry_data.yaml (L5c)

spec:
  version: "0.1.0"
  level: "5a_service_frontend"
  name: "artifact-registry-frontend"
  parent: "artifact-registry-feature"
  status: "draft"

meta:
  owner: "frontend"
  tech_stack: ["Svelte 5", "TypeScript", "Dexie.js"]
  description: "Artifact Registry 前端服务实现规格 — 本地优先架构"

content:
  derived_from: "service.yaml 接口契约"
  # ── 服务层架构 ─────────────────────────────────────────────
  architecture:
    description: "Artifact Registry 服务层采用本地优先架构，以 Dexie.js (IndexedDB) 为持久化后端，Svelte Store 为响应式状态层，接收 run-engine SSE 事件流实现被动更新"
    pattern: "Svelte 5 Reactive Store + Dexie.js + SSE Consumer"
    layers:
      - name: "API Layer"
        description: "公开 TypeScript API（createArtifact / updateArtifact / deleteArtifact / searchArtifacts 等）"
      - name: "Business Logic Layer"
        description: "artifact-service 封装版本管理、标签、引用追踪、导出等业务逻辑"
      - name: "Store Layer"
        description: "artifactStore 响应式 Svelte Store，维护 artifacts[] / filters / searchQuery / currentArtifactId"
      - name: "Persistence Layer"
        description: "persistence-manager 封装 Dexie.js，管理 IndexedDB schema、事务、迁移"
      - name: "SSE Consumer Layer"
        description: "接收 artifact.created / artifact.updated / artifact.deleted 事件并同步到 Store + DB"

  # ── 核心服务模块 ─────────────────────────────────────────────
  modules:
    artifactStore:
      description: "Svelte 响应式 Store，Artifact 状态在内存中的唯一来源"
      responsibilities:
        - "维护 artifactStore.artifacts[] 和 artifactStore.currentArtifactId"
        - "暴露只读派生 Store：artifactsByThread / artifactsByRun / filteredArtifacts / searchResults"
        - "与 persistence-manager 保持双向同步（optimistic update 策略）"
        - "管理 searchQuery / filters 状态"
      store_shape:
        artifacts: "Artifact[]"
        currentArtifactId: "string | null"
        searchQuery: "string"
        filters: "ArtifactFilters"
        isLoading: "boolean"
        error: "string | null"
      derived_stores:
        artifactsByThread:
          description: "writable derived store，按 threadId 过滤"
          derives_from: "artifacts + threadId filter"
        artifactsByRun:
          description: "writable derived store，按 runId 过滤"
          derives_from: "artifacts + runId filter"
        filteredArtifacts:
          description: "derived store，应用所有 active filters"
          derives_from: "artifacts + filters"
        searchResults:
          description: "derived store，执行全文检索"
          derives_from: "filteredArtifacts + searchQuery"

    persistenceManager:
      description: "Dexie.js 封装层，IndexedDB 所有读写操作的唯一入口"
      responsibilities:
        - "定义和管理 IndexedDB schema（artifacts / artifact_versions / artifact_tags 表）"
        - "实现 CRUD 原子事务"
        - "处理 schema version 迁移"
        - "暴露 query API：byThread / byRun / byType / byTag / fullTextSearch"
        - "Storage quota 检查与预警上报"
      schema_version: 1
      tables:
        - name: "artifacts"
          description: "Artifact 主表"
        - name: "artifact_versions"
          description: "历史版本快照表"
        - name: "artifact_tags"
          description: "标签关联表"
      query_api:
        findById: "id → Promise<Artifact | undefined>"
        findByThread: "threadId, filters? → Promise<Artifact[]>"
        findByRun: "runId → Promise<Artifact[]>"
        findByType: "type[] → Promise<Artifact[]>"
        findByTag: "tag → Promise<Artifact[]>"
        search: "query, filters? → Promise<Artifact[]>"
        findVersions: "artifactId → Promise<ArtifactVersion[]>"
      quota_check:
        strategy: "pre-write check + async recalculation"
        warning_threshold: 0.8
        critical_threshold: 0.95
        check_before_write: true

    artifactService:
      description: "业务逻辑层，封装所有 Artifact 操作语义"
      responsibilities:
        - "createArtifact: 创建 + 持久化 + Store 同步"
        - "updateArtifact: 生成版本快照 + 更新 + Store 同步"
        - "deleteArtifact: soft delete（默认）或 hard delete"
        - "版本管理：每次 updateArtifact 生成新 ArtifactVersion"
        - "tagging: addTag / removeTag / searchByTag"
        - "引用追踪：维护 referenced_by（runId[]）"
        - "导出: exportArtifact (下载文件或返回 Blob)"
        - "getArtifactVersion: 按版本号查询历史快照"
      optimistic_update:
        description: "先更新 Store（立即响应），后写 DB（异步持久化）"
        store_first: true
        rollback_on_db_error: true

    artifactIndexer:
      description: "全文索引与多维检索"
      responsibilities:
        - "维护 in-memory 索引缓存（基于 Dexie.js liveQuery）"
        - "支持 content 字段 substring / regex 搜索"
        - "按 type / tag / runId / threadId 多维过滤"
        - "分页（cursor-based offset）+ 排序（createdAt / updatedAt / relevance）"
        - "搜索结果高亮（返回匹配位置信息）"
      indexing_strategy:
        type: "in-memory index over IndexedDB liveQuery"
        refresh_triggers: ["artifact.created", "artifact.updated", "run.completed"]
        max_cache_size: 1000
        search_truncate_length: 10000  # 超过此长度的 content 不全文索引，仅按 name/metadata 检索
      pagination:
        default_page_size: 20
        max_page_size: 100
        cursor_field: "created_at"
        sort_options: ["created_at", "updated_at", "name", "relevance"]

    artifactRenderer:
      description: "Artifact 内容渲染器"
      responsibilities:
        - "按 artifact.type 分发渲染：code / markdown / json / image / data / generic / diagram"
        - "代码高亮：highlight.js + 语言自动检测"
        - "Markdown 预览：marked + DOMPurify sanitize"
        - "JSON 树形可视化（可折叠）"
        - "图片缩略图（canvas API, max 200px）和大图查看"
        - "行号显示 / 代码折叠（基于 CodeMirror 或 custom）"
        - "导出渲染内容为 Blob"
      renderer_types:
        code:
          library: "highlight.js"
          theme: "github-light"
          font_size: "13px"
          show_line_numbers: true
          max_height: "500px"
          overflow: "scroll"
          copy_button: true
        markdown:
          library: "marked + DOMPurify"
          allowed_tags: ["h1","h2","h3","h4","p","code","pre","ul","ol","li","blockquote","a","img","table","thead","tbody","tr","th","td","strong","em","hr"]
          max_image_width: "800px"
          sanitize: true
        json:
          library: "custom tree renderer"
          collapsible: true
          default_expand_depth: 2
          color_scheme: "key:#2563eb, string:#059669, number:#d97706, boolean:#7c3aed, null:#9ca3af"
        image:
          thumbnail_size: 200
          full_size_max: "2000px"
          lazy_load: true
          format: "blob URL → img.src"
        data:
          description: "表格/CSV 渲染"
          library: "custom"
        diagram:
          description: "Mermaid / PlantUML 等图渲染"
          library: "mermaid.js"
        generic:
          description: "纯文本预览"
          font_size: "13px"

    storageManager:
      description: "存储空间管理"
      responsibilities:
        - "定期计算 storage.usage（usedBytes / quotaBytes）并上报"
        - "LRU 淘汰策略：清理 last_accessed_at 超过阈值且 version > keep_versions 的 artifact"
        - "手动清理：用户可按 artifact / thread / run 批量删除"
        - "Quota 预警（>80% toast，>95% 阻止新写入）"
        - "pruneArtifacts: 执行清理，返回删除数量"
      lru_strategy:
        lookback_days: 30
        min_versions_per_artifact: 3
        max_versions_per_artifact: 50
        prune_batch_size: 50
      quota_thresholds:
        warning: 0.8
        critical: 0.95
        enforcement: "throw QUOTA_EXCEEDED error on write when > critical"

  # ── Public API 详细规格 ─────────────────────────────────────
  public_api:
    createArtifact:
      signature: "createArtifact(data: CreateArtifactInput): Promise<Artifact>"
      description: "创建新 Artifact，持久化到 IndexedDB 并更新 Store"
      parameters:
        - name: "data"
          type: "CreateArtifactInput"
          required: true
          description: "{ thread_id, run_id, type, name, content, language?, mime_type?, tags?, metadata? }"
      returns:
        type: "Promise<Artifact>"
        description: "创建完成的 Artifact 对象（含 id / version=1 / created_at）"
      behavior:
        - "生成 nanoid(12) 作为 id"
        - "计算 size_bytes = new TextEncoder().encode(content).length"
        - "optimistic: 先 push 到 artifactStore.artifacts[]"
        - "persistence-manager.insert(artifact)"
        - "若 thread_id/run_id 存在，建立 referenced_by 关联"
      errors:
        - code: "QUOTA_EXCEEDED"
          message: "存储空间已满，无法创建 Artifact"
        - code: "INVALID_TYPE"
          message: "artifact.type 必须是枚举值之一"
        - code: "CONTENT_EMPTY"
          message: "content 不能为空"

    updateArtifact:
      signature: "updateArtifact(id: string, patch: UpdateArtifactInput): Promise<Artifact>"
      description: "更新 Artifact，自动生成新版本快照"
      parameters:
        - name: "id"
          type: "string"
          required: true
          description: "目标 Artifact ID"
        - name: "patch"
          type: "UpdateArtifactInput"
          required: true
          description: "{ content?, name?, tags?, status?, metadata? }"
      returns:
        type: "Promise<Artifact>"
        description: "更新后的 Artifact（含 incremented version）"
      behavior:
        - "查找当前 Artifact，校验存在且 status != deleted"
        - "创建 ArtifactVersion 快照（当前 content + version）"
        - "应用 patch，更新 version += 1，updated_at = now"
        - "persistence-manager.transaction: insert version + update artifact"
        - "更新 artifactStore 中对应 Artifact"
      errors:
        - code: "ARTIFACT_NOT_FOUND"
          message: "Artifact 不存在"
        - code: "ARTIFACT_DELETED"
          message: "Artifact 已删除，无法更新"
        - code: "VERSION_LIMIT_EXCEEDED"
          message: "版本数超过上限（50），请清理历史版本"

    deleteArtifact:
      signature: "deleteArtifact(id: string, hard?: boolean): Promise<void>"
      description: "删除 Artifact（soft delete 默认）"
      parameters:
        - name: "id"
          type: "string"
          required: true
        - name: "hard"
          type: "boolean"
          required: false
          default: false
          description: "true=物理删除，false=软删除（status=deleted）"
      behavior:
        - soft: "更新 status=deleted，deleted_at=now，从 Store 过滤掉"
        - hard: "删除 artifact + 所有 artifact_versions + 所有 artifact_tags"
      errors:
        - code: "ARTIFACT_NOT_FOUND"
          message: "Artifact 不存在"

    getArtifact:
      signature: "getArtifact(id: string): Promise<Artifact | null>"
      description: "按 ID 获取 Artifact（含最新 content）"
      behavior:
        - "更新 last_accessed_at = now"
        - "返回 artifact，不存在则 null"
      errors:
        - code: "ARTIFACT_NOT_FOUND"
          message: "Artifact 不存在"

    getArtifactVersion:
      signature: "getArtifactVersion(artifactId: string, version: number): Promise<ArtifactVersion | null>"
      description: "获取指定历史版本快照"
      parameters:
        - name: "artifactId"
          type: "string"
          required: true
        - name: "version"
          type: "number"
          required: true
      returns:
        type: "Promise<ArtifactVersion | null>"
      errors:
        - code: "VERSION_NOT_FOUND"
          message: "指定版本不存在"

    listArtifactsByThread:
      signature: "listArtifactsByThread(threadId: string, filters?: ArtifactFilters): Promise<Artifact[]>"
      description: "列出指定 Thread 下的所有 Artifact"
      parameters:
        - name: "threadId"
          type: "string"
          required: true
        - name: "filters"
          type: "ArtifactFilters"
          required: false
      behavior:
        - "应用 threadId 过滤 + 其他 filters"
        - "默认过滤掉 status=deleted"
        - "按 updated_at DESC 排序"
      errors:
        - code: "INVALID_FILTER"
          message: "filters 参数无效"

    listArtifactsByRun:
      signature: "listArtifactsByRun(runId: string): Promise<Artifact[]>"
      description: "列出指定 Run 生成的所有 Artifact"
      parameters:
        - name: "runId"
          type: "string"
          required: true
      behavior:
        - "按 run_id 索引查询"
        - "过滤 status=deleted"
        - "按 created_at ASC 排序"

    searchArtifacts:
      signature: "searchArtifacts(query: string, filters?: ArtifactFilters, options?: SearchOptions): Promise<ArtifactSearchResult>"
      description: "全文检索 Artifact"
      parameters:
        - name: "query"
          type: "string"
          required: true
          description: "搜索关键词"
        - name: "filters"
          type: "ArtifactFilters"
          required: false
        - name: "options"
          type: "SearchOptions"
          required: false
          description: "{ page?, pageSize?, sort? }"
      returns:
        type: "Promise<ArtifactSearchResult>"
        description: "{ items: Artifact[], total: number, highlights: Record<id, Highlight[]> }"
      behavior:
        - "content + name 字段全文匹配"
        - "支持 AND/OR 逻辑（空格=AND）"
        - "按 relevance 或 updated_at 排序"
        - "高亮匹配片段"
      errors:
        - code: "QUERY_TOO_SHORT"
          message: "搜索关键词至少 2 个字符"
        - code: "QUERY_TOO_LONG"
          message: "搜索关键词最多 200 个字符"

    addTag:
      signature: "addTag(artifactId: string, tag: string, createdBy?: 'user'|'agent'|'system'): Promise<void>"
      description: "为 Artifact 添加标签"
      behavior:
        - "tag 小写化 + trim"
        - "校验 tag 长度 <= 100"
        - "insert artifact_tags 表"
        - "更新 artifact.tags[] in Store"
      errors:
        - code: "TAG_EXISTS"
          message: "该标签已存在"
        - code: "ARTIFACT_NOT_FOUND"
          message: "Artifact 不存在"

    removeTag:
      signature: "removeTag(artifactId: string, tag: string): Promise<void>"
      description: "移除 Artifact 的标签"
      behavior:
        - "delete from artifact_tags where artifact_id=? and tag=?"
        - "更新 artifact.tags[] in Store"
      errors:
        - code: "TAG_NOT_FOUND"
          message: "该标签不存在"

    exportArtifact:
      signature: "exportArtifact(id: string, format?: 'json' | 'file'): Promise<Blob | string>"
      description: "导出 Artifact 为下载文件或 JSON 字符串"
      parameters:
        - name: "id"
          type: "string"
          required: true
        - name: "format"
          type: "'json' | 'file'"
          default: "'file'"
          description: "'file' = Blob 触发下载，'json' = JSON string"
      behavior:
        - "file: 根据 mime_type 构造 Blob，触发 <a download> 点击"
        - "json: 返回 JSON.stringify(artifact, null, 2)"
      errors:
        - code: "ARTIFACT_NOT_FOUND"
          message: "Artifact 不存在"
        - code: "EXPORT_FAILED"
          message: "导出失败，可能是内容过大"

    subscribeSSE:
      signature: "subscribeSSE(): void"
      description: "订阅 artifact SSE 事件流（被动模式，由 run-engine 推送）"
      behavior:
        - "注册 artifact.created / artifact.updated / artifact.deleted 事件处理器"
        - "消费 run-engine 透传的 artifact 事件"
        - "分发到 artifactStore / artifactService"

    unsubscribeSSE:
      signature: "unsubscribeSSE(): void"
      description: "取消 SSE 订阅"

    getStorageStats:
      signature: "getStorageStats(): Promise<StorageStats>"
      description: "返回存储使用统计"
      returns:
        description: "{ used_bytes, quota_bytes, artifact_count, version_count, last_calculated_at }"
      behavior:
        - "使用 navigator.storage.estimate() 获取 quota"
        - "遍历 IndexedDB 计算实际使用量"
        - "缓存结果，每 60s 刷新"

    pruneArtifacts:
      signature: "pruneArtifacts(options?: PruneOptions): Promise<number>"
      description: "执行清理，返回删除的 artifact 数量"
      parameters:
        - name: "options"
          type: "PruneOptions"
          required: false
          description: "{ older_than_days?, keep_versions?, by_thread_id?, dry_run? }"
      returns:
        type: "number"
        description: "删除的 artifact 数量（dry_run=true 时为 0）"
      behavior:
        - "按 LRU 策略查找可删除 artifact"
        - "保留 min_versions_per_artifact（3）"
        - "dry_run=true 只计算不删除"
      errors:
        - code: "PRUNE_FAILED"
          message: "清理操作失败"

  # ── SSE 事件处理器 ─────────────────────────────────────────────
  sse_event_handlers:
    - event: "artifact.created"
      handler: "artifactService.handleCreated"
      description: "接收服务端 artifact.created，写入 IndexedDB 并更新 artifactStore"
      behavior:
        - "persistence-manager.insert(artifact)"
        - "artifactStore.add(artifact)"
        - "若 runId 关联，更新 referenced_by"

    - event: "artifact.updated"
      handler: "artifactService.handleUpdated"
      description: "接收服务端 artifact.updated，生成新版本并更新"
      behavior:
        - "创建 ArtifactVersion 快照"
        - "persistence-manager.transaction(version + artifact)"
        - "artifactStore.update(artifact)"

    - event: "artifact.deleted"
      handler: "artifactStore.remove"
      description: "接收服务端 artifact.deleted，从 Store 和 DB 标记删除"
      behavior:
        - "artifactStore.remove(id)"
        - "persistence-manager.updateStatus(id, 'deleted')"

    - event: "run.completed"
      handler: "artifactIndexer.reindex"
      description: "Run 完成后重建相关 artifact 索引"

  # ── 错误处理策略 ─────────────────────────────────────────────
  error_handling:
    indexeddb_errors:
      strategy: "Log + Store rollback + User notification"
      behavior: "optimistic update 失败时回滚 Store 状态"
      logging: "console.error with structured metadata"

    quota_exceeded:
      strategy: "Block write + Toast notification + Prune suggestion"
      behavior: "throw QUOTA_EXCEEDED，不再写入"

    sse_malformed:
      strategy: "Skip event + Log warning"
      behavior: "不中断 SSE 连接，记录错误事件"

    artifact_not_found:
      strategy: "Return null + Log debug"
      behavior: "不抛出异常，返回 null"

  # ── 性能考虑 ─────────────────────────────────────────────
  performance:
    live_query_batch_size: 50
    search_debounce_ms: 300
    thumbnail_cache_size: 100
    version_snapshot_max_size_mb: 5
    large_content_threshold_bytes: 1048576  # 1MB 以上不全文索引 content
    store_sync_debounce_ms: 50
    storage_stats_refresh_interval_ms: 60000

  # ── 依赖关系 ─────────────────────────────────────────────
  dependencies:
    internal:
      - module: "artifact-store"
        imports: ["persistence-manager"]
      - module: "persistence-manager"
        imports: ["artifactStore"]
      - module: "artifact-service"
        imports: ["artifactStore", "persistence-manager", "storage-manager"]
      - module: "artifact-indexer"
        imports: ["persistence-manager"]
      - module: "artifact-renderer"
        imports: ["artifactStore"]
      - module: "storage-manager"
        imports: ["persistence-manager"]

    external:
      - module: "run-engine"
        description: "上游：推送 artifact.created/updated/deleted SSE 事件"
      - module: "canvas-workbench"
        description: "下游：消费 artifactStore，映射为 Canvas 节点"
      - module: "workbench-shell"
        description: "下游：消费 artifactStore，提供预览和编辑能力"
      - module: "thread-manager"
        description: "获取 currentThreadId 用于过滤"

  # ── 非目标（Non-Goals）────────────────────────────────────────────
  non_goals:
    - "不实现服务端 artifact 同步（local-first，暂不考虑 cloud sync）"
    - "不实现 artifact 的 ACL / 权限控制"
    - "不实现 artifact 的 collaborative editing"
    - "不直接持久化 ToolInvocation result（大结果由服务端存储，此处只存引用 URL）"
    - "不实现 artifact 的分布式复制或 CDN 分发"
    - "不实现跨设备同步"
    - "不实现 artifact 的自动分类（future work）"
