# ============================================================
# Level 4 — Artifact Registry 功能规格
# Feature Specification
#
# 从属于：vibex-workbench-architecture (L2)
# 上层：artifact-registry_data.yaml (L5)
# ============================================================

spec:
  version: "0.1.0"
  level: "4"
  name: "artifact-registry"
  parent: "vibex-workbench-architecture"
  status: "draft"

meta:
  feature: "artifact-registry"
  owner: "frontend"
  target_users: ["run-engine", "canvas-workbench", "thread-manager", "workbench-shell"]

content:
  overview:
    description: "Artifact Registry 负责 AI 生成物的持久化存储、版本管理、检索与展示。它作为 IndexedDB (Dexie.js) 的前端抽象层，接收 run-engine 推送的 artifact.created / artifact.updated SSE 事件，提供 artifactStore 供全应用消费"
    responsibilities:
      - "Artifact 生命周期管理（创建 / 更新 / 删除 / 版本化）"
      - "IndexedDB 持久化（通过 Dexie.js）"
      - "全文检索与过滤（基于 artifact 内容 / 类型 / 标签）"
      - "消费 SSE 事件：artifact.created / artifact.updated / artifact.deleted"
      - "为 canvas-workbench 提供 artifact → Canvas 节点的映射数据"
      - "为 workbench-shell 提供 artifact 预览渲染"
      - "Storage quota 管理与清理策略"

  modules:
    - name: "artifact-store"
      description: "Svelte 响应式 Store"
      responsibilities:
        - "维护 artifactStore.artifacts[] 和 artifactStore.currentArtifactId"
        - "暴露只读派生 Store（artifactStore.forThread / artifactStore.forRun）"
        - "与 Dexie.js 持久层保持双向同步"
        - "支持 optimistic update（先写 Store，后写 DB）"

    - name: "persistence-manager"
      description: "Dexie.js 封装层"
      responsibilities:
        - "定义 IndexedDB schema（artifacts / artifact_versions / artifact_tags 表）"
        - "实现 CRUD 操作的原子事务"
        - "处理迁移（schema version 升级）"
        - "暴露 query API（byThread / byRun / byType / fullTextSearch）"
        - "Storage quota 检查与预警"

    - name: "artifact-service"
      description: "业务逻辑层"
      responsibilities:
        - "createArtifact / updateArtifact / deleteArtifact / getArtifact API"
        - "版本管理：每次 update 生成新 version，保留历史"
        - "tagging：addTag / removeTag / searchByTag"
        - "引用追踪：哪些 Run 引用了此 Artifact"
        - "导出功能：exportArtifact (下载为文件)"

    - name: "artifact-indexer"
      description: "全文索引与检索"
      responsibilities:
        - "基于 Dexie.js 的 in-memory 索引缓存"
        - "支持 content 字段的 substring / regex 搜索"
        - "按 type / tag / runId / threadId 多维过滤"
        - "分页（cursor-based）与排序（createdAt / updatedAt / relevance）"
        - "结果高亮（search highlight）"

    - name: "artifact-renderer"
      description: "Artifact 内容渲染器"
      responsibilities:
        - "按 artifact.type 分发渲染：code / markdown / json / image / data / generic"
        - "代码高亮（基于 highlight.js，支持语言检测）"
        - "Markdown 预览（marked + DOMPurify sanitize）"
        - "JSON 树形可视化"
        - "图片缩略图生成（canvas API, max 200px）"
        - "行号显示 / 代码折叠"

    - name: "storage-manager"
      description: "存储空间管理"
      responsibilities:
        - "定期上报 storage.usage（usedBytes / quotaBytes）"
        - "LRU 淘汰策略：清理久未访问的 artifact（保留至少 3 个版本）"
        - "手动清理：用户可按 artifact / thread / run 批量删除"
        - "Quota 预警（>80% 触发 toast，>95% 阻止新写入）"

  public_api:
    - name: "artifactStore"
      description: "Svelte Store：artifacts[] / currentArtifactId / searchQuery / filters"
      description_detail: "artifacts: Artifact[]; currentArtifactId: string | null; searchQuery: string; filters: ArtifactFilters"

    - name: "createArtifact(data: CreateArtifactInput): Artifact"
      description: "创建新 Artifact，持久化到 IndexedDB"

    - name: "updateArtifact(id: string, patch: Partial<Artifact>): Artifact"
      description: "更新 Artifact，自动生成新版本快照"

    - name: "deleteArtifact(id: string, hard?: boolean): void"
      description: "删除 Artifact（soft delete 默认，hard=true 物理删除）"

    - name: "getArtifact(id: string): Promise<Artifact | null>"
      description: "按 ID 获取 Artifact（含最新 content）"

    - name: "getArtifactVersion(artifactId: string, version: number): Promise<ArtifactVersion | null>"
      description: "获取指定历史版本"

    - name: "listArtifactsByThread(threadId: string, filters?: ArtifactFilters): Artifact[]"
      description: "列出指定 Thread 下的所有 Artifact"

    - name: "listArtifactsByRun(runId: string): Artifact[]"
      description: "列出指定 Run 生成的所有 Artifact"

    - name: "searchArtifacts(query: string, filters?: ArtifactFilters): Artifact[]"
      description: "全文检索 Artifact"

    - name: "addTag(artifactId: string, tag: string): void"
      description: "为 Artifact 添加标签"

    - name: "removeTag(artifactId: string, tag: string): void"
      description: "移除 Artifact 的标签"

    - name: "exportArtifact(id: string, format?: 'json' | 'file'): Blob | string"
      description: "导出 Artifact 为下载文件或 JSON 字符串"

    - name: "subscribeSSE(): void"
      description: "订阅 artifact SSE 事件流（被动模式，由 run-engine 主动推送）"

    - name: "unsubscribeSSE(): void"
      description: "取消 SSE 订阅"

    - name: "getStorageStats(): StorageStats"
      description: "返回存储使用统计 { usedBytes, quotaBytes, artifactCount }"

    - name: "pruneArtifacts(options?: PruneOptions): number"
      description: "执行清理，返回删除的 artifact 数量"

  sse_event_handlers:
    - event: "artifact.created"
      handler: "artifactStore.add / persistence-manager.insert"
      description: "接收服务端 artifact.created 事件，写入 IndexedDB 并更新 Store"

    - event: "artifact.updated"
      handler: "artifactStore.update / artifact-service.updateArtifact"
      description: "接收服务端 artifact.updated 事件，生成新版本并更新"

    - event: "artifact.deleted"
      handler: "artifactStore.remove"
      description: "接收服务端 artifact.deleted 事件，标记删除"

    - event: "run.completed"
      handler: "artifact-indexer.reindex"
      description: "Run 完成后重建相关 artifact 的索引"

  boundaries:
    upstream: ["run-engine"]
    downstream: ["canvas-workbench", "workbench-shell"]
    data_deps: ["run-engine_data", "thread-manager_data"]

  non_goals:
    - "不实现服务端 artifact 同步（local-first，暂不考虑 cloud sync）"
    - "不实现 artifact 的 ACL / 权限控制（future work）"
    - "不实现 artifact 的 collaborative editing"
    - "不直接持久化 ToolInvocation result（大结果由服务端存储，此处只存引用 URL）"
    - "不实现 artifact 的分布式复制或 CDN 分发"

  derived_from:
    - parent: "vibex-workbench-architecture"
      rationale: "artifact-registry 是架构中声明的持久化层"
    - source: "run-engine_feature.yaml"
      key_insight: "artifact.created / artifact.updated SSE 事件需要有人消费和存储"
    - source: "禹笑笑《从聊天框到工作台》"
      key_insight: "AI 生成物需要持久化、可追溯、可版本化"

  linked_data_spec: "artifact-registry_data"
  linked_modules:
    - "run-engine (上游：发送 SSE 事件)"
    - "canvas-workbench (下游：artifact → Canvas 节点可视化)"
    - "workbench-shell (下游：artifact 预览与编辑)"

  test_scenarios:
    - id: "AR-01"
      description: "接收 artifact.created SSE → 验证 artifactStore 新增 + IndexedDB 写入"
    - id: "AR-02"
      description: "updateArtifact → 验证 version +1，历史版本可查询"
    - id: "AR-03"
      description: "deleteArtifact(soft) → 验证 artifact.status=deleted，可恢复"
    - id: "AR-04"
      description: "searchArtifacts('function') → 验证 content 全文检索结果正确"
    - id: "AR-05"
      description: "Storage quota >95% → 验证新写入被阻止，返回错误"
    - id: "AR-06"
      description: "listArtifactsByThread → 验证按 threadId 过滤正确"
    - id: "AR-07"
      description: "pruneArtifacts → 验证 LRU 策略正确，保留必要版本"

  updated_by: "hermes"
  updated_at: "2026-04-19T20:10:00Z"
