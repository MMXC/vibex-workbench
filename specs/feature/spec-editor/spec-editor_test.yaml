# ============================================================
# Level 5d — Spec Editor 测试规格
# parent: spec-editor (L4)
# ============================================================
spec:
  version: "1.1"
  level: "5d_test"
  name: "spec-editor_test"
  parent: "spec-editor"
  status: "active"

content:
  trace_note: |
    Phase B（L5d）：最小可验增量，对齐 L1 C3/C7 与 L4 spec-editor vision_traceability。
    门禁语义与 generators/validate_specs、spec-engine 父链校验一致；CI 聚合仍以 make validate 为准。

  test_cases:
    - id: "TC-001"
      name: "解析标准 L1 spec"
      input: "vibex-workbench-goal.yaml"
      expected: "parse success, level=1, parent=null"

    - id: "TC-002"
      name: "从属链验证通过"
      input: "spec with valid parent"
      expected: "no violations"

    - id: "TC-003"
      name: "孤立 spec 检测"
      input: "spec with non-existent parent"
      expected: "Violation(type=missing-parent)"

    - id: "TC-004"
      name: "循环引用检测"
      input: "A.parent=B, B.parent=A"
      expected: "Violation(type=circular-ref)"

    - id: "TC-005"
      name: "层级一致性验证"
      input: "L4 spec with L2 parent"
      expected: "Violation(type=invalid-level)"
