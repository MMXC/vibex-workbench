spec:
  version: "2.0"
  level: "5b_service"
  name: "spec-editor_service"
  parent: "spec-editor"
  status: "active"

content:
  io_contract:
    input: "YAML 内容字符串 + spec 文件路径"
    output: "SpecAST + Violation[] + spec.saved 事件"
    boundary: "只做解析和验证，不做代码生成和 UI 展示"
    behavior: "解析 → 验证 → 保存 → 触发 generation"
    changelog:
      - version: "2.0"
        date: "2026-04-20"
        author: "hermes"
        changes:
          - "新增 io_contract 字段"
          - "新增 validateIOContract() 方法"

  services:
    - name: "SpecParserService"
      methods:
        - name: "parseYAML"
          params: ["content: string"]
          returns: "SpecAST"
        - name: "serializeYAML"
          params: ["ast: SpecAST"]
          returns: "string"

    - name: "ValidationService"
      methods:
        - name: "validateParentChain"
          params: ["spec: SpecAST, allSpecs: SpecAST[]"]
          returns: "Violation[]"
        - name: "validateLevelConsistency"
          params: ["spec: SpecAST"]
          returns: "Violation[]"
        - name: "validateIOContract"
          params: ["spec: SpecAST"]
          returns: "Violation[]"

    - name: "FileService"
      methods:
        - name: "readSpec"
          params: ["path: string"]
          returns: "SpecFile"
        - name: "writeSpec"
          params: ["path: string, content: string"]
          returns: "void"
        - name: "listSpecs"
          params: []
          returns: "SpecFile[]"
