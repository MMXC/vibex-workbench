content:
  description: "YAML Spec 编辑器——语法高亮、从属链解析、实时验证"

  # ── M0：愿景承接（L1/L2→L4），与 specs/meta/spec-layer-contract.yaml 对齐 ──
  vision_traceability:
    summary: "Spec Editor 把「可编辑、可校验 parent、IO 契约可感知」落到编辑器交互与 Violation 反馈"
    l1:
      goal_path: "specs/project-goal/vibex-workbench-goal.yaml"
      constraint_ids: ["C1", "C2", "C3", "C7"]
      goal_sections_hint:
        - "content.constraints（C1 变更经 spec；C2 IO 确认；C3 从属链）"
        - "content.spec_workflow_units（validate 聚合门禁与变更→todo）"
        - "content.product_value_layers.kernel_governance_and_agent"
    l2:
      skeleton_path: "specs/architecture/vibex-workbench-skeleton.yaml"
      module_id: "MOD-spec-engine"
      anchors_hint:
        - "content.modules 中 MOD-spec-engine"
        - "content.upstream_l1"
    l3:
      module_spec_path: "specs/module/MOD-spec-engine_module.yaml"
    acceptance_summary:
      - "用户可打开/编辑 YAML spec，实时或保存时获得与从属链/IO 契约一致的 Violation 与反馈（红线、列表等实现可选）"
      - "parent 跳转与聚合门禁（make lint-specs / make validate）职责可分：编辑器负责交互与即时校验，整仓门禁仍以 CLI 为准"

  # ── IO 契约 ────────────────────────────────────────
  io_contract:
    input: |
      - 用户打开/编辑 spec 文件
      - 用户输入 YAML 内容
      - router 的 route.to_spec 事件（打开指定 spec）
    output: |
      - Violation[]（从属链验证结果）
      - spec.saved 事件（触发 generation）
      - SpecFile（保存到 IndexedDB）
    boundary: |
      范围：YAML 编辑 + 实时验证
      不做：代码生成 / Canvas 可视化 / 路由决策
      parent 字段跳转 → 打开对应 spec（同模块内跳转）
    behavior: |
      1. 打开文件 → SpecParser.parseFile() → SpecAST
      2. 实时验证 → ParentChainValidator.validate()
      3. 显示 Violation 警告（红线下划线）
      4. 点击 parent 字段 → 打开对应 spec
      5. 保存 → spec.saved 事件 → 触发 generation
    changelog:
      - version: "2.1"
        date: "2026-04-22"
        author: "hermes"
        changes:
          - "新增 content.vision_traceability（M0 层级契约推广：L1/L2/L3 锚点 + 验收摘要）"
      - version: "2.0"
        date: "2026-04-20"
        author: "hermes"
        changes:
          - "新增 io_contract 字段（input/output/boundary/behavior/changelog）"
          - "新增 behavior 描述（实时验证 + parent 跳转 + spec.saved 事件）"

  user_stories:
    - id: "US-001"
      as_a: "spec 作者"
      i_want: "在 CodeMirror 编辑器中打开和编辑 YAML spec 文件"
      so_that: "我可以维护项目的规格定义"
    - id: "US-002"
      as_a: "spec 作者"
      i_want: "实时看到从属链违规警告"
      so_that: "我不会创建孤立的或循环引用的 spec"
    - id: "US-003"
      as_a: "spec 作者"
      i_want: "点击 parent 字段跳转到对应 spec 文件"
      so_that: "我可以快速追踪规格的来源"
    - id: "US-004"
      as_a: "spec 作者"
      i_want: "保存时自动验证 IO 契约字段（input/output/boundary/behavior/changelog）"
      so_that: "我确保每个 spec 都有完整的 IO 定义"

  capabilities:
    - id: "C-001"
      name: "YAML 语法高亮"
      priority: "critical"
    - id: "C-002"
      name: "从属链实时验证"
      priority: "critical"
    - id: "C-003"
      name: "IO 契约验证"
      priority: "high"
      description: "保存时检查 content 层是否包含 input/output/boundary/behavior/changelog"
    - id: "C-004"
      name: "parent 字段跳转"
      priority: "high"
    - id: "C-005"
      name: "全文搜索"
      priority: "medium"

  sub_specs:
    uiux: "spec-editor_uiux.yaml"
    service: "spec-editor_service.yaml"
    data: "spec-editor_data.yaml"
    test: "spec-editor_test.yaml"

derived_from:
  - parent: "MOD-spec-engine"
    rationale: "spec-editor 是 spec-engine 模块的核心功能实现"
