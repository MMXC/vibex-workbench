# ============================================================
# Level 5c — Spec Editor 数据规格
# parent: spec-editor (L4)
# ============================================================

spec:
  version: "2.0"
  level: "5c_data"
  name: "spec-editor_data"
  parent: "spec-editor"
  status: "active"

content:
  io_contract:
    input: "YAML 文件路径或内容"
    output: "SpecFile + SpecAST + Violation[]"
    boundary: "只做 spec 数据结构，不做解析和验证逻辑"
    behavior: "定义 spec 数据模型"
    changelog:
      - version: "2.0"
        date: "2026-04-20"
        author: "hermes"
        changes:
          - "新增 io_contract 字段"
          - "Violation 实体新增 type='io-contract-missing'"

  entities:
    - entity: "SpecFile"
      fields:
        - name: "id"
          type: "string"
          primary_key: true
        - name: "path"
          type: "string"
          unique: true
        - name: "content"
          type: "string"
        - name: "level"
          type: "number"
        - name: "name"
          type: "string"
        - name: "parent"
          type: "string | null"
        - name: "status"
          type: "'active' | 'draft' | 'confirmed' | 'deprecated'"
        - name: "updatedAt"
          type: "Date"

    - entity: "Tab"
      fields:
        - name: "id"
          type: "string"
          primary_key: true
        - name: "specFileId"
          type: "string"
        - name: "label"
          type: "string"
        - name: "isActive"
          type: "boolean"

    - entity: "Violation"
      fields:
        - name: "id"
          type: "string"
          primary_key: true
        - name: "specId"
          type: "string"
        - name: "type"
          type: "'missing-parent' | 'circular-ref' | 'invalid-level' | 'io-contract-missing'"
          description: |
            io-contract-missing = spec.content 缺少 input/output/boundary/behavior/changelog
        - name: "message"
          type: "string"
        - name: "line"
          type: "number | null"
