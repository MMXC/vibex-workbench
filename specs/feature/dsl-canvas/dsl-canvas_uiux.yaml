# ============================================================
# Level 5a — DSL Canvas UI/UX 规格
# parent: dsl-canvas (L4)
# ============================================================
spec:
  version: "1.0"
  level: "5a_uiux"
  name: "dsl-canvas_uiux"
  parent: "dsl-canvas"
  status: "active"

content:
  pages:
    - id: "dsl-canvas-page"
      layout:
        type: "workspace"
        grid_template: "1fr"
      regions:
        - id: "mermaid-main"
          position: "center"
          components: ["MermaidViewer", "CanvasToolbar"]

  components:
    - id: "MermaidViewer"
      type: "composite"
      states:
        - state: "loading"
          style: "opacity: 0.5"
        - state: "rendered"
          style: "opacity: 1"
        - state: "error"
          style: "border: 2px solid var(--color-error)"

    - id: "MermaidNode"
      type: "atomic"
      states:
        - state: "default"
          style: "border-radius: 4px; padding: 4px 8px"
        - state: "highlighted"
          style: "box-shadow: 0 0 0 3px var(--color-primary-alpha)"

    - id: "CanvasToolbar"
      type: "composite"
      states:
        - state: "default"
          style: "background: var(--color-bg-secondary)"

  level_colors:
    L1: "#ef4444"
    L2: "#f97316"
    L3: "#eab308"
    L4: "#22c55e"
    L5: "#3b82f6"
    L6: "#8b5cf6"

  state_management:
    stores:
      - store: "dslCanvasStore"
        state:
          - name: "mermaidCode"
            type: "string"
          - name: "highlightedSpecId"
            type: "string | null"
          - name: "zoomLevel"
            type: "number"
          - name: "panOffset"
            type: "{ x: number; y: number }"
          - name: "viewMode"
            type: "'mermaid' | 'canvas'"
        mutations:
          - name: "setMermaidCode"
            params: ["code: string"]
          - name: "highlightSpec"
            params: ["specId: string | null"]
          - name: "setZoom"
            params: ["level: number"]
          - name: "setPan"
            params: ["offset: { x: number; y: number }"]

  sse_events:
    - event: "spec.opened"
      handler: "dslCanvasStore.highlightSpec"
    - event: "spec.modified"
      handler: "dslCanvasStore.refreshMermaid"

  design_tokens:
    colors:
      primary: "#6366f1"
      bg_base: "#0f0f0f"
      border: "#333"
    animation:
      duration_fast: "120ms"
      duration_normal: "200ms"
