# ============================================================
# Level 5c — DSL Canvas 数据规格
# parent: dsl-canvas (L4)
# ============================================================

spec:
  version: "2.0"
  level: "5c_data"
  name: "dsl-canvas_data"
  parent: "dsl-canvas"
  status: "active"

content:
  io_contract:
    input: "DependencyGraph（spec视图）+ SSE事件数组（canvas视图）"
    output: "SpecNode[] + SpecEdge[] + MermaidGraph + CanvasNode[]"
    boundary: "只做数据结构定义，不做转换逻辑（converter负责）"
    behavior: "定义两种视图的数据模型"
    changelog:
      - version: "2.0"
        date: "2026-04-20"
        author: "hermes"
        changes:
          - "新增 io_contract 字段"
          - "新增 CanvasNode / CanvasConnection（canvas视图数据模型）"
          - "新增 SSEEventSubscription（订阅记录）"

  entities:
    - entity: "SpecNode"
      fields:
        - name: "id"
          type: "string"
          primary_key: true
        - name: "specId"
          type: "string"
        - name: "level"
          type: "number"
        - name: "name"
          type: "string"
        - name: "x"
          type: "number"
        - name: "y"
          type: "number"
        - name: "color"
          type: "string"

    - entity: "SpecEdge"
      fields:
        - name: "id"
          type: "string"
          primary_key: true
        - name: "fromSpecId"
          type: "string"
        - name: "toSpecId"
          type: "string"
        - name: "label"
          type: "string | null"

    - entity: "MermaidGraph"
      fields:
        - name: "code"
          type: "string"
        - name: "generatedAt"
          type: "Date"
        - name: "specIds"
          type: "string[]"

    - entity: "CanvasNode"
      description: "Canvas视图的节点，代表SSE事件"
      fields:
        - name: "id"
          type: "string"
          primary_key: true
        - name: "eventId"
          type: "string"
        - name: "threadId"
          type: "string"
        - name: "nodeType"
          type: "input | sequence | iteration | branch | subagent | gate | output"
        - name: "label"
          type: "string"
        - name: "x"
          type: "number"
        - name: "y"
          type: "number"
        - name: "status"
          type: "pending | running | done | error"
        - name: "color"
          type: "string"
        - name: "payload"
          type: "object"

    - entity: "CanvasConnection"
      description: "Canvas视图的连线，代表时间顺序"
      fields:
        - name: "id"
          type: "string"
        - name: "fromNodeId"
          type: "string"
        - name: "toNodeId"
          type: "string"
        - name: "type"
          type: "sequence | iteration-loop"

    - entity: "SSEEventSubscription"
      description: "Event Bus订阅记录"
      fields:
        - name: "eventPattern"
          type: "string"
        - name: "handler"
          type: "Function"
        - name: "activeThreadId"
          type: "string | null"
