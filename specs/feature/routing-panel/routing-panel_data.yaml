# ============================================================
# Level 5c — Routing Panel 数据规格
# parent: routing-panel (L4)
# ============================================================

spec:
  version: "2.0"
  level: "5c_data"
  name: "routing-panel_data"
  parent: "routing-panel"
  status: "active"

content:
  io_contract:
    input: "feature-spec 确认的数据需求 + 字段定义"
    output: "data entities（RouteDecision, ClarificationSession, ConfirmedIO, BugReport）+ TypeScript interfaces"
    boundary: "只定义数据结构和类型，不包含业务逻辑"
    behavior: "提供 TypeScript interface 导出，供前端 store 和后端 service 共享"
    changelog:
      - version: "2.0"
        date: "2026-04-20"
        author: "hermes"
        changes:
          - "新增 ClarificationSession（澄清循环状态机）"
          - "新增 ConfirmedIO（用户确认的IO契约）"
          - "新增 BugReport + BugChangelogEntry（bug跟踪）"
          - "新增 Suggestion（agent选项建议）"

  entities:
    - entity: "RouteDecision"
      fields:
        - name: "route"
          type: "goal | feature | bug"
        - name: "confidence"
          type: "number (0-1)"
        - name: "reason"
          type: "string"

    - entity: "ClarificationSession"
      fields:
        - name: "id"
          type: "string"
          primary_key: true
        - name: "threadId"
          type: "string"
        - name: "route"
          type: "goal | feature | bug"
        - name: "state"
          type: "idle | receiving | clarification_loop | terminating"
        - name: "subState"
          type: "string | null"
        - name: "questions"
          type: "Clarification[]"
        - name: "answers"
          type: "Clarification[]"
        - name: "suggestions"
          type: "Suggestion[]"
        - name: "isResolved"
          type: "boolean"
        - name: "createdAt"
          type: "Date"
        - name: "resolvedAt"
          type: "Date | null"

    - entity: "Clarification"
      fields:
        - name: "id"
          type: "string"
        - name: "type"
          type: "ask | answer"
        - name: "question"
          type: "string"
        - name: "answer"
          type: "string | null"
        - name: "timestamp"
          type: "Date"

    - entity: "Suggestion"
      fields:
        - name: "id"
          type: "string"
        - name: "content"
          type: "string"
        - name: "type"
          type: "style | direction | detail | boundary"
        - name: "accepted"
          type: "boolean | null"

    - entity: "ConfirmedIO"
      description: "每条对话最终必须产出用户确认的IO契约"
      fields:
        - name: "id"
          type: "string"
        - name: "threadId"
          type: "string"
        - name: "route"
          type: "goal | feature | bug"
        - name: "input"
          type: "string"
        - name: "output"
          type: "string"
        - name: "boundary"
          type: "string"
        - name: "confirmedBy"
          type: "user_confirmation | screenshot_confirmed"
        - name: "confirmedAt"
          type: "Date"
        - name: "specId"
          type: "string | null"
        - name: "prototypePath"
          type: "string | null"

    - entity: "BugReport"
      fields:
        - name: "id"
          type: "string"
        - name: "threadId"
          type: "string"
        - name: "description"
          type: "string"
        - name: "expected"
          type: "string"
        - name: "actual"
          type: "string"
        - name: "reproduceSteps"
          type: "string[]"
        - name: "specId"
          type: "string"
        - name: "rootCause"
          type: "string | null"
        - name: "status"
          type: "open | fixed | wontfix"
        - name: "changelog"
          type: "BugChangelogEntry[]"

    - entity: "BugChangelogEntry"
      fields:
        - name: "version"
          type: "string"
        - name: "date"
          type: "Date"
        - name: "author"
          type: "string"
        - name: "changes"
          type: "string[]"
