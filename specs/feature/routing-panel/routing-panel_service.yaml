# ============================================================
# Level 5b — Routing Panel 服务规格
# parent: routing-panel (L4)
# ============================================================

spec:
  version: "2.0"
  level: "5b_service"
  name: "routing-panel_service"
  parent: "routing-panel"
  status: "active"

content:
  io_contract:
    input: "RouteDecision + ClarificationSession（澄清循环进行中）+ SSE 事件流"
    output: "ConfirmedIO（用户确认的 input/output/boundary）+ SSE 事件广播"
    boundary: "只管理澄清循环状态和事件广播，不管理 Canvas 渲染"
    behavior: "澄清循环状态机 + SSE 事件广播 → Event Bus → Canvas 订阅"
    changelog:
      - version: "2.0"
        date: "2026-04-20"
        author: "hermes"
        changes:
          - "新增 GoalClarificationLoop / FeatureClarificationLoop / BugClarificationLoop"
          - "新增 SSEEventEmitter（Event Bus 广播）"

  services:
    - name: "ChangeRouter"
      description: "变更路由引擎——入口路由判断"
      methods:
        - name: "route"
          params: ["utterance: string"]
          returns: "RouteDecision"
        - name: "startClarification"
          params: ["route: RouteDecision"]
          returns: "ClarificationSession"

    - name: "GoalClarificationLoop"
      description: "goal路由的澄清循环——生成产品原型"
      methods:
        - name: "ask"
          params: ["question: string"]
          returns: "Clarification"
        - name: "suggest"
          params: ["options: string[]", "type: string"]
          returns: "Suggestion[]"
        - name: "receiveAnswer"
          params: ["answer: string"]
          returns: "Clarification"
        - name: "isResolved"
          returns: "boolean"
        - name: "getConfirmedIO"
          returns: "ConfirmedIO"
        - name: "generatePrototype"
          params: ["direction: string", "style: string"]
          returns: "string"

    - name: "FeatureClarificationLoop"
      description: "feature路由的澄清循环——确认IO + 更新spec"
      methods:
        - name: "ask"
          params: ["question: string"]
          returns: "Clarification"
        - name: "receiveAnswer"
          params: ["answer: string"]
          returns: "Clarification"
        - name: "isResolved"
          returns: "boolean"
        - name: "getConfirmedIO"
          returns: "ConfirmedIO"
        - name: "generateSpecDelta"
          returns: "FeatureSpecDelta"

    - name: "BugClarificationLoop"
      description: "bug路由的澄清循环——复现 + 修复"
      methods:
        - name: "ask"
          params: ["question: string"]
          returns: "Clarification"
        - name: "receiveAnswer"
          params: ["answer: string"]
          returns: "Clarification"
        - name: "isResolved"
          returns: "boolean"
        - name: "getBugReport"
          returns: "BugReport"
        - name: "locateSpec"
          params: ["bugDescription: string"]
          returns: "string"

    - name: "SpecLevelMapper"
      description: "将变更映射到spec层"
      methods:
        - name: "mapToSpecLayer"
          params: ["route: RouteDecision", "context: string[]"]
          returns: "string[]"

    - name: "ImpactAnalyzer"
      description: "分析变更影响范围"
      methods:
        - name: "analyzeImpact"
          params: ["specId: string"]
          returns: "ImpactReport"

    - name: "SSEEventEmitter"
      description: "SSE事件发射器——广播到Event Bus"
      methods:
        - name: "emit"
          params: ["event: string", "payload: object"]
          returns: "void"
