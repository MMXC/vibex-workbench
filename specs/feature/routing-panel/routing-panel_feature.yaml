# ============================================================
# Level 4 — Routing Panel 功能规格
# parent: MOD-router (L3)
#
# 核心职责：三条路由路径（goal/feature/bug）+ 歧义消除循环
# 规范：所有对话在路由前必须走澄清循环，确保输入/输出/边界经用户确认
# ============================================================

spec:
  version: "2.1"
  level: "4_feature"
  name: "routing-panel"
  parent: "MOD-router"
  status: "active"

meta:
  module: "MOD-router"
  owner: "hermes"
  created: "2026-04-20"
  updated: "2026-04-22"
  pilot_m0_layer_contract: true

content:
  description: "变更路由面板——输入自然语言需求 → 判断路由类型 → 执行澄清循环 → 确认 IO → 触发对应处理"

  # ── M0：愿景承接（L1/L2→L4），与 specs/meta/spec-layer-contract.yaml 对齐 ──
  vision_traceability:
    summary: "Routing Panel 把「goal|feature|bug 分支 + 澄清循环 + ConfirmedIO」落到可交互面板与 SSE 事件序列"
    l1:
      goal_path: "specs/project-goal/vibex-workbench-goal.yaml"
      constraint_ids: ["C1", "C2", "C3", "C7"]
      goal_sections_hint:
        - "content.constraints（C1 变更经闭环；C2 IO 确认；C3 从属链）"
        - "content.l1_l2_lineage.traceability（路由与澄清 ↔ MOD-router）"
        - "content.spec_workflow_units（澄清终止后对接 validate / todo）"
    l2:
      skeleton_path: "specs/architecture/vibex-workbench-skeleton.yaml"
      module_id: "MOD-router"
      anchors_hint:
        - "content.modules 中 MOD-router"
        - "content.upstream_l1"
    l3:
      module_spec_path: "specs/module/MOD-router_module.yaml"
    acceptance_summary:
      - "用户输入可被分类为 goal|feature|bug 之一并进入对应澄清叙事；终止条件与 ConfirmedIO 语义与本 feature io_contract 一致"
      - "route.determined / dialog.clarification / route.to_spec 等事件可被订阅用于 Canvas 或后续模块；聚合门禁仍以 make validate 为准"

  io_contract:
    input: "用户的自然语言需求描述（可能是新方向/新功能/bug 报告）"
    output: |
      - RouteDecision: 路由类型（goal|feature|bug）
      - ClarificationSession: 澄清循环状态
      - ConfirmedIO: 用户确认的 input/output/boundary
      - SSE 事件：route.determined / dialog.clarification / route.to_spec / route.to_goal
    boundary: |
      范围：路由判断 + 澄清循环 + IO 确认
      不做：spec 编写（由 spec-engine/spec-designer 负责）
      不做：代码生成（由 code-generator 负责）
      不做：界面展示（由 dsl-canvas 负责）
      规范约束：所有对话在路由决策前必须经过澄清循环
    behavior: |
      1. 接收用户输入 → 关键词分析（方向词/功能词/bug词）
      2. 判断路由类型（goal/feature/bug）
      3. 进入对应澄清循环（循环）：
         - agent 提问 + agent 提供建议选项
         - user 回答 + user 给方向
         - agent 给出 IO 建议
         - user 确认 IO
      循环终止：user 明确说出确认语句（"好"/"确认"/"就这样"）
      4. 输出 ConfirmedIO（用户签字的 input/output/boundary）
      5. 发送 SSE 事件 → 触发后续处理
      6. Canvas 展示整条链路
    changelog:
      - version: "2.1"
        date: "2026-04-22"
        author: "hermes"
        changes:
          - "新增 content.vision_traceability（M0 层级契约推广：L1/L2/L3 锚点 + 验收摘要）"
      - version: "2.0"
        date: "2026-04-20"
        author: "hermes"
        changes:
          - "从「变更路由到 spec 层」升级为「三条路由路径 + 澄清循环规范」"
          - "新增 ClarificationSession + ConfirmedIO 数据结构"
          - "新增 result[] 追踪最终产出"
          - "明确规范：所有对话在路由前必须走澄清循环"

  result:
    - path: "/root/vibex-workbench/prototypes/routing-panel-prototype.html"
      type: "html-prototype"
      spec_link: "routing-panel_behavior.yaml"
      confirmed_by: "user_screenshot"
      confirmed_at: "pending"
      note: "三栏布局原型，含三条路由颜色编码：goal(紫)/feature(绿)/bug(橙)"
    - path: "/root/vibex-workbench/backend/router/change_router.go"
      type: "source-code"
      spec_link: "routing-panel_service.yaml"
      confirmed_by: "manual"
      confirmed_at: "pending"
      note: "ChangeRouter 路由判断逻辑，待实现"

  # ── 三条路由路径 ────────────────────────────────────
  routing_paths:
    goal_route:
      trigger_keywords: ["做一个", "新的", "想做", "想开发", "新产品", "新方向"]
      trigger_condition: "用户描述的是全新的产品/功能方向，不是对现有功能的修改"
      color: "#a78bfa"  # 紫色
      clarification_loop_summary: "澄清循环（循环）：agent提问->agent提供风格建议->user选择方向->agent生成HTML原型->user截图确认"
      termination: "user说出确认语句：好/确认/就这样/ok/OK"
      canvas_nodes: "dialog.started -> dialog.clarification(循环xN) -> route.determined(goal) -> spec.designer -> dialog.completed(output=HTML原型)"
      output_spec: "vibex-workbench-goal的新条目或新spec文件"
      example: "用户说「我想做一个AI写作助手，风格参考Notion」-> spec-goal生成原型 -> user确认 -> goal-spec confirmed"

    feature_route:
      trigger_keywords: ["加", "新增", "想要", "功能", "支持", "能不能"]
      trigger_condition: "用户对现有产品提出新功能需求，不是全新方向"
      color: "#34d399"  # 绿色
      clarification_loop_summary: "澄清循环（循环）：agent提问(输入/输出/边界)->user回答->agent给出spec变更建议->user确认spec"
      termination: "user确认IO + boundary"
      canvas_nodes: "dialog.started -> dialog.clarification(循环xN) -> route.determined(feature) -> spec.changed -> test.written -> test.passed/failed(循环) -> spec.confirmed -> dialog.completed"
      output_spec: "更新的feature-spec + test-spec"
      example: "用户说「在导出面板加一个导出PDF功能」-> spec-feature更新spec+test -> make generate -> Canvas展示"

    bug_route:
      trigger_keywords: ["不对", "没反应", "bug", "错误", "坏了", "问题", "修复"]
      trigger_condition: "用户报告一个预期之外的行为"
      color: "#fb923c"  # 橙色
      clarification_loop_summary: "澄清循环（循环）：agent复现问题->user补充细节->agent定位feature-spec->user确认bug描述和根因"
      termination: "user确认bug描述"
      canvas_nodes: "dialog.started -> dialog.clarification(循环xN) -> route.determined(bug) -> spec.changed -> test.written -> test.passed/failed(循环) -> bug.fixed -> dialog.completed(output=fixed)"
      output_spec: "bug-changelog记录 + 更新的feature-spec + 修复验证测试"
      example: "用户说「点击保存按钮没反应」-> 定位到spec-editor -> 修复 -> 测试通过 -> bug-changelog记录"

  user_stories:
    - id: "US-001"
      as_a: "开发者"
      i_want: "输入一个需求描述，系统自动判断是 goal/feature/bug 并进入对应处理流程"
      so_that: "我不需要手动选择路由类型"
    - id: "US-002"
      as_a: "开发者"
      i_want: "看到澄清循环中的 IO 确认过程"
      so_that: "我知道系统的每一步在做什么"
    - id: "US-003"
      as_a: "开发者"
      i_want: "看到 Canvas 上展示的整条行为链路"
      so_that: "我直观看到从需求到交付的完整流程"
    - id: "US-004"
      as_a: "开发者"
      i_want: "确认最终的 IO 输出"
      so_that: "我知道系统理解的需求和我的原始意图一致"

  capabilities:
    - id: "C-001"
      name: "路由类型判断"
      priority: "critical"
      description: "关键词分析 + 语义理解 → goal|feature|bug"
    - id: "C-002"
      name: "澄清循环执行"
      priority: "critical"
      description: "agent 提问 + agent 提供选项建议 + user 给方向 + user 确认 IO"
    - id: "C-003"
      name: "IO 确认契约"
      priority: "critical"
      description: "每个对话最终必须产出 ConfirmedIO（user 确认的 input/output/boundary）"
    - id: "C-004"
      name: "SSE 事件广播"
      priority: "critical"
      description: "所有路由状态变化通过 Event Bus 广播到 Canvas"
    - id: "C-005"
      name: "Canvas 链路展示"
      priority: "critical"
      description: "每条路由的整条澄清链路由 Canvas 展示"
    - id: "C-006"
      name: "spec-designer 集成（goal 路由）"
      priority: "high"
      description: "goal 路由触发 spec-designer 生成 HTML 原型"

  sub_specs:
    uiux: "routing-panel_uiux.yaml"
    service: "routing-panel_service.yaml"
    data: "routing-panel_data.yaml"
    behavior: "routing-panel_behavior.yaml"
    test: "routing-panel_test.yaml"

derived_from:
  - parent: "MOD-router"
    rationale: "routing-panel 是 router 模块的核心功能实现，实现 goal 的三条路由路径"
