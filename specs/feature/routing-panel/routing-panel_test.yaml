# ============================================================
# Level 5d — Routing Panel 测试规格
# parent: routing-panel (L4)
#
# TDD 格式：given / when / then / boundary
# ============================================================

spec:
  version: "2.0"
  level: "5d_test"
  name: "routing-panel_test"
  parent: "routing-panel"
  status: "active"

content:
  # ── IO 契约 ────────────────────────────────────────
  io_contract:
    input: "路由测试用例（given/when/then/boundary）"
    output: "测试通过/失败结果 + SSE 事件序列"
    boundary: "测试在隔离环境中运行，不涉及真实的 spec 写入或代码生成"
    behavior: "TDD 循环：given → when → then → 失败则迭代修复 → 通过则进入下一测试"
    changelog:
      - version: "2.0"
        date: "2026-04-20"
        author: "hermes"
        changes:
          - "格式从 placeholder 升级为完整 TDD 格式（given/when/then/boundary）"

  # ── 路由判断测试 ────────────────────────────────────
  routing_tests:
    - id: "TC-R01"
      name: "goal 路由判断：全新产品方向"
      given: |
        用户输入：「我想做一个 AI 写作助手，风格参考 Notion」
      when: |
        router.route(utterance)
      then: |
        route = 'goal'
        confidence >= 0.7
        SSE: route.determined(route='goal')
        Canvas: branch 节点显示
      boundary: |
        输入包含「想做」「新的」「风格」→ goal
        输入是对现有功能修改 → feature（不走 goal）
        输入描述 bug → bug（不走 goal）

    - id: "TC-R02"
      name: "feature 路由判断：现有功能新需求"
      given: |
        用户输入：「加一个导出 PDF 功能到导出面板」
      when: |
        router.route(utterance)
      then: |
        route = 'feature'
        confidence >= 0.7
        SSE: route.determined(route='feature')
        Canvas: branch 节点显示
      boundary: |
        关键词「加」「新增」「支持」「能不能」→ feature
        全新方向（无现有功能引用）→ goal

    - id: "TC-R03"
      name: "bug 路由判断：问题报告"
      given: |
        用户输入：「点击保存按钮没反应，坏了」
      when: |
        router.route(utterance)
      then: |
        route = 'bug'
        confidence >= 0.7
        SSE: route.determined(route='bug')
        Canvas: branch 节点显示
      boundary: |
        关键词「不对」「没反应」「bug」「坏了」「问题」→ bug
        功能请求（带「想」「要」）→ feature

  # ── 澄清循环测试 ────────────────────────────────────
  clarification_tests:
    - id: "TC-C01"
      name: "goal 路由澄清循环：风格建议"
      given: |
        route = 'goal'
        user_utterance = 「我想做一个写作助手」
      when: |
        goalClarificationLoop.ask(question).then(user_responds("风格要简洁"))
        .then(agent_suggests(["Linear暗色", "Notion暖白", "Claude温暖"]))
      then: |
        SSE: dialog.clarification(type='suggest', options=[...])
        Canvas: iteration 节点显示
        agent_suggestions 包含 3 个选项
      boundary: |
        agent 最多提供 3 个选项（避免选择疲劳）
        user 选完方向 → 澄清循环终止
        user 拒绝所有选项 → agent 提供新建议（循环）

    - id: "TC-C02"
      name: "feature 路由澄清循环：IO 确认"
      given: |
        route = 'feature'
        user_utterance = 「加一个导出 PDF」
      when: |
        featureClarificationLoop.start()
        .then(agent_asks("输入是什么？")).then(user_responds("当前编辑的文档内容"))
        .then(agent_asks("输出是什么？")).then(user_responds("PDF 文件下载"))
      then: |
        SSE: dialog.clarification(type='ask') × 2
        Canvas: iteration 节点 × 2
        confirmedIO.input = "当前编辑的文档内容"
        confirmedIO.output = "PDF 文件下载"
      boundary: |
        每次澄清只能问一个维度（输入/输出/边界/优先级）
        user 确认 IO 后 → 澄清循环终止

    - id: "TC-C03"
      name: "澄清循环终止：用户确认语句"
      given: |
        clarificationLoop 处于 clarification_loop 状态
        用户说：「好，就这样吧」
      when: |
        clarificationLoop.receiveAnswer("好，就这样吧")
      then: |
        isResolved = true
        SSE: spec.confirmed / route.to_goal / route.to_spec
        Canvas: gate 节点显示（绿色）
      boundary: |
        确认语句：「好」「确认」「就这样」「ok」「OK」
        上传截图 → 自动触发确认
        连续拒绝 3 次 → agent 主动终止循环

  # ── IO 确认契约测试 ─────────────────────────────────
  io_tests:
    - id: "TC-IO01"
      name: "goal 路由 IO 确认：HTML 原型输出"
      given: |
        用户完成 goal 澄清循环，确认了产品方向
        spec-designer 生成了 HTML 原型
      when: |
        user.confirmsPrototype(prototypePath, screenshot)
      then: |
        confirmedIO.input = 用户原始需求
        confirmedIO.output = prototypePath
        confirmedIO.confirmedBy = 'screenshot_confirmed'
        SSE: spec.confirmed(specId=vibex-workbench-goal)
        Canvas: output 节点显示（HTML原型路径）
      boundary: |
        必须有 screenshot 确认才记录 confirmedIO
        无 screenshot 只口头确认 → 警告但允许

    - id: "TC-IO02"
      name: "feature 路由 IO 确认：spec 变更"
      given: |
        用户完成 feature 澄清循环，确认了 IO 和边界
        agent 生成了 feature-spec 变更
      when: |
        user.confirmsSpec(specId, delta)
      then: |
        confirmedIO.input = 用户需求描述
        confirmedIO.output = specId
        confirmedIO.boundary = 边界描述
        SSE: spec.confirmed(specId)
        Canvas: gate 节点（绿色）
      boundary: |
        用户必须明确说出确认（不能默认接受）
        确认后 spec 进入 active 状态

  # ── TDD 循环测试 ────────────────────────────────────
  tdd_tests:
    - id: "TC-TDD01"
      name: "feature TDD 循环：测试失败 → 修复 → 通过"
      given: |
        feature-route 确认了 IO
        spec = "导出面板"
      when: |
        1. agent.writesTest(given="输入: 文档内容", when="点击导出PDF", then="返回PDF二进制")
        2. test.run() → FAILED (PDF库未加载)
        3. agent.fixes(导入PDF库)
        4. test.run() → PASSED
      then: |
        SSE: test.written → test.failed → spec.changed → test.passed
        Canvas: sequence → iteration(红) → sequence → gate(绿)
      boundary: |
        测试失败 → 必须修复代码 → 重新测试（不能跳过）
        循环最多 3 次 → 超过则记录 issue

    - id: "TC-TDD02"
      name: "bug TDD 循环：复现 → 写测试 → 修复 → 通过"
      given: |
        bug-route 确认了 bug 描述
        bug = "点击保存按钮无响应"
        spec = "spec-editor"
      when: |
        1. agent.writesTest(given="编辑器有内容", when="点击保存", then="触发save事件")
        2. test.run() → FAILED (事件未绑定)
        3. agent.fixes(绑定save事件)
        4. test.run() → PASSED
        5. bug.status = 'fixed'
      then: |
        SSE: test.written → test.failed → spec.changed → test.passed → bug.fixed
        Canvas: sequence → iteration(红) → sequence → gate(绿) → output
      boundary: |
        bug 必须有对应的测试防止回归
        bug-changelog 记录修复版本

  # ── Canvas SSE 事件测试 ─────────────────────────────
  sse_tests:
    - id: "TC-SSE01"
      name: "完整对话 SSE 事件序列（goal 路由）"
      given: |
        用户输入：「我想做一个 AI 写作助手」
      when: |
        router.route() → clarificationLoop → user confirms → spec.designer generates
      then: |
        SSE 事件序列：
        1. dialog.started → Canvas: input 节点
        2. route.determined(goal) → Canvas: branch 节点
        3. dialog.clarification(ask) × N → Canvas: iteration 节点 × N
        4. dialog.clarification(suggest) → Canvas: iteration 节点
        5. spec.confirmed → Canvas: gate 节点（绿）
        6. dialog.completed(output=HTML) → Canvas: output 节点
      boundary: |
        事件必须按时间顺序（eventId 递增）
        乱序事件 → 前端按 eventId 重排
        重复 eventId → 丢弃重复

    - id: "TC-SSE02"
      name: "Canvas 节点连线正确（feature 路由 + TDD）"
      given: |
        用户完成 feature-route + TDD 循环
        测试案例数 = 3，全部通过
      then: |
        Canvas 节点序列：
        input → branch(feature) →
        iteration × 2 → spec.changed →
        test.written → test.passed → test.written → test.passed →
        test.written → test.failed → test.written → test.passed →
        spec.confirmed → output
      boundary: |
        test.failed 必须连接回修复循环
        所有 test.passed 后才能 spec.confirmed
        spec.confirmed 必须是最后一个节点（输出前）
