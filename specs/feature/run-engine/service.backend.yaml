# ============================================================
# Level 5a — Run Engine Backend Service 实现规格
# Backend Service Implementation Specification (Go)
# ============================================================
# 从属于: run-engine_feature.yaml (L4)
# 接口契约: service.yaml

spec:
  version: "0.1.0"
  level: "5a_service_backend"
  name: "run-engine-backend"
  parent: "run-engine-feature"
  status: "draft"

meta:
  owner: "backend"
  tech_stack: ["Go", "net/http", "sse"]
  description: "Run Engine 后端实现规格"

content:
  # ── Go Service 接口 ─────────────────────────────────────────────
  go_interface:
    name: "RunEngineService"
    package: "internal/service/run"
    methods:
      - name: "StartRun"
        signature: "func (s *RunEngineService) StartRun(ctx context.Context, req *pb.StartRunRequest) (*pb.Run, error)"
      - name: "CancelRun"
        signature: "func (s *RunEngineService) CancelRun(ctx context.Context, id string) error"
      - name: "PauseRun"
        signature: "func (s *RunEngineService) PauseRun(ctx context.Context, id string) error"
      - name: "ResumeRun"
        signature: "func (s *RunEngineService) ResumeRun(ctx context.Context, id string) error"

  # ── HTTP Handlers ─────────────────────────────────────────────
  http_handlers:
    - path: "POST /api/runs"
      impl: "StartRun"
    - path: "DELETE /api/runs/:id"
      impl: "CancelRun"
    - path: "POST /api/runs/:id/pause"
      impl: "PauseRun"
    - path: "POST /api/runs/:id/resume"
      impl: "ResumeRun"

  # ── SSE 端点 ─────────────────────────────────────────────
  sse_endpoint:
    path: "GET /api/sse/runs/:threadId"
    description: "Run 事件 SSE 流，发送 run.* / tool.* / message.delta / artifact.created 事件"

  # ── 任务执行器 (Mock) ─────────────────────────────────────────────
  task_executor:
    description: "Minimal task executor — 接收 goal 后模拟执行几个工具调用，推送 SSE 事件"
    mock_tools: ["read_file", "terminal", "search_files"]
    mock_delay_ms: 500

  # ── 仓储层 ─────────────────────────────────────────────
  repository:
    name: "RunRepository"
    package: "internal/data/run"
    methods: ["Create", "Get", "Update", "List"]
