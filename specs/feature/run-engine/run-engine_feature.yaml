# ============================================================
# Level 4 — Run Engine 功能规格
# Feature Specification
#
# 从属于：vibex-workbench-architecture (L2)
# 下层：run-engine_data.yaml (L5c)
# ============================================================

spec:
  version: "0.1.0"
  level: "4"
  name: "run-engine"
  parent: "vibex-workbench-architecture"
  status: "draft"

meta:
  feature: "run-engine"
  owner: "frontend"
  target_users: ["user", "canvas-workbench", "thread-manager"]

content:
  overview:
    description: "Run Engine 负责管理 Run 生命周期（queued → planning → executing → completed/failed），消费 SSE 事件流，驱动 runStore 和 Canvas 可视化"
    responsibilities:
      - "Run 生命周期状态机管理"
      - "SSE 事件流消费（run.started / tool.called / tool.completed / message.delta 等）"
      - "三层可见性渲染控制（toolVisibilityLayer）"
      - "与 canvas-workbench 双向同步（Run → Canvas 节点）"
      - "ToolInvocation 记录：发起、进行中、完成、失败"

  modules:
    - name: "run-state-machine"
      description: "Run 状态转换引擎"
      responsibilities:
        - "维护 runStore.runs[] 和 runStore.currentRunId"
        - "处理状态转换：queued → planning → executing → completed | failed | cancelled"
        - "暴露 startRun(threadId, goal) / cancelRun(runId) API"

    - name: "sse-consumer"
      description: "SSE 事件流消费者"
      responsibilities:
        - "建立并维护 SSE 连接（基于当前 threadId）"
        - "解析并分发事件到对应 Store handlers"
        - "处理重连、心跳、超时"
        - "支持并发 Run 的事件路由（按 runId 隔离）"

    - name: "tool-invocation-tracker"
      description: "ToolInvocation 生命周期追踪"
      responsibilities:
        - "记录每个 tool.call（id / name / args / status）"
        - "响应 tool.called / tool.completed / tool.failed 事件"
        - "维护 runStore.toolInvocations[]"

    - name: "visibility-controller"
      description: "三层可见性控制"
      responsibilities:
        - "toolVisibilityLayer: 1（自然语言）| 2（结构化）| 3（开发者日志）"
        - "根据层级过滤 runStore.messageStream 渲染内容"
        - "暴露 setVisibilityLayer(layer: 1|2|3) API"

    - name: "canvas-sync"
      description: "Run → Canvas 同步桥接"
      responsibilities:
        - "消费 run.started / tool.called / run.completed 事件"
        - "将 Run / ToolInvocation 映射为 Canvas Node"
        - "推送至 canvasStore.nodes[]"

  public_api:
    - name: "runStore"
      description: "Svelte Store：runs[] / currentRunId / toolInvocations[] / messageStream / visibilityLayer"
    - name: "startRun(threadId: string, goal: string): Run"
      description: "发起新 Run，返回 Run 对象"
    - name: "cancelRun(runId: string): void"
      description: "取消指定 Run"
    - name: "pauseRun(runId: string): void"
      description: "暂停指定 Run（executing → paused）"
    - name: "resumeRun(runId: string): void"
      description: "恢复指定 Run（paused → executing）"
    - name: "setVisibilityLayer(layer: 1 | 2 | 3): void"
      description: "切换工具可见性层级"
    - name: "subscribeSSE(threadId: string): void"
      description: "订阅指定 Thread 的 SSE 事件流"
    - name: "unsubscribeSSE(): void"
      description: "取消 SSE 订阅"

  sse_event_handlers:
    - event: "run.started"
      handler: "runStore.setCurrentRun"
      description: "设置 currentRunId，触发 canvas-sync"
    - event: "run.stage_changed"
      handler: "runStore.updateStage"
      description: "更新 Run 阶段（planning / executing / ...）"
    - event: "tool.called"
      handler: "runStore.addToolInvocation"
      description: "追加 ToolInvocation"
    - event: "tool.completed"
      handler: "runStore.updateToolInvocation"
      description: "更新 ToolInvocation status=completed，附加 result"
    - event: "tool.failed"
      handler: "runStore.markToolFailed"
      description: "更新 ToolInvocation status=failed，附加 error"
    - event: "message.delta"
      handler: "runStore.appendMessage"
      description: "追加 message delta 到 messageStream"
    - event: "artifact.created"
      handler: "artifactStore.add"
      description: "透传给 artifact-registry"
    - event: "run.completed"
      handler: "runStore.markCompleted"
      description: "设置 Run status=completed"
    - event: "run.failed"
      handler: "runStore.markFailed"
      description: "设置 Run status=failed"

  boundaries:
    upstream: ["thread-manager"]
    downstream: ["canvas-workbench", "artifact-registry"]
    data_deps: ["thread-manager", "canvas-workbench_data"]

  non_goals:
    - "不实现 Run 的服务端重试逻辑（由后端 SSE 端点保证）"
    - "不实现分布式 Run 调度"
    - "不直接持久化 Run 数据（由 artifact-registry 通过 IndexedDB 存储）"
    - "不实现 Run 的人工审批 gate（future work）"
