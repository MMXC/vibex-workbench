# ============================================================
# Level 5c — Run Engine 数据规格
# Data Specification
# ============================================================
# 从属于: run-engine_feature.yaml (L4)

spec:
  version: "0.1.0"
  level: "5c_data"
  name: "run-engine_data"
  parent: "run-engine"

meta:
  feature: "run-engine"
  generated_from: "run-engine_feature.yaml"
  storage: "Svelte reactive store (memory) + Dexie.js/IndexedDB via artifact-registry"

content:
  entities:
    # ── Run ──────────────────────────────────────────────────
    - name: "Run"
      description: "一次完整的 Agent 执行会话"
      fields:
        - name: "id"
          type: "string"
          pk: true
          description: "UUID，服务端下发"
        - name: "thread_id"
          type: "string"
          required: true
          description: "所属 Thread ID"
        - name: "goal"
          type: "string"
          required: true
          description: "本次 Run 的用户目标文本"
        - name: "status"
          type: "string"
          required: true
          description: "queued | planning | executing | paused | completed | failed | cancelled"
          default: "queued"
        - name: "stage"
          type: "string"
          description: "当前阶段描述（如 'Thinking...' / 'Using tool: read_file'）"
        - name: "visibility_layer"
          type: "number"
          default: 1
          description: "工具可见性层级：1（自然语言）| 2（结构化）| 3（开发者日志）"
        - name: "created_at"
          type: "datetime"
          description: "Run 创建时间"
        - name: "started_at"
          type: "datetime"
          description: "实际开始执行时间"
        - name: "finished_at"
          type: "datetime"
          description: "Run 结束时间"
        - name: "result_summary"
          type: "string"
          description: "Run 完成后的摘要文本（最终 LLM 输出截断）"
        - name: "error_message"
          type: "string"
          description: "Run 失败时的错误信息"

    # ── ToolInvocation ────────────────────────────────────────
    - name: "ToolInvocation"
      description: "一次工具调用的完整记录"
      fields:
        - name: "id"
          type: "string"
          pk: true
          description: "UUID，服务端 SSE 事件携带"
        - name: "run_id"
          type: "string"
          required: true
          description: "所属 Run ID"
        - name: "tool_name"
          type: "string"
          required: true
          description: "工具名称（如 'read_file' / 'terminal' / 'search_files'）"
        - name: "tool_display_name"
          type: "string"
          description: "人类可读工具名称"
        - name: "args"
          type: "json"
          description: "工具输入参数（JSON）"
        - name: "result"
          type: "json"
          description: "工具输出结果（JSON）"
        - name: "error"
          type: "string"
          description: "工具调用失败时的错误信息"
        - name: "status"
          type: "string"
          required: true
          description: "pending | running | completed | failed"
          default: "pending"
        - name: "order"
          type: "number"
          description: "同 Run 内的调用顺序（由 SSE 事件顺序保证）"
        - name: "started_at"
          type: "datetime"
          description: "调用开始时间"
        - name: "finished_at"
          type: "datetime"
          description: "调用结束时间"
        - name: "duration_ms"
          type: "number"
          description: "执行耗时（毫秒）"
        - name: "canvas_node_id"
          type: "string"
          description: "关联的 Canvas 节点 ID（由 canvas-sync 填充）"

    # ── MessageDelta ──────────────────────────────────────────
    - name: "MessageDelta"
      description: "SSE message.delta 事件的累积记录（用于流式渲染）"
      fields:
        - name: "id"
          type: "string"
          pk: true
          description: "UUID"
        - name: "run_id"
          type: "string"
          required: true
          description: "所属 Run ID"
        - name: "role"
          type: "string"
          required: true
          description: "消息角色：user | assistant | system | tool"
        - name: "content"
          type: "string"
          description: "累积的文本内容（增量追加）"
        - name: "delta"
          type: "string"
          description: "本次 delta 增量文本"
        - name: "tool_call_id"
          type: "string"
          description: "如果 role=tool，关联的 ToolInvocation ID"
        - name: "is_final"
          type: "boolean"
          default: false
          description: "是否为最终消息块（end 事件到达时置 true）"

    # ── SSEStream ─────────────────────────────────────────────
    - name: "SSEStream"
      description: "SSE 连接状态记录（内存，非持久化）"
      fields:
        - name: "thread_id"
          type: "string"
          pk: true
          description: "订阅的 Thread ID"
        - name: "url"
          type: "string"
          description: "SSE 端点 URL"
        - name: "status"
          type: "string"
          default: "disconnected"
          description: "disconnected | connecting | connected | reconnecting | error"
        - name: "last_event_id"
          type: "string"
          description: "最后收到的 event ID（用于恢复）"
        - name: "error_message"
          type: "string"
          description: "最近一次错误信息"
        - name: "connected_at"
          type: "datetime"
          description: "连接建立时间"

    # ── VisibilityLayer ───────────────────────────────────────
    - name: "VisibilityLayer"
      description: "三层可见性配置（前端内存状态）"
      fields:
        - name: "layer"
          type: "number"
          default: 1
          description: "1=自然语言（LLM 摘要工具调用）| 2=结构化（工具名+状态）| 3=开发者日志（完整 args/result）"
        - name: "show_raw_args"
          type: "boolean"
          default: false
          description: "是否展示原始工具参数（layer=3 时强制 true）"
        - name: "show_raw_result"
          type: "boolean"
          default: false
          description: "是否展示原始工具结果（layer=3 时强制 true）"
        - name: "truncate_length"
          type: "number"
          default: 200
          description: "layer=1 时的内容截断长度（字符数）"

  indexes:
    - entity: "Run"
      fields: ["thread_id", "status", "created_at"]
    - entity: "ToolInvocation"
      fields: ["run_id", "status", "tool_name"]
    - entity: "MessageDelta"
      fields: ["run_id", "role"]
    - entity: "SSEStream"
      fields: ["thread_id", "status"]

  store_schema:
    # runStore 的 TypeScript 类型定义（对应 runStore 导出）
    runStore:
      runs: "Run[]"
      currentRunId: "string | null"
      toolInvocations: "ToolInvocation[]"
      messageStream: "MessageDelta[]"
      visibilityLayer: "1 | 2 | 3"
    sseStreamStore:
      streams: "Record<string, SSEStream>"
      activeThreadId: "string | null"
