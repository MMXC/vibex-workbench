# ============================================================
# Level 5a — Run Engine Service 接口契约
# Service Interface Contract
# ============================================================
# 从属于: run-engine_feature.yaml (L4)
# 共用方: frontend (service.frontend.yaml) / backend (service.backend.yaml)

spec:
  version: "0.1.0"
  level: "5a_service"
  name: "run-engine-service"
  parent: "run-engine-feature"
  status: "contract"

meta:
  owner: "shared"
  tech_stack: ["contract"]
  description: "Run Engine 接口契约 — frontend 和 backend 共用"

content:
  # ── Public API 接口定义 ─────────────────────────────────────
  public_api:
    - method: "startRun"
      signature: "startRun(threadId: string, goal: string): Promise<Run>"
    - method: "cancelRun"
      signature: "cancelRun(runId: string): void"
    - method: "pauseRun"
      signature: "pauseRun(runId: string): void"
    - method: "resumeRun"
      signature: "resumeRun(runId: string): void"
    - method: "setVisibilityLayer"
      signature: "setVisibilityLayer(layer: 1|2|3): void"
    - method: "subscribeSSE"
      signature: "subscribeSSE(threadId: string): void"
    - method: "unsubscribeSSE"
      signature: "unsubscribeSSE(): void"

  # ── SSE 事件定义 ─────────────────────────────────────────────
  sse_events:
    - event: "run.started"
      payload: "{ runId: string, threadId: string, status: string, stage: string }"
    - event: "run.stage_changed"
      payload: "{ runId: string, stage: string }"
    - event: "run.completed"
      payload: "{ runId: string, summary: string }"
    - event: "run.failed"
      payload: "{ runId: string, error: string }"
    - event: "run.cancelled"
      payload: "{ runId: string }"
    - event: "tool.called"
      payload: "{ invocationId: string, runId: string, toolName: string, args: Record<string, unknown> }"
    - event: "tool.completed"
      payload: "{ invocationId: string, result: Record<string, unknown> }"
    - event: "tool.failed"
      payload: "{ invocationId: string, error: string }"
    - event: "message.delta"
      payload: "{ runId: string, role: string, delta: string, is_final: boolean }"
    - event: "artifact.created"
      payload: "{ artifact: Artifact }"

  # ── 数据契约 ─────────────────────────────────────────────
  data_contract:
    imports_from: "run-engine_data.yaml"
    types: ["Run", "ToolInvocation", "MessageDelta", "Artifact"]

  # ── 错误码定义 ─────────────────────────────────────────────
  error_codes:
    RUN_001: Run not found (404)
    RUN_002: Run already completed (409)
    RUN_003: Network error (500)
    RUN_004: Invalid state transition (400)
