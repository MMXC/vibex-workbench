# ============================================================
# Level 5 — Thread Manager UI/UX Specification
# User Interface & Interaction Design
#
# Parent: thread-manager-feature (L4)
# Sibling: thread-manager_data.yaml (L5)
# ============================================================

spec:
  version: "0.1.0"
  level: "5_uiux"
  name: "thread-manager-uiux"
  parent: "thread-manager-feature"
  status: "draft"

meta:
  feature: "thread-manager"
  owner: "frontend"
  target_users: ["end_user"]
  platform: "Web (Responsive)"

content:
  # ============================================================
  # 1. Layout Specification
  # ============================================================
  layout:
    structure:
      - container: "app-layout"
        description: "整体应用布局"
        regions:
          - name: "sidebar"
            width: "280px (collapsible)"
            position: "left"
            min_width: "64px"
            max_width: "400px"

          - name: "main-content"
            flex: 1
            position: "center"

          - name: "panel-drawer"
            width: "360px (collapsible)"
            position: "right"

      - container: "sidebar"
        description: "Thread 管理侧边栏"
        sub_regions:
          - name: "sidebar-header"
            height: "56px"
            content: "Thread 标题 + 新建按钮"

          - name: "thread-list"
            flex: 1
            overflow: "auto"
            content: "Thread 卡片列表"

          - name: "sidebar-footer"
            height: "48px"
            content: "设置/搜索入口"

    responsive:
      - breakpoint: "mobile (< 768px)"
        behavior: "sidebar 变为 drawer overlay"
        sidebar_width: "100vw"

      - breakpoint: "tablet (768px - 1024px)"
        behavior: "sidebar 收起为 icon-only (64px)"

      - breakpoint: "desktop (> 1024px)"
        behavior: "sidebar 展开 (280px)"

  # ============================================================
  # 2. Component Specifications
  # ============================================================
  components:
    # ---- Thread Card ----
    ThreadCard:
      description: "Sidebar 中的 Thread 列表项"
      dimensions:
        width: "100% (minus padding)"
        min_height: "72px"
        padding: "12px 16px"
        border_radius: "8px"

      structure:
        - element: "thread-indicator"
          type: "colored bar"
          width: "4px"
          height: "100%"
          position: "left"
          color: "threadMeta.color"

        - element: "thread-icon"
          type: "emoji or icon"
          size: "24px"
          position: "left of title"

        - element: "thread-title"
          type: "text"
          font: "14px / 500 weight"
          color: "text-primary"
          max_lines: 1
          overflow: "ellipsis"

        - element: "thread-goal-preview"
          type: "text"
          font: "12px / 400 weight"
          color: "text-secondary"
          max_lines: 2
          overflow: "ellipsis"

        - element: "thread-badge"
          type: "status indicator"
          position: "top-right"
          states:
            - state: "planning"
              color: "blue"
            - state: "executing"
              color: "green"
            - state: "reviewing"
              color: "yellow"
            - state: "completed"
              color: "gray"

        - element: "context-count"
          type: "pill"
          position: "bottom-right"
          content: "{sliceCount} slices"

      states:
        - state: "default"
          background: "transparent"
          border: "none"

        - state: "hover"
          background: "var(--surface-hover)"

        - state: "active"
          background: "var(--surface-active)"
          border_left: "2px solid var(--accent-primary)"

        - state: "pinned"
          icon: "pin"
          position: "top-right corner"

      interactions:
        - trigger: "click"
          action: "switchThread(threadId)"
          feedback: "border highlight + background"

        - trigger: "right-click / long-press"
          action: "show context menu"
          menu_items:
            - "重命名"
            - "复制链接"
            - "置顶/取消置顶"
            - "导出"
            - divider
            - "删除"

        - trigger: "drag"
          action: "reorder threads"
          visual: "ghost element + drop indicator"

    # ---- Thread Context Menu ----
    ThreadContextMenu:
      description: "Thread 卡片右键菜单"
      dimensions:
        min_width: "180px"
        border_radius: "8px"
        shadow: "var(--shadow-elevated)"

      items:
        - label: "重命名"
          icon: "edit"
          shortcut: "F2"
          action: "open inline edit mode"

        - label: "复制 Thread"
          icon: "copy"
          action: "duplicateThread"

        - label: "置顶"
          icon: "pin"
          toggle: true
          checked: "threadMeta.isPinned"

        - label: "导出为 Markdown"
          icon: "download"
          action: "exportThreadAsMarkdown"

        - divider

        - label: "删除"
          icon: "trash"
          danger: true
          action: "confirmDelete → deleteThread"
          confirmation:
            title: "删除 Thread？"
            message: "此操作不可撤销"
            confirm_label: "删除"
            cancel_label: "取消"

    # ---- New Thread Button ----
    NewThreadButton:
      description: "新建 Thread 入口"
      placement: "sidebar-header"

      visual:
        type: "icon button"
        icon: "plus"
        size: "20px"
        background: "var(--accent-primary)"
        color: "white"
        border_radius: "8px"

      states:
        - state: "default"
          opacity: 1

        - state: "hover"
          transform: "scale(1.05)"

        - state: "active"
          transform: "scale(0.95)"

        - state: "disabled"
          opacity: 0.5
          cursor: "not-allowed"

      interactions:
        - trigger: "click"
          action: "createThread('') → focus composer"
          feedback: "ripple effect"

    # ---- Thread Search ----
    ThreadSearch:
      description: "Sidebar 搜索框"
      placement: "sidebar-footer"

      structure:
        - element: "search-icon"
          position: "left"
          icon: "search"

        - element: "search-input"
          placeholder: "搜索 threads..."
          clear_button: true

        - element: "filter-dropdown"
          position: "right"
          options: ["全部", "进行中", "已完成", "已归档"]

      interactions:
        - trigger: "type"
          action: "filter threads by goal/title"
          debounce: "300ms"

        - trigger: "escape"
          action: "clear search + blur"

    # ---- Thread Composer (Inline) ----
    InlineThreadComposer:
      description: "在 Sidebar 内快速创建 Thread"
      trigger: "NewThreadButton click"

      structure:
        - element: "input-field"
          type: "textarea"
          placeholder: "输入目标... (Ctrl+Enter 提交)"
          rows: 2
          max_length: 2000

        - element: "action-row"
          content:
            - "取消"
            - "创建 (Ctrl+Enter)"

      interactions:
        - trigger: "Ctrl+Enter"
          action: "createThread(goal) → close composer"
          feedback: "success toast"

        - trigger: "Escape"
          action: "close composer"

        - trigger: "click outside"
          action: "close composer (if empty)"

  # ============================================================
  # 3. Visual Design System
  # ============================================================
  visual_design:
    colors:
      primary: "var(--accent-primary)"
      primary_hover: "var(--accent-primary-hover)"
      surface: "var(--surface-base)"
      surface_hover: "var(--surface-hover)"
      surface_active: "var(--surface-active)"
      text_primary: "var(--text-primary)"
      text_secondary: "var(--text-secondary)"
      text_disabled: "var(--text-disabled)"
      border: "var(--border-default)"
      danger: "var(--color-danger)"
      success: "var(--color-success)"
      warning: "var(--color-warning)"

      # Stage colors
      stage_planning: "#3b82f6"
      stage_executing: "#22c55e"
      stage_reviewing: "#eab308"
      stage_completed: "#6b7280"
      stage_paused: "#f97316"

    typography:
      font_family: "var(--font-sans)"
      thread_title:
        size: "14px"
        weight: 500
        line_height: 1.4
      thread_goal:
        size: "12px"
        weight: 400
        line_height: 1.5
        color: "text-secondary"

    spacing:
      base_unit: "4px"
      thread_card_padding: "12px 16px"
      thread_card_gap: "4px"
      sidebar_padding: "12px"

    animations:
      thread_switch:
        duration: "200ms"
        easing: "ease-out"
        effect: "fade + slide"

      context_update:
        duration: "300ms"
        easing: "ease-in-out"
        effect: "pulse highlight on new slice"

      card_hover:
        duration: "150ms"
        effect: "background transition"

      context_menu:
        duration: "100ms"
        easing: "ease-out"
        effect: "scale from origin"

  # ============================================================
  # 4. Interaction Flows
  # ============================================================
  interaction_flows:
    flow_create_thread:
      name: "创建 Thread"
      trigger: "composer submit / Ctrl+T"
      steps:
        1. "用户输入 goal"
        2. "系统验证 goal 非空"
        3. "系统生成 Thread"
        4. "Sidebar 高亮新 Thread"
        5. "自动切换到新 Thread"
        6. "显示 success toast"
      alternative:
        - step: "goal 为空"
          action: "显示错误提示，输入框震动"

    flow_switch_thread:
      name: "切换 Thread"
      trigger: "click / Ctrl+Tab"
      steps:
        1. "用户点击 Thread 卡片"
        2. "高亮当前 Thread"
        3. "Canvas 加载对应 Run 数据"
        4. "Composer 清空"
        5. "发送 SSE thread.switched"

    flow_delete_thread:
      name: "删除 Thread"
      trigger: "context menu → 删除"
      steps:
        1. "显示确认对话框"
        2. "用户确认"
        3. "Thread 淡出"
        4. "自动切换到最近 Thread"
        5. "显示 undo toast (5s)"
      alternative:
        - step: "用户取消"
          action: "关闭对话框，无变化"

    flow_search_thread:
      name: "搜索 Thread"
      trigger: "sidebar search input"
      steps:
        1. "用户输入搜索词"
        2. "300ms 防抖"
        3. "过滤 threads[]"
        4. "高亮匹配文本"
        5. "无结果时显示空状态"

  # ============================================================
  # 5. Keyboard Shortcuts
  # ============================================================
  keyboard_shortcuts:
    global:
      - key: "Ctrl+T"
        action: "新建 Thread"
        description: "打开 NewThreadComposer"

      - key: "Ctrl+Tab"
        action: "切换到下一个 Thread"
        description: "循环切换"

      - key: "Ctrl+Shift+Tab"
        action: "切换到上一个 Thread"
        description: "循环切换"

      - key: "Ctrl+Shift+T"
        action: "打开 Thread 搜索"
        description: "聚焦搜索框"

    sidebar_focused:
      - key: "ArrowUp"
        action: "选中上一个 Thread"
        description: "导航"

      - key: "ArrowDown"
        action: "选中下一个 Thread"
        description: "导航"

      - key: "Enter"
        action: "切换到选中 Thread"
        description: "确认选择"

      - key: "Delete"
        action: "删除选中 Thread"
        description: "需确认"

      - key: "F2"
        action: "重命名选中 Thread"
        description: "inline edit"

      - key: "Escape"
        action: "取消操作/关闭菜单"
        description: "退出当前模式"

  # ============================================================
  # 6. Empty States
  # ============================================================
  empty_states:
    no_threads:
      illustration: "thread-icon-large"
      title: "还没有 Thread"
      description: "创建第一个 Thread 开始工作"
      action: "新建 Thread"

    no_search_results:
      illustration: "search-empty"
      title: "未找到匹配结果"
      description: "尝试其他关键词"
      action: "清除搜索"

    no_context_slices:
      illustration: "memory-empty"
      title: "暂无上下文记录"
      description: "开始对话后会自动记录"

  # ============================================================
  # 7. Loading States
  # ============================================================
  loading_states:
    thread_list_loading:
      skeleton: true
      count: 5
      structure: "ThreadCard skeleton"

    thread_switching:
      indicator: "spinner in thread card"
      overlay: "subtle dim on main content"

    thread_creating:
      indicator: "button spinner"
      disabled: true

  # ============================================================
  # 8. Accessibility (a11y)
  # ============================================================
  accessibility:
    aria:
      sidebar:
        role: "navigation"
        label: "Thread 列表"
        aria_label: "thread-list"

      thread_card:
        role: "listitem"
        aria_selected: "is active"
        aria_description: "thread goal preview"

      new_thread_button:
        aria-label: "新建 Thread"
        aria-keyshortcuts: "Control+T"

    keyboard_navigation:
      tab_order:
        1. "New Thread Button"
        2. "Thread List (tabindex=0 per item)"
        3. "Search Input"
        4. "Filter Dropdown"

      focus_management:
        on_create: "focus to new thread card"
        on_delete: "focus to next thread"
        on_switch: "focus to thread card"

    screen_reader:
      announcements:
        - event: "thread created"
          message: "已创建新 Thread: {title}"

        - event: "thread switched"
          message: "已切换到 Thread: {title}"

        - event: "thread deleted"
          message: "已删除 Thread"

        - event: "context updated"
          message: "上下文已更新，共 {count} 条记录"

    color_contrast:
      minimum: "WCAG AA (4.5:1 for text)"
      enhanced: "WCAG AAA where possible"

  # ============================================================
  # 9. Error States
  # ============================================================
  error_states:
    create_failed:
      visual: "red border on input"
      message: "创建失败，请重试"
      action: "重试按钮"

    switch_failed:
      visual: "toast error"
      message: "切换失败"
      action: "重试"

    delete_failed:
      visual: "toast error"
      message: "删除失败，Thread 仍存在"
      action: "重试"

    offline:
      visual: "badge on sidebar"
      message: "离线模式"
      description: "数据将在恢复连接后同步"

derived_from:
  - parent: "thread-manager-feature"
    rationale: "UI/UX 交互规格化"

linked_specs:
  - "thread-manager_data (L5 - data schema)"
  - "thread-manager_service (L5 - service specification)"

