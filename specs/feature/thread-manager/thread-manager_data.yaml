---
spec:
  name: thread-manager-data
  level: 5_data
  version: "0.1.0"
  status: draft
  parent: "thread-manager-feature"

content:
  entities:
    Thread:
      description: "Thread 实体：用户目标的上下文容器"
      fields:
        - name: "id"
          type: "string"
          source: "nanoid(10)"
          required: true
          immutable: true
          indexed: true

        - name: "goal"
          type: "string"
          required: true
          description: "用户最初输入的目标描述"
          max_length: 2000

        - name: "title"
          type: "string"
          description: "自动生成的标题（取 goal 前 N 字符）或用户自定义"
          max_length: 100
          auto_generate: "从 goal 截取，移除换行符"

        - name: "description"
          type: "string"
          required: false
          max_length: 500
          description: "用户补充的描述"

        - name: "stage"
          type: "enum"
          enum_values: ["planning", "executing", "reviewing", "completed", "paused"]
          default: "planning"
          description: "当前所处阶段"

        - name: "tags"
          type: "string[]"
          default: "[]"
          description: "用户自定义标签"

        - name: "status"
          type: "enum"
          enum_values: ["active", "archived", "deleted"]
          default: "active"

        - name: "createdAt"
          type: "ISO8601 string"
          source: "new Date().toISOString()"
          required: true
          immutable: true
          indexed: true

        - name: "updatedAt"
          type: "ISO8601 string"
          source: "new Date().toISOString()"
          updated_on: "每次 mutation"

        - name: "deletedAt"
          type: "ISO8601 string | null"
          description: "软删除时间戳"

        - name: "parentThreadId"
          type: "string | null"
          description: "父 Thread ID（用于 Thread 分支）"
          foreign_key: "Thread.id"

        - name: "metadata"
          type: "Record<string, unknown>"
          description: "扩展字段预留"

    ContextSlice:
      description: "Context Memory 的最小单元：一次上下文注入记录"
      fields:
        - name: "id"
          type: "string"
          source: "nanoid(8)"
          required: true

        - name: "threadId"
          type: "string"
          required: true
          foreign_key: "Thread.id"
          indexed: true

        - name: "type"
          type: "enum"
          enum_values: ["goal", "conclusion", "constraint", "preference", "intermediate_result", "system"]
          required: true
          indexed: true

        - name: "content"
          type: "string"
          required: true
          max_length: 10000

        - name: "source"
          type: "enum"
          enum_values: ["user", "agent", "system", "tool"]
          default: "agent"

        - name: "createdAt"
          type: "ISO8601 string"
          required: true

        - name: "importance"
          type: "number"
          min: 0
          max: 10
          default: 5
          description: "重要性评分，影响上下文组装时的权重"

    ThreadMeta:
      description: "Thread 的额外 UI 元数据"
      fields:
        - name: "threadId"
          type: "string"
          primary_key: true
          foreign_key: "Thread.id"

        - name: "color"
          type: "string"
          format: "hex color"
          default: "#6366f1"
          description: "sidebar 中显示的颜色"

        - name: "icon"
          type: "string"
          description: "emoji 或 icon name"

        - name: "isPinned"
          type: "boolean"
          default: false
          description: "是否固定在 sidebar 顶部"

        - name: "sortOrder"
          type: "number"
          default: 0
          description: "sidebar 排序顺序"

    CreateThreadOptions:
      description: "createThread 的可选参数"
      fields:
        - name: "parentThreadId"
          type: "string | null"
          description: "从现有 Thread 分支创建"

        - name: "tags"
          type: "string[]"
          default: "[]"

        - name: "description"
          type: "string"

        - name: "color"
          type: "string"
          format: "hex color"

        - name: "title"
          type: "string"
          description: "自定义标题，不自动生成"

  store_schemas:
    threadStore:
      type: "Svelte writable store"
      fields:
        - name: "threads"
          type: "Thread[]"
          initial_value: "[]"
          persistence: "Dexie threads table"

        - name: "currentThreadId"
          type: "string | null"
          initial_value: "null"
          persistence: "localStorage (last currentThreadId)"

        - name: "contextMemory"
          type: "Record<string, ContextSlice[]>"
          initial_value: "{}"
          description: "key = threadId，value = slices[]"
          persistence: "Dexie context_memory table"

        - name: "threadMeta"
          type: "Record<string, ThreadMeta>"
          initial_value: "{}"
          persistence: "Dexie threads table"

  type_definitions:
    ts: |
      // Thread entity
      interface Thread {
        id: string;
        goal: string;
        title: string;
        description?: string;
        stage: 'planning' | 'executing' | 'reviewing' | 'completed' | 'paused';
        tags: string[];
        status: 'active' | 'archived' | 'deleted';
        createdAt: string;
        updatedAt: string;
        deletedAt?: string;
        parentThreadId?: string;
        metadata?: Record<string, unknown>;
      }

      // ContextSlice entity
      interface ContextSlice {
        id: string;
        threadId: string;
        type: 'goal' | 'conclusion' | 'constraint' | 'preference' | 'intermediate_result' | 'system';
        content: string;
        source: 'user' | 'agent' | 'system' | 'tool';
        createdAt: string;
        importance: number;
      }

      // ThreadMeta entity
      interface ThreadMeta {
        threadId: string;
        color: string;
        icon?: string;
        isPinned: boolean;
        sortOrder: number;
      }

      // Options
      interface CreateThreadOptions {
        parentThreadId?: string;
        tags?: string[];
        description?: string;
        color?: string;
        title?: string;
      }

      // ThreadStore
      interface ThreadStore {
        threads: Thread[];
        currentThreadId: string | null;
        contextMemory: Record<string, ContextSlice[]>;
        threadMeta: Record<string, ThreadMeta>;
      }

  indexeddb_schema:
    version: 1
    tables:
      - name: "threads"
        primary_key: "id"
        indexes:
          - name: "by_created"
            key_path: "createdAt"
          - name: "by_status"
            key_path: "status"
          - name: "by_parent"
            key_path: "parentThreadId"
        schema_definition: |
          id: string (primary key)
          goal: string
          title: string
          description: string?
          stage: string
          tags: string[]
          status: string
          createdAt: string
          updatedAt: string
          deletedAt: string?
          parentThreadId: string?
          metadata: object?

      - name: "context_memory"
        primary_key: "id"
        indexes:
          - name: "by_thread"
            key_path: "threadId"
          - name: "by_type"
            key_path: "type"
          - name: "by_thread_type"
            key_path: ["threadId", "type"]
        schema_definition: |
          id: string (primary key)
          threadId: string (indexed)
          type: string (indexed)
          content: string
          source: string
          createdAt: string
          importance: number

  validation_rules:
    Thread:
      - rule: "id 必须唯一"
        validator: "nanoid collision check"
      - rule: "goal 不能为空"
        validator: "trim(goal).length > 0"
      - rule: "stage 必须是枚举值之一"
        validator: "enum check"
      - rule: "parentThreadId 引用存在或为 null"
        validator: "foreign key check"

    ContextSlice:
      - rule: "threadId 必须引用存在的 Thread"
        validator: "foreign key check"
      - rule: "type 必须是枚举值之一"
        validator: "enum check"
      - rule: "content 不能为空"
        validator: "content.length > 0"
      - rule: "importance 在 [0, 10] 范围内"
        validator: "range check"

  default_values:
    Thread:
      title: "取 goal 前 50 字符，末尾加 '...'"
      stage: "planning"
      tags: "[]"
      status: "active"
      createdAt: "new Date().toISOString()"
      updatedAt: "new Date().toISOString()"
      deletedAt: "null"
      parentThreadId: "null"
      metadata: "{}"

    ContextSlice:
      source: "agent"
      createdAt: "new Date().toISOString()"
      importance: 5

    ThreadMeta:
      color: "#6366f1"
      isPinned: false
      sortOrder: 0

derived_from:
  - parent: "thread-manager-feature"
    rationale: "thread-manager_feature.yaml 中定义实体的数据结构落地"

linked_data_specs: []

updated_by: "hermes"
updated_at: "2026-04-19T20:08:00Z"
