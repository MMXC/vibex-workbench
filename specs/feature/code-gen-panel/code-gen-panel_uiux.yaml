spec:
  version: "1.0"
  level: "5a_uiux"
  name: "code-gen-panel_uiux"
  parent: "code-gen-panel"
  status: "draft"

content:
  pages:
    - id: "code-gen-panel-page"
      layout:
        type: "panel"
      regions:
        - id: "gen-main"
          position: "center"
          components: ["GenerationTimeline", "DiffViewer"]

  components:
    - id: "GenerationTimeline"
      type: "composite"
      states:
        - state: "idle"
        - state: "running"
        - state: "done"
        - state: "error"

    - id: "DiffViewer"
      type: "composite"

  state_management:
    stores:
      - store: "codeGenStore"
        state:
          - name: "currentJob"
            type: "GenerationJob | null"
          - name: "stepLogs"
            type: "StepLog[]"
          - name: "isRunning"
            type: "boolean"
        mutations:
          - name: "startGeneration"
          - name: "appendLog"
          - name: "completeGeneration"

  design_tokens:
    colors:
      primary: "#6366f1"
      success: "#22c55e"
      error: "#ef4444"
      bg_base: "#0f0f0f"
