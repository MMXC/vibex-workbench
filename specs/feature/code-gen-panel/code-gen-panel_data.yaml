spec:
  version: "2.0"
  level: "5c_data"
  name: "code-gen-panel_data"
  parent: "code-gen-panel"
  status: "active"

content:
  io_contract:
    input: "make generate 命令"
    output: "GenerationJob + GenerationEvent[] + FileDiff[]"
    boundary: "只做生成状态数据，不做生成逻辑"
    behavior: "记录生成任务状态和 SSE 事件"
    changelog:
      - version: "2.0"
        date: "2026-04-20"
        author: "hermes"
        changes:
          - "新增 io_contract 字段"
          - "status 从 draft → active"
          - "新增 GenerationEvent 实体（SSE 流事件）"

  entities:
    - entity: "GenerationJob"
      fields:
        - name: "id"
          type: "string"
        - name: "startedAt"
          type: "Date"
        - name: "completedAt"
          type: "Date | null"
        - name: "status"
          type: "'running' | 'done' | 'error'"
        - name: "steps"
          type: "GenerationStep[]"

    - entity: "GenerationStep"
      description: "生成流水线中的单个步骤"
      fields:
        - name: "index"
          type: "number"
        - name: "name"
          type: "string"
        - name: "status"
          type: "'pending' | 'running' | 'done' | 'error'"
        - name: "startedAt"
          type: "Date | null"
        - name: "durationMs"
          type: "number | null"
        - name: "error"
          type: "string | null"

    - entity: "GenerationEvent"
      description: "SSE 流事件——推送给 Canvas"
      fields:
        - name: "eventId"
          type: "string"
        - name: "type"
          type: "'generation.started' | 'generation.step' | 'generation.completed' | 'generation.failed'"
        - name: "payload"
          type: "object"
        - name: "timestamp"
          type: "Date"

    - entity: "FileDiff"
      description: "生成前后的文件差异"
      fields:
        - name: "filePath"
          type: "string"
        - name: "changeType"
          type: "'added' | 'modified' | 'deleted'"
        - name: "before"
          type: "string | null"
        - name: "after"
          type: "string | null"
        - name: "diffHunk"
          type: "string | null"
