# ============================================================
# Level 4 — Workbench 可拖拽分区（布局尺寸契约 v2）
# parent: workbench-shell / workbench-ide-chrome
# 取代 v1 中「主栏对话/画布分割 + 通栏 Composer」描述
# ============================================================

spec:
  version: "2.2"
  level: "4_feature"
  name: "workbench-layout-resize"
  parent: "workbench-shell"
  status: "active"

meta:
  module: "MOD-workbench-shell"
  owner: "hermes"
  created: "2026-04-21"
  updated: "2026-04-22"
  pilot_m0_layer_contract: true

content:
  description: |
    对标 Cursor / VS Code：用户通过拖拽分隔条调整 **左侧一级侧栏宽度**、**右侧 AI 栏宽度**、
    **右侧栏内 AI 输入条高度**、**底部 Dock（问题/终端等）高度**。
    持久化采用 localStorage；**v2 键名与字段**见 persistence；兼容读取 v1 键仅用于迁移默认值。
    壳层组件由开发者维护（不手改生成的 WorkbenchShell.svelte），详见 workbench-ide-chrome_feature。

  # ── M0：愿景承接（Phase A），与 specs/meta/spec-layer-contract.yaml 对齐 ──
  vision_traceability:
    summary: "布局像素契约把 L1 的 Local-first（C5）与体验面可调（C6）落到可持久化、可对照 R2 的验收字段"
    l1:
      goal_path: "specs/project-goal/vibex-workbench-goal.yaml"
      constraint_ids: ["C1", "C5", "C6"]
      goal_sections_hint:
        - "content.constraints.C5（Local-first / IndexedDB）"
        - "content.product_value_layers.experience_visualization"
        - "content.mission（人机协同可见分区）"
    l2:
      skeleton_path: "specs/architecture/vibex-workbench-skeleton.yaml"
      module_id: "MOD-workbench-shell"
      anchors_hint:
        - "content.modules 中 MOD-workbench-shell"
        - "content.upstream_l1"
    l3:
      module_spec_path: "specs/module/MOD-workbench-shell_module.yaml"
    l4_aggregate_parent:
      feature_spec_path: "specs/feature/workbench-shell/workbench-shell_feature.yaml"
      note: "parent=workbench-shell；与 ide-chrome region_map / r2_pixel_parity 联合验收"
    acceptance_summary:
      - "pointerup 后 `vibex.workbench.layout.v2` 持久化字段与 limits_px 一致；几何归属见 geometry_accounting"
      - "窄屏与 Dock 折叠策略以 ide-chrome / uiux 为准；本 spec 锁桌面像素语义"

  io_contract:
    input: |
      - 指针在分隔条上按下并拖拽（pointermove / pointerup）
      - 视口 resize 时可选重新钳制 AI 输入条高度（依赖右侧栏可用内高）
    output: |
      - 更新布局维度对象 WorkbenchLayoutDims（TypeScript）；
      - localStorage 写入键 `vibex.workbench.layout.v2`（松手 persist；拖拽中仅内存 preview）。
    boundary: |
      - 分隔条可点击宽度约 4–5px；limits 见 limits_px。
      - v1 字段 `conversationPanePx`（主栏对话/画布分割）由 IDE 壳层迁移废除，不再写入 v2。
      - 窄屏打断点行为由 uiux / ide-chrome 验收约束，本 spec 仅定义桌面级像素契约。
    behavior: |
      1. **左竖分隔条**：调整 sidebarLeftPx（一级侧栏 + 活动栏所占复合宽度中的可变部分，实现可将活动栏宽度固定计入左侧）。
      2. **右竖分隔条**：调整 panelRightPx（右侧 AI 栏总宽）。
      3. **右侧栏内横分隔条**：调整 aiComposerBarPx（Composer 高度）；上部为 AI 对话区，须保留最小对话高度（实现用 ResizeObserver + clamp）。
      4. **底部 Dock 上横分隔条**：调整 bottomDockPx（问题/终端等区域高度）。
      5. pointerup 调用 commit 持久化；拖拽中 preview 不写盘。
    changelog:
      - version: "2.2"
        date: "2026-04-22"
        author: "hermes"
        changes:
          - "新增 content.vision_traceability（Phase A：C1/C5/C6 + l4_aggregate_parent）"
      - version: "2.1"
        date: "2026-04-22"
        author: "hermes"
        changes:
          - "新增 geometry_accounting：sidebarLeftPx 含活动栏（建议 48px）、bottomDockPx 不得被壳层魔法 max-height 替代"
      - version: "2.0"
        date: "2026-04-21"
        author: "hermes"
        changes:
          - "对齐 IDE 壳层：引入 bottomDockPx、aiComposerBarPx；废除主栏 conversationPanePx + 通栏 Composer 描述"
          - "持久化键升级为 v2；允许从 v1 导入侧栏与面板宽度"
      - version: "1.0"
        date: "2026-04-21"
        author: "hermes"
        changes:
          - "初版（已 superseded）：三栏 + 主栏对话/画布 + 底部 Composer"

  persistence:
    storage_key_v2: "vibex.workbench.layout.v2"
    storage_key_v1_legacy: "vibex.workbench.layout.v1"
    fields_v2:
      sidebarLeftPx: "左侧复合栏宽度（px）"
      panelRightPx: "右侧 AI 栏宽度（px）"
      aiComposerBarPx: "右侧栏底部 AI 输入（Composer）高度（px）"
      bottomDockPx: "底部 Dock 面板高度（px）"

  limits_px:
    sidebar_left: { min: 180, max: 560, default: 260 }
    panel_right: { min: 240, max: 720, default: 380 }
    ai_composer_bar: { min: 96, max: 400, default: 156 }
    bottom_dock: { min: 120, max: 520, default: 200 }

  # 实现易错点：几何归属写清，避免壳层「看起来乱」却无法验收
  geometry_accounting:
    sidebar_left_px:
      meaning: |
        `sidebarLeftPx` 表示 **左侧整条复合栏的外宽（像素）**，包含固定宽度的竖向 **活动栏** 与可伸缩的 **一级侧栏 body**。
        推荐常量：`activity_bar_px = 48`（与 R2 原型 `--ab-w` 一致）；则 **一级侧栏可用内容宽 ≈ sidebarLeftPx − 48**。
      implementation_must_not: |
        不得把 sidebarLeftPx 仅赋给文件树而把活动栏再加到窗口外（会导致总宽溢出或拖拽语义与持久化不一致）。
    bottom_dock_px:
      meaning: |
        `bottomDockPx` 为 **底部 Dock 区域总高度（含 Dock 页签条 + 内容区）**，由 **主工作区（wb-row）底边与 Dock 顶边之间的横向分隔条** 调整。
      implementation_must_not: |
        不得在壳层再用 `max-height: 40vh` 等与持久化字段无关的魔法数替代 bottomDockPx，否则 violates LR2-003、刷新后 Dock 高度不可复现。

  acceptance_criteria:
    - id: "LR2-001"
      given: "桌面宽度 ≥1024px"
      when: "拖拽左、右竖分隔条"
      then: "sidebarLeftPx / panelRightPx 在 limits 内连续变化；刷新后保持"
    - id: "LR2-002"
      given: "右侧 AI 栏可见"
      when: "拖拽栏内 Composer 上缘"
      then: "aiComposerBarPx 更新且不挤没对话区（钳制依赖右侧栏内高）"
    - id: "LR2-003"
      given: "底部 Dock 可见"
      when: "拖拽 Dock 上缘"
      then: "bottomDockPx 更新且在 limits 内"

  implementation:
    reference_code:
      - "frontend/src/lib/stores/workbench-layout-store.ts"
    shell_components:
      - "frontend/src/lib/components/workbench/WorkbenchLayoutResizable.svelte（或后续替代壳层，须遵守本契约）"
      - "frontend/src/routes/workbench/+page.svelte"
