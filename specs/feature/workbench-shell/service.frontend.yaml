---
spec:
  name: workbench-shell-frontend
  level: 5a_service_frontend
  version: "0.1.0"
  status: draft
  parent: "workbench-shell-feature"

meta:
  owner: "frontend"
  tech_stack: ["Svelte 5", "TypeScript"]

content:
  overview: |
    workbench-shell 服务层规范，定义 uiStore API、组件事件总线、
    布局状态管理服务、模态框管理服务、拖拽服务等。

  architecture:
    pattern: "Svelte 5 Workbench Shell Component"

  public_api:
    uiStore:
      description: "全局 UI 布局状态 Store（Svelte 5 $state）"
      module: "src/lib/stores/uiStore.svelte.ts"
      methods:
        - name: "toggleLeftSidebar"
          signature: "() => void"
          description: "切换左侧边栏展开/折叠状态"
          side_effects:
            - "更新 leftSidebarOpen 状态"
            - "触发组件重渲染"

        - name: "toggleRightSidebar"
          signature: "() => void"
          description: "切换右侧边栏展开/折叠状态"
          side_effects:
            - "更新 rightSidebarOpen 状态"
            - "触发组件重渲染"

        - name: "setLeftSidebarWidth"
          signature: "(width: number) => void"
          description: "设置左侧边栏宽度（受 min/max 约束）"
          constraints:
            min: 180
            max: 400
          validation: "clamp(width, 180, 400)"

        - name: "setRightSidebarWidth"
          signature: "(width: number) => void"
          description: "设置右侧边栏宽度（受 min/max 约束）"
          constraints:
            min: 200
            max: 480
          validation: "clamp(width, 200, 480)"

        - name: "setActivePanel"
          signature: "(panel: 'artifact' | 'tool' | 'run') => void"
          description: "设置右侧边栏激活的 Tab 面板"
          side_effects:
            - "更新 activePanel 状态"
            - "如果 rightSidebarOpen 为 false，自动打开"

        - name: "setToolVisibilityLayer"
          signature: "(layer: 1 | 2 | 3) => void"
          description: "设置工具可见性层级"
          layer_mapping:
            1: "NATURAL_LANGUAGE"
            2: "STRUCTURED"
            3: "DEVELOPER"
          side_effects:
            - "更新 toolVisibilityLayer 状态"
            - "同步到 runStore.visibilityLayer"

        - name: "toggleComposerExpanded"
          signature: "() => void"
          description: "切换 Composer 展开/收起状态"

        - name: "setComposerText"
          signature: "(text: string) => void"
          description: "设置 Composer 文本内容"

        - name: "addComposerAttachment"
          signature: "(attachment: ComposerAttachment) => void"
          description: "添加 Composer 附件"
          side_effects:
            - "生成临时 UUID"
            - "追加到 composerAttachments 数组"
            - "触发上传流程（如果需要）"

        - name: "removeComposerAttachment"
          signature: "(attachmentId: string) => void"
          description: "移除 Composer 附件"
          side_effects:
            - "从 composerAttachments 数组移除"
            - "清理本地 blob URL"

        - name: "reorderComposerAttachments"
          signature: "(fromIndex: number, toIndex: number) => void"
          description: "重排 Composer 附件顺序"

        - name: "setSelectedThreadId"
          signature: "(threadId: string | null) => void"
          description: "设置当前选中的 Thread ID（双向同步 threadStore）"
          side_effects:
            - "更新 selectedThreadId"
            - "同步到 threadStore.currentThreadId"

        - name: "setSelectedArtifactId"
          signature: "(artifactId: string | null) => void"
          description: "设置当前选中的 Artifact ID（双向同步 artifactStore）"
          side_effects:
            - "更新 selectedArtifactId"
            - "同步到 artifactStore.selectedId"

        - name: "setSelectedToolInvocationId"
          signature: "(toolInvocationId: string | null) => void"
          description: "设置当前选中的工具调用 ID"

        - name: "openModal"
          signature: "(type: ModalType, props?: Record<string, any>, priority?: number) => string"
          returns: "modalId: string"
          description: "打开全局 Modal，返回 modalId"
          side_effects:
            - "创建 ModalInstance"
            - "追加到 modals 队列"
            - "按 priority 排序"

        - name: "closeModal"
          signature: "(modalId: string) => void"
          description: "关闭指定 Modal"
          side_effects:
            - "从 modals 队列移除"
            - "触发组件重渲染"

        - name: "closeAllModals"
          signature: "() => void"
          description: "关闭所有 Modal"

        - name: "setDragState"
          signature: "(state: DragState | null) => void"
          description: "设置全局拖拽状态"

        - name: "reset"
          signature: "() => void"
          description: "重置所有 UI 状态到默认值（用于退出或切换 Thread）"

  event_bus:
      description: "组件间事件通信总线"
      implementation: "Svelte 5 $emit / createEventDispatcher"
      global_events:
        - event: "sidebar.toggle"
          source: "SidebarLeft, SidebarRight"
          payload: "side: 'left' | 'right'"
          handlers:
            - "WorkbenchShell: 调用 uiStore.toggleLeftSidebar / toggleRightSidebar"

        - event: "thread.select"
          source: "ThreadList, ThreadItem"
          payload: "threadId: string"
          handlers:
            - "WorkbenchShell: 调用 uiStore.setSelectedThreadId"
            - "触发路由跳转到 /canvas/[id]/thread/[threadId]"

        - event: "thread.create"
          source: "SidebarLeftFooter"
          payload: "goal?: string"
          handlers:
            - "触发 threadStore.createThread"

        - event: "thread.delete"
          source: "ThreadItem"
          payload: "threadId: string"
          handlers:
            - "弹出 confirm-dialog（通过 openModal）"
            - "确认后调用 threadStore.deleteThread"

        - event: "composer.submit"
          source: "ComposerSubmit"
          payload: "goal: string; attachments: Artifact[]"
          handlers:
            - "调用 runEngine.startRun"
            - "清空 Composer 内容"

        - event: "visibility.change"
          source: "CanvasToolbar"
          payload: "layer: 1 | 2 | 3"
          handlers:
            - "调用 uiStore.setToolVisibilityLayer"

        - event: "tab.change"
          source: "SidebarRightTabs"
          payload: "tab: 'artifact' | 'tool' | 'run'"
          handlers:
            - "调用 uiStore.setActivePanel"

        - event: "artifact.reference"
          source: "ArtifactPreview"
          payload: "artifactId: string"
          handlers:
            - "调用 uiStore.addComposerAttachment"

        - event: "run.cancel"
          source: "RunStatus"
          payload: "runId: string"
          handlers:
            - "调用 runStore.cancelRun"

        - event: "modal.close"
          source: "GlobalModals, ConfirmDialog"
          payload: "modalId: string"
          handlers:
            - "调用 uiStore.closeModal"

  layout_service:
      description: "布局状态管理服务"
      module: "src/lib/services/layoutService.ts"
      methods:
        - name: "initLayout"
          signature: "(initialState?: Partial<LayoutState>) => void"
          description: "初始化布局状态（支持从 URL 参数恢复）"
          defaults:
            leftSidebarOpen: true
            rightSidebarOpen: false
            composerExpanded: true

        - name: "saveLayoutState"
          signature: "() => LayoutState"
          description: "获取当前布局状态快照"

        - name: "restoreLayoutState"
          signature: "(state: LayoutState) => void"
          description: "恢复到指定布局状态"

        - name: "getBreakpoint"
          signature: "() => 'desktop' | 'tablet' | 'mobile'"
          description: "根据窗口宽度获取当前断点"
          thresholds:
            desktop: ">= 1024px"
            tablet: "768px - 1023px"
            mobile: "< 768px"

        - name: "applyBreakpoint"
          signature: "(breakpoint: string) => void"
          description: "应用断点对应的布局配置"

  modal_service:
      description: "模态框管理服务"
      module: "src/lib/services/modalService.ts"
      methods:
        - name: "showSettings"
          signature: "() => string"
          returns: "modalId"
          description: "打开设置弹层"

        - name: "showUrlExtract"
          signature: "(initialUrl?: string) => string"
          returns: "modalId"
          description: "打开 URL 提取弹层"

        - name: "showConfirm"
          signature: "(options: ConfirmOptions) => Promise<boolean>"
          description: "显示确认对话框，返回用户选择"
          options:
            title: "string"
            message: "string"
            confirmLabel: "string (default: 'Confirm')"
            cancelLabel: "string (default: 'Cancel')"
            destructive: "boolean (default: false)"

        - name: "showThreadDeleteConfirm"
          signature: "(threadId: string, threadName: string) => Promise<boolean>"
          description: "显示删除 Thread 确认对话框"

  drag_service:
      description: "拖拽服务"
      module: "src/lib/services/dragService.ts"
      methods:
        - name: "startDrag"
          signature: "(type: DragType, sourceId: string, sourceIndex?: number) => void"
          description: "开始拖拽，设置 dragState"

        - name: "updateDrag"
          signature: "(ghostData: any) => void"
          description: "更新拖拽预览数据"

        - name: "endDrag"
          signature: "() => void"
          description: "结束拖拽，清除 dragState"

        - name: "handleDrop"
          signature: "(targetId: string, targetIndex: number) => void"
          description: "处理放下操作，根据 dragType 执行对应逻辑"
          type_handlers:
            artifact-reference:
              action: "调用 uiStore.addComposerAttachment"
            thread-reorder:
              action: "调用 threadStore.reorderThreads"
            attachment-reorder:
              action: "调用 uiStore.reorderComposerAttachments"

  inter_module_communication:
      description: "与其他模块 Store 的通信协议"
      integrations:
        - module: "threadStore"
          sync:
            - direction: "uiStore → threadStore"
              trigger: "setSelectedThreadId"
              action: "threadStore.currentThreadId = threadId"
            - direction: "threadStore → uiStore"
              trigger: "threadStore 内部切换"
              action: "uiStore.selectedThreadId = threadStore.currentThreadId"
              note: "通过 threadStore.subscribe 监听"

        - module: "artifactStore"
          sync:
            - direction: "uiStore → artifactStore"
              trigger: "setSelectedArtifactId"
              action: "artifactStore.selectedId = artifactId"
            - direction: "artifactStore → uiStore"
              trigger: "artifactStore 内部选中"
              action: "uiStore.selectedArtifactId = artifactStore.selectedId"

        - module: "runStore"
          sync:
            - direction: "uiStore → runStore"
              trigger: "setToolVisibilityLayer"
              action: "runStore.visibilityLayer = layer"
            - direction: "runStore → uiStore"
              trigger: "runStore 更新 currentRun"
              action: "uiStore.selectedRunId = runStore.currentRunId"

  error_handling:
      description: "服务层错误处理"
      patterns:
        - pattern: "store_update_failure"
          description: "Store 更新失败时回滚并提示"
          action: "恢复前一个有效状态 + toast.error"

        - pattern: "event_handler_error"
          description: "事件处理器抛出异常时阻止冒泡"
          action: "console.error + 不影响其他组件"

        - pattern: "drag_invalid_target"
          description: "拖拽到无效目标时"
          action: "ghost 回退 + 轻微震动反馈"

  derived_from:
    - parent: "service.yaml 接口契约"
      rationale: "实现 workbench-shell 前端接口契约"
    - parent: "workbench-shell-feature"
      rationale: "服务层实现 feature 规范中定义的交互行为"
    - parent: "workbench-shell-data"
      rationale: "服务 API 操作 data 规范中定义的数据实体"

updated_by: "hermes"
updated_at: "2026-04-19T20:13:00Z"
