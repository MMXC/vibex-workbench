spec:
  version: "2.0"
  level: "5c_data"
  name: "workbench-shell_data"
  parent: "workbench-shell"
  status: "active"

content:
  io_contract:
    input: "用户操作（对话输入/对话切换/布局操作）"
    output: "LayoutState + ConversationThread[]"
    boundary: "只做 UI 状态数据，不做业务逻辑"
    behavior: "记录布局和对话状态"
    changelog:
      - version: "2.0"
        date: "2026-04-20"
        author: "hermes"
        changes:
          - "新增 io_contract 字段"
          - "新增 ConversationThread + ConversationMessage 数据实体"

  entities:
    - entity: "LayoutState"
      fields:
        - name: "id"
          type: "string"
        - name: "leftSidebarWidth"
          type: "number"
        - name: "rightSidebarWidth"
          type: "number"
        - name: "leftSidebarOpen"
          type: "boolean"
        - name: "rightSidebarOpen"
          type: "boolean"
        - name: "viewMode"
          type: "mermaid_or_canvas"
          description: "dsl-canvas 的视图模式，值: mermaid | canvas"

    - entity: "ConversationThread"
      description: "对话线程——对应 Canvas 上的一条行为序列"
      fields:
        - name: "id"
          type: "string"
          primary_key: true
        - name: "title"
          type: "string"
        - name: "route"
          type: "route_type"
        - name: "messages"
          type: "ConversationMessage[]"
        - name: "confirmedIO"
          type: "ConfirmedIO_or_null"
        - name: "createdAt"
          type: "Date"
        - name: "isActive"
          type: "boolean"

    - entity: "ConversationMessage"
      description: "对话消息"
      fields:
        - name: "id"
          type: "string"
        - name: "role"
          type: "user_or_agent"
        - name: "content"
          type: "string"
        - name: "timestamp"
          type: "Date"
        - name: "route"
          type: "route_type"
        - name: "clarificationType"
          type: "clarification_type"
          description: "clarification loop 中的消息类型"
