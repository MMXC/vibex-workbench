---
spec:
  name: workbench-shell-feature
  level: 4_feature
  version: "0.1.0"
  status: draft
  parent: "vibex-workbench-architecture"

content:
  feature_name: "workbench-shell"
  feature_tagline: "三栏布局外壳 + Composer 多模态输入"
  milestone_ref: "M1"

  overview: |
    workbench-shell 是 VibeX Workbench 的根布局模块（M1 里程碑）。
    负责渲染三栏布局（sidebar-left / main-canvas / sidebar-right），
    提供 Composer 多模态输入组件，以及全局 uiStore 布局状态管理。
    不直接处理 Thread/Run/Artifact 业务逻辑——那些由其他模块负责。

  component_tree:
    description: "组件树，root 为 WorkbenchShell"
    root: "workbench-shell"
    nodes:
      - id: "workbench-shell"
        name: "WorkbenchShell"
        type: "layout"
        file: "src/lib/components/WorkbenchShell.svelte"
        description: "根布局：CSS Grid 三栏 + 响应式断点"
        children:
          - "sidebar-left"
          - "main-canvas"
          - "sidebar-right"
          - "composer"
          - "global-modals"
        props:
          initialLeftSidebarOpen: "boolean (default: true)"
          initialRightSidebarOpen: "boolean (default: false)"
        responsibilities:
          - "渲染三栏 Grid 布局（sidebar-left / main-canvas / sidebar-right）"
          - "响应 resize / 断点变化"
          - "消费 uiStore 状态，触发子组件重渲染"
          - "管理 composer 区域展开/收起"
        events: []

      - id: "sidebar-left"
        name: "SidebarLeft"
        type: "container"
        file: "src/lib/components/SidebarLeft.svelte"
        description: "左侧边栏：Thread 列表 + 快捷操作"
        children:
          - "sidebar-left-header"
          - "thread-list"
          - "sidebar-left-footer"
        props:
          width: "px (default: 260)"
          collapsible: "boolean (default: true)"
        responsibilities:
          - "渲染 Thread 列表（从 threadStore 订阅）"
          - "侧边栏折叠/展开动画"
          - "快捷操作按钮（新建 / 设置）"
        events:
          - name: "thread.select"
            payload: "threadId: string"
            description: "用户点击 Thread 时发出，父组件路由到 /canvas/[id]/thread/[threadId]"
          - name: "thread.create"
            payload: "goal?: string"
            description: "新建 Thread 按钮点击"
          - name: "sidebar.toggle"
            payload: "side: 'left' | 'right'"
            description: "通知 uiStore 切换侧边栏状态"

      - id: "sidebar-left-header"
        name: "SidebarLeftHeader"
        type: "display"
        file: "src/lib/components/SidebarLeftHeader.svelte"
        description: "左侧栏标题栏"
        children: []
        props:
          title: "string (default: 'Threads')"
          showToggle: "boolean (default: true)"
        responsibilities:
          - "显示标题 + 折叠按钮"
        events: []

      - id: "thread-list"
        name: "ThreadList"
        type: "container"
        file: "src/lib/components/ThreadList.svelte"
        description: "可滚动的 Thread 列表"
        children:
          - "thread-item"
        props:
          maxHeight: "px (default: calc(100vh - 120px))"
        responsibilities:
          - "从 threadStore 订阅 threads[] 并渲染列表"
          - "当前 Thread 高亮"
          - "滚动加载（懒加载）"
        events: []

      - id: "thread-item"
        name: "ThreadItem"
        type: "display"
        file: "src/lib/components/ThreadItem.svelte"
        description: "单个 Thread 条目"
        children: []
        props:
          thread: "Thread"
          isActive: "boolean"
        responsibilities:
          - "显示 Thread 名称 + 创建时间 + 状态"
          - "hover 显示快捷操作（切换 / 删除）"
        events:
          - name: "thread.select"
            payload: "threadId: string"
          - name: "thread.delete"
            payload: "threadId: string"
            description: "显示确认弹层后再发出"

      - id: "sidebar-left-footer"
        name: "SidebarLeftFooter"
        type: "action"
        file: "src/lib/components/SidebarLeftFooter.svelte"
        description: "左侧栏底部操作区"
        children: []
        props: {}
        responsibilities:
          - "新建 Thread 按钮"
          - "设置入口"
        events:
          - name: "thread.create"
          - name: "settings.open"

      - id: "main-canvas"
        name: "MainCanvas"
        type: "container"
        file: "src/lib/components/MainCanvas.svelte"
        description: "主画布区：路由到 canvas-workbench 模块渲染"
        children:
          - "canvas-toolbar"
          - "canvas-viewport"
          - "context-banner"
        props:
          threadId: "string (from URL param)"
        responsibilities:
          - "接收 threadId，注入 canvas-workbench"
          - "显示上下文摘要 Banner"
          - "工具栏（可见性切换 / 视图操作）"
        events: []

      - id: "canvas-toolbar"
        name: "CanvasToolbar"
        type: "action"
        file: "src/lib/components/CanvasToolbar.svelte"
        description: "画布工具栏：可见性切换 + 视图控制"
        children: []
        props:
          toolVisibilityLayer: "1 | 2 | 3"
        responsibilities:
          - "三层可见性切换按钮（自然语言 / 结构化 / 开发者）"
          - "缩放控制 / 视图重置"
        events:
          - name: "visibility.change"
            payload: "layer: 1 | 2 | 3"
            description: "触发 uiStore.toolVisibilityLayer 更新"
          - name: "view.reset"
          - name: "view.zoom"
            payload: "delta: number"

      - id: "canvas-viewport"
        name: "CanvasViewport"
        type: "display"
        file: "src/lib/components/CanvasViewport.svelte"
        description: "画布视口，委托 canvas-workbench 模块渲染"
        children: []
        props:
          canvasId: "string"
        responsibilities:
          - "渲染 CanvasRenderer（来自 canvas-workbench 模块）"
          - "转发 pan/zoom 事件"
        events: []

      - id: "context-banner"
        name: "ContextBanner"
        type: "display"
        file: "src/lib/components/ContextBanner.svelte"
        description: "上下文摘要 Banner（显示在画布上方）"
        children: []
        props:
          contextSummary: "string (来自 threadStore.contextMemory)"
        responsibilities:
          - "显示当前 Thread 的上下文摘要"
          - "hover 展开查看详情"
        events: []

      - id: "sidebar-right"
        name: "SidebarRight"
        type: "container"
        file: "src/lib/components/SidebarRight.svelte"
        description: "右侧边栏：Artifact 预览 / 工具详情 / Run 状态"
        children:
          - "sidebar-right-tabs"
          - "artifact-preview"
          - "tool-detail"
          - "run-status"
        props:
          width: "px (default: 320)"
          collapsible: "boolean (default: true)"
        responsibilities:
          - "Tab 切换：Artifact / Tool / Run"
          - "响应 uiStore.activePanel 切换显示内容"
        events:
          - name: "sidebar.toggle"
            payload: "side: 'left' | 'right'"
          - name: "tab.change"
            payload: "tab: 'artifact' | 'tool' | 'run'"

      - id: "sidebar-right-tabs"
        name: "SidebarRightTabs"
        type: "action"
        file: "src/lib/components/SidebarRightTabs.svelte"
        description: "右侧栏 Tab 切换"
        children: []
        props:
          activeTab: "'artifact' | 'tool' | 'run'"
        responsibilities:
          - "Tab 按钮渲染"
          - "Tab 切换触发 uiStore.activePanel 更新"
        events:
          - name: "tab.change"
            payload: "tab: 'artifact' | 'tool' | 'run'"

      - id: "artifact-preview"
        name: "ArtifactPreview"
        type: "display"
        file: "src/lib/components/ArtifactPreview.svelte"
        description: "Artifact 预览面板"
        children: []
        props:
          artifact: "Artifact | null"
        responsibilities:
          - "从 artifactStore 订阅选中 Artifact 并渲染预览"
          - "图片 / PDF / 文本 / URL 差异化渲染"
          - "拖拽引用（drag into Composer）"
        events:
          - name: "artifact.reference"
            payload: "artifactId: string"
            description: "拖拽时引用 Artifact 到 Composer"
          - name: "artifact.open"
            payload: "artifactId: string"
          - name: "artifact.delete"
            payload: "artifactId: string"

      - id: "tool-detail"
        name: "ToolDetail"
        type: "display"
        file: "src/lib/components/ToolDetail.svelte"
        description: "工具调用详情面板"
        children: []
        props:
          toolInvocation: "ToolInvocation | null"
        responsibilities:
          - "显示当前工具调用的输入参数、输出、耗时"
          - "错误状态高亮"
        events: []

      - id: "run-status"
        name: "RunStatus"
        type: "display"
        file: "src/lib/components/RunStatus.svelte"
        description: "Run 状态面板"
        children: []
        props:
          run: "Run | null"
        responsibilities:
          - "显示当前 Run 状态机（queued / planning / executing / completed / failed）"
          - "进度条 / ETA 显示"
          - "取消 Run 按钮"
        events:
          - name: "run.cancel"
            payload: "runId: string"

      - id: "composer"
        name: "Composer"
        type: "input"
        file: "src/lib/components/Composer.svelte"
        description: "多模态输入组合器（核心交互组件）"
        children:
          - "composer-textarea"
          - "composer-attachments"
          - "composer-toolbar"
          - "composer-submit"
        props:
          maxHeight: "px (default: 200)"
          autoFocus: "boolean (default: true)"
          placeholder: "string (default: '输入目标，或拖拽 Artifact...')"
        responsibilities:
          - "多模态输入：text / image / pdf / url"
          - "附件列表管理（add / remove / reorder）"
          - "URL / PDF 预览提取"
          - "Ctrl+Enter 提交快捷键"
          - "展开/收起动画"
        events:
          - name: "composer.submit"
            payload: "goal: string; attachments: Artifact[]"
            description: "提交目标，触发 startRun()"
          - name: "composer.attach"
            payload: "Artifact"
            description: "添加附件"
          - name: "composer.detach"
            payload: "artifactId: string"
            description: "移除附件"
          - name: "composer.expand"
          - name: "composer.collapse"

      - id: "composer-textarea"
        name: "ComposerTextarea"
        type: "input"
        file: "src/lib/components/ComposerTextarea.svelte"
        description: "Composer 文本输入区"
        children: []
        props:
          placeholder: "string"
          value: "string"
          maxRows: "number (default: 8)"
        responsibilities:
          - "textarea 自动高度（rows 1 → maxRows）"
          - "placeholder 显示"
          - "focus ring / blur 效果"
        events:
          - name: "input.change"
            payload: "value: string"
          - name: "input.submit"
            payload: "value: string"
            description: "Ctrl+Enter 触发父组件 composer.submit"

      - id: "composer-attachments"
        name: "ComposerAttachments"
        type: "display"
        file: "src/lib/components/ComposerAttachments.svelte"
        description: "Composer 附件缩略图列表"
        children: []
        props:
          attachments: "Artifact[]"
        responsibilities:
          - "渲染已添加附件的缩略图（图片/PDF/URL）"
          - "拖拽排序"
          - "单个移除按钮"
        events:
          - name: "attachment.remove"
            payload: "artifactId: string"
          - name: "attachment.reorder"
            payload: "fromIndex: number; toIndex: number"

      - id: "composer-toolbar"
        name: "ComposerToolbar"
        type: "action"
        file: "src/lib/components/ComposerToolbar.svelte"
        description: "Composer 工具栏：添加附件快捷入口"
        children: []
        props: {}
        responsibilities:
          - "按钮：上传图片 / 上传 PDF / 粘贴 URL"
          - "触发 artifact-registry 模块上传"
        events:
          - name: "attach.image"
          - name: "attach.pdf"
          - name: "attach.url"
            payload: "url: string"
            description: "弹出 URL 提取对话框"

      - id: "composer-submit"
        name: "ComposerSubmit"
        type: "action"
        file: "src/lib/components/ComposerSubmit.svelte"
        description: "Composer 提交按钮"
        children: []
        props:
          disabled: "boolean (当 text 为空时)"
          loading: "boolean (提交中状态)"
        responsibilities:
          - "显示提交按钮 + 加载动画"
          - "disable 状态样式"
        events:
          - name: "submit.click"
            payload: "goal: string; attachments: Artifact[]"

      - id: "global-modals"
        name: "GlobalModals"
        type: "container"
        file: "src/lib/components/GlobalModals.svelte"
        description: "全局 Modal 层：覆盖所有 UI 的弹层"
        children:
          - "settings-modal"
          - "url-extract-modal"
          - "confirm-dialog"
        props: {}
        responsibilities:
          - "消费 uiStore.modals[] 渲染弹层队列"
          - "backdrop click 关闭"
          - "ESC 快捷键支持"
        events:
          - name: "modal.close"
            payload: "modalId: string"
          - name: "modal.open"
            payload: "modalType: string; props: Record<string, any>"

      - id: "settings-modal"
        name: "SettingsModal"
        type: "display"
        file: "src/lib/components/SettingsModal.svelte"
        description: "设置弹层"
        children: []
        props:
          visible: "boolean"
        responsibilities:
          - "可见性层级配置"
          - "快捷键配置"
          - "数据导出/清除"
        events:
          - name: "settings.save"
          - name: "settings.close"

      - id: "url-extract-modal"
        name: "UrlExtractModal"
        type: "display"
        file: "src/lib/components/UrlExtractModal.svelte"
        description: "URL 提取弹层"
        children: []
        props:
          visible: "boolean"
          url: "string"
        responsibilities:
          - "URL 输入框 + 预览"
          - "提取内容类型选择（article / product / image）"
        events:
          - name: "url.extract"
            payload: "url: string; contentType: string"
          - name: "url.cancel"

      - id: "confirm-dialog"
        name: "ConfirmDialog"
        type: "display"
        file: "src/lib/components/ConfirmDialog.svelte"
        description: "通用确认对话框"
        children: []
        props:
          title: "string"
          message: "string"
          confirmLabel: "string (default: 'Confirm')"
          cancelLabel: "string (default: 'Cancel')"
          destructive: "boolean (default: false)"
        responsibilities:
          - "通用确认/取消交互"
          - "danger 样式（红色确认按钮）"
        events:
          - name: "confirm.ok"
          - name: "confirm.cancel"

  layout_spec:
    description: "CSS Grid 三栏布局规范"
    grid_template: "'sidebar-left main-canvas sidebar-right' 1fr"
    grid_template_columns: "260px 1fr 320px"
    grid_template_rows: "1fr auto"
    areas:
      sidebar-left:
        grid_area: "1 / 1 / 3 / 2"
        description: "Thread 列表区"
      main-canvas:
        grid_area: "1 / 2 / 3 / 3"
        description: "画布主视图"
      sidebar-right:
        grid_area: "1 / 3 / 3 / 4"
        description: "详情/预览面板"
      composer:
        grid_area: "2 / 2 / 3 / 4"
        description: "底部输入框（可展开）"
    breakpoints:
      - breakpoint: "1024px"
        grid_template_columns: "220px 1fr 280px"
      - breakpoint: "768px"
        grid_template_columns: "0px 1fr 0px"
        sidebar-left_visible: false
        sidebar-right_visible: false
      - breakpoint: "480px"
        grid_template_columns: "0px 1fr 0px"
        composer_max_height: "120px"

  interaction_spec:
    description: "全局交互规范"
    keyboard_shortcuts:
      - key: "Ctrl+Enter"
        action: "composer.submit"
        context: "composer focused"
      - key: "Escape"
        action: "modal.close / composer.collapse"
        context: "global"
      - key: "Ctrl+\\"
        action: "sidebar.right.toggle"
        context: "global"
      - key: "Ctrl+1"
        action: "visibility.set(1)"
        context: "global"
      - key: "Ctrl+2"
        action: "visibility.set(2)"
        context: "global"
      - key: "Ctrl+3"
        action: "visibility.set(3)"
        context: "global"
    drag_and_drop:
      - source: "artifact-preview"
        target: "composer"
        action: "artifact.reference"
        feedback: "ghost + drop zone highlight"
      - source: "thread-item"
        target: "main-canvas"
        action: "thread.switch"
        feedback: "highlight"

  accessibility:
    description: "无障碍规范"
    a11y_rules:
      - rule: "所有交互元素有可聚焦的 tabindex"
        wcag_level: "AA"
      - rule: "sidebar 折叠时有 aria-expanded / aria-controls"
        wcag_level: "AA"
      - rule: "模态弹层有 focus trap + aria-modal"
        wcag_level: "AA"
      - rule: "emoji/icon-only 按钮有 aria-label"
        wcag_level: "A"
      - rule: "三栏布局在 screen reader 中声明为 landmark (aside/nav/main)"
        wcag_level: "A"

  implementation_notes:
    - "WorkbenchShell 使用 SvelteKit 的 +layout.svelte，可通过 $props() 获取 threadId"
    - "composer textarea 使用 contenteditable div 替代 textarea 以支持富文本占位符（可选）"
    - "三栏使用 CSS Grid + ResizeObserver 监听侧边栏宽度变化，同步 uiStore"
    - "可见性切换不影响 canvas-workbench 节点渲染，仅改变 runStore 的渲染过滤逻辑"
    - "GlobalModals 使用 Svelte 的 <svelte:fragment> + 事件冒泡，不阻塞主交互流"

derived_from:
  - parent: "vibex-workbench-architecture"
    rationale: "workbench-shell 模块的 Feature 规格细化"
  - source: "禹笑笑《从聊天框到工作台》M1 里程碑"
    key_insight: "三栏布局 + Composer 是工作台的核心入口"

linked_modules:
  - thread-manager
  - run-engine
  - artifact-registry
  - canvas-workbench

updated_by: "hermes"
updated_at: "2026-04-19T20:08:00Z"
