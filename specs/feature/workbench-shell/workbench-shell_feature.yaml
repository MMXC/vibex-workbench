# ============================================================
# Level 4 — Workbench Shell 功能规格
# parent: MOD-workbench-shell (L3)
# ============================================================

spec:
  version: "2.2"
  level: "4_feature"
  name: "workbench-shell"
  parent: "MOD-workbench-shell"
  status: "active"

meta:
  module: "MOD-workbench-shell"
  owner: "hermes"
  created: "2026-04-20"
  updated: "2026-04-22"
  pilot_m0_layer_contract: true

content:
  description: |
    工作台外壳——以 workbench-ide-chrome_feature 为权威：类 Cursor IDE 分区（顶栏、左活动栏+侧栏、中央文档/画布、
    右侧 AI、底部 Dock）+ Canvas 行为展示；尺寸拖拽见 workbench-layout_resize_feature v2。

  # ── M0：愿景承接（L1/L2→L4 聚合），与 specs/meta/spec-layer-contract.yaml 对齐 ──
  vision_traceability:
    summary: "聚合 L4：把 L1 体验面与 C6 行为展示落到壳层 Store/Event Bus 边界，并索引子 feature（ide-chrome / layout / conversation / canvas）"
    l1:
      goal_path: "specs/project-goal/vibex-workbench-goal.yaml"
      constraint_ids: ["C1", "C6", "C7"]
      goal_sections_hint:
        - "content.product_value_layers.experience_visualization"
        - "content.constraints（C6 行为展示；C7 门禁与变更派生）"
        - "content.mission（输入→输出→行为展示）"
    l2:
      skeleton_path: "specs/architecture/vibex-workbench-skeleton.yaml"
      module_id: "MOD-workbench-shell"
      anchors_hint:
        - "content.modules 中 MOD-workbench-shell"
        - "content.upstream_l1"
    l3:
      module_spec_path: "specs/module/MOD-workbench-shell_module.yaml"
    acceptance_summary:
      - "子 feature（ide-chrome、layout-resize、conversation、canvas-renderer 等）在 parent 链上挂在本聚合或 MOD 下可解析；壳层不负责 spec 解析/路由/生成"
      - "conversation_store 与 canvas_store 的事件边界与本文件 io_contract 一致；详细分区以 ide-chrome 为准"

  # ── IO 契约 ────────────────────────────────────────
  io_contract:
    input: |
      - 用户对话输入（自然语言）
      - SSE 事件流（来自 router / code-generator / spec-engine）
      - 点击旧对话（切换 activeThreadId）
    output: |
      - conversationStore 状态更新
      - canvasStore 节点序列更新
      - 三栏布局渲染
    boundary: |
      范围：UI 布局 + Store 状态管理
      不做：spec 逻辑 / 路由决策 / 代码生成
      切换对话在 conversation_panel 侧实现，canvas 被动跟随（只读）
    behavior: |
      1. 用户输入 → conversationStore.addMessage()
      2. router 处理 → conversationStore.setRoute()
      3. conversationStore 通过 Event Bus 广播 dialog.* 事件
      4. canvasStore 订阅 → 更新 canvasNodes
      5. 点击旧对话 → conversationStore.setActiveThread() → 触发重放
    changelog:
      - version: "2.2"
        date: "2026-04-22"
        author: "hermes"
        changes:
          - "新增 content.vision_traceability（Phase A：聚合 L4 锚点 + 验收摘要）"
      - version: "2.1"
        date: "2026-04-21"
        author: "hermes"
        changes:
          - "挂接 IDE 壳层 spec（ide-chrome）与 layout_resize v2；描述从旧三栏升级为 Cursor 式分区"
      - version: "2.0"
        date: "2026-04-20"
        author: "hermes"
        changes:
          - "新增 io_contract 字段（input/output/boundary/behavior/changelog）"
          - "description 从「VSCode风格三栏」改为「对话面板 + Canvas 行为展示 + 三栏」"
          - "新增 behavior 描述（Event Bus 广播 + Canvas 只读跟随）"

  user_stories:
    - id: "US-001"
      as_a: "开发者"
      i_want: "在对话面板输入自然语言需求，看到 Canvas 实时展示行为节点"
      so_that: "我直观看到从需求到交付的全链路过程"
    - id: "US-002"
      as_a: "开发者"
      i_want: "点击左侧的旧对话，Canvas 切换到该对话的行为序列"
      so_that: "我可以在不同对话之间切换查看"
    - id: "US-003"
      as_a: "开发者"
      i_want: "在 IDE 式分区中看到：左侧工作区/线程、中央画布与文档、右侧 AI 对话与输入"
      so_that: "我能对照 Spec 治理流程完成需求与可视化"

  capabilities:
    - id: "C-001"
      name: "对话面板"
      priority: "critical"
      description: "多线程对话 + 路由状态标签（goal/feature/bug）"
    - id: "C-002"
      name: "Canvas 行为展示"
      priority: "critical"
      description: "SSE 事件流 → 节点序列图（只读）"
    - id: "C-003"
      name: "三栏布局"
      priority: "high"
      description: "对话面板 | Canvas | 属性面板"
    - id: "C-004"
      name: "Event Bus 广播"
      priority: "high"
      description: "conversationStore → Event Bus → canvasStore"
    - id: "C-005"
      name: "对话切换"
      priority: "high"
      description: "点击旧对话 → 重放 SSE 事件流到 Canvas"

  sub_specs:
    ide_chrome: "workbench-ide-chrome_feature.yaml"
    layout_resize: "workbench-layout_resize_feature.yaml"
    conversation: "workbench-conversation_feature.yaml"
    uiux: "workbench-shell_uiux.yaml"
    service: "workbench-shell_service.yaml"
    data: "workbench-shell_data.yaml"
    test: "workbench-shell_test.yaml"

derived_from:
  - parent: "MOD-workbench-shell"
    rationale: "workbench-shell 是 workbench-shell 模块的核心功能实现"
