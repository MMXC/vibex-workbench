spec:
  version: "1.0"
  level: "4_feature"
  name: "workbench-shell"
  parent: "MOD-workbench-shell"
  status: "active"

meta:
  module: "MOD-workbench-shell"
  owner: "hermes"
  created: "2026-04-20"

content:
  description: "工作台外壳——VSCode 风格三栏布局，左侧文件树/右侧面板/中央编辑器"

  user_stories:
    - id: "US-001"
      as_a: "spec 作者"
      i_want: "看到三栏布局：左侧文件树，中间编辑器，右侧属性面板"
      so_that: "我可以在统一界面中完成所有 spec 工作"
    - id: "US-002"
      as_a: "spec 作者"
      i_want: "底部看到状态栏，显示当前文件路径和生成状态"
      so_that: "我随时知道系统状态"
    - id: "US-003"
      as_a: "spec 作者"
      i_want: "顶部看到 tab 栏，多个文件切换"
      so_that: "我可以同时编辑多个文件"

  capabilities:
    - id: "C-001"
      name: "三栏布局"
      priority: "critical"
    - id: "C-002"
      name: "Tab 栏"
      priority: "high"
    - id: "C-003"
      name: "状态栏"
      priority: "high"
    - id: "C-004"
      name: "暗色主题"
      priority: "medium"

  sub_specs:
    uiux: "workbench-shell_uiux.yaml"
    service: "workbench-shell_service.yaml"
    data: "workbench-shell_data.yaml"
    test: "workbench-shell_test.yaml"

