# I4: 迭代节奏

## I4.1 迭代周期定义

```yaml
iteration_cycles:
  hotfix:
    trigger: P0 bug
    duration: 立即
    participants: agent + user（审批）
    gate: make validate 通过

  sprint:
    trigger: 每周或每 2 周
    capacity: config.sprint_capacity_p1  # 由 p-metaspec-config.yaml 注入，默认建议值 3
    participants: user（需求）+ agent（实现）
    gate: make validate + 用户 sign-off

  milestone:
    trigger: L2 下所有 L3 confirmed + implemented
    duration: 评审 + 归档
    participants: user 主导
    gate: 全部 L3 测试通过 + 无 P0/P1

  quarterly_review:
    trigger: 每季度
    duration: 1-2 天
    participants: user
    action: 
      - 审阅所有 deprecated specs
      - 清理 unused specs
      - 调整 L1 goals
```

## I4.2 Backlog 管理

```yaml
backlog:
  storage: specs/backlog/*.yaml
  fields:
    - id: auto-generated
    - title: 摘要
    - type: bug|feature|perf|ux|arch
    - priority: P1|P2|P3
    - created_at: ISO8601
    - last_touched: ISO8601
    - reason: 为什么进入 backlog
    - blocking: [spec-id-list]  # 是否有前置依赖
  grooming:
    frequency: 每 sprint 开始前
    action: 审阅 P3 items，提升或清理
```

