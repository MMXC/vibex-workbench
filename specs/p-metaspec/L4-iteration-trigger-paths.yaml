# I5: spec 漂移检测与对齐

## I5.1 漂移检测规则

```yaml
spec_drift:
  check_tool: validate_specs.py
  
  drift_types:
    - type: missing_implementation
      when: "spec 声明了功能，代码中无对应实现"
      severity: high
      action: back_to_impl

    - type: extra_implementation
      when: "代码中有实现，spec 中无声明"
      severity: medium
      action: back_to_spec（补充 spec）

    - type: behavior_mismatch
      when: "实现行为与 io_contract 不符"
      severity: critical
      action: back_to_impl

    - type: constraint_violation
      when: "代码违反 spec 中声明的 constraints"
      severity: high
      action: back_to_impl（修复）或 back_to_spec（修正 constraint）

  frequency:
    - on_commit: git hook 触发
    - on_demand: user 执行 make validate
    - scheduled: 每日一次（CI/CD）
```

## I5.2 漂移对齐决策

```
检测到漂移后：

missing_implementation：
  → spec 正确，代码缺失
  → 回到 W4 补充实现

extra_implementation：
  → 代码存在，spec 无声明
  → 询问 user：
      - 是有意为之 → 补充 spec
      - 是遗留代码 → 删除

behavior_mismatch：
  → 代码 ≠ spec
  → 询问 user：
      - spec 对 → 修复代码
      - 代码对 → 修改 spec → 重新 confirm

constraint_violation：
  → 查看 constraint source：
      - security/compliance → 必须修代码
      - business → 询问 user
```

