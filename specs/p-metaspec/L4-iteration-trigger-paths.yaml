# I1: 迭代触发器类型

## I1.1 内部触发（spec 自身驱动）

```yaml
triggers:
  - type: spec_completed
    when: "L3 spec 所有 behaviors 已验证通过"
    action: next_L3
    description: "当前 L3 功能完成后，自动推荐下一个 L3"

  - type: spec_coverage_full
    when: "L2 下所有 L3 spec 已 confirmed"
    action: spec_freeze
    description: "该 L2 模块 spec 全部冻结，标记为 implemented"

  - type: constraint_saturated
    when: "L3 constraints 覆盖率达到 80%"
    action: generate_tests
    description: "约束足够，触发测试覆盖率生成"
```

## I1.2 外部触发（用户/业务驱动）

```yaml
triggers:
  - type: user_feedback
    when: "用户在 W5 sign-off 时填写反馈"
    action: classify_feedback
    description: "分类用户反馈，决定处理路径"

  - type: bug_report
    when: "用户提交 bug，通过 bug_report 工具录入"
    action: create_bug_spec
    description: "自动创建 bug-spec，进入 spec-first 流程"

  - type: business_requirement
    when: "用户提出新功能需求"
    action: new_spec_flow
    description: "进入 W1 澄清流程"
```

## I1.3 数据驱动触发

```yaml
triggers:
  - type: usage_threshold
    when: "某功能使用频率 < 5% 超过 30 天"
    action: propose_deprecation
    description: "建议标记为 deprecated 或删除"

  - type: test_coverage_drop
    when: "main 分支覆盖率 < 80%"
    action: block_merge
    description: "阻止合并，要求补测试"

  - type: spec_drift_detected
    when: "代码与 spec 不一致（validate_specs.py 报错）"
    action: reconcile
    description: "对比 spec 与代码，决定更新哪方"
```

