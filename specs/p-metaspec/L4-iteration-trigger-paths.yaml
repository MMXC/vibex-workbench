# I2: 反馈分类与路由

## I2.1 用户反馈分类器

```yaml
feedback_classifier:
  input: user_feedback_text

  routing:
    - if: "提到 bug/错误/crash"
      then:
        type: bug
        target: L4-bug-spec
        workflow: W6 → W1（简化版）→ W4
        
    - if: "提到新功能/希望/应该能"
      then:
        type: feature_request
        target: new_L3_spec
        workflow: W1 → W2 → W3 → W4
        
    - if: "提到太慢/性能问题"
      then:
        type: performance_issue
        target: L4-performance-spec
        workflow: W4（性能优化路径）
        
    - if: "提到 UI/交互/体验"
      then:
        type: ux_improvement
        target: L3-ux-refinement
        workflow: W1 → W2（仅更新 spec）→ W4
        
    - if: "提到扩展性/架构调整"
      then:
        type: architecture_change
        target: L2-architecture-spec
        workflow: W1 → W2（重写 L2）→ 所有 L3 需重新审阅
        
    - if: "提到 spec 写错了/不合理"
      then:
        type: spec_correction
        target: current_spec
        workflow: W6 → 回退到 W2 修改 → 重新 confirm
```

## I2.2 优先级矩阵

| 类型 | 严重性 \ 频率 | 高频 | 低频 |
|------|------------|------|------|
| **bug** | critical | P0 → 立即修复 | P1 → 下一迭代 |
| **bug** | 偶发 | P1 → 下一迭代 | P2 → backlog |
| **feature_request** | - | P1 | P3 |
| **performance** | - | P1 | P2 |
| **ux** | - | P2 | P3 |
| **architecture** | - | P2 | P3 |

