## I6.2 反馈分类消歧规则

在 I2.1 的路由规则基础上，以下规则用于消除歧义：

```yaml
disambiguation_rules:
  # 规则1：同一文本同时匹配 bug 和 spec_correction 时
  rule: "提到 spec 本身错了 → spec_correction 优先"
  example:
    text: "这个 spec 里说 '延迟不超过 100ms' 但实际应该能到 50ms"
    outcome: spec_correction
    reason: "用户是在批评 spec 内容本身，不是报告实现 bug"

  # 规则2：同时提到架构调整和新功能
  rule: "以架构调整为手段实现新功能 → architecture_change"
  example:
    text: "需要支持多租户，所以要重构存储层"
    outcome: architecture_change
    reason: "明确提及了架构层面的调整"

  # 规则3：性能问题与 bug 的边界
  rule: "性能退化 vs 预期性能不达标"
  example:
    text_a: "以前导出 1 万行只要 2 秒，现在要 10 秒"  # bug：回归
    text_b: "导出 10 万行太慢了，希望 5 秒内完成"     # feature_request 或 performance_issue
    outcome_a: bug  # 回归问题
    outcome_b: performance_issue

  # 规则4：UI/交互 与 spec_correction 的边界
  rule: "UI 与 spec 描述不符 → spec_correction；UI 体验不好 → ux_improvement"
  example:
    text_a: "spec 里写的是弹窗确认，但实际是跳转页面"  # spec 不对
    text_b: "弹窗确认的方式不够直观，建议改成 toast"  # ux 改进
```

