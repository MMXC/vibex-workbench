# 目标

回答 spec 体系最稀缺的问题：**「当前完成后，下一步做什么？」**。定义迭代触发条件、决策树和优先级排序，让 spec 的演进有章可循，而不是随机拍脑袋。

## I0: 量化验收标准

以下指标用于衡量迭代治理体系的健康度，按月统计：

| # | 指标 | 目标值 | 采集方式 | 说明 |
|---|------|--------|---------|------|
| QA-1 | P0 bug 在 24h 内修复率 | ≥ 95% | hotfix 触发日志 | 统计月度所有 P0 中在 24h 内完成 fix + validate 的比例 |
| QA-2 | Backlog 流转透明度 | ≥ 80% | backlog/*.yaml last_touched | 有 last_touched 记录且 30 天内有更新的 item 占总 backlog 的比例 |
| QA-3 | Sprint 交付完成率 | ≥ 85% | sprint_review 日志 | 每个 sprint 结束时实际交付的 P1 items / 计划 P1 items |
| QA-4 | Spec 漂移平均修复时长 | ≤ 7 天 | validate_specs.py 报告 | 从漂移被检测到被修复（back_to_impl / back_to_spec 完成）的平均天数 |
| QA-5 | 季度功能去废弃率 | ≥ 10%/季度 | usage_data 报告 | 季度内被标记 deprecated 或删除的 feature 数 / 季度新增 feature 数 |

> **配置项**：所有容量和阈值均为外部可配置参数（`config.*`），不得在 spec 中硬编码。配置项包括：`config.sprint_capacity_p1`、`config.p0_window_hours`、`config.usage_threshold_percent`、`config.usage_threshold_days`、`config.backlog_grooming_days`。具体值由 `p-metaspec-config.yaml` 或环境变量注入。

