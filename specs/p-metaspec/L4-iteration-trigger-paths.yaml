# I3: 迭代决策树

## I3.1 标准化决策流程

```
当 spec 进入 W6（迭代阶段）时：

Step 1: 收集输入
  ├── validation_result（测试结果）
  ├── user_feedback（用户反馈）
  ├── usage_data（使用数据，可选）
  └── spec_drift_report（漂移检测报告，可选）

Step 2: 分类
  ├── 所有输入按 I2.1 分类
  └── 合并同类（多个 bug 反馈 → 一个 bug-spec）

Step 3: 优先级排序
  ├── 按 I2.2 矩阵打分
  └── 输出优先级队列：P0 > P1 > P2 > P3

Step 4: 决策
  ┌─ P0 items > 0
  │   → 必须立即处理，进入 W4（简化版 bug-fix 路径）
  │   → 决策：back_to_impl
  │
  ├─ P1 items > 0 且 当前 sprint 未满
  │   → 纳入当前迭代
  │   → 决策：revise_scope
  │
  ├─ 当前目标达成（P0/P1 全部清空）且 user 确认
  │   → 决策：finish
  │
  └─ 其他情况
      → 决策：backlog（放入待办池）

Step 5: 架构依赖冲突检测
  ┌─ 检测到 cross_spec_dependency_conflict
  │   （两个或多个 L3 spec 的 feature_request 同时依赖同一 L2 架构变更）
  │   → 进入冲突仲裁流程（见 I3.3 架构依赖冲突仲裁）
  │
  └─ 无冲突
      → 继续 Step 4 决策结果
```

## I3.2 决策类型详解

| 决策 | 触发条件 | 回到工作流 | 影响范围 |
|------|---------|----------|---------|
| `continue` | 目标未完成，还有 P1 待处理 | W4 | 继续当前 L3 |
| `revise_scope` | 发现新需求或 scope 有误 | W1 | 调整 scope，重新澄清 |
| `back_to_spec` | spec 本身有误或不完整 | W2 | 修改 spec，重新 confirm |
| `back_to_impl` | 实现不符合 spec 或 P0 bug | W4 | 修复实现，重新 validate |
| `finish` | 目标达成，用户确认 | 结束 | 标记 done |
| `deprecate` | 功能废弃（usage < 5% > 30d）| W6 | 标记 deprecated，进入维护态 |

## I3.3 架构依赖冲突仲裁

当检测到两个或多个 `feature_request` 类型的 L3 spec 依赖同一 L2 架构变更时，进入本流程：

```yaml
cross_spec_dependency_conflict:
  detection:
    trigger: "backlog 中存在 ≥2 个 feature_request，它们的 blocking 字段指向同一 L2 spec"
    example: "L3-upload-spec + L3-export-spec 都声明 blocking: [L2-storage-arch]"

  arbitration_rules:
    priority_1: "业务价值更高的 feature 先做"
      decision: "由 user 显式确认哪个 feature 的业务价值优先"
      action: "高优先级 feature 的 L3 先进入 W4，低优先级 feature 等待 L2 变更完成后进入 W4"

    priority_2: "依赖链更短的 feature 先做"
      decision: "无 user 确认时，选择从属链最短的 L3（中间层 spec 最少）"
      action: "同一 L2 下，blocking 链中 spec 数量最少的 L3 优先"

    priority_3: "并行推进（需要 L2 独立变更路径）"
      decision: "如果 L2 变更可以切分为独立子集，分别服务不同 L3"
      condition: "L2 spec owner 确认可拆分"
      action: "并行推进，各自独立 L2 子集变更 + 对应 L3 实现"

    priority_4: "先到先得（backlog 中先出现的先做）"
      decision: "如果以上均无法判断，由 backlog 中的 created_at 确定顺序"
      action: "created_at 更早的 feature 优先进入迭代"

  conflict_record:
    fields:
      - conflicting_specs: [L3-id-list]    # 冲突涉及的 L3 spec 列表
      - shared_l2_dependency: L2-id         # 共同依赖的 L2 spec
      - resolution_rule_used: priority_1~4  # 使用的优先级规则
      - resolution_note: string              # 人工说明（如 user 确认内容）
      - resolved_at: ISO8601
    storage: specs/backlog/conflict_records/*.yaml
```

| 冲突场景 | 仲裁规则 | 决策结果 |
|---------|---------|---------|
| 两个 feature 都依赖同一 L2 | user 确认业务价值优先级 | 优先级高者先做 |
| 三个以上 feature 依赖同一 L2 | 业务价值 → 依赖链长度 → 先到先得 | 逐级筛选 |
| 架构变更可拆分 | L2 owner 确认可独立子集 | 并行推进 |
| user 无法判断且依赖链相同 | 按 backlog created_at 排序 | 先到先得 |

