# I6: 质量评估（Darwin Rubrics）

## I6.1 io_contract（顶层输入输出契约）

```yaml
io_contract:
  version: "1.0"

  # ─── input ───────────────────────────────────────
  input:
    - name: user_feedback_text
      type: string
      source: W5 sign-off 表单 / bug_report 工具 / 反馈渠道
      required: false
      description: "用户在 W5 签收时填写的自由文本反馈"
      examples:
        - "导出的 CSV 格式不对"
        - "希望能支持深色模式"
        - "这个 spec 里的约束写错了"

    - name: validation_result
      type: object
      source: make validate / validate_specs.py
      required: false
      description: "spec 验证工具的原始输出"
      fields:
        - spec_id: string
        - status: pass|fail|drift
        - errors: [string]
        - coverage_percent: number

    - name: usage_data
      type: object
      source: telemetry / analytics pipeline
      required: false
      description: "功能级别的使用频率数据"
      fields:
        - feature_id: string
        - usage_rate: number      # 百分比
        - period_days: number
        - trend: rising|stable|declining

    - name: spec_drift_report
      type: object
      source: validate_specs.py --diff 或 CI daily check
      required: false
      description: "代码与 spec 之间漂移的检测报告"
      fields:
        - drift_type: missing_impl|extra_impl|behavior_mismatch|constraint_violation
        - spec_id: string
        - severity: critical|high|medium|low
        - details: string

    - name: sprint_context
      type: object
      source: sprint tracking system
      required: false
      description: "当前迭代的容量和状态"
      fields:
        - sprint_id: string
        - capacity_remaining: number    # P1 items slot 剩余数量
        - p0_count: number
        - p1_count: number
        - p2_count: number

  # ─── output ───────────────────────────────────────
  output:
    - name: decision
      type: enum
      values: [continue, revise_scope, back_to_spec, back_to_impl, finish, deprecate, backlog]
      description: "迭代决策树的标准输出，驱动工作流路由"
      always_emitted: true

    - name: priority_queue
      type: array
      description: "按 P0→P1→P2→P3 排序的 backlog items"
      items:
        - id: string
          priority: P0|P1|P2|P3
          type: bug|feature_request|performance_issue|ux_improvement|architecture_change|spec_correction
          title: string
          target_spec: string|null   # 关联的 spec ID，无则为 new

    - name: feedback_classification
      type: array
      description: "将用户反馈文本映射为结构化分类"
      items:
        - original_text: string
          classified_type: bug|feature_request|performance_issue|ux_improvement|architecture_change|spec_correction
          confidence: high|medium|low
          ambiguity_flags: [string]  # 标记疑似歧义，供人工复核

    - name: workflow_routing
      type: object
      description: "指定每条 item 接下来的目标工作流"
      fields:
        - item_id: string
          next_workflow: string   # e.g. "W4", "W1→W2→W3→W4"
          gate: string            # e.g. "make validate", "user sign-off"

    - name: spec_drift_action
      type: object
      description: "针对检测到的 spec 漂移的修复指令"
      fields:
        - drift_id: string
          action: back_to_impl|back_to_spec|ask_user
          spec_id: string
          instruction: string    # 人类可读的修复说明

  # ─── 错误状态 ────────────────────────────────────
  errors:
    - code: ITER-001
      name: feedback_ambiguous
      description: "反馈文本可归入多个类别（high ambiguity），需人工复核"
      output: feedback_classification with confidence=low + ambiguity_flags

    - code: ITER-002
      name: no_decision_possible
      description: "输入不足以支撑任何决策"
      output: decision=null + human_review_required=true
```

