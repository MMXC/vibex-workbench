## I6.3 外部依赖引用（Spec自足性保障）

```yaml
external_dependencies:
  - name: W1-W6 工作流定义
    ref: L2-workflow-phases.yaml
    used_in:
      - I2.1 feedback_classifier.workflow 字段
      - I3.1 Step 1/4 决策流程
    note: "各 W* 阶段的具体活动、gate criteria、参与者角色均定义于该文件"

  - name: validate_specs.py
    ref: tools/validate_specs.py
    used_in:
      - I5.1 spec_drift.check_tool
      - io_contract.inputs.validation_result
    note: "该工具负责比对代码与 spec 声明的 behaviors/io_contract，需保证输出格式与 io_contract.input.validation_result 一致"

  - name: L4-bug-spec 模板
    ref: L4-bug-spec-template.yaml
    used_in:
      - I2.1 routing.bug.target
    note: "Bug spec 的标准模板，定义 bug 生命周期和 fix 验证方式"

  - name: L4-performance-spec 模板
    ref: L4-performance-spec-template.yaml
    used_in:
      - I2.1 routing.performance_issue.target
    note: "性能优化的 spec 模板，包含 baseline/goal/methodology"

  - name: make validate
    ref: Makefile 或 CI 配置
    used_in:
      - I4.1 iteration_cycles.gate
      - I5.1 frequency.on_demand
    note: "CI 入口命令，需在项目根目录 Makefile 中定义"

  - name: telemetry / analytics pipeline
    ref: infrastructure/usage-tracking.yaml
    used_in:
      - io_contract.inputs.usage_data
    note: "提供 usage_rate 和 period_days 数据，支持 I1.3 usage_threshold 触发"
