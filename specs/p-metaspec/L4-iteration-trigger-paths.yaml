# I7: 质量评估（Darwin Rubrics）

| # | 维度 | 权重 | 评分标准 |
|---|------|------|---------|
| 1 | **触发器覆盖度** | 25 | 内部/外部/数据驱动 三类齐全 |
| 2 | **决策树完整性** | 25 | 每种决策类型有明确的触发条件和影响范围 |
| 3 | **反馈路由清晰度** | 20 | I2.1 分类无歧义，每类有明确路径 |
| 4 | **迭代节奏合理性** | 15 | hotfix/sprint/milestone/quarterly 节奏明确 |
| 5 | **漂移检测自动化** | 15 | on_commit 钩子 + CI 自动运行 |

**最低门槛**：总分 ≥ 80，且 feedback 分类无歧义（任意文本输入都能归入某一类）。
