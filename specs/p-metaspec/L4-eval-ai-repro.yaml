## E6.2 评估节奏

```yaml
eval_frequency:
  on_demand:
    trigger: 用户主动运行 eval_ai_repro.py
    scope: smoke (5 TC, ~25min)

  on_spec_change:
    trigger: 任一 spec 文件被修改并 confirm 后
    scope: affected TC only
    automation: |
      # .git/hooks/pre-commit（需安装）
      # 调用 eval/feedback_triggers/run_affected_tc.py
      # 读取 git diff --name-only 获取变更 spec
      # 运行相关 TC，输出简报到 #spec-governance slack

  weekly:
    trigger: 每周定时
    scope: standard (20 TC, ~100min)
    delivery: slack #spec-governance

  pre_release:
    trigger: 发布前
    scope: full (50 TC, ~250min)
    gate: repro_level >= L3_substantial 才允许发布
```

