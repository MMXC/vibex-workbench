# E3: 评估指标体系

## E3.1 三大核心指标

### 指标 1：完整性（completeness）

```
completeness = matched_artifacts / total_declared_artifacts

其中：
  matched_artifacts = AI 实际生成且名称/路径匹配的产物数
  total_declared_artifacts = spec 中声明的产物总数（文件+目录+函数）
```

**评分规则**：
- ≥ 95%：A（优秀）
- 80-94%：B（良好）
- 60-79%：C（及格）
- < 60%：D（失败）

### 指标 2：一致性（alignment）

```
alignment = aligned_behaviors / total_declared_behaviors

其中 aligned_behaviors 通过以下检查：
  1. io_contract 检查：函数输入输出类型是否与 spec 一致
  2. parent_chain 检查：目录结构是否遵循 parent 链路
  3. constraint 检查：约束是否被正确实现（通过生成的测试用例验证）
  4. behavior 检查：spec 中声明的 behaviors 是否在代码中有对应实现
```

### 指标 3：稳定性（stability）

```
stability = consistency(run_1, run_2, run_3)
  = 文件路径完全相同的比例（忽略内容时间戳）

两个维度：
  path_stability: 相同路径的比例
  content_stability: 相同内容的比例（token-level diff < 5%）
```

## E3.2 失败模式分类（F1-F7）

```yaml
failure_modes:
  F1: parent_chain_broken
    description: "AI 生成的目录结构不符合 parent 链路"
    example: "spec 要求 component → parent 是 ui-layer，但 AI 建在了 utils/ 下"
    root_cause: "parent 字段存在但 AI 没有作为结构约束读取"
    spec_fix: "parent 链路验证前置到 W2 gate，不允许 parent 声明模糊"

  F2: io_contract_mismatch
    description: "AI 实现的函数签名与 io_contract 不符"
    example: "spec 声明 input.email 类型为 string，AI 实现为 object"
    root_cause: "io_contract 字段存在但 AI 理解为注释而非约束"
    spec_fix: "在 io_contract 中增加 enforced: true 字段，触发自动验证"

  F3: constraint_ignored
    description: "spec 中声明的约束未被实现"
    example: "spec 声明 password min_length: 8，AI 实现未做校验"
    root_cause: "constraints 在 spec 中，但无对应验证代码生成"
    spec_fix: "通过 L4-constraint spec 的三阶段验证自动生成验证代码"

  F4: structural_invention
    description: "AI 自行发明了 spec 中未声明的结构"
    example: "AI 创建了 spec 中没有的 config/environments/ 目录"
    root_cause: "AI 依赖训练数据中的先验知识，而非严格遵循 spec"
    spec_fix: "spec 中明确声明 exclusion: []（明确禁止的目录/文件）"

  F5: behavior_omission
    description: "spec 中声明的行为未实现"
    example: "spec behaviors: ['用户可删除待办']，AI 未实现 delete API"
    root_cause: "behaviors 是自然语言描述，AI 理解有偏差"
    spec_fix: "behaviors 字段增加对应的 test_case 片段（可执行断言）"

  F6: generation_inconsistency
    description: "相同 spec 两次生成结果差异大"
    example: "run_1 生成的目录在 src/components/，run_2 在 app/widgets/"
    root_cause: "gen.py 的 Skeleton/Content 分离不幂等"
    spec_fix: "L2-generator G8.2 的 should_overwrite() 逻辑需强化"

  F7: spec_ambiguity
    description: "spec 自身有歧义，AI 做了错误假设"
    example: "parent 字段指向不存在的节点"
    root_cause: "spec 在 Darwin 评估前未经过 L2-generator parent 链路验证"
    spec_fix: "gen.py pre_hook 的 check-parent-exists 强制执行"
```

## E3.3 复现能力等级

```yaml
repro_levels:
  L0_impossible:
    description: "无法复现，spec 自身不完整"
    metrics: {completeness: < 40%, alignment: < 40%}

  L1_minimal:
    description: "仅能复现最简单的目录结构"
    metrics: {completeness: 40-59%, alignment: 40-59%}

  L2_partial:
    description: "目录结构正确，io_contract 部分正确"
    metrics: {completeness: 60-79%, alignment: 60-79%}

  L3_substantial:
    description: "大部分结构正确，约束基本覆盖"
    metrics: {completeness: 80-89%, alignment: 80-89%, stability: > 80%}

  L4_reliable:
    description: "可信赖的复现，接近人类开发者水平"
    metrics: {completeness: 90-94%, alignment: 90-94%, stability: > 90%}

  L5_perfect:
    description: "完美复现，spec 即代码"
    metrics: {completeness: 95-100%, alignment: 95-100%, stability: 100%}
```

