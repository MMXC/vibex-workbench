# E6: Spec → 改进闭环

## E6.1 反馈触发条件

> **可执行性标注**：以下每个触发条件需对应 `eval/feedback_triggers/` 下的验证脚本。
> 脚本路径：`eval/feedback_triggers/eval_trigger_{fmode}.py`，在每次 E5 pipeline 完成后自动调用。

```yaml
feedback_triggers:
  - id: FT-F1
    when: "failure_mode == F1_parent_chain_broken 且出现次数 > 总TC数的30%"
    then:
      spec: L2-workflow
      action: "W2.5 parent 验证 Gate 加严：必须验证目录归属"
      urgency: high
    validate_script: "eval/feedback_triggers/eval_trigger_F1.py"
    script_logic: |
      # 读取 eval/results.json 的 failure_mode_distribution
      # if F1_parent_chain_broken > total_tc * 0.3:
      #     emit spec_feedback_entry(spec="L2-workflow", action=W2.5加严)
    ci_gate: "pre-commit hook: gen.py pre_hook check-parent-exists 必须通过"

  - id: FT-F2
    when: "failure_mode == F2_io_contract_mismatch 且出现次数 > 总TC数的20%"
    then:
      spec: L2-workflow
      action: "io_contract 增加 enforced: true 标记"
      urgency: high
    validate_script: "eval/feedback_triggers/eval_trigger_F2.py"
    script_logic: |
      # 读取 per_tc_results 中 F2 出现次数
      # if F2_count > total_tc * 0.2:
      #     emit spec_feedback_entry(spec="L2-workflow", action=io_contract enforced)
    ci_gate: "L2-generator G2.1 模板中 enforced: true 的字段必须生成对应验证代码"

  - id: FT-F3
    when: "failure_mode == F3_constraint_ignored（任意出现）"
    then:
      spec: L4-constraint
      action: "检查该 constraint 是否在代码生成映射表中"
      urgency: medium
    validate_script: "eval/feedback_triggers/eval_trigger_F3.py"
    script_logic: |
      # 读取 spec_gaps 中 constraint_ignored 相关条目
      # 对照 L4-constraint 的约束→代码映射表
      # 识别缺失映射项，输出 gap_report

  - id: FT-F4
    when: "failure_mode == F4_structural_invention（任意出现）"
    then:
      spec: L2-generator
      action: "增加 exclusion: [] 字段规范"
      urgency: medium
    validate_script: "eval/feedback_triggers/eval_trigger_F4.py"
    script_logic: |
      # 识别 AI 生成的、但不在 expected_artifacts 中的路径
      # if invented_paths: emit spec_feedback(spec="L2-generator", action=exclusion规范)

  - id: FT-F5
    when: "failure_mode == F5_behavior_omission（任意出现）"
    then:
      spec: L2-workflow
      action: "behaviors 字段增加 test_case 片段"
      urgency: medium
    validate_script: "eval/feedback_triggers/eval_trigger_F5.py"
    script_logic: |
      # 读取 per_tc_results 中 missing_artifacts
      # 识别 spec 中 behaviors 声明但 AI 未实现的条目
      # 建议在 spec 的 behaviors 字段中添加 test_case 片段

  - id: FT-P0-gate
    when: "repro_level < L2_partial（任意评估轮次）"
    then:
      spec: vibex-workbench
      action: "阻塞发布：repro_level 必须 ≥ L2_partial"
      urgency: critical
    validate_script: "eval/feedback_triggers/eval_trigger_p0_gate.py"
    script_logic: |
      # 读取 overall_metrics.repro_level
