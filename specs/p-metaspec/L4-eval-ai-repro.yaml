# E5: 评估 Pipeline

## E5.1 评估流程

```
Step 1: 准备阶段
  ├── 克隆测试仓库（空基础镜像）
  ├── 注入 TC 定义（specs + expected_artifacts）
  ├── 初始化 AI agent（安装依赖、配置）
  └── 记录初始状态（git init + baseline snapshot）

Step 2: 执行阶段
  ├── AI agent 在空仓库中「阅读 spec」→「执行实现」
  ├── 每个 TC 单独运行，互不干扰
  ├── 记录完整日志（system prompt / tool calls / responses）
  └── 超时控制（300s/TC，超时则标记 L0_impossible）

Step 3: 评估阶段
  ├── structural_comparison:
  │   ├── 生成的目录树 vs expected_artifacts
  │   └── parent_chain 验证
  ├── io_contract_check:
  │   ├── 提取函数签名
  │   └── 与 spec 对比
  ├── constraint_verification:
  │   └── 运行 L4-constraint 的验证脚本
  └── behavior_match:
      └── AI 自述行为 vs spec behaviors（简单 NLP 匹配）

Step 4: 分析阶段
  ├── 分类失败模式（F1-F7）
  ├── 识别 spec 自身 gap（哪些失败源于 spec 不完整）
  └── 输出改进建议（spec → L2-generator/L2-workflow 反馈）
```

## E5.2 评估脚本接口

```python
# eval_ai_repro.py
import argparse
import json
import subprocess

def main():
    parser = argparse.ArgumentParser()
    parser.add_argument("--corpus", required=True,
                        help="corpus 目录路径（tc-*.json 文件）")
    parser.add_argument("--agent", required=True,
                        help="被测 agent：nanoClaudeCode | claude-code | gpt-coder")
    parser.add_argument("--mode", default="M1-full-context",
                        help="spec 注入模式")
    parser.add_argument("--output", required=True,
                        help="评估结果 JSON 输出路径")
    parser.add_argument("--parallel", type=int, default=1,
                        help="并行 TC 数")
    args = parser.parse_args()

    results = []
    for tc in load_corpus(args.corpus):
        result = run_single_tc(tc, args.agent, args.mode)
        result = evaluate_result(tc, result)
        results.append(result)
        save_intermediate(args.output, results)

    summary = aggregate(results)
    print(json.dumps(summary, indent=2))

if __name__ == "__main__":
    main()
```

