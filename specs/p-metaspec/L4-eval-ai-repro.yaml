# E2: Benchmark Corpus 设计

## E2.1 测试用例来源

```yaml
corpus_sources:
  - type: vibex_internal
    specs:
      - vibex-workbench L1-L5 specs
      - p002 llamafile 规格（已有高质量 spec）
      - p-metaspec 自身四个新 spec
    weight: 60%    # 内部 spec 权重最高，因为最了解期望结果

  - type: external_oss
    specs:
      - goa design/design.go DSL
      - plop plopfile.js 配置
    weight: 30%    # 外部参考，用于泛化能力测试

  - type: synthetic
    specs:
      - 人工构造的「边界 case」spec
      - 故意缺少 parent 的 spec
      - 约束冲突的 spec
    weight: 10%    # 压力测试，识别 spec 自身的脆弱性
```

