# L4-eval-ai-repro: AI 复现能力评估规格
---
name: vibex-ai-repro-eval
parent: vibex-workbench
type: L4-eval
version: "0.1"
---

# 目标

衡量一个 AI agent 在给定完整 L2+ spec 的情况下，能否在**空仓库**中建立与 spec 描述一致的代码架构。并通过评估结果识别 spec 自身的不完整性，形成「spec 补全 → 复现率提升 → 再次识别 gap」的闭环。

---

# E1: 评估概念

## E1.1 核心问题

**原始问题**：AI 能根据 L2 spec 在空仓库建立同样架构么？

这个问题拆解为三个子问题：

| 子问题 | 含义 |
|-------|------|
| **完整性**：AI 是否实现了 spec 中声明的所有内容？ | 结构覆盖率 |
| **一致性**：AI 实现的结构是否符合 spec 的约束？ | 行为对齐度 |
| **幂等性**：相同 spec 两次给 AI，是否得到相同结果？ | 稳定性 |

## E1.2 评估变量

```
AI_Reproduction(S, A, M) → {
  completeness: float,   # [0, 1] spec 覆盖率
  alignment: float,       # [0, 1] 行为对齐度
  stability: float,       # [0, 1] 幂等性（两次运行一致性）
  failure_modes: [],      # 失败模式列表
}

其中：
  S = spec（目标规格）
  A = agent（被测 AI agent）
  M = mode（spec 呈现方式）
```

## E1.3 Spec 呈现模式（M）

| 模式 | 描述 | 典型场景 |
|------|------|---------|
| `M1-full-context` | spec 内容全部 prepended 到 system prompt | claude-code 默认 |
| `M2-tool-read` | AI 主动用 `read_spec` tool 读取 spec | agent 自驱动 |
| `M3-split-context` | spec 分层注入（L1 先，L2 后，L3 按需）| 上下文受限场景 |
| `M4-api-driven` | AI 通过 API 工具按需查询 spec 字段 | 超长 spec |

**当前主要测试 M1（因为最常用），逐步扩展到 M2-M4。**

