# E8: Darwin 质量评估 Rubrics

| # | 维度 | 权重 | 评分标准 |
|---|------|------|---------|
| 1 | **Benchmark 设计质量** | 25 | corpus 覆盖 L2/L3/L4；TC 定义完整；token_budget 合理 |
| 2 | **指标体系完整性** | 25 | completeness/alignment/stability 三指标齐全；F1-F7 覆盖主要失败模式 |
| 3 | **Pipeline 可执行性** | 20 | eval_ai_repro.py 可独立运行；无外部硬依赖 |
| 4 | **Spec → 改进闭环** | 15 | 反馈触发条件具体；自动化程度高 |
| 5 | **基线与目标合理性** | 15 | 初始基线可验证；目标分阶段可达成 |

**最低门槛**：总分 ≥ 75，且 Pipeline 可执行性 ≥ 15/20。
