# G2: 生成器触发机制

## G2.1 命令行触发

```bash
make generate [target=<spec-path>] [dry-run=true]
```

- `target`：可选，指定生成某个 spec，默认全部
- `dry-run=true`：打印将要生成的文件，不实际写入

## G2.2 内部触发（Agent 工具调用）

```typescript
// Agent 调用 spec_sync 或 make_validate 时自动触发
interface GenerateTrigger {
  tool: 'spec_sync' | 'make_validate' | 'spec_feature'
  target: string[]           // spec 文件路径列表
  options: {
    force?: boolean           // 强制覆盖已存在的 content 文件
    dryRun?: boolean
  }
}
```

## G2.3 文件变更触发（watch 模式）

```bash
make watch-generate
# 监听 specs/ 目录变更，变更后自动触发相关生成
```

