# G6: 生成器自身规格（自举验证）

## G6.1 自举 Spec 定义

gen.py 作为生成器，其自举规格独立于其输入的 spec YAML 格式：

```yaml
name: gen-py-generator
parent: vibex-generator-system
type: L2-generator-instance
version: "0.1"

generator:
  target: code-generator
  separation: none
  # gen.py 直接覆盖自身，不使用 Skeleton/Content 分离
```

## G6.2 gen.py 自身约束

| 约束 | 描述 | 验证方式 |
|------|------|---------|
| `idempotent` | 连续运行两次生成，结果应相同（第二次无变化） | `make generate && make generate && diff -rq out/ out/` |
| `non-destructive` | 绝不删除开发者手写的 content 文件 | `separation_rules.py` 强制执行 |
| `deterministic` | 相同输入规格 → 相同输出文件 | 版本化模板 + 固定 seed |
| `traceable` | 每次生成记录输入 spec 版本 + 模板版本 | 写入生成文件头注释 |
| `fail-fast` | 预检失败立即退出，不执行生成 | 退出码 ≥ 2 |

## G6.3 自举可行性

gen.py 应能用自身机制生成自身（即 gen.py 生成的代码可以替代当前 gen.py）：

1. gen.py 的源代码被描述为一个 `L2-generator-instance` spec
2. 该 spec 通过 `spec-to-python` 生成器输出到 `generators/gen-py/gen.py`
3. 生成物与源文件进行 diff 对比，通过则为自举成功
4. **当前状态**：自举可行性为**目标态**（TODO），待 `spec-to-python` 生成器实现后验证

## G6.4 循环依赖破解路径

> **核心问题**：gen.py 的规格（spec）依赖 gen.py 的实现，而 gen.py 的实现又依赖 gen.py 的规格。这形成了一个经典的**自举循环依赖**。
>
> 破解思路：将循环拆解为三个递进阶段，每阶段都是**可独立验证的目标态**。

### 循环结构图

```
gen.py spec  ──描述──→  gen.py 实现  ──依赖──→  gen.py spec
    ↑                                              │
    └──────────────── 需要破解 ────────────────────┘
```

### Stage 1: 手工引导（Manual Bootstrap）

**目标**：用纯手写代码实现一个最小生成器，打破循环的第一步。

**手工量**：
- 手写 `generators/spec-to-python/gen.py`（约 200-300 行）
- 手写 `generators/spec-to-python/templates/gen_py.j2`（模板）
- 手写 `generators/shared/skeleton_rules.py`
- 手写 `generators/shared/template_helpers.py`

**验收标准**：
- [ ] `python generators/spec-to-python/gen.py --help` 输出正确
- [ ] 能读取一个简单 spec YAML（仅有 `name`/`parent`/`type`）并生成对应 `.py` 文件
- [ ] 生成的 `.py` 文件可执行且行为符合 spec 描述
- [ ] 生成的代码**不包含**自身模板（排除循环污染）

**手工代码清单**：

| 文件 | 行数估计 | 职责 |
|------|---------|------|
| `gen.py` | ~150 | 主入口、argparse、dispatcher |
| `skeleton_parser.py` | ~100 | 解析 Skeleton/Content 分离 |
| `spec_validator.py` | ~80 | YAML frontmatter 验证 |
| `template_engine.py` | ~50 | Jinja2 渲染封装 |
| `gen_py.j2` | ~200 | Python 代码模板 |

**与 spec 的关系**：Stage 1 的手写代码**不受 spec 驱动**，完全独立手工实现。这是一种"spec 前身"（pre-spec）状态。

### Stage 2: 最小生成器（Minimal Generator）

**目标**：用 Stage 1 的手写生成器生成 gen.py 的一个**简化版本**（去掉高级特性）。

**破解的循环**：
```
手工生成器 → 生成简化 gen.py spec → 用简化 gen.py 生成简化 gen.py 实现
```

**手工量**：
- 手写 `gen-py-minimal.yaml`（简化版 spec，约 80 行）
  - 移除 `watch` 模式、`--generator` 多后端、`pre_hook`/`post_hook` 链
  - 仅保留：`--spec-path`、`--target-dir`、`--dry-run`、`--force`
- 用 Stage 1 生成器从 `gen-py-minimal.yaml` 生成 `gen-py-minimal.py`

**验收标准**：
- [ ] `gen-py-minimal.py` 与手写 `gen.py` 在核心功能（`--spec-path` + Jinja2 渲染）上 diff 一致
- [ ] `gen-py-minimal.py` 能用自身生成简化版（自举一次）
- [ ] Stage 1 生成器 → `gen-py-minimal.yaml` → `gen-py-minimal.py` 链路可跑通

**自举验证公式**：
```
手工 gen.py ≅ 生成 gen-py-minimal.py ≅ 生成器自举输出
```

### Stage 3: 自举完成（Full Bootstrap）

**目标**：用 Stage 2 的最小生成器生成完整版 gen.py，实现真正的自举。

**破解的循环**：
```
Stage 2 生成器 → 生成完整 gen.py spec（含完整 hooks/watch/多后端）
→ 用完整 spec 生成完整 gen.py 实现
→ 完整 gen.py 能生成自身（最终自举）
```

**手工量**：
- 手写 `gen-py-full.yaml`（完整版 spec，约 200+ 行）
  - 包含所有 G1-G8 定义的完整字段
  - `io_contract`、`behaviors`、`constraints`、`generator.pre_hook`/`post_hook`
- 用 Stage 2 生成器从 `gen-py-full.yaml` 生成 `gen-py-full.py`

**验收标准**：
- [ ] `gen-py-full.py --version` 输出一致
- [ ] `gen-py-full.py --help` 与 `gen.py --help` 完全一致
- [ ] `gen-py-full.py` 生成的组件与原 `gen.py` 生成的组件行为等价
- [ ] **终极自举**：`gen-py-full.py` 能从 `gen-py-full.yaml` 生成自身（diff 为空）

**质量门（Quality Gates）**：

| 阶段 | 门控条件 | 验证命令 |
|------|---------|---------|
| Stage 1 | 核心功能可用 | `python gen.py spec.yaml && diff out.py expected.py` |
| Stage 2 | 自举一次成功 | `python gen-py-minimal.py gen-py-minimal.yaml && diff` |
| Stage 3 | 完整自举达成 | `python gen-py-full.py gen-py-full.yaml && diff -rq` |

**循环依赖风险缓解策略**：

1. **版本隔离**：每个 Stage 的 spec 和实现放在独立目录（如 `stage1/`、`stage2/`、`stage3/`），避免版本混淆
2. **Diff 对比基准**：始终以手工版本为基准，生成的版本必须与基准一致才能推进
3. **回退机制**：任何 Stage 失败可回退到上一 Stage，不污染核心代码库
4. **Spec 冻结**：每个 Stage 的 spec 一旦通过验收则冻结，不再修改（防止 spec 自身循环迭代）

**当前状态**：Stage 1 手工引导阶段（**进行中**）。Stage 2 和 Stage 3 为未来目标态。

