# G8: 错误处理与恢复

## G8.1 错误分类

| 错误类型 | 阶段 | 返回码 | 处理策略 |
|---------|------|--------|---------|
| YAML 语法错误 | 预检（pre_hook） | 2 | abort，立即退出 |
| parent 链路断裂 | 预检（pre_hook） | 2 | abort |
| io_contract 缺失必填字段 | 预检（pre_hook） | 2 | abort |
| 模板文件不存在 | 生成阶段 | 3 | abort，跳过后续 |
| 目标目录无写权限 | 生成阶段 | 3 | abort |
| 生成的代码 lint 失败 | 后置钩子（post_hook） | 3 | abort（lint-generated 为 abort 策略）|
| type-check 警告 | 后置钩子（post_hook） | 1 | warn，不阻断 |
| Skeleton 已存在（无 --force）| 生成阶段 | 1 | warn + skip |

## G8.2 幂等性保证（详细）

幂等性是分离模式与覆盖逻辑的核心保证：

```python
# separation_rules.py 核心逻辑
def should_overwrite(path: str, force: bool) -> bool:
    if is_skeleton_file(path):
        return True  # Skeleton: 生成器拥有，总是覆盖
    elif is_content_file(path):
        return False  # Content: 开发者私有，永不覆盖
    else:
        return force  # 其他文件: 仅 --force 时覆盖
```

**幂等性测试用例**：
```bash
# TC-1: 连续生成，结果相同
make generate
snapshot1=$(find generated/ -type f | sort)
make generate
snapshot2=$(find generated/ -type f | sort)
diff <(echo "$snapshot1") <(echo "$snapshot2")  # 必须为空

# TC-2: 修改 Skeleton → 重新生成，Content 保留
# 手动修改 generated/Component.Skeleton.svelte
make generate
# → Skeleton 被覆盖，Content.Svelte 未改动

# TC-3: 修改 Content 后重新生成 → Content 保留
# 手动修改 generated/Component.svelte
make generate
# → Content.Svelte 保持原样（开发者修改优先）
```

## G8.3 恢复策略

| 场景 | 恢复方式 |
|------|---------|
| 生成中断（中途 crash） | 下次运行时检测已存在的 Skeleton 文件，对比 checksum，只写入有变化的 |
| 开发者的 Skeleton 被意外覆盖 | `git checkout generated/*.Skeleton.*` 从版本库恢复 |
| 模板损坏 | 预检钩子检测模板 checksum，不匹配则 abort |
| watch 模式异常退出 | 监听 SIGTERM/SIGINT，优雅退出；重启后自动重扫全部 spec |
