# G4: 生成器架构

## G4.1 gen.py 结构

```
generators/
├── spec-to-sveltekit/
│   ├── gen.py              # 主入口，argparse + dispatcher
│   ├── skeleton_parser.py  # 解析 Skeleton/Content 分离规则
│   ├── template_engine.py  # Jinja2 模板渲染
│   ├── spec_validator.py   # frontmatter 验证
│   ├── separation_rules.py # 文件保护逻辑
│   └── templates/
│       ├── component.Skeleton.svelte.j2
│       ├── component.Skeleton.ts.j2
│       ├── store.svelte.j2
│       └── type.ts.j2
├── spec-to-go/
│   └── gen.py
└── shared/
    ├── skeleton_rules.py   # 共享分离规则引擎
    └── template_helpers.py # 共享 Jinja2 filters
```

## G4.2 生成器注册表

```python
# generators/registry.py
GENERATORS = {
    "svelte": {
        "entry": "spec-to-sveltekit/gen.py",
        "input_spec_type": "L2-frontend|L3-feature|L4-module",
        "output_extension": [".svelte", ".ts", ".js"],
        "skeleton_pattern": "*.Skeleton.svelte",
    },
    "go": {
        "entry": "spec-to-go/gen.py",
        "input_spec_type": "L2-backend|L3-service",
        "output_extension": [".go"],
    },
}
```

