# G3: 模板引擎与文件分离规则

## G3.1 双文件分离模式（Skeleton + Content）

```
┌─ ComponentName.Skeleton.svelte ──────┐  ← 生成器覆盖
│  <script lang="ts">                 │
│    // Generated: props, imports,     │
│    //           lifecycle hooks     │
│  </script>                          │
│  <!-- Content injected here -->      │
│  <slot />                           │
└─────────────────────────────────────┘

┌─ ComponentName.svelte ───────────────┐  ← 开发者私有，永不覆盖
│  <script lang="ts">                 │
│    import ComponentNameSkeleton       │
│      from './ComponentName.svelte'  │
│  </script>                          │
│  <ComponentNameSkeleton>            │
│    <!-- 开发者手写内容 -->           │
│  </ComponentNameSkeleton>           │
└─────────────────────────────────────┘
```

## G3.2 分离策略

| 分离等级 | 适用场景 | 规则 |
|---------|---------|------|
| `strict` | 组件（Svelte/Vue） | `*.Skeleton.svelte` 覆盖，`*.svelte` 保护 |
| `relaxed` | Stores/Types | 覆盖所有文件，开发者需在文件头注释声明保留区 |
| `none` | 一次性生成物 | 全部覆盖，无保护 |

## G3.3 模板变量（gen.py 输入上下文）

```python
context = {
    "spec_name": "ComponentName",
    "spec_parent": "ParentName",
    "spec_type": "L3-feature",
    "io_contract": {...},
    "behaviors": [...],
    "constraints": [...],
    "user_stories": [...],
    "generation_timestamp": "2026-04-23T...",
    "template_vars": {...},  # spec 正文 YAML 扩展字段
}
```

### template_vars 映射规则（Spec 正文 YAML 扩展字段 → 模板变量）

> **问题**：spec YAML 的 frontmatter 只定义了标准字段（G1.1），但开发者可能需要在 spec 正文中声明额外的字段供模板使用。`template_vars` 即承载这些扩展字段。

**映射原则**：

1. **声明式优于隐式**：所有 template_vars 必须显式声明在 spec YAML 的 `template_vars:` 块下，不得通过正则扫描正文推断。
2. **类型安全**：template_vars 的值类型必须与模板中使用的 Jinja2 表达式类型一致。
3. **命名空间隔离**：template_vars 的顶级 key 不得与标准字段（`spec_name`、`io_contract` 等）重名。

**YAML 结构规范**：

```yaml
---
name: ComponentName
parent: ParentComponentName
type: L3-feature
version: "0.1"
# ... 标准 frontmatter 字段 ...

template_vars:           # ← 扩展字段声明区（必须）
  # 基础变量
  css_class: "btn-primary"
  icon_name: "settings"
  
  # 复合变量
  api_endpoints:
    base: "https://api.example.com"
    v1: "/v1/users"
    v2: "/v2/accounts"
  
  # 布尔开关
  enable_infinite_scroll: true
  show_tooltip: false
  
  # 列表配置
  tab_items:
    - label: "Overview"
      route: "/overview"
    - label: "Settings"
      route: "/settings"
  
  # 嵌套对象
  theme:
    primary: "#1976D2"
    secondary: "#424242"
    density: "comfortable"   # compact | comfortable | spacious
---

# Markdown 正文
```

**模板中的使用方式**：

```jinja2
{# templates/component.Skeleton.svelte.j2 #}
<button class="{{ template_vars.css_class }}">
  <Icon name="{{ template_vars.icon_name }}" />
</button>

{% if template_vars.enable_infinite_scroll %}
  <InfiniteScroll onLoadMore={loadMore} />
{% endif %}

{% for tab in template_vars.tab_items %}
  <Tab label="{{ tab.label }}" route="{{ tab.route }}" />
{% endfor %}
```

**映射类型表**：

| YAML 类型 | Jinja2 表达式 | 示例 |
|-----------|--------------|------|
| 标量（string/number/boolean） | `{{ template_vars.key }}` | `{{ template_vars.icon_name }}` |
| 列表（list） | `{% for item in template_vars.list %}...{% endfor %}` | `{% for tab in template_vars.tab_items %}` |
| 字典（dict） | `{{ template_vars.dict.key }}` | `{{ template_vars.theme.primary }}` |
| 布尔（boolean） | `{% if template_vars.flag %}...{% endif %}` | `{% if template_vars.enable_infinite_scroll %}` |

**验证规则**：

| 规则 ID | 描述 | 验证时机 | 失败处理 |
|---------|------|---------|---------|
| TV-001 | `template_vars` 顶级 key 不得与标准字段重名 | 预检（pre_hook） | abort，YAML 解析错误 |
| TV-002 | `template_vars` 的 value 类型与 Jinja2 表达式匹配 | 生成阶段 | warn，生成含空占位的代码 |
| TV-003 | 未声明的模板变量引用（如 `template_vars.unknown_key`）在模板中出现 | 预检 | warn，提醒在 spec 中声明 |
| TV-004 | `template_vars` 嵌套深度不超过 3 层 | 预检 | warn，提示简化结构 |

**与 frontmatter 标准字段的关系**：

```
标准字段（frontmatter）          扩展字段（template_vars）
├── spec_name                   ├── css_class
├── spec_parent                 ├── icon_name
├── io_contract                 ├── api_endpoints
├── behaviors                   ├── enable_...
├── constraints                 └── ...
├── user_stories
└── generator.*                 ← 不进入 template_vars
```

> **注意**：`generator.*` 字段（如 `generator.target`、`generator.separation`）是生成器的**配置参数**，不进入模板上下文，仅用于生成器内部路由和策略选择。

