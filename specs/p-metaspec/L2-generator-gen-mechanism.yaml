# G5: 预/后置钩子

## G5.1 预置钩子（pre_hook）

```yaml
generator:
  pre_hook: validate-spec-yaml
```

| 钩子名 | 行为 | 失败处理 |
|--------|------|---------|
| `validate-spec-yaml` | 验证 frontmatter 完整性、parent 链路、io_contract | abort |
| `check-parent-exists` | 验证 parent spec 文件存在 | abort |
| `dedup-check` | 检查是否已有同名生成物 | warn + skip 或 force 覆盖 |
| `lint-markdown` | 检查 spec 正文 markdown 语法 | warn |

## G5.2 后置钩子（post_hook）

```yaml
generator:
  post_hook: lint-generated
```

| 钩子名 | 行为 | 失败处理 |
|--------|------|---------|
| `lint-generated` | 运行 eslint/tsc 检查生成代码 | abort（代码质量不达标）|
| `type-check` | 运行 tsc --noEmit | warn（类型错误不 abort）|
| `git-add` | 将生成文件 git add | skip（不阻断）|
| `openai-format` | 将生成结果发给 LLM 润色 | skip（可选）|

