# G7: 质量评估（Darwin Rubrics）

> 本节为 spec 自评用 Rubrics，记录各维度的评分与改进历史。

| # | 维度 | 权重 | 评分标准 | 最高分 |
|---|------|------|---------|--------|
| 1 | **输入规格完整性** | 20 | frontmatter 字段是否完整，parent 链路是否验证 | 20 |
| 2 | **分离规则清晰度** | 20 | Skeleton/Content 边界是否无歧义 | 20 |
| 3 | **模板引擎表达力** | 15 | Jinja2 是否支持所需全部模板语义 | 15 |
| 4 | **钩子系统覆盖** | 15 | pre/post 钩子是否覆盖关键节点 | 15 |
| 5 | **幂等性保证** | 15 | 连续运行不产生副作用 | 15 |
| 6 | **自举可行性** | 15 | gen.py 能否用自身机制生成自身 | 15 |

**最低门槛**：总分 ≥ 80，且 G6.2 中幂等性约束 ≥ 10 才算合格。

## G7.1 约束来源追溯规范

> **问题**：spec YAML 中的 `constraints` 字段（如 `field: email, rule: format:email`）来自哪里？如果是 security/compliance 约束，需要能追溯到具体的法规或内部政策。

**约束分类与来源追溯要求**：

| 约束类型 | 示例 | 来源追溯要求 | 引用格式 |
|---------|------|------------|---------|
| **技术约束** | `min_length:3`, `format:email` | 无需外部引用 | `source: technical_standard` |
| **安全约束** | `password_strength:128bits`, `rate_limit:1000/hour` | **必须**引用安全标准（如 OWASP、CWE、RFC） | `source: OWASP-ASVS-2024-2.1.3` |
| **合规约束** | `gdpr:consent_required`, `pci_dss:encryption_at_rest` | **必须**引用法规编号或合规框架 | `source: GDPR-Art-6-1f`, `source: PCI-DSS-3.2.1-req-3.4` |
| **内部策略** | `max_upload_size:10MB`, `session_timeout:30min` | **必须**引用内部文档编号 | `source: internal_policy-DEV-003` |
| **业务约束** | `max_items_per_order:99`, `currency:CNY` | 推荐引用需求文档 | `source: PRD-2026-Q1-Section-4.2` |

**约束来源声明格式**：

```yaml
constraints:
  - field: user_email
    rule: required|format:email
    source: technical_standard           # 技术约束无需外部引用

  - field: password_hash
    rule: required|algorithm:argon2id|memory:65536
    source: OWASP-2023-password-storage   # 安全约束引用 OWASP

  - field: user_consent
    rule: required|boolean:true
    source: GDPR-Art-7|internal_policy-PRIV-001  # 合规+内部策略双引用

  - field: file_upload
    rule: max_size:10485760|allowed_types:image/jpeg,image/png
    source: internal_policy-DEV-003        # 内部策略引用

  - field: max_order_value
    rule: range:0-99999
    source: PRD-2026-Q1-Section-4.2       # 业务约束推荐引用
```

**引用有效性规则**：

| 规则 ID | 描述 | 验证时机 | 失败处理 |
|---------|------|---------|---------|
| CS-001 | 安全约束（`security:` 或引用 OWASP/CWE/RFC）必须有 `source:` 字段 | 预检（pre_hook） | abort，约束缺少来源 |
| CS-002 | 合规约束（引用 GDPR/PCI/SOX 等）必须有 `source:` 字段 | 预检 | abort，约束缺少来源 |
| CS-003 | `source:` 引用的格式必须符合上述格式规范 | 预检 | warn，提醒格式修正 |
| CS-004 | 推荐业务约束有 `source:` 引用（warn 级别） | 预检 | warn，建议补充来源 |
| CS-005 | `source:` 引用的文档应在文档库（confluence/wiki）中存在（CI 检查） | CI gate | fail，构建失败 |

**自动约束生成规则**：

当 `constraints[].generated_validation: true` 时，生成器应自动从 `source:` 字段读取约束强度，生成对应验证代码：

```python
# 从 source: OWASP-2023-password-storage 生成验证强度
if "OWASP" in constraint.source:
    validation_code = generate_argon2id_validation(strength="high")
elif "GDPR" in constraint.source:
    validation_code = generate_consent_checkbox()
elif "internal_policy" in constraint.source:
    validation_code = generate_size_limit_validation()
```

