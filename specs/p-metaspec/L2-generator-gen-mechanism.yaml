---
spec:
  version: "0.4"
  level: "2_skeleton"
  name: "vibex-generator-system"
  parent: "p-metaspec"           # L2 回指 L1 goal
  status: "done"
  # mixins: []                  # L2 通常不使用 mixin

meta:
  type: "skeleton"
  owner: "hermes"
  created: "2026-04-20"
  updated: "2026-04-23"

lifecycle:
  current: "done"
  updated: "2026-04-23"
  history:
    - status: "draft"
      at: "2026-04-20T10:00:00"
      by: "hermes"
      trigger: "agent:auto"
      note: "初始版本 v0.1"
    - status: "done"
      at: "2026-04-22T20:00:00"
      by: "hermes"
