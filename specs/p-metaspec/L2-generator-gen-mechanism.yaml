# ── io_contract ─────────────────────────────────
io_contract:
  input: |
    spec YAML 文件（或文件集合）+ gen.py 命令行参数（--target-dir / --force 等）
  output: |
    生成的代码文件（.svelte / .go 等）+ 生成报告（哪些文件被创建/覆盖/跳过）
  boundary: |
    只做代码生成，不做 spec 语法校验（那是 validate_specs.py 的职责）
    只做幂等性检查，不做代码质量检查（那是 lint 的职责）
  behavior: |
    1. 解析命令行参数
    2. 加载 spec YAML 文件
    3. 验证 spec 语法（基本 YAML 校验）
    4. 推断生成器类型（svelte / go）
    5. 渲染模板 → 生成代码
    6. 幂等性检查（should_overwrite）
    7. 写入文件
    8. 返回退出码

# ── upstream_l1（L2 必须回指 L1）────────────────────
upstream_l1:
  spec_path: "SPEC.md"
  spec_name: "p-metaspec"
  note: "gen.py 是 spec 体系的核心工具，其 io_contract 必须与 L1 goal 一致"
  l1_sections_realized_here:
    - "content.core_specs[L2-generator]"
    - "content.constraints[C1 自举闭环]"

# ── level_mapping（L2 定义的层级）────────────────────
level_mapping:
  - spec_level: 1
    vibex_spec_level: "L1 project-goal"
    is_root: true
  - spec_level: 2
    vibex_spec_level: "L2 skeleton ← 当前层"
    is_root: false
  - spec_level: 3
    vibex_spec_level: "L3 module（spec-engine / pipeline tools）"
    is_root: false
  - spec_level: 4
    vibex_spec_level: "L4 feature（validation / generation）"
    is_root: false
  - spec_level: 5
    vibex_spec_level: "L5 slice（gen.py / validation scripts）"
    is_root: false

---

# 目标

描述 VibeX 中 `gen.py` 自身的机制——不是用 gen.py 生成了什么，而是 **gen.py 本身是怎么工作的**。这是 spec 体系能自举的关键：spec 文件驱动生成器，生成器再生成代码。

---

# G1: 生成器调用接口（gen.py 的 io_contract）

## G1.0 调用接口

gen.py 是 spec 体系的唯一入口点，其 io_contract 独立于被生成的 spec YAML 格式。

### 命令行接口

```bash
gen.py [spec-path...] [flags]
```

| 参数/标志 | 类型 | 必填 | 含义 |
|---------|------|------|------|
| `spec-path` | 位置参数 | 否 | 指定要处理的 spec 文件路径；省略则处理全部 |
| `--target-dir`, `-d` | string | 否 | 输出目录，默认 `src/generated/` |
| `--dry-run` | flag | 否 | 仅打印将要生成的文件，不写入 |
| `--force` | flag | 否 | 强制覆盖已存在的 Skeleton 文件 |
| `--watch` | flag | 否 | 监听 specs/ 目录变更，持续生成 |
| `--generator`, `-g` | string | 否 | 指定生成器类型：`svelte`/`go`，默认自动推断 |

### 返回码语义

| 退出码 | 含义 |
|--------|------|
| `0` | 全部成功，无跳过，无警告 |
| `1` | 部分成功（有 skipped 或 warnings） |
| `2` | 预检失败（spec YAML 校验不通过、parent 链路断裂） |
| `3` | 生成失败（模板渲染错误、目标目录不可写） |
| `4` | 自检失败（幂等性测试未通过） |

### 内部触发接口（Agent 工具调用）

```typescript
interface GenerateTrigger {
  tool: 'spec_sync' | 'make_validate' | 'spec_feature'
  targets: string[]           // spec 文件路径列表
  options: {
    force?: boolean           // 强制覆盖已存在的 Skeleton 文件
    dryRun?: boolean
    generator?: 'svelte' | 'go'
    targetDir?: string
  }
}
```

### 输入输出总览

```
输入:
  ├── spec YAML 文件（≥1个）
  │     ├── frontmatter: name, parent, type, version, generator, ...
  │     └── body: Markdown 正文（可选的模板变量来源）
  └── templates/ 目录（由 generator.template_dir 指定）

输出:
  ├── generated/Skeleton 文件（*.Skeleton.{ext}） — 生成器拥有，覆盖写入
  ├── generated/Type 文件（*.types.ts）           — 生成器拥有，覆盖写入
  └── skipped: Content 文件（*.{ext}）            — 开发者私有，从不覆盖
```

**关键原则**：spec YAML 的格式（G1.1）是**被生成内容的元数据格式**，而 G1.0 是**生成器本身的调用接口**，两者是不同层级的概念，必须严格分离。

---

# G1.1: Spec 输入格式（被生成的 spec YAML 元数据格式）

> 本节定义 spec YAML 文件的结构规范，即 gen.py 的**被处理对象**的格式，而非 gen.py 自身的输入参数。



每个需要生成的组件对应一个 spec YAML 文件：

```yaml
---
name: ComponentName
parent: ParentComponentName      # 必须声明，追踪纵向从属
type: L2-frontend|L3-feature|...
version: "0.1"
io_contract:                     # 输入输出约定
  input:
    fields:
      - name: fieldName
        type: string|number|boolean|object
        required: true|false
        description: "..."
  output:
    http_status: 200
    payload: {...}
behaviors:                       # 用户行为描述
  - "用户执行 X，Y 发生"
constraints:                     # goa 风格技术约束
  - field: fieldName
    rule: required|min_length:3|format:email
    generated_validation: true     # 生成器应生成对应验证代码
user_stories:
  - "作为用户，我希望..."
generator:
  target: SvelteComponent         # 生成目标类型
  skeleton_pattern: "*.Skeleton.svelte"
  content_pattern: "*.svelte"
  separation: strict              # strict | relaxed | none
  template_dir: generators/spec-to-sveltekit/templates/
  pre_hook: validate-spec-yaml
  post_hook: lint-generated
---

# Markdown 正文（补充说明）

组件的详细描述、技术选型理由、示例等。
```

## G1.2 纵向从属链路验证

```yaml
# 每个 L2+ 必须有 parent 字段，指向父节点 name
# 示例链路：
L1: vibex-workbench (parent: null)
  → L2: frontend-layer (parent: vibex-workbench)
    → L3: spec-viewer-feature (parent: frontend-layer)
      → L4: spec-tree-renderer (parent: spec-viewer-feature)
```

验证规则：
- `parent` 字段必须存在且非空（除非 L1）
- `parent` 的 `name` 必须在链路中存在
- 环路检测：parent 不能是自身或自身的后代

