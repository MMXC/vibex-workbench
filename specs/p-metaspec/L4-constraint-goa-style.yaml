# C2: 约束到验证代码的映射

## C2.1 验证代码生成规则

每个约束字段在实现时自动生成对应验证代码：

```yaml
# Spec 中声明约束
- name: email
  type: string
  constraints:
    - rule: format
      value: email

# gen.py 自动生成验证代码（以 Go 为例）
func ValidateEmail(email string) error {
    if email == "" {
        return errors.New("email is required")
    }
    if !isValidEmail(email) {
        return errors.New("invalid email format")
    }
    if len(email) > 254 {
        return errors.New("email must be at most 254 characters")
    }
    return nil
}

# 自动生成的测试用例
func TestValidateEmail(t *testing.T) {
    cases := []struct {
        input    string
        expected error
    }{
        {"", errors.New("email is required")},
        {"not-an-email", errors.New("invalid email format")},
        {"a@"", errors.New("invalid email format")},
        {strings.Repeat("a", 255) + "@b.com", errors.New("email must be at most 254 chars")},
        {"valid@example.com", nil},
    }
    for _, c := range cases {
        if got := ValidateEmail(c.input); !errors.Is(got, c.expected) {
            t.Errorf("ValidateEmail(%q) = %v; want %v", c.input, got, c.expected)
        }
    }
}
```

## C2.2 各语言验证代码模板

### C2.2.1 字段级约束映射

|| 约束规则 | Go | Python | TypeScript |
||---------|-----|--------|------------|
|| `required` | `if v == ""` | `if not v` | `if (!v)` |
|| `min_length` | `len(v) < n` | `len(v) < n` | `v.length < n` |
|| `max_length` | `len(v) > n` | `len(v) > n` | `v.length > n` |
|| `pattern` | `regexp.MustCompile` | `re.match` | `new RegExp` |
|| `format: email` | `net/mail.ParseAddress` | `email_validator.validate` | `z.string().email()` |
|| `format: uri` | `url.Parse` | `urllib.parse` | `new URL()` |
|| `format: date` | `time.Parse("2006-01-02")` | `datetime.fromisoformat` | `!isNaN(Date.parse(v))` |
|| `minimum` | `v < n` | `v < n` | `v < n` |
|| `maximum` | `v > n` | `v > n` | `v > n` |
|| `exclusive_minimum` | `v <= n → error` | `v <= n → error` | `v < n` |
|| `exclusive_maximum` | `v >= n → error` | `v >= n → error` | `v > n` |
|| `enum` | `switch case` | `v in [...]` | `v === x \|\| v === y` |

### C2.2.2 跨字段约束映射

|| 跨字段规则 | Go | Python | TypeScript |
||-----------|-----|--------|------------|
|| `date_range` | `end.Before(start)` | `end_date < start_date` | `new Date(end) < new Date(start)` |
|| `required_with` | `if base != "" && sub == ""` | `if base and not sub` | `if (base && !sub)` |

### C2.2.3 协议级约束映射

|| 协议规则 | Go | Python | TypeScript |
||---------|-----|--------|------------|
|| `timeout_ms` | `http.Client{Timeout: t}` | `requests.get(timeout=t)` | `fetch(url, {signal: AbortSignal})` |
|| `max_body_bytes` | `io.LimitReader(r, n)` | `max_bytes=n in request` | `signal.abort()` at n bytes |
|| `required_headers` | `if h == "" return 400` | `if not headers.get(h)` | `if (!headers.has(h))` |

