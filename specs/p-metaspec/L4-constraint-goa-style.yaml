# C4: 约束验证生命周期

## C4.1 三阶段验证

### 工具接口规范

#### constraint_validator.py（阶段1 Spec 静态验证）

```bash
# CLI 接口
constraint_validator.py --spec <spec-path> [--strict] [--output json|text]

# 退出码
0: 验证通过
1: 语法错误（constraint 字段语法错误）
2: 引用错误（parent 不存在 / cross_constraints 字段名不存在）
3: 矛盾错误（min > max / exclusive_min >= maximum）
4: 严重错误（缺失必需字段）

# 校验规则清单
- frontmatter 语法正确性
- parent 引用存在且可达
- io_contract.fields 中 name 唯一
- cross_constraints 引用的字段在 fields 中已声明
- 无矛盾约束（min_length > max_length, minimum > maximum, exclusive_min >= maximum）
- enum values 与 fields.type=enum 一致
- security_constraints.fields 与 io_contract.fields 有交集
```

#### lint-generated post_hook（阶段2 编译时验证）

```bash
# Go: go vet ./...
# Python: mypy, pylint
# TypeScript: tsc --noEmit, eslint
```

#### 运行时验证（阶段3）

生成的验证函数在每个请求到达时执行，按 C4.2 错误响应格式返回。

### 验证流程

```
阶段1：Spec 验证（静态）
  ├── 工具：constraint_validator.py
  ├── 时机：gen.py pre_hook
  ├── 内容：
  │   ├── frontmatter 中 constraints 语法正确性
  │   ├── parent 引用存在
  │   ├── cross_constraints 字段名正确
  │   └── 无矛盾约束（如 min > max）
  └── 失败：阻止生成，中断工作流

阶段2：代码生成验证（编译时）
  ├── 工具：各语言 linter/type-checker
  ├── 时机：post_hook lint-generated
  ├── 内容：
  │   ├── 生成的验证函数类型正确
  │   └── 无死代码
  └── 失败：abort 生成

阶段3：运行时验证
  ├── 工具：生成的验证函数
  ├── 时机：每个请求到达时
  ├── 内容：
  │   ├── 字段值满足所有 constraints
  │   ├── 安全约束生效（log masking）
  │   └── 协议约束（timeout/rate_limit）
  └── 失败：返回 400 + 详细错误信息
```

## C4.2 错误响应格式

```yaml
# 约束违反时的标准错误响应
validation_error:
  code: CONSTRAINT_VIOLATION
  http_status: 400
  details:
    - field: email
      rule: format
      message: "无效的邮箱格式"
      received: "not-an-email"
    - field: password
      rule: pattern
      message: "必须包含大小写字母和数字"
      received: "***"   # 敏感字段自动掩码
```

