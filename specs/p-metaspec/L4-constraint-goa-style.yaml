# 目标

将**技术约束**声明式地嵌入 spec，在约束被违反时自动生成验证代码 + 运行时错误。借鉴 goa DSL 的 validation 模式，让约束成为 spec 的一等公民，而非事后追加的注释。

---

# C1: 约束类型体系

## C1.0 顶层 io_contract 引用规范

每个使用约束的 L3 spec **必须**在顶层声明 io_contract 的位置和引用路径：

```yaml
# L3 spec 示例
---
name: user-authentication
parent: vibex-auth-module
type: L3
version: "0.1"

io_contract:
  input:
    source: L4-constraint  # 约束来源于 L4-constraint spec
    endpoint: POST /auth/login
    fields: [...]
    cross_constraints: [...]
  output:
    success: 200
    error: 400|401|429
    shape:
      - name: token
        type: string
      - name: user_id
        type: integer

generated_validator: auth_login_validator.go   # 自动生成文件路径
```

## C1.1 字段级约束（field-level）

```yaml
io_contract:
  input:
    fields:
      - name: email
        type: string
        required: true
        constraints:
          - rule: format
            value: email          # RFC 5322 邮箱格式
          - rule: max_length
            value: 254
      - name: password
        type: string
        required: true
        constraints:
          - rule: min_length
            value: 8
          - rule: pattern
            value: "^(?=.*[a-z])(?=.*[A-Z])(?=.*\\d)"
            message: "必须包含大小写字母和数字"
          - rule: max_length
            value: 128
      - name: age
        type: integer
        constraints:
          - rule: minimum
            value: 0
          - rule: maximum
            value: 150
      - name: status
        type: enum
        values: [pending, active, deleted]
        constraints:
          - rule: enum
            value: [pending, active, deleted]
      - name: file_size
        type: integer
        constraints:
          - rule: exclusive_minimum
            value: 0
          - rule: exclusive_maximum
            value: 10485760   # 10MB
```

## C1.2 字段间约束（cross-field）

### 1.2.1 约束示例

```yaml
io_contract:
  input:
    fields:
      - name: start_date
        type: string  # ISO 8601
        constraints:
          - rule: format
            value: date
      - name: end_date
        type: string
        constraints:
          - rule: format
            value: date
    cross_constraints:
      - rule: date_range
        fields: [start_date, end_date]
        message: "结束日期必须晚于开始日期"
      - rule: required_with
        base_field: end_date
        required_fields: [start_date]  # end_date 存在时 start_date 必须存在
```

### 1.2.2 标准跨字段约束类型库

```yaml
cross_constraint_library:
  # 1. 范围约束：字段A必须小于字段B
  - rule: compare_lt
    fields: [field_a, field_b]    # field_a < field_b
    applies_to: [integer, float, date, datetime]

  # 2. 互斥约束：两个字段不能同时存在
  - rule: mutually_exclusive
    fields: [field_a, field_b]

  # 3. 依赖存在约束：base 存在时，targets 也必须存在
  - rule: required_with
    base_field: base
    required_fields: [target_a, target_b]

  # 4. 总和约束：多个数值字段之和不超过某阈值
  - rule: sum_max
    fields: [quantity, weight]
    max_value: 1000

  # 5. 一致性约束：两个字段值必须相等
  - rule: must_equal
    fields: [password, confirm_password]
    message: "两次输入的密码不一致"

  # 6. 正则匹配约束：某字段值必须匹配另一字段的值格式
  - rule: matches_pattern_of
    base_field: pattern
    target_field: value
```

### 1.2.3 自定义跨字段约束注册

```yaml
cross_constraints:
  - rule: custom
    name: subscription_not_expired
    description: "用户订阅未过期时才能访问高级功能"
    fields: [subscription_status, feature_tier]
    code_snippet:           # 签名模板，gen.py 填充
      go: "func ValidateSubscriptionNotExpired(subscription_status, feature_tier string) error"
      typescript: "function validateSubscriptionNotExpired(subscription_status: string, feature_tier: string): Error | null"
    test_required: true    # 自定义约束必须提供测试用例
```

## C1.3 协议级约束（protocol-level）

```yaml
protocol_constraints:
  http:
    timeout_ms: 30000
    max_body_bytes: 1048576       # 1MB
    allowed_methods: [GET, POST, PUT, DELETE]
    required_headers: [Content-Type]
    cors:
      allowed_origins: ["https://app.vibex.com"]
      allowed_methods: [GET, POST]
  auth:
    required: true
    type: bearer|basic|jwt|apikey
    jwt:
      algorithm: RS256
      expiry_hours: 24
```

## C1.4 安全约束

### 1.4.1 敏感字段掩码

```yaml
security_constraints:
  - rule: no_sensitive_in_logs
    fields: [password, token, api_key, secret, credit_card, ssn]
    action: mask     # 运行时自动将字段值替换为 "***"
    log_behavior: omit  # 可选：完全不记录该字段
```

### 1.4.2 XSS 防护约束

```yaml
security_constraints:
  # HTML 净化：移除危险标签和属性
  - rule: html_sanitization
    fields: [content, description, bio, comment]
    allowed_tags: [p, br, strong, em, ul, ol, li, a, span]
    allowed_attributes:
      a: [href, title]
      span: [class]
    strip_scripts: true
    strip_event_handlers: true
    url_schemes_whitelist: [http, https, mailto]

  # URL 净化：防止 javascript: 协议和 data: 协议
  - rule: url_sanitization
    fields: [redirect_url, callback_url, avatar_url, link]
    allowed_schemes: [http, https]
    blocked_patterns:
      - "^javascript:"
      - "^data:"
      - "^vbscript:"
    max_length: 2048

  # 富文本内容：阻止 JavaScript 能力
  - rule: javascript_blocking
    fields: [rich_content, html_content, markdown]
    blocking_rules:
      - pattern: "<script"
        action: strip_tag
      - pattern: "on\\w+="
        action: strip_attribute
      - pattern: "javascript:"
        action: reject
```

### 1.4.3 SQL / NoSQL 注入防护约束

```yaml
security_constraints:
  # 参数化查询：强制使用绑定变量
  - rule: parametrized_query
    applies_to: all_query_fields
    enforcement: mandatory    # mandatory | advisory
    code_generation_template:
      go: "db.QueryContext(ctx, $QUERY, $BIND_VARS...)"
      python: "cursor.execute($QUERY, $BIND_VARS)"
      typescript: "db.query($QUERY, [$BIND_VARS])"
    blocked_patterns:
      - "\\bOR\\b.*="
      - "UNION\\s+SELECT"
      - ";\\s*DROP\\s+TABLE"
      - "--"
      - "'\\s+OR\\s+'\\s*=\\s*'"

  # SQL 注入安全字段标注
  - rule: sql_injection_safe
    fields: [username, search_query, filter_value]
    requires_parametrization: true

  # NoSQL 注入防护：防止操作符注入
  - rule: nosql_injection_safe
    fields: [query, filter, selector]
    blocked_patterns:
      - "^\\$"
      - "\\bwhere\\b.*\\$gt"
      - "\\bwhere\\b.*\\$ne"
    enforcement: strict
    mongo_template: "{$expr: {$eq: ['$field', $value]}}"

  # 避免字符串拼接查询
  - rule: no_string_concatenation_in_query
    severity: error
    message: "禁止将用户输入直接拼接到 SQL/NoSQL 查询字符串中"
```

### 1.4.4 CSRF 防护约束

```yaml
security_constraints:
  # CSRF Token 验证
  - rule: csrf_token_required
    applies_to: [POST, PUT, PATCH, DELETE]
    token_location: [header, body, cookie]
    token_header: X-CSRF-Token
    token_field: csrf_token
    cookie_name: csrf_cookie
    validate_on:
      - session_based
      - stateless_jwt
    secret_min_length: 32

  # SameSite Cookie 属性
  - rule: same_site_cookie
    cookie_names: [session_id, auth_token, csrf_cookie]
    same_site: strict   # strict | lax | none
    secure: true
    http_only: true

  # Origin / Referer 验证
  - rule: origin_validation
    applies_to: [POST, PUT, PATCH, DELETE]
    allowed_origins:
      - "https://app.vibex.com"
      - "https://admin.vibex.com"
    allowed_referers:
      - "^https://(app|admin)\\.vibex\\.com/"
    check_order: [origin, referer]   # 先检查 Origin，再检查 Referer
    strict_mode: true               # 两者都缺失时 reject（非 GET/HEAD）
    fail_action: reject_with_403

  # CORS 白名单
  - rule: cors_whitelist
    allowed_origins: ["https://app.vibex.com"]
    allowed_methods: [GET, POST, PUT, DELETE]
    allowed_headers: [Content-Type, Authorization, X-Requested-With]
    exposed_headers: [X-Total-Count, X-Page-Number]
    max_age_seconds: 86400
    allow_credentials: true
```

### 1.4.5 Rate Limiting 约束

```yaml
security_constraints:
  - rule: rate_limit_per_ip
    scope: ip
    requests: 100
    window_seconds: 60
    response_header: X-RateLimit-Limit
    retry_after_header: Retry-After
  - rule: rate_limit_per_user
    scope: authenticated_user
    requests: 1000
    window_seconds: 3600
  - rule: rate_limit_per_endpoint
    scope: [ip, endpoint]
    limits:
      POST /auth/login: 5/minute
      POST /payments: 10/minute
      GET /export: 3/minute
```

### 1.4.6 安全约束 → 代码生成映射

||| 安全规则 | Go | Python | TypeScript |
|||---------|-----|--------|------------|
|| `no_sensitive_in_logs` | `log.Printf("password=***")` | `logging.warning("password=***")` | `console.log("password=***")` |
|| `html_sanitization` | `bluemonday.UGCPolicy()` | `bleach.clean(v, tags, attrs)` | `DOMPurify.sanitize(v)` |
|| `url_sanitization` | `net/url.Parse` + scheme check | `urllib.parse` + scheme check | `new URL(v)` + check |
|| `javascript_blocking` | `re.ReplaceAllString(script_regex, "")` | `re.sub(pattern, "", v)` | `v.replace(/regex/, "")` |
|| `sql_injection_safe` | 绑定变量 `$1,$2` | `?` 参数占位符 | `?` 参数占位符 |
|| `nosql_injection_safe` | BSON 构造而非字符串拼接 | PyMongo 参数绑定 | MongoDB driver params |
|| `csrf_token_required` | `gorilla/csrf` middleware | `flask_wtf.csrf` | `csurf` middleware |
|| `same_site_cookie` | `http.SameSiteStrictMode` | `samesite='Strict'` | `SameSite=Strict` |
|| `origin_validation` | 请求头解析 + 白名单比对 | `request.origin` 检查 | `request.headers.get('origin')` |
|| `rate_limit_per_ip` | ` tollbooth`/limiter | `flask-limiter` | `express-rate-limit` |

