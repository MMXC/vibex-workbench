# C1.5 跨端点不变量（Inter-Endpoint Invariants）

## 1.5.1 概念定义

跨端点不变量约束定义的是跨越多个 API 端点的**全局状态不变量**。与字段级（intra-field）和跨字段（cross-field）约束不同，这些约束涉及多个 API 端点之间的状态依赖关系，用于防止业务逻辑漏洞。

```
字段级约束：  endpoint-A: field-1 < field-2
跨字段约束：  endpoint-B: address.state 必须与 address.country 匹配
跨端点不变量：endpoint-C → endpoint-D: 状态机转换必须合法
```

## 1.5.2 定义格式

```yaml
inter_endpoint_invariants:
  - id: order-lifecycle
    name: 订单状态机不变量
    description: "订单在生命周期中状态转换必须遵循合法路径"
    scope: order_service    # 关联的服务/模块
    state_machine:
      model: order_status
      states: [created, paid, shipped, delivered, cancelled, refunded]
      initial: created
      transitions:
        - from: created
          to: [paid, cancelled]
          via: [POST /orders/{id}/pay, POST /orders/{id}/cancel]
        - from: paid
          to: [shipped, refunded]
          via: [POST /orders/{id}/ship, POST /orders/{id}/refund]
        - from: shipped
          to: [delivered, refunded]
          via: [POST /orders/{id}/deliver, POST /orders/{id}/refund]
        - from: delivered
          to: [refunded]
          via: [POST /orders/{id}/refund]
        - from: cancelled
          to: []             # 终态，不可再转换
        - from: refunded
          to: []             # 终态，不可再转换

  - id: user-session-invariants
    name: 用户会话不变量
    description: "会话状态与认证状态必须一致"
    scope: auth_service
    invariants:
      - rule: session_active_requires_auth
        description: "会话有效时用户必须已认证"
        endpoints: [GET /profile, POST /orders]
        condition: "session.expires_at > now() implies user.authenticated == true"
        violation_response: 401
        message: "会话无效或已过期，请重新登录"
      - rule: logout_invalidates_session
        description: "登出后 session 必须失效"
        endpoints: [POST /auth/logout, DELETE /auth/sessions]
        post_condition: "session.active == false"

  - id: payment-gateway-invariants
    name: 支付网关不变量
    description: "支付相关操作不能并发或重复"
    scope: payment_service
    invariants:
      - rule: idempotency_required
        description: "所有支付操作必须携带幂等键"
        endpoints: [POST /payments, POST /orders/{id}/pay]
        required_header: Idempotency-Key
        max_key_age_seconds: 86400
      - rule: no_double_spend
        description: "同一支付源不能并发扣款"
        endpoints: [POST /payments]
        lock_field: payment_source_id
        lock_scope: user
        lock_duration_ms: 30000
```

## 1.5.3 状态机定义规范

### 状态机元模型

```yaml
state_machine_model:
  name: <model_name>       # 状态机名称
  states: [<state>]        # 所有可能状态列表
  initial: <state>         # 初始状态（必须）
  final_states: [<state>]  # 终态集合（可选，无出口的状态）
  transitions:
    - from: <state>
      to: <state>|[<state>]
      via: <endpoint>|[<endpoint>]
      guard: <condition_expression>   # 可选：前置条件
      effect: <post_condition>       # 可选：后置效果
```

### 转换合法性规则

```yaml
transition_validity:
  # 规则1：合法转换必须在 transitions 中明确声明
  explicit_transitions_only: true

  # 规则2：终态不能有出口转换
  no_transitions_from_final: true

  # 规则3：每个状态至少有一条入边和出边（初始/终态除外）
  connectivity_check: true

  # 规则4：转换必须通过对应的 API 端点触发
  endpoint_authorization:
    endpoint: POST /orders/{id}/cancel
    allowed_roles: [owner, admin]
    allowed_states: [created, pending]
```

## 1.5.4 跨端点不变量示例

### 示例 1：订阅 + 访问控制

```yaml
inter_endpoint_invariants:
  - id: subscription-access
    name: "订阅有效时才能访问高级功能"
    scope: subscription_service
    invariants:
      - rule: feature_access_requires_active_subscription
        description: "只有 active 订阅用户可以访问高级功能"
        access_endpoint: GET /premium/content
        subscription_endpoint: GET /subscription
        condition: >
          if access_endpoint.user_id == subscription_endpoint.user_id
          then subscription_endpoint.status == "active"
        violation_response: 403
        message: "需要有效的订阅才能访问此内容"
```

### 示例 2：库存 + 订单（乐观锁）

```yaml
inter_endpoint_invariants:
  - id: inventory-order-consistency
    name: "库存与订单数量必须一致"
    scope: order_service
    invariants:
      - rule: order_quantity_lte_inventory
        description: "下单数量不能超过可用库存"
        endpoints: [POST /orders]
        check: |
          order.quantity <= inventory.available
            where inventory.sku == order.sku
        failure_mode: reject_with_insufficient_stock
      - rule: inventory_reserved_on_order
        description: "下单成功后立即扣减库存"
        endpoints: [POST /orders, POST /orders/{id}/cancel]
        post_condition: >
          if order.status == "confirmed"
          then inventory.reserved == inventory.reserved + order.quantity
        rollback: >
          if order.status == "cancelled"
          then inventory.reserved == inventory.reserved - order.quantity
```

## 1.5.5 验证方式

### 阶段 1：静态验证（Spec Review）

```bash
# constraint_validator.py 验证状态机定义
constraint_validator.py --spec spec.yaml --check-invariant-consistency

# 检查项：
# - 状态机所有状态都有定义
# - transitions.from 引用了已声明的状态
# - 没有孤立状态（除了 initial 和 final）
# - 终态集合 = 出口为空的节点集合
```

### 阶段 2：合约测试（Contract Test）

```yaml
# 为每个跨端点不变量生成合约测试
contract_tests:
  - id: order-state-transition-test
    spec: order-lifecycle
    test_cases:
      - name: can_pay_from_created
        action: POST /orders/{id}/pay
        preconditions:
          - GET /orders/{id} returns status=created
        expected: 200, status=paid

      - name: cannot_pay_from_cancelled
        action: POST /orders/{id}/pay
        preconditions:
          - POST /orders/{id}/cancel returns 200
          - GET /orders/{id} returns status=cancelled
        expected: 409 Conflict, code=INVALID_STATE_TRANSITION

      - name: cannot_pay_twice
        action: POST /orders/{id}/pay
        preconditions:
          - POST /orders/{id}/pay returns 200
        expected: 409 Conflict, code=ORDER_ALREADY_PAID
```

### 阶段 3：运行时强制

```yaml
# 在 API 网关或中间件层实现状态机强制
gateway_middleware:
  state_machine_enforcer:
    enabled: true
    cache_state_in: redis
    key_pattern: "order:state:{order_id}"
    ttl_seconds: 3600
    on_violation:
      http_status: 409
      body:
        code: INVALID_STATE_TRANSITION
        message: "订单当前状态不允许此操作"
        current_state: "{{state}}"
        attempted_transition: "{{transition}}"
        allowed_transitions: "{{allowed}}"
```

## 1.5.6 不变量冲突检测

```yaml
invariant_conflict_detection:
  # 检测两个不变量是否相互矛盾
  - name: 检测死锁不变量
    check: >
      invariant_A: "endpoint-X requires resource-A locked"
      invariant_B: "endpoint-Y requires resource-B locked"
      conflict: "endpoint-X holds B and endpoint-Y holds A"
    resolution: deadlock_detection_timeout_ms

  - name: 检测循环依赖
    check: >
      invariant_A: "A depends on B"
      invariant_B: "B depends on C"
      invariant_C: "C depends on A"
    resolution: fail_fast_with_circular_dependency_error
```

