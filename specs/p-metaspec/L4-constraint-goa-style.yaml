# C3: 约束元数据

## C3.1 约束来源标记

```yaml
# 约束可以标记来源，便于追踪
constraints:
  - rule: min_length
    value: 8
    source: security        # security | business | performance | compliance
    reason: "OWASP 建议最小密码长度"
    citation: "OWASP ASVS 2.5.1"
  - rule: max_length
    value: 254
    source: protocol       # RFC 5321
    reason: "SMTP 邮箱地址最大长度"
    citation: "RFC 5321 Section 4.5.3"
```

