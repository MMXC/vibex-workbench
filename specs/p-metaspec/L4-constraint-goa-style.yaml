# C5: 质量评估（Darwin Rubrics）

| # | 维度 | 权重 | 评分标准 |
|---|------|------|---------|
| 1 | **约束类型覆盖度** | 25 | required/format/min/max/pattern/enum/cross 至少 5 种 |
| 2 | **代码生成映射完整性** | 25 | 每种约束类型都有对应生成模板 |
| 3 | **三阶段验证覆盖** | 20 | 静态/编译时/运行时 全部覆盖 |
| 4 | **安全约束质量** | 15 | 敏感字段掩码(XSS防护/SQL注入/CSRF/跨端点不变量各2分) |
| 5 | **约束来源追溯** | 15 | 每个约束有 source/reason/citation |

**最低门槛**：总分 ≥ 80，且代码生成映射至少覆盖 Go + TypeScript。

### L4-constraint 安全约束专项评分子表

| # | 安全子项 | 分值 | 评估标准 |
|---|---------|------|---------|
| S1 | 敏感字段掩码 | 3 | `no_sensitive_in_logs` 覆盖 ≥6 类敏感字段（password/token/api_key/secret/credit_card/ssn），log_behavior=omit |
| S2 | XSS 防护 | 2 | `html_sanitization` + `url_sanitization` + `javascript_blocking` 三规则完整，含 allowed_tags/whitelist/attribute strip |
| S3 | SQL/NoSQL 注入防护 | 2 | `parametrized_query`（mandatory）+ `nosql_injection_safe`（strict）+ blocked_patterns 覆盖 UNION/DROP/OR/注释注入 |
| S4 | CSRF 防护 | 2 | `csrf_token_required` + `same_site_cookie`（strict）+ `origin_validation`（strict_mode=true）三重保障 |
| S5 | Rate Limiting | 1 | `rate_limit_per_ip` + `rate_limit_per_user` + `rate_limit_per_endpoint`，覆盖 login/payments/export 关键端点 |
| S6 | 跨端点不变量 | 2 | 状态机不变量（`order-lifecycle`）+ 会话不变量（`session_active_requires_auth`）+ 支付幂等（`idempotency_required`）+ 无双重支付（`no_double_spend`）|
