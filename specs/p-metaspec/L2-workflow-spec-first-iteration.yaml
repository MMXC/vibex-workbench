# 质量评估（Darwin Rubrics）

|| # | 维度 | 权重 | 评分标准 |
||---|------|------|---------|
|| 1 | **步骤完整性** | 20 | 6 个阶段是否都有明确定义 |
|| 2 | **Gate 条件可判定性** | 20 | 每个 gate 的判定标准是否清晰、无歧义 |
|| 3 | **回退机制覆盖** | 20 | 每个阶段失败时的回退路径是否完整 |
|| 4 | **角色分离清晰度** | 15 | user/agent/system 职责是否互不重叠 |
|| 5 | **自动化程度** | 15 | 哪些步骤可自动，哪些必须人工 |
|| 6 | **歧义处理覆盖** | 10 | 每个阶段的歧义处理是否完整 |

**最低门槛**：总分 ≥ 80，且 W1/W2/W4 每步都有 gate 定义。

