# 全局依赖定义

本文档引用的所有系统组件必须遵循以下接口规范。
任何实现必须满足这些契约，否则 spec-first 工作流无法闭环。

## gen.py（L3 骨架代码生成器）

```yaml
interface:
  command: "gen.py [spec-path...] [flags]"
  arguments:
    spec-path:  path   # L3 spec 文件路径（位置参数，可多个）
    --target-dir, -d: path   # 输出目录路径（默认 src/generated/）
    --dry-run: flag   # 仅打印将要生成的文件，不写入
    --force: flag     # 强制覆盖已存在的 Skeleton 文件
    --watch: flag     # 监听 specs/ 目录变更，持续生成
    --generator, -g: string  # 指定生成器类型：svelte/go
  exit_codes:
    0: success                    # 骨架生成成功
    1: partial_success           # 部分成功（有 skipped 或 warnings）
    2: spec_invalid              # spec YAML 校验不通过、parent 链路断裂
    3: generator_missing          # 找不到对应 L3 的 generator 插件
    4: render_error              # 模板渲染失败
  output:
    stdout: generation log
    stderr: error detail
    files: [generated-file-list]  # 写入选定的 --out 目录
  pre_hooks:
    - name: validate-spec-yaml
      command: "python3 -c 'import yaml; yaml.safe_load(open(\"<spec>\"))'"
      required: true
  post_hooks:
    - name: lint-generated
      command: "make lint FILE=<generated-file>"
      required: false  # 失败不阻断，但记录到 errors
  error_format:
    errors:
      - level: error|warning
        file: "<path>"
        message: "<string>"
spec_internal_ref:
  - W2.6   # "gen.py 根据 L3 spec 生成框架代码（Skeleton 文件）"
  - W4.2.2 # "执行 pre_hook（validate-spec-yaml）"
  - W4.2.4 # "执行 separation_rules（保护 content 文件）"
  - W4.2.5 # "执行 post_hook（lint-generated）"
  - W4.2.6 # "如有错误，记录到 errors 列表"
```

## make validate（全量验证命令）

```yaml
interface:
  command: "make validate [TARGET=<L3-name>]"
  targets:
    all:        # 默认：lint + type-check + unit + integration
    lint:       # 代码风格检查（.eslintrc / .golangci-lint 等）
    type-check: # 类型检查（tsc --noEmit / go vet 等）
    unit:       # 单元测试（jest / go test 等）
    integration:# 集成测试（supertest / playwright 等）
  exit_codes:
    0: all targets pass
    1: one or more targets failed
  output:
    stdout: TAP/JUnit format summary
    coverage_report: "coverage/index.html"
  coverage_threshold:
    line: 80
    branch: 70
    critical_path: 100  # 关键路径（按 io_contract 字段覆盖）必须 100%
spec_internal_ref:
  - W4.5      # "make validate 运行全量验证"
  - W4.6      # "agent 修复 → 重新验证（最多 3 轮）"
  - W4.gate   # "make validate 全部通过"
  - W5.1      # "运行单元测试（jest/vitest）"
  - W5.2      # "运行集成测试（supertest/playwright）"
```

## separation_rules（骨架/内容分离规则）

```yaml
interface:
  config_file: ".spec-governance/separation.yaml"
  format:
    protected_dirs:
      - path: "src/content/**"
        reason: "用户编写的内容文件，禁止 gen.py 覆盖"
      - path: "*.user.md"
        reason: "手动维护文档"
    protected_by_extension:
      - ".content.ts"
      - ".manual.ts"
    overwrite_allowed:
      - path: "src/generated/**"
        reason: "gen.py 生成的骨架文件，可安全覆盖"
  enforcement:
    pre_write:  # gen.py 写入前检查
      command: "python3 check_separation.py --file <target>"
      block_on_violation: true
    post_write: # 写完后验证
      command: "python3 verify_separation.py"
      report: true
spec_internal_ref:
  - W4.2.4   # "执行 separation_rules（保护 content 文件）"
  - W4.risk  # "修改 content 文件 → 系统阻止（separation_rules）"
```

## ClarificationPanel（意图澄清 UI 组件）

```yaml
interface:
  component: "ClarificationPanel"
  mount_point: "/clarify"
  events:
    IN:  clarification_questions: [{id, question, type, options?}]
    OUT: clarification_complete: {answers: [{question_id, answer}], confidence}
    OUT: clarification_abort: {}
  requirements:
    - 每个问题卡片支持：单选、多选、文本输入
    - 支持跳过非关键问题（记录为 skipped=true）
    - 完成后触发 agent 汇总，生成 clarification_result
    - 用户可回退修改之前的选择
spec_internal_ref:
  - W1.3   # "展示 ClarificationPanel UI（卡片列表）"
```

## SpecViewer（规格审阅 UI 组件）

```yaml
interface:
  component: "SpecViewer"
  mount_point: "/spec"
  modes:
    view:   # 只读展示，支持层层展开（L1→L2→L3）
    diff:   # 对比视图（需要 diff_against 参数）
    edit:   # 草稿编辑（仅限未 confirmed 的 spec）
  events:
    IN:  spec_paths: [spec-path-list]
    IN:  diff_against: spec-path  # diff 模式时必需
    OUT: spec_confirmed: {paths: [...], confirmed_at, confirmed_by}
    OUT: spec_draft_updated: {path, changes: [...]}
    OUT: L3_status_changed: {path, status: confirmed|draft|rejected}
  requirements:
    - 颜色编码：绿色=新增，红色=删除，黄色=变更
    - 自动生成 changelog
    - 支持逐层（L1/L2/L3）批量确认
    - 已 confirmed 的 spec 不可在 view 模式下直接修改
spec_internal_ref:
  - W2.8   # "展示 SpecViewer UI，用户可逐层展开审阅"
  - W3.1   # "展示 SpecViewer 对比视图"
```

## 全局错误码索引

本文档所有错误码统一在此注册，任何阶段均可引用。

| 错误码 | 描述 | 首次定义 | 默认回退 |
|--------|------|---------|---------|
| WF-001 | W1 歧义无法澄清，超过 3 轮追问仍无法收敛 | W1.io_contract | → W6（revise_scope）|
| WF-002 | spec 内部冲突（L2 模块名重复，或 parent 引用缺失）| W2.io_contract | → agent 自动修复 |
| WF-003 | make validate 返回 exit_code=1（build/lint 失败）| W4.io_contract | → agent 修复（最多 3 轮），失败 → W6 |
| WF-004 | 测试失败（critical bug 发现）| W5.io_contract | → 立即 W6（back_to_impl）|
| WF-005 | 迭代轮次超限（iteration_count ≥ 10）| W6.io_contract | → 强制终止，生成总结报告 |
| WF-006 | 用户主动放弃澄清（clarification_abort 事件）| W1.io_contract | → 终止工作流，记录放弃原因 |
| WF-007 | gen.py 返回 exit_code=2（spec_invalid，YAML 解析失败或 parent 链路断裂）| W2.io_contract | → 回退到 W2 修复 spec |
| WF-008 | gen.py 返回 exit_code=3（generator_missing，找不到对应 generator）| W2.io_contract | → 注册缺失 generator 或降级 handwritten |
| WF-009 | 用户拒绝确认（reject rate > 50% 的 L3）| W3.io_contract | → W6（back_to_spec 或 revise_scope）|
| WF-010 | separation_rules 阻止写入（protected file 被覆盖）| W4.io_contract | → 系统阻止并告警，agent 手动处理 |
| WF-011 | io_contract 对齐率 < 80%（严重偏离）| W5.io_contract | → W6（back_to_spec 或 back_to_impl）|

