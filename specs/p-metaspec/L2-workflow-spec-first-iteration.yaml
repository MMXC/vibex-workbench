# W6: 迭代（Iterate）

## 参与者

- **user**：主导决策（所有迭代方向选择必须由 user 做出）
- **agent**：分析、汇总、建议

## 常规迭代（每 L3 完成后）

### 输入

```yaml
context:
  current_spec: confirmed-spec-path
  implementation: implementation-result
  validation: validation-result
  user_feedback: "..."
```

### 输出

```yaml
iteration_decision:
  decision: continue|revise_scope|back_to_spec|back_to_impl|finish
  next_action:
    target: L3-path | null
    action: add|remove|modify|implement
  revision_note: "..."
  iteration_count: N   # 当前迭代轮次（用于终止判断）
```

### 步骤分解

```
W6.1  agent 汇总 validation 结果 + 用户反馈
W6.2  agent 分析 gap：
      - 功能缺失？→ 建议新增 L3
      - 实现不符合 spec？→ 建议回到 W4 修复
      - spec 本身不合理？→ 建议回到 W2 重写
      - 目标达成？→ 建议 finish
W6.3  agent 检查 iteration_count：
      - count ≥ 5 → 强制要求用户决定：finish 或 终止
      - count ≥ 10 → 强制终止，禁止继续迭代
W6.4  展示 iteration panel（带建议 + 风险提示）
W6.5  用户选择决策：
      - continue：继续下一个 L3（count++）
      - revise_scope：调整 scope，进入 W1 重新澄清
      - back_to_spec：修改 spec，进入 W2
      - back_to_impl：修复实现，进入 W4
      - finish：当前目标完成，标记 done
```

## 季度回顾（quarterly_review）

每完成一轮 L3 迭代周期（或每 10 个 iteration_count），
自动触发 quarterly_review，聚焦 spec 体系的长期健康度。

### 参与者

- **user**（主导）：审阅、决策
- **agent**（辅助）：生成分析报告、列出建议清单

### 触发条件

- iteration_count 累计达到 10 的倍数（10, 20, 30, ...）
- 或 user 主动触发（通过 `quarterly_review` 命令）

### Action 清单（user 必须逐项审阅）

```yaml
quarterly_review:
  trigger: automatic|manual
  iteration_snapshot: N          # 本季度累计迭代轮次

  actions:
    - action: review_deprecated
      description: "审阅已标记为 deprecated 的 spec"
      target_scope: "所有 L1/L2/L3 中 status=deprecated 的节点"
      required_output:
        - "保留的 deprecated spec：维持 deprecated 状态，说明原因"
        - "需删除的 deprecated spec：执行删除，记录到 changelog"
        - "可恢复的 deprecated spec：撤销 deprecated 标记，重新激活"
      user_decision_required: true

    - action: cleanup_unused
      description: "清理未使用的 spec 节点"
      target_scope: "所有 L3 中 source_file 映射为空且超过 3 个迭代周期未修改的节点"
      required_output:
        - "确认删除的 unused spec：执行删除，记录到 changelog"
        - "保留的 unused spec：说明保留原因（如跨项目引用），更新 source_file 映射"
      user_decision_required: true

    - action: adjust_l1_goals
      description: "审阅并调整 L1 goals"
      target_scope: "当前项目的 L1，总览所有 L2 和 L3 的实现进度"
      required_output:
        - "已完成的 goal：标记为 completed，说明完成时间"
        - "过时的 goal：更新目标文本或移入 archived_goals"
        - "新出现的 goal：记录到 next_quarter_goals，由 user 决定是否加入 L1"
        - "L2/L3 与 L1 不对齐的部分：列出对齐缺口，进入 revise_scope 流程"
      user_decision_required: true

    - action: cross_spec_health
      description: "全链路 spec 健康度检查"
      required_output:
        - "parent 链断裂的节点：列出并要求立即修复"
        - "io_contract 字段缺失的 L3：列出并要求补全"
        - "constraints 过期的 L3：列出并要求更新"
        - "spec 文档注释率：覆盖率应 ≥ 90%"
      user_decision_required: false  # 警告类输出，无需决策

  output:
    quarterly_report:
      deprecated_summary: {kept: N, deleted: N, restored: N}
      unused_summary: {deleted: N, retained: N}
      l1_goals_summary: {completed: N, active: N, archived: N, new: N}
      health_score: N/100
    generated_at: ISO8601
    approved_by: user-id
```

### Gate 条件

- quarterly_review 的所有 `user_decision_required: true` 的 action 必须有 user 明确决策
- 未完成的 quarterly_review 不得开始新的 W1-W5 迭代周期
- quarterly_review 完成后，iteration_count 重置为 0（新周期开始）

## 共享 Gate 条件（常规迭代 + 季度回顾）

- iteration_count ≤ 10（硬上限，不可绕过）
- 用户必须做出明确决策（不允许"跳过"）
- 用户选择 finish 时，confirmed spec 状态变为 `implemented`

## 回退机制

W6 本身是回退调度层，依赖下游阶段（W1/W2/W4）的回退定义。
不允许从 W6 直接跳转到 W5（验证不通过须先修复）。

## io_contract

```yaml
input:
  context:
    current_spec: path
    implementation: {...}     # W4 输出
    validation: {...}        # W5 输出
    user_feedback: string
    iteration_count: N
output:
  iteration_decision:
    decision: continue|revise_scope|back_to_spec|back_to_impl|finish|deprecate
    next_action:
      target: path|null
      action: add|remove|modify|implement
    revision_note: string
    iteration_count: N
    termination_reason: string|null
error_codes:
  WF-005: "迭代轮次超限（iteration_count ≥ 10）"
fallback:
  WF-005: → 强制终止，生成迭代总结报告，禁止继续迭代
  iteration_count ≥ 5: → 强制要求用户做明确决策（finish 或 终止）
```

