# 纵向从属链路定义

本章节明确 L2-workflow 规格文档在整体 spec 体系中的纵向从属关系，
以及 parent 链路的验证机制，确保规格树从 L1 总目标到 L3 功能模块的完整性。

## Spec 层级定义

|| 层级 | 名称 | parent 指向 | 说明 |
||-----|------|----------|------|
|| L1 | 总目标（Mission）| 无（根节点）| 定义项目的使命、愿景和战略目标 |
|| L2 | 工作流/架构（Workflow/Architecture）| L1 | 定义实现 L1 目标的技术方案和模块划分 |
|| L3 | 功能模块（Feature Module）| L2 | 定义具体的输入输出契约和行为约束 |
|| L4 | 子功能/组件（Sub-feature/Component）| L3 | 可选，粒度更细的功能单元 |

## W1-W6 纵向层级映射表

|| 工作流阶段 | Spec 产物层级 | 主要 Spec 产物 | 参与者 | parent 验证要求 |
||-----------|------------|--------------|------|--------------|
|| W1 Clarify | L1（部分）| clarification_result（含 scope/exclusions/goals 雏形）| user + agent | 无（L1 尚未正式生成）|
|| W2 Spec | L1 + L2 + L3（完整树）| L1 goals，L2 架构模块，L3 功能 spec（含 io_contract）| agent + user + system | **所有 L2/L3 必须有 parent 声明；L2.parent → L1.name，L3.parent → L2.name** |
|| W3 Confirm | L1 + L2 + L3（确认态）| confirmed spec（含 status=confirmed 标记）| user | parent 链路必须完整（回退检查）|
|| W4 Implement | L3（实现态）| generated_skeleton + handwritten_impl 映射到 L3| agent + system + user | **每个 generated_file 必须可追溯到其 L3 spec（实现与规格对齐）** |
|| W5 Validate | L3（验证态）| validation_result（含 io_contract_alignment）| system + user | 对齐结果必须关联到对应 L3 |
|| W6 Iterate | L1 + L2 + L3（迭代决策）| iteration_decision（含 revision_note）| user + agent | 决策必须明确 target spec 及其 parent 链路 |

## Parent 验证机制

### 验证时机

1. **W2 Gate（W2.8 之前）**：每次生成 L2/L3 时，必须通过 parent 完整性检查
2. **W3 Gate（W3.1 之前）**：confirm 之前，遍历完整 spec 树，验证所有 parent 引用有效
3. **W4 Gate（W4.3 之前）**：gen.py 执行前，确认每个 L3 的 parent 链完整

### 验证规则

```yaml
parent_chain_validation:
  rules:
    - id: PC-001
      description: "L2 spec 必须有 parent 字段，且指向已存在的 L1 name"
      check: "L2.parent == L1.name"
      severity: error
      auto_fix: false  # parent 引用不存在的 L1 必须人工确认
    - id: PC-002
      description: "L3 spec 必须有 parent 字段，且指向已存在的 L2 name"
      check: "L3.parent == L2.name"
      severity: error
      auto_fix: false
    - id: PC-003
      description: "parent 链不得存在环路（L1→...→L5 应为 DAG，非循环图）"
      check: "spec_tree 是有向无环图（DAG）"
      severity: error
      auto_fix: false
    - id: PC-004
      description: "同一 L2 下的 L3 不得重名"
      check: "L3.name 在同一 parent 下唯一"
      severity: warning
      auto_fix: true   # agent 可自动重命名（L3-name-v2）
    - id: PC-005
      description: "L1 根节点不得有 parent 字段（根节点禁止有 parent）"
      check: "L1.parent == null"
      severity: error
      auto_fix: false
    - id: PC-006
      description: "实现文件到 L3 的可追溯性（L3.source_file 声明）"
      check: "每个 L3 应对应至少一个 generated_file 或 handwritten_file"
      severity: warning
      auto_fix: true   # agent 自动补充 L3.source_file 映射
  enforcement:
    auto_fail_on_error: true   # PC-001/002/003/005 失败 → 阻断 spec 生成
    warn_only_on_warning: true  # PC-004/006 失败 → 仅警告，不阻断
  tooling:
    validation_script: "python3 validate_parent_chain.py --spec <spec-path>"
    CI_gate: true               # 必须在 CI 中强制执行
```

### 验证错误回退

| 验证失败类型 | 回退动作 |
|------------|---------|
| PC-001（L2.parent 指向不存在的 L1）| 阻断 W2，agent 列出可用的 L1 列表，用户选择或新建 L1 |
| PC-002（L3.parent 指向不存在的 L2）| 阻断 W2，agent 自动修复 parent 引用 |
| PC-003（环路检测）| 阻断 W2，agent 输出环路路径，用户手动拆分 |
| PC-005（L1 有 parent）| 阻断 W2，拒绝生成，提示 L1 根节点禁止有 parent |
| PC-004/006（重名/可追溯性警告）| 记录到 spec warnings，允许继续，但必须在下个 W3 确认前修复 |

