# W1: 意图澄清（Clarify）

## 参与者

- **user**：提问、选择、确认
- **agent**：追问、拆解、整理

## 输入

```yaml
user_input: "帮我做一个待办事项管理"
```

## 输出

```yaml
clarification_result:
  project_goal: "待办事项管理应用"
  scope:
    - "需要创建、编辑、删除待办"
    - "需要按优先级排序"
    - "需要本地持久化"
  exclusions:
    - "不需要多用户协作"
    - "不需要云同步"
  tech_hint: "前端 Svelte，后端 Go"
  confidence: high|medium|low
```

## 步骤分解

```
W1.1 agent 接收用户输入
W1.2 agent 拆解意图 → 生成澄清问题列表
W1.3 展示 ClarificationPanel UI（卡片列表）
    - 每个卡片一个问题
    - 用户选择或填写
W1.4 agent 汇总澄清结果 → 生成 scope + exclusions
W1.5 用户审阅 → 确认或修改
```

## Gate 条件

- `confidence >= medium`（agent 对意图理解充分）
- 用户明确选择了 scope 和 exclusions
- 技术栈提示已给出

## 歧义处理

| 歧义类型 | 处理方式 |
|---------|---------|
| 需求模糊 | agent 提出澄清问题，用户回答 |
| 技术选型未给 | agent 给出建议，用户确认 |
| 范围过大 | agent 拆分优先级，用户决定本轮范围 |
| 范围过小 | agent 建议扩展，用户决定 |

## io_contract

```yaml
input:
  user_raw_text: string              # 用户原始意图文本
  project_context:                   # （可选）项目已有 spec 链路
    existing_specs: [path-list]
output:
  clarification_result:
    project_goal: string
    scope: [string]
    exclusions: [string]
    tech_hint: string
    confidence: high|medium|low
    answered_questions: [{id, question, answer}]
error_codes:
  WF-001: "歧义无法澄清，W1.3 超过 3 轮追问仍无法收敛"
  WF-006: "用户主动放弃澄清（clarification_abort 事件）"
fallback:
  WF-001: → 路由到 W6（revise_scope）
  WF-006: → 终止工作流，记录放弃原因
```

---

# W2: 规格生成（Spec）

## 参与者

- **agent**：主导生成
- **user**：审阅
- **system**：gen.py 框架代码生成

## 输入

```yaml
clarification_result: {...}   # W1 输出
project_context:
  existing_specs: [spec-path-list]  # 已有 spec 链路
```

## 输出

```yaml
generated_spec:
  L1:
    name: project-name
    mission: "..."
    goals: ["...", "..."]
  L2:
    - name: architecture-name
      parent: project-name
      tech_stack: ["...", "..."]
      modules: ["...", "..."]
  L3[]:
    - name: feature-name
      parent: architecture-name
      io_contract: {...}
      behaviors: ["...", "..."]
      constraints: ["...", "..."]
```

## 步骤分解

```
W2.1 agent 读取项目已有 spec（理解现有架构）
W2.2 agent 根据 clarification_result 生成 L1 总目标
W2.3 agent 生成 L2 架构（技术选型 + 模块划分）
W2.4 agent 生成 L3 功能模块（每个带 io_contract）
W2.5 agent 为每个 L3 声明 constraints（技术约束）
W2.6 gen.py 根据 L3 spec 生成框架代码（Skeleton 文件）
W2.7 agent 为每个 L3 补充 user_stories
W2.8 展示 SpecViewer UI，用户可逐层展开审阅
```

## Gate 条件

- L1 的 goals 可度量（每条 goal 有明确的验收标准）
- L2 的模块划分无遗漏（L3 覆盖全部 scope）
- L3 的 io_contract 每条都有输入/输出字段定义
- 所有 L2+ 有 parent 声明
- 无环路（L1→...→L5 链路完整）

## 失败处理

- L2 模块重复 → 合并或重命名
- parent 引用缺失 → 创建缺失的父节点
- io_contract 字段不完整 → 标记为 draft，等 W1 再次澄清

## io_contract

```yaml
input:
  clarification_result:               # W1 输出
    project_goal: string
    scope: [string]
    exclusions: [string]
    tech_hint: string
    confidence: high|medium|low
  project_context:
    existing_specs: [path-list]
output:
  generated_spec:
    L1:
      name: string
      mission: string
      goals: [{id, text, acceptance_criteria: string}]
    L2[]:
      - name: string
        parent: string
        tech_stack: [string]
        modules: [string]
    L3[]:
      - name: string
        parent: string
        io_contract: {inputs: [...], outputs: [...], errors: [...]}
        behaviors: [string]
        constraints: [string]
        user_stories: [string]
error_codes:
  WF-002: "spec 内部冲突（L2 模块名重复，或 L3 parent 引用不存在的 L2）"
  WF-007: "gen.py 返回 exit_code=2（spec_invalid，YAML 解析失败或 parent 链路断裂）"
  WF-008: "gen.py 返回 exit_code=3（generator_missing，找不到对应 generator）"
fallback:
  WF-002: → agent 自动修复（合并/重命名/补 parent），重新生成
  WF-007: → agent 修复 spec YAML，重新执行 W2
  WF-008: → agent 注册缺失的 generator 或降级为 handwritten（见 W4.3）
```

---

# W3: 确认冻结（Confirm）

## 参与者

- **user**：唯一决策者
- **agent**：准备对比视图

## 输入

```yaml
generated_spec: {...}    # W2 输出
diff_against: previous-spec-path  # 相比上一个版本的变更
```

## 输出

```yaml
confirmed_spec:
  spec_paths: [spec-path-list]
  status: confirmed
  confirmed_at: ISO8601
  confirmed_by: user
  change_summary: "新增 L3:待办创建, 删除 L3:待办分享"
```

## 步骤分解

```
W3.1 展示 SpecViewer 对比视图
    - 绿色：新增内容
    - 红色：删除内容
    - 黄色：变更内容
W3.2 展示 changelog（自动生成）
W3.3 用户逐层审阅 L1 → L2 → L3
W3.4 用户对每个 L3 可选择：
    - confirm（冻结，进入 W4）
    - draft（返回 W2 继续修改）
    - reject（放弃该功能）
W3.5 确认后，spec 状态变为 confirmed（不可直接修改）
W3.6 confirmed spec 进入 W4 实现阶段
```

## Gate 条件

- 用户必须逐层确认（或批量确认）
- 每个 L3 的 io_contract 被用户审阅过
- constraints 被用户确认（或删除不合理约束）

## 回退机制

```
W3.5 之前：任意修改，无需记录
W3.5 之后：confirmed spec 如需修改 → 走 W6 iteration 流程
           不允许直接覆盖 confirmed spec
           必须新建 revision（如 spec.v2.yaml）
```

## io_contract

```yaml
input:
  generated_spec: {...}           # W2 输出（完整 L1+L2+L3 树）
  diff_against: spec-path|null   # 对比上一版本（首次 confirm 时为 null）
output:
  confirmed_spec:
    spec_paths: [path-list]       # 已确认的 spec 文件路径列表
    status: confirmed|draft|rejected
    confirmed_at: ISO8601
    confirmed_by: user-id
    change_summary: string
    L3_statuses:
      - path: path
        status: confirmed|draft|rejected
        confirmed_at: ISO8601|null
error_codes:
  WF-009: "用户拒绝确认（reject rate > 50% 的 L3）"
fallback:
  WF-009: → 汇总被拒 L3，进入 W6（back_to_spec 或 revise_scope）
```

