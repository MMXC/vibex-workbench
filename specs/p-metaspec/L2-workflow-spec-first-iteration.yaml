# 目标

描述从「用户意图」到「可验证代码」的完整工作流。每个步骤明确定义：
- **actor**：谁执行（user / agent / system）
- **input**：接受什么
- **output**：产出什么
- **gate**：什么条件放行到下一步
- **rollback**：失败时如何回退

---

# 工作流阶段图

```
用户意图
    ↓
┌─ W1: Clarify（意图澄清）─────────┐
│  user + agent 共同明确需求边界     │ ← gate: 用户确认 L2 ClarificationPanel
└─────────────────────────────────┘
    ↓
┌─ W2: Spec（规格生成）────────────┐
│  agent 根据澄清结果生成 L2+ spec   │ ← gate: 用户确认 spec 内容
└─────────────────────────────────┘
    ↓
┌─ W3: Confirm（确认冻结）─────────┐
│  用户审阅 spec，确认进入实现        │ ← gate: 用户点击 confirm
└─────────────────────────────────┘
    ↓
┌─ W4: Implement（实现）────────────┐
│  agent 执行生成 + 手动实现         │ ← gate: make validate 通过
└─────────────────────────────────┘
    ↓
┌─ W5: Validate（验证）────────────┐
│  自动化测试 + 用户体验验证          │ ← gate: 全部测试通过
└─────────────────────────────────┘
    ↓
┌─ W6: Iterate（迭代）────────────┐
│  收集反馈，决定下一轮方向          │ ← gate: 用户决策
└─────────────────────────────────┘
    ↓
[结束 / 回退到 W1 / 回退到 W2 / 回退到 W4]
```

