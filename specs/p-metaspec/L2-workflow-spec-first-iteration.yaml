# W4: 实现（Implement）

## 参与者

- **agent**：主导实现
- **system**：gen.py 生成框架代码
- **user**：审批高风险操作

## 输入

```yaml
confirmed_spec:
  spec_paths: [...]
  L3_list: [...]
```

## 输出

```yaml
implementation_result:
  generated_files: [file-list]       # gen.py 生成
  handwritten_files: [file-list]    # agent 手动实现
  build_status: success|failed
  test_status: pass|fail|skipped
```

## 步骤分解

```
W4.1 gen.py 读取所有 confirmed L3 spec
W4.2 对于每个 L3：
    W4.2.1 gen.py 查找对应 generator
    W4.2.2 执行 pre_hook（validate-spec-yaml）
    W4.2.3 渲染 Skeleton 文件
    W4.2.4 执行 separation_rules（保护 content 文件）
    W4.2.5 执行 post_hook（lint-generated）
    W4.2.6 如有错误，记录到 errors 列表
W4.3 agent 根据 L3 补充业务逻辑（手动实现部分）
W4.4 agent 为每个 L3 写单元测试
W4.5 make validate 运行全量验证
W4.6 如有失败：agent 修复 → 重新验证（最多 3 轮）
W4.7 如 3 轮后仍失败：进入 W6 iteration，决定方向
```

## Gate 条件

- `make validate` 全部通过
- 无 build error
- L3 行为与 io_contract 对齐（测试覆盖）

## 高风险操作（需用户审批）

|| 风险等级 | 操作类型 | 阈值 | 处理 | 审批方式 |
|---------|---------|------|------|------|
|| 🔴 高 | 删除已有文件（任意）| 任意字节数 | 用户审批（阻断式）| 必须显式确认 |
|| 🔴 高 | 修改 confirmed spec | 任意字段 | 禁止直接修改，必须走 W6 iteration 流程 | W6 审批 |
|| 🟡 中 | 外部 API 调用（高敏感）| 涉及支付/认证/数据删除 | 用户审批（阻断式）| 必须显式确认 |
|| 🟡 中 | 外部 API 调用（中敏感）| 涉及用户数据读写/状态变更 | 用户审批（提示式）| 确认或取消 |
|| 🟡 中 | 修改 content 文件 | 任意 | 系统阻止（separation_rules）| 自动阻断 |
|| 🟢 低 | 外部 API 调用（低敏感）| 纯读取/公开数据/无状态调用 | agent 自动执行，事后记录 | 事后审计 |
|| 🟢 低 | 修改 draft spec（未 confirmed）| 任意字段 | agent 自动执行 | 事后审计 |

**外部 API 敏感度分级标准：**

| 等级 | 类型 | 示例 | 审批要求 |
|------|------|------|---------|
| 高敏感 | 支付、认证凭据、个人隐私数据删除 | `POST /payments`, `DELETE /users/{id}`, `PUT /auth/revoke` | 用户必须显式输入 `APPROVE_<action>` 命令 |
| 中敏感 | 用户数据读写、业务状态变更 | `PUT /users/{id}`, `POST /orders`, `PATCH /todos/{id}` | 用户点击确认按钮，提供操作摘要 |
| 低敏感 | 纯读取、公开数据、无状态调用 | `GET /products`, `GET /todos`, `GET /public/info` | agent 自动执行，记录到操作日志 |

## io_contract

```yaml
input:
  confirmed_spec:
    spec_paths: [path-list]
    L3_list: [...]
output:
  implementation_result:
    generated_files: [path-list]      # gen.py 生成的骨架文件
    handwritten_files: [path-list]    # agent 手动实现文件
    build_status: success|failed|partial
    test_status: pass|fail|skipped
    errors[]:
      - level: error|warning
        file: path
        message: string
        L3: path|null
error_codes:
  WF-003: "make validate 返回 exit_code=1（build 或 lint 失败）"
  WF-007: "gen.py 返回 exit_code=2（spec_invalid，YAML 解析失败或 parent 链路断裂）"
  WF-008: "gen.py 返回 exit_code=3（generator_missing，找不到对应 generator）"
  WF-010: "separation_rules 阻止写入（protected file 被覆盖）"
fallback:
  WF-003: → agent 修复（最多 3 轮），仍失败 → W6
  WF-007: → 回退到 W2 修复 spec
  WF-008: → 注册缺失 generator 或降级为 handwritten
  WF-010: → 系统阻止并告警，agent 手动处理
```

---

# W5: 验证（Validate）

## 参与者

- **system**：自动化测试
- **user**：用户体验验证

## 输入

```yaml
implementation_result: {...}   # W4 输出
confirmed_spec: {...}          # W3 输出（L3 io_contract 基准）
```

## 输出

```yaml
validation_result:
  automated_tests:
    unit: pass|n|total
    integration: pass|n|total
    e2e: pass|n|total
  io_contract_alignment:
    L3-name:
      inputs_verified: [field-list]
      outputs_verified: [field-list]
      aligned: true|false
  manual_tests:
    - scenario: "..."
      result: pass|fail
  user_signoff: true|false
```

## 步骤分解

```
W5.1  运行单元测试（jest/vitest）
W5.2  运行集成测试（supertest/playwright）
W5.3  agent 对比每个 L3 的实现输出 vs io_contract 定义
      - 逐字段核对 inputs/outputs 是否存在且类型匹配
      - 记录对齐缺口（unmatched_fields）
W5.4  agent 生成测试覆盖率报告
W5.5  用户体验验证（手动操作关键路径）
W5.6  用户填写 sign-off（通过/需修改）
W5.7  如需修改 → 进入 W6 iteration
W5.8  全部通过 → spec 标记为 implemented
```

## Gate 条件

- 自动化测试覆盖率 ≥ 80%（关键路径 100%）
- 每个 L3 的 io_contract 对齐率 = 100%（或明确记录缺口并获用户批准）
- 用户 sign-off = true
- 无 critical 级别 bug

## 回退机制

```
W5 验证失败（非 critical bug）：
    → agent 自动修复单元测试或类型错误（最多 2 轮）
    → 仍失败 → 进入 W6，用户决策

W5 验证失败（critical bug）：
    → 立即进入 W6，建议 back_to_impl

W5 io_contract 对齐率 < 100%：
    → 记录未对齐字段到 validation_result.io_contract_alignment
    → 用户判断是否接受缺口
    → 不接受 → back_to_spec (W2) 或 back_to_impl (W4)
```

## io_contract

```yaml
input:
  implementation_result: {...}    # W4 输出
  confirmed_spec: {...}           # W3 输出（L3 io_contract 基准）
output:
  validation_result:
    automated_tests:
      unit:     {pass: N, fail: N, total: N}
      integration: {pass: N, fail: N, total: N}
      e2e:      {pass: N, fail: N, total: N}
      coverage:
        line: N%
        branch: N%
        critical_path: N%
    io_contract_alignment:
      L3-name:
        inputs_verified:  [field-list]
        outputs_verified: [field-list]
        unmatched_fields: [{field, expected, actual, severity}]
        aligned: true|false
    manual_tests[]:
      - scenario: string
        result: pass|fail|skipped
        notes: string
    user_signoff: true|false
    overall_status: passed|failed|conditional_pass
error_codes:
  WF-004: "测试失败（critical bug 发现）"
  WF-011: "io_contract 对齐率 < 80%（严重偏离）"
fallback:
  WF-004: → 立即进入 W6，建议 back_to_impl
  WF-011: → 进入 W6，建议 back_to_spec 或 back_to_impl
  non_critical: → agent 自动修复（最多 2 轮），仍失败 → W6
```

