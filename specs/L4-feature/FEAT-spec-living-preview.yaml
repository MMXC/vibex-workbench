---
spec:
  version: "0.1"
  level: "4_feature"
  name: FEAT-spec-living-preview
  parent: MOD-spec-editor
  status: proposal

meta:
  type: feature
  module: frontend
  owner: hermes
  created: "2026-04-27"
  updated: "2026-04-27"

lifecycle:
  current: proposal
  updated: "2026-04-27"

io_contract:
  input: |
    spec 文件内容（或编辑中的草稿）、spec level、preview_trigger（draft_change | confirm_button | spec_select）。
  output: |
    预览产物（截图/mermaid/骨架代码）+ 确认状态 + 预览快照路径。
  boundary: |
    只负责从 spec 生成预览和人类确认。
    不负责 spec 的 CRUD，不负责实现代码生成，不负责 AI 图像生成引擎本身。

behavior:
  - "用户编辑 spec 或点预览按钮时触发预览生成"
  - "预览产物根据 level 不同形态各异"
  - "预览区域展示在 spec 编辑器旁边或下方"
  - "用户点确认后 preview_snapshot 写入 spec，锁定本次确认"
  - "spec 内容变化时预览自动失效（需重新预览）"

content:
  # ── 预览触发时机 ────────────────────────────────────────────
  preview_triggers:
    - id: "PT-1"
      name: "draft_change"
      detail: "spec 草稿内容变化超过 1 秒后自动触发（debounce）"
    - id: "PT-2"
      name: "confirm_button"
      detail: "用户点「预览」按钮立即触发"
    - id: "PT-3"
      name: "spec_select"
      detail: "从列表选择 spec 时展示上次确认的快照（不重新生成）"

  # ── 各层级的预览形态 ──────────────────────────────────────
  level_preview_map:
    L1:
      artifact: "文字摘要 + Mermaid ERD（目标关系图）"
      generator: "读取 io_contract 的 input/output 渲染 mermaid"
      confirmation_point: "这个产品目标方向对吗？"
    L2:
      artifact: "组件关系图（Mermaid flowchart）"
      generator: "读取 content.modules 和 l1_l2_lineage 渲染架构图"
      confirmation_point: "这个架构拆分合理吗？"
    L3:
      artifact: "模块结构预览（模块边界 + 依赖关系文字描述）"
      generator: "读取 io_contract 和 content 生成文字描述"
      confirmation_point: "这个模块边界和 API 对吗？"
    L4:
      artifact: "界面原型截图（AI 生成）或行为流程图（Mermaid）"
      generator: "读取 io_contract + content 生成交互描述或 AI 截图"
      confirmation_point: "这个功能行为是你想要的吗？"
    L5:
      artifact: "代码骨架预览（生成的 *.Skeleton.svelte 或对应文件截图）"
      generator: "运行 make generate --dry-run 或直接读 content.file_path 指向的生成逻辑"
      confirmation_point: "这个文件边界和 allowed/forbidden 清单对吗？"

  # ── 预览快照 ───────────────────────────────────────────────
  preview_snapshot:
    path: "specs/<level>/<name>/preview_snapshot.png"
    format: "png | mermaid.svg | skeleton.txt"
    written_at: "spec.confirmed_at"
    invalidated_when: "spec content 再次变化"

  user_stories:
    - id: "US-1"
      as_a: "用户"
      i_want: "写完 L4 spec 后能看到界面原型长什么样"
      so_that: "在实现之前确认方向，避免返工"
      acceptance: "点预览按钮后 10 秒内展示产物"
    - id: "US-2"
      as_a: "开发者"
      i_want: "写完 L5 spec 后能看到将要生成的代码骨架"
      so_that: "确认文件边界和 allowed/forbidden 清单"
      acceptance: "骨架预览和 spec content.file_path 一致"

  test_scenarios:
    - id: "TC-1"
      scenario: "L4 spec 预览"
      given: "用户编辑 FEAT-xxx.yaml 的 io_contract"
      when: "用户点预览按钮"
      then: "展示对应的行为描述或界面原型"
      evaluation: "预览产物与 spec 内容语义一致"
    - id: "TC-2"
      scenario: "spec 变化后预览失效"
      given: "用户已有确认过的 preview_snapshot"
      when: "用户修改 spec 内容"
      then: "预览区域显示 stale 提示，需重新预览"
      evaluation: "旧的 snapshot 不被误用"
    - id: "TC-3"
      scenario: "L5 骨架预览"
      given: "用户打开 L5 slice spec"
      when: "用户点预览"
      then: "展示 content.file_path 的骨架内容摘要"
      evaluation: "不执行真实写入"

  constraints:
    - id: "C1"
      name: "Preview before commit"
      rule: "确认前预览产物不写入 specs/（preview_snapshot 除外）"
      validation: "preview_snapshot 在用户点确认后才落盘"
    - id: "C2"
      name: "Stable preview"
      rule: "同一 spec 内容两次预览结果应一致"
      validation: "预览为纯函数，无随机性"
    - id: "C3"
      name: "Level appropriate artifact"
      rule: "每个 level 只展示该层级关心的抽象"
      validation: "L4 不展示代码细节，L5 不展示产品意图"
    - id: "C4"
      name: "No auto-implement"
      rule: "预览不等于实现，确认不等于执行"
      validation: "预览按钮不触发 make generate"

  dependencies:
    - file: specs/L3-module/MOD-spec-editor.yaml
      reason: 预览能力是 spec 编辑器的核心扩展
    - file: specs/L4-feature/FEAT-spec-graph-expansion.yaml
      reason: 图谱视图可以复用预览产物的渲染逻辑
    - file: specs/L4-feature/FEAT-spec-write-refresh-and-conflict.yaml
      reason: preview_snapshot 的写入使用 spec write API

  acceptance_criteria:
    - id: "AC-1"
      given: "用户编辑 L4 spec"
      when: "点预览按钮"
      then: "10 秒内展示行为描述或界面原型"
    - id: "AC-2"
      given: "spec 内容已变化"
      when: "用户未重新预览"
      then: "预览区域显示 stale 状态，不允许点确认"
    - id: "AC-3"
      given: "用户点确认"
      when: "preview_snapshot 写入 specs/"
      then: "snapshot 路径记录在 spec metadata 中"
    - id: "AC-4"
      given: "用户打开 L5 slice"
      when: "点预览"
      then: "展示 content.file_path 的骨架摘要，不执行 make generate"

changelog:
  - version: "0.1"
    date: "2026-04-27"
    author: hermes
    changes:
      - "新增 spec 活预览功能规格——人类在确认前能看到 spec 完成后的预览产物"
