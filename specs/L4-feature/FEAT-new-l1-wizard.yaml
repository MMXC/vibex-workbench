  current: proposal
  updated: "2026-04-27"

display:
  title: new l1 wizard
  summary: 生成 L1 spec 文件（如 specs/L1-goal/{projectName}.yaml）
  description: 生成 L1 spec 文件（如 specs/L1-goal/{projectName}.yaml）

structure:
  parent: MOD-spec-editor
  children: []
  dependencies: []
  impacted_files: []

io:
  input:
  - 用户点击「新建 L1 Spec」按钮，填写表单（项目名、描述、类型）。
  output:
  - '- 生成 L1 spec 文件（如 specs/L1-goal/{projectName}.yaml）

    - 自动打开新创建的 spec 进入编辑模式

