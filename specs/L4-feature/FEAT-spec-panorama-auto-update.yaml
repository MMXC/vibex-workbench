---
spec:
  version: "0.1"
  level: "4_feature"
  name: "FEAT-spec-panorama-auto-update"
  parent: "MOD-spec-editor"
  status: "proposal"

meta:
  type: "feature"
  module: "agent"
  owner: "hermes"
  created: "2026-04-28"
  updated: "2026-04-28"

lifecycle:
  current: "proposal"
  updated: "2026-04-28"

io_contract:
  input: |
    spec write、agent confirmed spec draft、rollback、generate、drift check、validate 完成事件。
  output: |
    自动刷新 specs/_governance/panorama.json、coverage-report.md、受影响 spec 的 view.json/view.md。
  boundary: |
    只定义治理视图刷新触发与缓存失效。
    不改变业务 spec 内容，不自动提交 git，不执行用户未确认的写入动作。
  behavior:
    - "spec 保存成功后计算 affected specs"
    - "更新当前 spec、parent、children、sibling 的 view model"
    - "更新全仓库 panorama.json 和 coverage-report.md"
    - "刷新失败时不回滚 spec 写入，但记录 stale_governance 状态"
    - "UI 通过 SSE 或轮询拿到 governance_refreshed 事件"

content:
  refresh_triggers:
    - "specs/write success"
    - "agent/spec-write success"
    - "specs/rollback success"
    - "make validate completed"
    - "make generate completed"
    - "drift/check completed"

  refresh_outputs:
    - "specs/_governance/panorama.json"
    - "specs/_governance/coverage-report.md"
    - "specs/_governance/<level>/<spec-name>.view.json"
    - "specs/_governance/<level>/<spec-name>.view.md"

  user_stories:
    - id: "US-1"
      as_a: "spec 编辑用户"
      i_want: "保存 spec 后全景图和覆盖率立即更新"
      so_that: "不用手动运行脚本才能确认变更影响"
      acceptance: "保存后 SpecTreeMap 的 L5 badge 和 panorama 数据同步刷新"

  test_scenarios:
    - id: "TC-1"
      scenario: "新增 L5 后刷新 parent L4 coverage"
      given: "FEAT-x 原本 L5x0"
      when: "用户保存新的 SLICE-x.yaml"
      then: "FEAT-x.view.json coverage.children_count 更新为 1"
      evaluation: "coverage-report.md 不再列 FEAT-x 为 missing L5"
    - id: "TC-2"
      scenario: "刷新失败"
      given: "spec 保存成功但 governance writer 失败"
      when: "auto-update hook 返回错误"
      then: "spec 写入保留，panorama 标记 stale_governance"
      evaluation: "UI 提示用户可手动刷新治理视图"

  constraints:
    - id: "C1"
      name: "No write rollback"
      rule: "治理视图刷新失败不得自动回滚已经确认的 spec 写入"
      validation: "失败只标记 stale_governance"
    - id: "C2"
      name: "Atomic governance files"
      rule: "view.json/panorama.json 写入必须使用 temp file + rename"
      validation: "中断不会留下半截 JSON"
    - id: "C3"
      name: "Affected-first refresh"
      rule: "优先刷新当前 spec 相关 view，再异步刷新全景"
      validation: "大仓库保存不阻塞 UI 超过阈值"

acceptance_criteria:
  - id: "AC-1"
    given: "spec 保存成功"
    when: "auto-update hook 运行"
    then: "受影响 spec view 和 panorama.json 被刷新"
  - id: "AC-2"
    given: "auto-update hook 失败"
    when: "UI 读取 governance 状态"
    then: "显示 stale_governance 而不是旧数据伪装为最新"
  - id: "AC-3"
    given: "用户新增 L5"
    when: "刷新完成"
    then: "parent L4 coverage badge 立即更新"

changelog:
  - version: "0.1"
    date: "2026-04-28"
    author: "hermes"
    changes:
      - "新增 spec 全景视图自动刷新规格"
