---
spec:
  version: "0.1"
  level: "4_feature"
  name: "FEAT-scaffold-preview-recovery"
  parent: "MOD-scaffolding"
  status: "proposal"

meta:
  type: "feature"
  module: "generators"
  owner: "hermes"
  created: "2026-04-27"
  updated: "2026-04-27"

lifecycle:
  current: "proposal"
  updated: "2026-04-27"

io_contract:
  input: |
    workspace state、scaffold options、模板清单、已有文件状态、scaffold 执行结果。
  output: |
    可确认的写入预览、跳过/创建/冲突列表、失败恢复建议。
  boundary: |
    扩展已有 FEAT-scaffolding 的 preview 和 failure recovery。
    不覆盖已有文件，不执行 Git 操作，不管理模板内容长期演进。
  behavior:
    - "预览每个将写入的文件路径和 action=create|skip|conflict"
    - "展示关键文件摘要，不默认展示完整模板内容"
    - "确认前不写入磁盘"
    - "失败后保留 result report 并给出 retry/inspect/fix-permission 建议"
    - "完成后重新 detect-state 并写入 command/output 结果"

content:
  preview_item:
    fields:
      - "path"
      - "action"
      - "reason"
      - "template_source"
      - "summary"

  user_stories:
    - id: "US-1"
      as_a: "空仓库用户"
      i_want: "确认前知道脚手架会创建哪些文件、哪些会跳过"
      so_that: "敢在真实仓库中初始化"
      acceptance: "preview 中每个文件都有 create/skip/conflict 状态"

  test_scenarios:
    - id: "TC-1"
      scenario: "空目录预览"
      given: "workspace 为空"
      when: "打开 scaffold drawer"
      then: "preview 列出将创建的 required files 和摘要"
      evaluation: "确认前 git status 无变化"
    - id: "TC-2"
      scenario: "部分文件已存在"
      given: "workspace 已有 Makefile"
      when: "生成 preview"
      then: "Makefile 标记 skip 或 conflict，不覆盖"
      evaluation: "确认后已有 Makefile 内容不变"
    - id: "TC-3"
      scenario: "写入失败恢复"
      given: "workspace 无写权限"
      when: "用户确认 scaffold"
      then: "显示失败文件、错误摘要和恢复建议"
      evaluation: "状态机不误报 ready"

  constraints:
    - id: "C1"
      name: "Preview before write"
      rule: "没有 preview 和用户确认不得写入磁盘"
      validation: "scaffold API 接收 confirmed_preview_id"
    - id: "C2"
      name: "No overwrite"
      rule: "已有文件默认 skip，冲突必须用户明确处理"
      validation: "重复运行 scaffold 不改变已有文件 hash"

acceptance_criteria:
  - id: "AC-1"
    given: "用户打开 scaffold preview"
    when: "workspace 为空"
    then: "UI 展示每个将创建文件的 path、action、summary"
  - id: "AC-2"
    given: "workspace 已有部分文件"
    when: "用户确认 scaffold"
    then: "已有文件不被覆盖，结果报告 skip 列表"
  - id: "AC-3"
    given: "scaffold 写入失败"
    when: "API 返回 error"
    then: "UI 展示恢复建议并重新 detect-state"

changelog:
  - version: "0.1"
    date: "2026-04-27"
    author: hermes
    changes:
      - "新增 scaffold preview 与失败恢复闭环规格"

dependencies:
  - file: specs/L5-slice/SLICE-scaffold-preview-endpoint.yaml
    reason: "backend GET /api/workspace/scaffold/preview endpoint（刚补充的 L5 slice）"
  - file: specs/L5-slice/SLICE-scaffold-preview-recovery-panel.yaml
    reason: UI panel，实现 preview drawer 和 recovery 展示
  - file: specs/L4-feature/FEAT-command-output-problems-panel.yaml
    reason: "dependency_order: scaffold 完成后写入 last_scaffold_result，供 Problems panel 展示"
