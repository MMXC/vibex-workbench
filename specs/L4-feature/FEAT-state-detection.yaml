---
spec:
  version: "0.1"
  level: "4_feature"
  name: "FEAT-state-detection"
  parent: "MOD-state-detection"
  status: "proposal"

meta:
  type: "feature"
  module: "generators"
  owner: "hermes"
  created: "2026-04-24"
  updated: "2026-04-24"

io_contract:
  input: |
    WORKSPACE_ROOT 路径（字符串）
  output: |
    JSON: {state: "empty"|"partial"|"ready", signals: [], suggestions: []}
  boundary: |
    只读探测，不做写操作，不做自动修复
  behavior:
    - "检查 WORKSPACE_ROOT/specs/ 是否存在"
    - "检查 WORKSPACE_ROOT/generators/gen.py 是否存在"
    - "检查 WORKSPACE_ROOT/Makefile 是否含 lint-specs"
    - "检查 WORKSPACE_ROOT/frontend/package.json 是否存在"
    - "综合判断状态"

content:
  behaviors:
    - id: "B1"
      trigger: "前端切换 WORKSPACE_ROOT 时自动调用"
      action: "GET /api/workspace/detect-state"
      expected_result: "返回 {state, signals, suggestions}"
      error_handling: "API 超时显示 '检测超时，请手动配置'"

  user_stories:
    - id: "US-1"
      as_a: "开发者"
      i_want: "打开工作台时能一眼看出项目当前状态"
      so_that: "知道下一步该做什么"
      acceptance: "空仓库显示引导文案，半成品显示缺什么，就绪显示可操作"

  test_scenarios:
    - id: "TC-1"
      scenario: "空目录"
      given: "/tmp/empty-dir 目录存在但内部为空"
      when: "GET /api/workspace/detect-state"
      then: "返回 {state: 'empty', suggestions: ['点击初始化脚手架']}"
      evaluation: "返回 state='empty'"
    - id: "TC-2"
      scenario: "有 specs 但无 gen.py"
      given: "目录有 specs/ 和 Makefile 但无 generators/gen.py"
      when: "GET /api/workspace/detect-state"
      then: "返回 {state: 'partial', suggestions: ['运行生成脚手架']}"
      evaluation: "返回 state='partial'"
    - id: "TC-3"
      scenario: "完整项目"
      given: "v-test 目录（所有文件齐全）"
      when: "GET /api/workspace/detect-state"
      then: "返回 {state: 'ready', suggestions: ['打开 spec 编辑器']}"
      evaluation: "返回 state='ready'"