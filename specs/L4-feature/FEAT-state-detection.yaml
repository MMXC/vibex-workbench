---
spec:
  version: "0.1"
  level: "4_feature"
  name: "FEAT-state-detection"
  parent: "MOD-state-detection"
  status: "proposal"

meta:
  type: "feature"
  module: "generators"
  owner: "hermes"
  created: "2026-04-24"
  updated: "2026-04-26"

io_contract:
  input: |
    WORKSPACE_ROOT 路径（字符串）
  output: |
    JSON: {state: "empty"|"partial"|"ready", signals: [], suggestions: []}
  boundary: |
    只读探测，不做写操作，不做自动修复

behavior:
  - "检查 WORKSPACE_ROOT/specs/ 是否存在"
  - "检查 WORKSPACE_ROOT/generators/gen.py 是否存在"
  - "检查 WORKSPACE_ROOT/Makefile 是否含 lint-specs"
  - "检查 WORKSPACE_ROOT/frontend/package.json 是否存在"
  - "综合判断状态"

content:
  behaviors:
    - id: "B1"
      trigger: "前端切换 WORKSPACE_ROOT 时自动调用"
      action: "GET /api/workspace/detect-state"
      expected_result: "返回 {state, signals, suggestions}"
      error_handling: "API 超时 5s 显示「检测超时，请手动配置」"
    - id: "B2"
      trigger: "探测返回 state === 'empty'"
      action: "StatusBar 显示橙色「空仓库」+ Problems tab 显示引导文案"
      expected_result: "用户看到「点击初始化脚手架」建议"
      error_handling: "无 signals 时默认 empty"
    - id: "B3"
      trigger: "探测返回 state === 'partial'"
      action: "StatusBar 显示黄色「半成品」+ Problems tab 列出缺什么"
      expected_result: "用户看到具体缺失项（如「generators/gen.py 缺失」）"
      error_handling: "无具体信号时显示「项目不完整」"
    - id: "B4"
      trigger: "探测返回 state === 'ready'"
      action: "StatusBar 显示绿色「就绪」+ 解锁 spec 列表读写和 make 按钮"
      expected_result: "Problems tab 显示绿色通过摘要"
      error_handling: "ready 但仍有错误信号时降级为 partial"

  user_stories:
    - id: "US-1"
      as_a: "开发者"
      i_want: "打开工作台时能一眼看出项目当前状态"
      so_that: "知道下一步该做什么"
      acceptance: "空仓库显示引导文案，半成品显示缺什么，就绪显示可操作"

  test_scenarios:
    - id: "TC-1"
      scenario: "空目录"
      given: "/tmp/empty-dir 目录存在但内部为空"
      when: "GET /api/workspace/detect-state"
      then: "返回 {state: 'empty', suggestions: ['点击初始化脚手架']}"
      evaluation: "返回 state='empty'"
    - id: "TC-2"
      scenario: "有 specs 但无 gen.py"
      given: "目录有 specs/ 和 Makefile 但无 generators/gen.py"
      when: "GET /api/workspace/detect-state"
      then: "返回 {state: 'partial', suggestions: ['运行生成脚手架']}"
      evaluation: "返回 state='partial'"
    - id: "TC-3"
      scenario: "完整项目"
      given: "v-test 目录（所有文件齐全）"
      when: "GET /api/workspace/detect-state"
      then: "返回 {state: 'ready', suggestions: ['打开 spec 编辑器']}"
      evaluation: "返回 state='ready'"
    - id: "TC-4"
      scenario: "检测超时"
      given: "backend 响应缓慢"
      when: "GET /api/workspace/detect-state 超时 5s"
      then: "返回默认值 {state: 'empty', suggestions: ['检测超时，请手动配置']}"
      evaluation: "不崩溃，UI 显示超时提示"

  constraints:
    - id: "C1"
      name: "只读探测"
      rule: "detect-state 只读目录，不写任何文件"
      validation: "调用前后目标目录内容一致"
    - id: "C2"
      name: "状态覆盖互斥"
      rule: "state 只能是 'empty' | 'partial' | 'ready' 三者之一"
      validation: "API 不会返回其他状态值"

changelog:
  - version: "0.1"
    date: "2026-04-24"
    author: "hermes"
    changes:
      - "初始版本"
  - version: "0.2"
    date: "2026-04-26"
    author: "hermes"
    changes:
      - "补全 B2/B3/B4；增加 TC2/TC3/TC4 和 C1/C2 约束"
