# FEAT-workspace-lifecycle

## 1. 概述与目标

实现 VibeX Workbench 的最小 MVP 能力闭环：**空仓库 → 状态探测 → 脚手架生成 → 规格读写 → 生成/校验**，不包含 spec 迁移、历史绑定表、多 workspace 并行。

目标用户场景：用户打开一个空文件夹，用 VibeX Workbench 从零开始描述需求，agent 落地成规格文件并生成可运行代码骨架。

---

