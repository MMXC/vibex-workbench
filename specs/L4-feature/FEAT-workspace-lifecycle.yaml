### 2.2 空/半/就绪三态探测

#### 检测信号（只读）

| 状态 | 条件 |
|------|------|
| `empty` | `specs/` 不存在 **且** `generators/gen.py` 不存在 |
| `half` | `specs/` 存在 **或** `generators/gen.py` 存在，但不同时满足 ready 条件 |
| `ready` | `specs/` 存在 **且** `generators/gen.py` 存在 **且** `Makefile` 存在且含 `lint-specs` target |

#### 实现：state_detector.py

**路径**：`generators/state_detector.py`

```python
"""检测 workspace 状态的只读工具。"""
import os
from pathlib import Path
from typing import Literal

def detect_state(workspace_root: str) -> Literal["empty", "half", "ready"]:
    root = Path(workspace_root)
    has_specs = (root / "specs").is_dir()
    has_gen = (root / "generators" / "gen.py").is_file()
    has_makefile = (root / "Makefile").is_file()

    if has_specs and has_gen and has_makefile:
        # 额外检查 Makefile 是否含 lint-specs
        try:
            content = (root / "Makefile").read_text()
            if "lint-specs" not in content:
                return "half"
        except Exception:
            return "half"
        return "ready"
    elif has_specs or has_gen:
        return "half"
    else:
        return "empty"
```

