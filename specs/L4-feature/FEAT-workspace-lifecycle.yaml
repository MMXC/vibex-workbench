## 4. 约束

- 不做自动修复，只报告状态
- scaffold 写入前**不**自动覆盖已有文件（`exist_ok=False` 或检查后跳过）
- scaffold 前需前端有显式确认（用户点"生成脚手架"按钮）
- run-make 有 120s 超时，超时返回 `{ "ok": false, "error": "timeout" }`
