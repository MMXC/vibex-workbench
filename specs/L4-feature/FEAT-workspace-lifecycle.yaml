### 2.6 菜单事件落地

**menu:open-project** → 前端调用 `window.runtime.OpenDirectoryDialog()` → 设置 workspaceRoot → 触发状态检测

**menu:run-generate** → 前端调用 `POST /api/workspace/run-make { target: "generate" }` → 显示结果

**menu:run-lint** → 前端调用 `POST /api/workspace/run-make { target: "lint-specs" }` → 显示结果

