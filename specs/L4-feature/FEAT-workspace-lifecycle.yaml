### 2.3 首次脚手架生成（写操作）

#### 实现：scaffolder.py

**路径**：`generators/scaffolder.py`

功能：在指定 workspace 根目录生成最小可跑骨架。

```python
"""在空/半空仓库生成最小可跑骨架。"""
import os
import shutil
from pathlib import Path
from typing import Literal

TEMPLATE_ROOT = Path(__file__).parent.parent / "spec-templates"

def scaffold(workspace_root: str, template_variant: str = "default") -> dict:
    """
    template_variant: "default" | "agent-assisted"
    生成产物：
      specs/
        L1-goal/ENTRY.yaml
      generators/
        gen.py
        validate_specs.py
      Makefile
      README.md
    返回 { "ok": true, "created": [...] }
    """
    root = Path(workspace_root)
    created = []

    # 创建目录
    for d in ["specs/L1-goal", "generators"]:
        p = root / d
        p.mkdir(parents=True, exist_ok=True)
        created.append(str(p.relative_to(root)))

    # 复制入口 L1 模板
    src_entry = TEMPLATE_ROOT / "L1-goal" / "entry.yaml"
    if src_entry.exists():
        dst = root / "specs" / "L1-goal" / "ENTRY.yaml"
        shutil.copy2(src_entry, dst)
        created.append(str(dst.relative_to(root)))

    # 生成 generators/gen.py（生成器入口桩）
    gen_py = root / "generators" / "gen.py"
    if not gen_py.exists():
        gen_py.write_text(GEN_PY_TEMPLATE)
        created.append("generators/gen.py")

    # 复制 validate_specs.py（如果存在）
    src_validate = TEMPLATE_ROOT.parent / "generators" / "validate_specs.py"
    if src_validate.exists():
        dst_validate = root / "generators" / "validate_specs.py"
        shutil.copy2(src_validate, dst_validate)

    # 生成 Makefile
    mk = root / "Makefile"
    if not mk.exists():
        mk.write_text(MAKEFILE_TEMPLATE)
        created.append("Makefile")

    # 生成 README.md
    readme = root / "README.md"
    if not readme.exists():
        readme.write_text(f"# {root.name}\n\nGenerated by VibeX Workbench.\n")
        created.append("README.md")

    return {"ok": true, "created": created}
```

#### Makefile 模板

```makefile
.PHONY: lint-specs generate validate help

help:
	@echo "VibeX Workbench — available targets:"
	@echo "  make lint-specs  — validate all specs"
	@echo "  make generate    — run spec-to-code generators"
	@echo "  make validate    — alias for lint-specs"

lint-specs:
	@echo "[lint-specs] Checking specs..."
	@cd generators && python3 validate_specs.py

generate:
	@echo "[generate] Running generators..."
	@cd generators && python3 gen.py

validate: lint-specs
```

#### 实现：Backend HTTP Handler

**路径**：`agent/cmd/web/workspace_handlers.go`

```go
