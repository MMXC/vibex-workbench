---
spec:
  version: "0.1"
  level: "4_feature"
  name: "FEAT-spec-graph-expansion"
  parent: "MOD-spec-editor"
  status: "proposal"

display:
  title: "Spec 图谱展开"
  summary: "展示 spec 父子关系，并把选中 spec 加入右侧 agent 上下文。"
  description: |
    中央图谱以 display.title/summary 渲染用户可理解的卡片。
    用户点击卡片后，spec 会进入右侧 Agent Workspace 的 Context 区域；
    Composer 输入 "/" 时展示当前层级允许的 slash command。

meta:
  type: "feature"
  module: "frontend"
  owner: "hermes"
  created: "2026-04-26"
  updated: "2026-04-26"

lifecycle:
  current: "proposal"
  updated: "2026-04-26"

structure:
  parent: MOD-spec-editor
  children: []
  dependencies: []
  impacted_files:
  - frontend/src/lib/components/workbench/SpecGraphViewer.svelte
  - frontend/src/lib/components/workbench/SpecAddChildCard.svelte
  - frontend/src/lib/components/workbench/SpecAgentClarification.svelte
  - frontend/src/lib/components/workbench/Composer.svelte
  - frontend/src/lib/stores/spec-agent-context-store.ts

io:
  input:
  - '用户在 SpecExplorer 中点击一个具体 spec 文件，

    或在中央 spec 图谱/Canvas 图谱中点击新增子 spec 的 + 卡片。'
  output:
  - '- 中央图形区展示当前 spec、父 spec、子 spec 的关联卡片

    - 卡片主体展示 display.title/display.summary，避免仅显示机器名

    - 点击 spec 卡片可将该 spec 添加到右侧 Agent Context

    - 右侧 Context 默认收起，仅显示已附加 spec 数量，展开后显示 chips

    - Composer 输入 "/" 时弹出当前层级允许的 slash command 列表

    - 根据当前 spec 层级展示允许新增的子 spec + 卡片

    - 点击 + 卡片后，右侧 agent 线程生成推荐草稿并进入澄清

    - 用户确认后写入 specs/ 并触发 make validate'
  boundary: '本 feature 只定义 spec 图谱查看、新增子 spec 入口、agent 澄清协作。

    不负责底层 LLM provider、完整 YAML 编辑器、真实代码生成或跨 workspace 迁移。

    Canvas 节点展开由 FEAT-canvas-expand 负责；新增子 spec 的层级规则、目标目录和确认写盘统一由本 feature 负责。'

constraints:
  rules:
  - id: C1
    name: Parent chain source of truth
    rule: 图谱边以 spec.parent 和 spec.name 为准，不从文件名猜父子关系
    validation: make validate 通过后，图谱关系与 validator index 一致
  - id: C2
    name: No implicit write
    rule: 点击 + 卡片只能创建澄清会话，不能直接写入 specs/
    validation: 未确认前 git status 不出现新增 spec 文件
  - id: C3
    name: Layer-safe child creation
    rule: 新增子 spec 的 target_dir 必须由当前层级映射决定
    validation: L3 只能新增 L4，L4 只能新增 L5，L5 不显示新增入口
  - id: C4
    name: Shared graph creation contract
    rule: Canvas 与 SpecViewer 都必须通过 create-child-spec intent 进入同一 agent 澄清流程
    validation: 不存在 Canvas 专属写盘路径或跨级 level 选择器
  - id: C5
    name: Human-readable card display
    rule: spec 卡片必须优先展示 display.title/display.summary，spec.name 仅作为机器标识
    validation: 缺少 display 字段时 UI fallback 可用，但 agent 修改 spec 时必须补齐中文摘要
  - id: C6
    name: Compact agent workspace
    rule: 右侧 Agent Workspace 只展示 Context、焦点摘要、命令输入与输出草稿
    validation: 命令列表仅在输入 / 时弹出，Context 默认收起
  forbidden: []

prototype:
  file: prototypes/spec-graph-expansion-prototype.html
  validates: []
  status: draft

io_contract:
  input: |
    用户在 SpecExplorer 中点击一个具体 spec 文件，
    或在中央 spec 图谱/Canvas 图谱中点击新增子 spec 的 + 卡片。
  output: |
    - 中央图形区展示当前 spec、父 spec、子 spec 的关联卡片
    - 卡片主体展示 display.title/display.summary，避免仅显示机器名
    - 点击 spec 卡片可将该 spec 添加到右侧 Agent Context
    - 右侧 Context 默认收起，仅显示已附加 spec 数量，展开后显示 chips
    - Composer 输入 "/" 时弹出当前层级允许的 slash command 列表
    - 根据当前 spec 层级展示允许新增的子 spec + 卡片
    - 点击 + 卡片后，右侧 agent 线程生成推荐草稿并进入澄清
    - 用户确认后写入 specs/ 并触发 make validate
  boundary: |
    本 feature 只定义 spec 图谱查看、新增子 spec 入口、agent 澄清协作。
    不负责底层 LLM provider、完整 YAML 编辑器、真实代码生成或跨 workspace 迁移。
    Canvas 节点展开由 FEAT-canvas-expand 负责；新增子 spec 的层级规则、目标目录和确认写盘统一由本 feature 负责。
  behavior:
    - "选中 spec 后读取当前 spec metadata 和 parent chain"
    - "中央图谱展示 parent/current/children/sibling context"
    - "中央卡片优先展示 display.title/display.summary；缺失时由 agent 在下次修改 spec 时补齐"
    - "点击 spec 卡片或元信息按钮时，将 spec 作为 Context chip 添加到右侧 Composer 上方"
    - "Context 区默认收起，避免占用 agent 输出区域；展开时显示 spec chips 并支持移除"
    - "Composer 输入 / 后按当前焦点 spec 层级过滤命令，并选择默认描述模板"
    - "按照 L1->L2->L3->L4->L5 的层级约束显示 + 子 spec 卡片"
    - "+ 卡片点击后把 parent spec、目标层级、相邻 specs 作为上下文发送给 agent 线程"
    - "agent 推荐草稿必须先在对话中澄清，不直接写盘"
    - "用户显式确认后调用 specs/write 并运行 make validate"

content:
  behaviors:
    - id: "B1"
      trigger: "用户点击左侧某个 spec 文件"
      action: "加载 spec 内容和索引关系，构建 parent/current/children 图谱"
      expected_result: "中央区显示当前 spec 卡片、父卡片、子卡片和可新增子 spec 的 + 卡片"
      error_handling: "读取失败时展示错误卡片，不清空 selectedSpecPath"
    - id: "B2"
      trigger: "用户点击 + 子 spec 卡片"
      action: "根据当前层级推断目标子层级，并打开右侧 agent 澄清线程"
      expected_result: "线程中出现推荐创建的 spec 草稿、待澄清问题和确认动作"
      error_handling: "当前层级不允许新增子 spec 时禁用 + 卡片并说明原因"
    - id: "B3"
      trigger: "用户在 agent 线程中确认草稿"
      action: "写入目标 specs/Lx-* 路径，并运行 make validate"
      expected_result: "新 spec 出现在图谱中，验证通过则卡片变为 proposal/ready 状态"
      error_handling: "验证失败时保留草稿，Problems/线程中显示失败分类"
    - id: "B4"
      trigger: "用户点击任意 spec 卡片或点击添加到 Context"
      action: "将 spec 的 path/name/level/display 摘要加入 Agent Workspace Context"
      expected_result: "右侧 Composer 上方默认只显示 Context 数量，展开后展示可移除 chip"
      error_handling: "重复添加同一 spec 时更新焦点而不是重复插入"
    - id: "B5"
      trigger: "用户在 Composer 输入 /"
      action: "展示当前焦点 spec 层级允许的 slash command 下拉"
      expected_result: "选择命令后填入默认描述，用户可编辑后发送"
      error_handling: "无上下文或层级未知时仅展示 analyse/validate 等安全命令"

  level_rules:
    - current_level: "L1"
      allowed_child_level: "L2"
      target_dir: "specs/L2-skeleton/"
    - current_level: "L2"
      allowed_child_level: "L3"
      target_dir: "specs/L3-module/"
    - current_level: "L3"
      allowed_child_level: "L4"
      target_dir: "specs/L4-feature/"
    - current_level: "L4"
      allowed_child_level: "L5"
      target_dir: "specs/L5-slice/"
    - current_level: "L5"
      allowed_child_level: null
      target_dir: null

  integration_contract:
    prototype:
      file: "prototypes/spec-graph-expansion-prototype.html"
      rule: |
        该 HTML 原型是本 feature 的交互蓝本。实现应保持：
        - Context 默认收起，仅显示 spec 数
        - 输入 "/" 后显示命令下拉，而不是常驻命令网格
        - 右侧面板保持简洁，避免无关说明挤占 agent 输出区域
    canvas_expand:
      producer: "FEAT-canvas-expand"
      intent_name: "create-child-spec"
      payload_required:
        - "parent_name"
        - "parent_path"
        - "target_level"
        - "target_dir"
        - "existing_children"
      rule: |
        Canvas 只能根据本 feature 的 level_rules 发出唯一合法下一层 intent。
        Canvas 不维护独立的跨级 level 选择器，也不直接写入 specs/。
    spec_viewer:
      producer: "SpecGraphViewer"
      intent_name: "create-child-spec"
      payload_required:
        - "parent_name"
        - "parent_path"
        - "target_level"
        - "target_dir"
        - "existing_children"
      rule: |
        SpecViewer 图谱与 Canvas 图谱使用同一个 intent 形状，
        让右侧 agent 澄清线程可以复用同一套草稿、确认、写盘和 validate 反馈流程。

  user_stories:
    - id: "US-1"
      as_a: "产品/工程共同评审者"
      i_want: "点击任意 spec 后看到它与父子 spec 的关系"
      so_that: "可以判断当前工作处在目标、模块、功能还是文件实现层"
      acceptance: "当前 spec、父 spec、子 spec 至少以三类卡片区分展示"
    - id: "US-2"
      as_a: "自举工作流使用者"
      i_want: "从图谱上的 + 卡片开始新增下一层 spec"
      so_that: "新增 spec 的层级、parent 和目录不会靠人工记忆"
      acceptance: "+ 卡片只展示合法下一层，并在确认前进入 agent 澄清线程"

  test_scenarios:
    - id: "TC-1"
      scenario: "选中 L3 模块 spec"
      given: "存在 MOD-spec-editor，其 parent 为 vibex-workbench-skeleton"
      when: "用户点击 MOD-spec-editor"
      then: "图谱展示 L2 parent、L3 current、L4 children，并显示 + L4 卡片"
      evaluation: "+ 卡片目标目录为 specs/L4-feature/"
    - id: "TC-2"
      scenario: "点击 + L5 子 spec"
      given: "当前选中 FEAT-spec-graph-expansion"
      when: "用户点击 + L5 卡片"
      then: "右侧 agent 线程收到 parent=FEAT-spec-graph-expansion 和 target_level=L5"
      evaluation: "agent 草稿不会在用户确认前写入文件"
    - id: "TC-3"
      scenario: "L5 不允许继续新增子 spec"
      given: "当前选中某个 L5 slice"
      when: "用户查看图谱"
      then: "不显示可点击新增子 spec 的 + 卡片"
      evaluation: "界面提示 L5 是文件级实现边界"

  constraints:
    - id: "C1"
      name: "Parent chain source of truth"
      rule: "图谱边以 spec.parent 和 spec.name 为准，不从文件名猜父子关系"
      validation: "make validate 通过后，图谱关系与 validator index 一致"
    - id: "C2"
      name: "No implicit write"
      rule: "点击 + 卡片只能创建澄清会话，不能直接写入 specs/"
      validation: "未确认前 git status 不出现新增 spec 文件"
    - id: "C3"
      name: "Layer-safe child creation"
      rule: "新增子 spec 的 target_dir 必须由当前层级映射决定"
      validation: "L3 只能新增 L4，L4 只能新增 L5，L5 不显示新增入口"
    - id: "C4"
      name: "Shared graph creation contract"
      rule: "Canvas 与 SpecViewer 都必须通过 create-child-spec intent 进入同一 agent 澄清流程"
      validation: "不存在 Canvas 专属写盘路径或跨级 level 选择器"
    - id: "C5"
      name: "Human-readable card display"
      rule: "spec 卡片必须优先展示 display.title/display.summary，spec.name 仅作为机器标识"
      validation: "缺少 display 字段时 UI fallback 可用，但 agent 修改 spec 时必须补齐中文摘要"
    - id: "C6"
      name: "Compact agent workspace"
      rule: "右侧 Agent Workspace 只展示 Context、焦点摘要、命令输入与输出草稿"
      validation: "命令列表仅在输入 / 时弹出，Context 默认收起"

  l4_l5_lineage:
    summary: "该 feature 由图谱展示、+ 子 spec 入口、agent 澄清线程三个 slice 落地。"
    which_files:
      - file: "frontend/src/lib/components/workbench/SpecGraphViewer.svelte"
        generated_from: "B1"
      - file: "frontend/src/lib/components/workbench/SpecAddChildCard.svelte"
        generated_from: "B2"
      - file: "frontend/src/lib/components/workbench/SpecAgentClarification.svelte"
        generated_from: "B2-B3"
      - file: "frontend/src/lib/components/workbench/Composer.svelte"
        generated_from: "B4-B5"
      - file: "frontend/src/lib/stores/spec-agent-context-store.ts"
        generated_from: "B4-B5"
    generation_order:
      - "SpecGraphViewer"
      - "SpecAddChildCard"
      - "SpecAgentClarification"

changelog:
  - version: "0.1"
    date: "2026-04-26"
    author: "hermes"
    changes:
      - "新增 spec 图谱父子卡片与 + 子 spec agent 澄清交互"
