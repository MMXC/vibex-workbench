# ============================================================
# Level 3 — Workbench Shell 模块规格
# parent: vibex-workbench-skeleton (L2)
# ============================================================

spec:
  version: "2.1"
  level: "3_module"
  name: "MOD-workbench-shell"
  parent: "vibex-workbench-skeleton"
  status: "active"

meta:
  updated: "2026-04-22"
  pilot_m0_layer_contract: true

content:
  module_id: "MOD-workbench-shell"
  responsibility: "工作台外壳——对话面板 + Canvas 行为展示 + 三栏布局"

  # ── M0：愿景承接（L1→L3），与 specs/meta/spec-layer-contract.yaml 对齐 ──
  vision_traceability:
    summary: "本 MOD 如何把 L1 的体验面与行为展示落成可实施边界"
    l1:
      goal_path: "specs/project-goal/vibex-workbench-goal.yaml"
      constraint_ids: ["C6"]
      goal_sections_hint:
        - "content.product_value_layers.experience_visualization"
        - "content.constraints（与用户可见工作台面相关的条目）"
    l2:
      skeleton_path: "specs/architecture/vibex-workbench-skeleton.yaml"
      anchors_hint:
        - "content.modules 中 MOD-workbench-shell（职责与 tech）"
        - "content.integration_contracts 中与工作台/SSE 展示相关的边（若有）"
    boundaries:
      not_here:
        - "spec 解析校验（MOD-spec-engine）"
        - "路由决策闭环（MOD-router）"
        - "代码生成管线实现（MOD-code-generator）"

  io_contract:
    input: "用户对话输入（自然语言）+ SSE 事件流"
    output: "conversation_store 状态 + canvas_store 节点渲染"
    boundary: |
      只做 UI 布局和状态管理，不做：
      - spec 逻辑（spec-engine 负责）
      - 路由决策（router 负责）
      - 代码生成（code-generator 负责）
    behavior: |
      1. 接收用户输入 → conversation_store
      2. conversation_store 通过 Event Bus 广播 SSE 事件
      3. canvas_store 订阅事件 → 渲染节点序列图（只读）
      4. 点击旧对话 → 重放该 thread 的 SSE 事件流

    changelog:
      - version: "2.1"
        date: "2026-04-22"
        author: "hermes"
        changes:
          - "新增 content.vision_traceability（M0 层级契约 pilot）"
          - "修正 changelog YAML 嵌套错误"
      - version: "2.0"
        date: "2026-04-20"
        author: "hermes"
        changes:
          - "新增 io_contract 字段"
          - "拆分 canvasStore（从 uiStore 独立）+ ConversationPanel"
          - "新增 Event Bus 广播模式（松耦合方案）"
          - "新增 stores 定义（conversationStore + canvasStore）"


  public_api:
    - name: "WorkbenchLayout"
      description: "根布局组件（三栏）"
    - name: "ConversationPanel"
      description: "对话面板——多线程对话 + 路由状态"
    - name: "CanvasBehavior"
      description: "Canvas 行为展示——SSE 节点序列图（只读）"
    - name: "StatusBar"
      description: "底部状态栏"

  stores:
    - name: "conversationStore"
      description: "对话状态管理"
      state:
        - threads: "ConversationThread[]"
        - activeThreadId: "string | null"
        - currentRoute: "'goal' | 'feature' | 'bug' | null"
        - pendingClarifications: "Clarification[]"
    - name: "canvasStore"
      description: "Canvas 节点状态管理（只读订阅者）"
      state:
        - nodes: "CanvasNode[]"
        - activeThreadId: "string | null"
        - nodeTypeColors: "Record<CanvasNodeType, string>"

