      description: "画布节点图渲染（Phase 2）"
    - name: "SpecGraphView"
      description: "从属图主视图组件"

  data_ownership:
    - entity: "SpecNode"
      owned_by: "dsl-visualizer"
      storage: "memory (runtime)"
    - entity: "SpecEdge"
      owned_by: "dsl-visualizer"
      storage: "memory (runtime)"

derived_from:
