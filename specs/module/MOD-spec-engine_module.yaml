# ============================================================
# Level 3 — Spec Engine 模块规格
# Module Specification
#
# parent: vibex-workbench-skeleton (L2)
# ============================================================

spec:
  version: "2.1"
  level: "3_module"
  name: "MOD-spec-engine"
  parent: "vibex-workbench-skeleton"
  status: "active"

meta:
  updated: "2026-04-22"
  pilot_m0_layer_contract: true

content:
  module_id: "MOD-spec-engine"
  responsibility: "Spec 解析、验证、从属链构建——工作台的核心引擎"

  # ── M0：愿景承接（L1→L3），与 specs/meta/spec-layer-contract.yaml 对齐 ──
  vision_traceability:
    summary: "本 MOD 如何把 L1 的从属链与分层门禁语义落成可执行的解析、校验与图构建边界"
    l1:
      goal_path: "specs/project-goal/vibex-workbench-goal.yaml"
      constraint_ids: ["C3", "C7"]
      goal_sections_hint:
        - "content.constraints（C3 从属链完整、C7 分层门禁与 todo 派生）"
        - "content.product_value_layers.kernel_governance_and_agent（maps_to_constraints 含 C1/C3/C7）"
        - "content.spec_workflow_units（minimal_unit test vs aggregate_gate validate）"
    l2:
      skeleton_path: "specs/architecture/vibex-workbench-skeleton.yaml"
      anchors_hint:
        - "content.modules 中 MOD-spec-engine（职责与 tech）"
        - "content.integration_contracts / traceability 中与 spec 解析、validate、依赖图相关条目"
    boundaries:
      not_here:
        - "DSL 图形与 Canvas 序列渲染（MOD-dsl-visualizer）"
        - "工作台壳层与会话 UI（MOD-workbench-shell）"
        - "变更路由闭环（MOD-router）"
        - "代码生成管线（MOD-code-generator）"

  io_contract:
    input: "YAML spec 文件路径或内容字符串"
    output: "SpecAST + Violation[] + DependencyGraph + parent-chain 验证结果"
    boundary: |
      只做 spec 的解析/验证/图构建，不做：
      - UI 展示（dsl-visualizer 负责）
      - 代码生成（code-generator 负责）
      - 路由决策（router 负责）
    behavior: |
      1. 读取 YAML 文件 → parseYAML() → SpecAST
      2. 遍历所有 SpecAST → 构建 parent-chain
      3. 验证每个 spec.parent 是否指向存在的 spec → Violation[]
      4. 构建 DependencyGraph（用于 Mermaid + Canvas）
      5. 提供全文搜索和按层过滤

    changelog:
      - version: "2.1"
        date: "2026-04-22"
        author: "hermes"
        changes:
          - "新增 content.vision_traceability（M0 层级契约推广：MOD-spec-engine）"
          - "修正 io_contract.changelog YAML 嵌套错误"
      - version: "2.0"
        date: "2026-04-20"
        author: "hermes"
        changes:
          - "新增 io_contract 字段（input/output/boundary/behavior/changelog）"
          - "DependencyGraphBuilder 新增 toCanvasNodes() 方法（支持 Canvas 可视化）"


  public_api:
    - name: "SpecParser"
      description: "解析 YAML spec 文件，构建 AST"
      methods:
        - "parseFile(path: string): SpecAST"
        - "parseDir(dir: string): SpecAST[]"
        - "parseContent(content: string): SpecAST"
    - name: "ParentChainValidator"
      description: "验证每个 spec 的 parent 字段是否指向存在的规格"
      methods:
        - "validate(spec: SpecAST): ValidationResult"
        - "getViolations(): Violation[]"
    - name: "DependencyGraphBuilder"
      description: "构建从属关系图（Mermaid 输入 + Canvas 可视化）"
      methods:
        - "buildGraph(specs: SpecAST[]): DependencyGraph"
        - "toMermaid(graph: DependencyGraph): string"
        - "toCanvasNodes(events: SSEEvent[]): CanvasNode[]"
    - name: "SpecSearchEngine"
      description: "全文搜索 specs 内容"
      methods:
        - "search(query: string): SearchResult[]"
        - "searchByLevel(level: number): SearchResult[]"

  data_ownership:
    - entity: "SpecFile"
      owned_by: "spec-engine"
      storage: "Dexie.js (IndexedDB)"
    - entity: "SpecAST"
      owned_by: "spec-engine"
      storage: "memory (runtime)"
    - entity: "DependencyGraph"
      owned_by: "spec-engine"
      storage: "memory (runtime)"

