# ── IO 契约 ──────────────────────────────────────────────────
io_contract:
  input: |
    Tauri 应用启动信号（用户双击 .exe / .app）
    + 所需环境：Rust toolchain + Go toolchain + npm
    + 已有：Go backend binary（或源码路径）、SvelteKit 前端构建产物
  output: |
    打开的 Tauri 窗口（WebView 加载 SvelteKit）
    + Go backend 子进程运行中
    + IPC 命令可用：open_directory_picker / spawn_go_backend / run_make / get_workspace_root
  boundary: |
    本模块管理进程生命周期和窗口，不处理 SvelteKit 路由和 Go backend 业务逻辑。
    Go backend 崩溃时 Tauri 窗口保持可见，WebView 优雅降级。
  behavior: |
    1. main() → run_tauri_app()
    2. Tauri builder 注册所有 IPC commands
    3. on_window_ready → 自动调用 spawn_go_backend()
    4. 用户触发目录选择 → invoke("open_directory_picker") → 返回路径
    5. 用户关闭窗口 → on_window_close → kill Go PID

# ── 模块内容 ────────────────────────────────────────────────
content:
  public_api:
    # Rust IPC 命令（前端通过 @tauri-apps/api invoke 调用）
    - command: "open_directory_picker"
      signature: "fn open_directory_picker() -> Result<Option<String>, String>"
      description: "打开系统原生目录选择器对话框，用户确认后返回绝对路径，取消返回 None"
      example: |
        // SvelteKit 前端调用
        import { invoke } from '@tauri-apps/api/core';
        const path = await invoke<string | null>('open_directory_picker');

    - command: "get_workspace_root"
      signature: "fn get_workspace_root() -> Result<String, String>"
      description: "返回当前工作区根路径（首次调用返回 None，须先选目录）"
      example: "const root = await invoke<string>('get_workspace_root');"

    - command: "spawn_go_backend"
      signature: "fn spawn_go_backend() -> Result<BackendHandle, String>"
      description: "启动 Go backend 子进程，记录 PID 和端口，返回 Handle 供后续清理"
      example: |
        // 返回 { pid: number, port: number }
        const handle = await invoke<{pid: number, port: number}>('spawn_go_backend');

    - command: "run_make"
      signature: "fn run_make(target: String, workspace: String) -> Result<MakeResult, String>"
      description: "在指定 workspace 执行 make target，通过 Go backend 或直接 Command"
      returns: "{ ok: bool, output: String }"
      example: |
        const result = await invoke<{ok: boolean, output: string}>('run_make', {
          target: 'lint-specs',
          workspace: '/path/to/project'
        });

    - command: "kill_go_backend"
      signature: "fn kill_go_backend() -> Result<(), String>"
      description: "强制终止 Go backend 子进程（窗口关闭或用户手动触发）"
      example: "await invoke('kill_go_backend');"

  state_definitions:
    - state: "AppState::Initializing"
      description: "Tauri 应用刚启动，Go backend 尚未启动"
      allowed_transitions:
        - from: "Initializing"
          to: "BackendReady"
          trigger: "spawn_go_backend() 成功"
        - from: "Initializing"
          to: "BackendFailed"
          trigger: "spawn_go_backend() 失败（Go binary 不存在）"

    - state: "AppState::BackendReady"
      description: "Go backend 子进程运行中，WebView 已加载"
      allowed_transitions:
        - from: "BackendReady"
          to: "DirectorySelected"
          trigger: "用户选择了工作区目录"
        - from: "BackendReady"
          to: "ShuttingDown"
          trigger: "窗口关闭信号"

    - state: "AppState::DirectorySelected"
      description: "工作区目录已选定，/workspace 链路完整，可进入 /workbench"
      allowed_transitions:
        - from: "DirectorySelected"
          to: "ShuttingDown"
          trigger: "窗口关闭"

    - state: "AppState::BackendFailed"
      description: "Go backend 启动失败（binary 不存在或端口冲突），WebView 降级显示错误"
      allowed_transitions:
        - from: "BackendFailed"
          to: "ShuttingDown"
          trigger: "用户关闭应用"

    - state: "AppState::ShuttingDown"
      description: "正在关闭，清理子进程"
      allowed_transitions: []

  internal_structure: |
    src-tauri/
    ├── src/
    │   ├── main.rs              # Tauri builder 入口，注册 commands
    │   ├── commands.rs          # 所有 Tauri IPC command 实现
    │   ├── backend.rs           # Go 子进程管理（spawn / kill / port）
    │   ├── state.rs             # AppState 状态机定义
    │   └── lib.rs               # library crate 入口（供 main.rs 调用）
    ├── Cargo.toml
    ├── tauri.conf.json          # Tauri 配置（窗口大小、devtools、权限）
    └── icons/                   # 应用图标（可选）

  dependencies:
    - name: "@tauri-apps/api"
      type: "frontend"
      purpose: "SvelteKit 前端调用 Rust IPC 命令"
    - name: "tauri-plugin-shell"
      type: "tauri-runtime"
      purpose: "子进程管理（推荐用 Rust std::process::Command 替代，本字段仅供参考）"
    - name: "tauri-plugin-dialog"
      type: "tauri-runtime"
      purpose: "原生文件/目录选择器（直接用 Rust crate dialog 也可）"
    - name: "tauri-plugin-process"
      type: "tauri-runtime"
      purpose: "窗口关闭时自动清理子进程"
    - name: "serde / serde_json"
      type: "rust-stdlib"
      purpose: "Rust ↔ JSON 序列化（invoke 返回值）"
    - name: "portpicker"
      type: "rust-crate"
      purpose: "Go backend 端口分配（:33338）"

  l3_l4_lineage:
    summary: "L3 定义 Rust IPC 命令接口和子进程管理；L4 展开具体实现细节（如错误处理、日志、dev/prod 区分）"
    which_features:
      - feature: "tauri-app-entry"
        uses_api:
          - "main.rs — Tauri builder"
          - "commands.rs — 所有 public_api"
      - feature: "go-backend-process"
        uses_api:
          - "backend.rs — spawn_go_backend / kill_go_backend"
          - "AppState 状态机"
      - feature: "native-directory-picker"
        uses_api:
          - "commands.rs — open_directory_picker"
          - "Tauri dialog API"

  error_handling:
    go_binary_not_found: |
      Go backend binary 路径未找到 → 降级到 BackendFailed 状态，
      前端 /workspace 显示错误提示"请确保 Go 环境已安装"
    go_port_conflict: |
      指定端口被占用 → 换随机可用端口（portpicker），通过 args 通知 Go backend
    window_close_cleanup: |
      窗口关闭信号 → AppState::ShuttingDown → kill_go_backend() → 等待进程退出（timeout 5s）
    go_backend_crash: |
      Go backend 子进程意外退出 → 前端 SSE 连接断开 → 显示重连按钮
      （不自动重启，避免无限循环）

