# ============================================================
# Level 3 — Change Router 模块规格
# parent: vibex-workbench-skeleton (L2)
# ============================================================

spec:
  version: "2.0"
  level: "3_module"
  name: "MOD-router"
  parent: "vibex-workbench-skeleton"
  status: "active"

content:
  module_id: "MOD-router"
  responsibility: "变更路由——三条路由路径（goal/feature/bug）+ 歧义消除循环 + 规范对话行为"

  io_contract:
    input: "用户的自然语言需求描述"
    output: "路由决策（goal|feature|bug）+ 对应澄清循环状态 + 目标 spec"
    boundary: |
      只做路由判断和澄清循环，不做：
      - spec 编写（spec-engine 负责）
      - 原型生成（spec-designer 负责）
      - 代码生成（code-generator 负责）
      - 界面展示（dsl-visualizer 负责）
    behavior: |
      1. 接收用户输入 → 关键词分析
      2. 判断路由类型：
         - 全新方向 → goal 路由
         - 现有功能修改 → feature 路由
         - 问题报告 → bug 路由
      3. 进入对应澄清循环：
         - goal: 风格/方向/范围确认
         - feature: 功能细节/边界/数据确认
         - bug: 复现步骤/根因/影响确认
      4. 循环终止 → 发送 route.to_spec / route.to_goal 事件
      5. Canvas 展示整条澄清链路（iteration 节点）

    changelog:
      changelog:
      - version: "2.0"
      date: "2026-04-20"
      author: "hermes"
      changes:
      - "新增 io_contract 字段"
      - "从「变更路由」升级为「三条路由路径 + 澄清循环」"
      - "新增 public_api：GoalClarificationLoop / FeatureClarificationLoop / BugClarificationLoop"
      - "新增 sse_events_produced（明确对外输出的 SSE 事件）"
      - "新增 behavior 描述（路由判断→澄清循环→事件发射）"


  public_api:
    - name: "ChangeRouter"
      description: "变更路由引擎——入口路由判断"
      methods:
        - "route(utterance: string): RouteDecision"
        - "startClarification(route: RouteDecision): ClarificationSession"
    - name: "GoalClarificationLoop"
      description: "goal 路由的澄清循环"
      methods:
        - "ask(question: string): Clarification"
        - "receiveAnswer(answer: string): Clarification"
        - "isResolved(): boolean"
        - "getConfirmedDirection(): GoalDirection"
    - name: "FeatureClarificationLoop"
      description: "feature 路由的澄清循环"
      methods:
        - "ask(question: string): Clarification"
        - "receiveAnswer(answer: string): Clarification"
        - "isResolved(): boolean"
        - "getConfirmedSpec(): FeatureSpecDelta"
    - name: "BugClarificationLoop"
      description: "bug 路由的澄清循环"
      methods:
        - "ask(question: string): Clarification"
        - "receiveAnswer(answer: string): Clarification"
        - "isResolved(): boolean"
        - "getBugReport(): BugReport"
    - name: "SpecLevelMapper"
      description: "将变更映射到 spec 层"
      methods:
        - "mapToSpecLayer(route: RouteDecision, context: SpecContext[]): SpecTarget[]"
    - name: "ImpactAnalyzer"
      description: "分析变更影响范围"
      methods:
        - "analyzeImpact(specId: string): ImpactReport"

  sse_events_produced:
    - event: "route.determined"
      payload: "{ threadId: string, route: 'goal' | 'feature' | 'bug' }"
    - event: "dialog.clarification"
      payload: "{ threadId: string, question: string, type: 'ask' | 'suggest' }"
    - event: "route.to_goal"
      payload: "{ threadId: string, goalDescription: string, specId: string }"
    - event: "route.to_spec"
      payload: "{ threadId: string, specId: string, changeType: 'feature' | 'bug' }"
    - event: "spec.confirmed"
      payload: "{ threadId: string, specId: string }"

