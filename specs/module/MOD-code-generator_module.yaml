# ============================================================
# Level 3 — Code Generator 模块规格
# parent: vibex-workbench-skeleton (L2)
# ============================================================

spec:
  version: "2.1"
  level: "3_module"
  name: "MOD-code-generator"
  parent: "vibex-workbench-skeleton"
  status: "active"

meta:
  updated: "2026-04-22"
  pilot_m0_layer_contract: true

content:
  module_id: "MOD-code-generator"
  responsibility: "代码生成可视化——make generate 的交互界面 + SSE 流驱动"

  # ── M0：愿景承接（L1→L3），与 specs/meta/spec-layer-contract.yaml 对齐 ──
  vision_traceability:
    summary: "本 MOD 如何把 L1 的自举证明（C4）与「规格驱动生成」落成 generate 管线与 SSE 进度边界"
    l1:
      goal_path: "specs/project-goal/vibex-workbench-goal.yaml"
      constraint_ids: ["C3", "C4", "C7"]
      goal_sections_hint:
        - "content.constraints（C4 自举验证；C3 从属链；C7 分层门禁）"
        - "content.vision_execution.self_bootstrap_proof"
        - "content.product_value_layers.proof_self_bootstrap（maps_to_constraints C4）"
    l2:
      skeleton_path: "specs/architecture/vibex-workbench-skeleton.yaml"
      anchors_hint:
        - "content.modules 中 MOD-code-generator（职责与 tech）"
        - "level_mapping / integration_contracts 中与 make generate、自举阶段策略相关条目"
    boundaries:
      not_here:
        - "spec 校验逻辑本体（MOD-spec-engine；本模块消费已通过 lint 的输入）"
        - "可视化主画布语义（MOD-dsl-visualizer）"
        - "变更路由（MOD-router）"

  io_contract:
    input: "specs/*.yaml（已通过 lint-specs 验证）"
    output: "生成的组件代码 + FileDiff[] + SSE 进度事件流"
    boundary: |
      只做代码生成和预览展示，不做：
      - spec 逻辑（spec-engine 负责）
      - 业务代码编写（开发者负责）
      - 路由决策（router 负责）
    behavior: |
      1. 接收 generation.triggered 事件
      2. 触发 make generate → 捕获 stdout/stderr
      3. 每步完成 → 发送 generation.step SSE 事件
      4. 完成后 → 计算 Diff → 发送 generation.completed
      5. 失败 → 发送 generation.failed + 具体错误

    changelog:
      - version: "2.1"
        date: "2026-04-22"
        author: "hermes"
        changes:
          - "新增 content.vision_traceability（M0 层级契约推广：MOD-code-generator）"
          - "修正 io_contract.changelog YAML 嵌套错误"
      - version: "2.0"
        date: "2026-04-20"
        author: "hermes"
        changes:
          - "新增 io_contract 字段"
          - "新增 sse_events_produced（明确对外输出的 SSE 事件）"
          - "stores 新增 diffs 字段（diff 对比结果）"
          - "GeneratorService.runGenerate() 改为 Observable 模式（SSE 流驱动）"


  public_api:
    - name: "GeneratorService"
      description: "主生成服务"
      methods:
        - "runGenerate(): Observable<GenerationEvent>"
        - "getDiff(specId: string): FileDiff[]"
    - name: "GenerationTimeline"
      description: "生成时间线组件——SSE 驱动"
    - name: "DiffViewer"
      description: "文件 diff 预览组件"

  stores:
    - name: "codeGenStore"
      description: "代码生成状态管理"
      state:
        - currentJob: "GenerationJob | null"
        - stepLogs: "StepLog[]"
        - isRunning: "boolean"
        - diffs: "FileDiff[]"

  sse_events_produced:
    - event: "generation.started"
      payload: "{ total: number }"
    - event: "generation.step"
      payload: "{ step: number, name: string, status: 'running' | 'done' | 'error' }"
    - event: "generation.completed"
      payload: "{ duration_ms: number, files_changed: number }"
    - event: "generation.failed"
      payload: "{ error: string }"

