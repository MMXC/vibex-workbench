content:
  # ── 产品定位 ─────────────────────────────────────────
  mission: |
    VibeX Workbench 是一套全产品自动化的 Spec 治理工作台。
    所有对话遵循统一范式：输入 → 行为过程（迭代/测试/修复）→ 输出 → 行为展示。
    工作台通过 Canvas 可视化每轮对话的状态变化（SSE 流事件序列），
    让用户直观看到从需求到交付的全链路。
    自举闭环是验证手段——工作台由自身 specs 驱动，生成自身代码——
    确保规格体系的完整性和可验证性。
    愿景延伸：任意新旧项目均可建立全景 spec；对话始终优先对齐 spec 变更（spec 先行），
    TDD 基于 spec 的 IO 契约施加约束，以保证生成与交付的稳定与可回归。
    落地顺序：先在当前仓库 vibex-workbench 完整证明（含自举），再抽象为可迁移到其他仓库的范式与工具链。

  # ── 愿景落地与自举证明（本仓库优先）──────────────────────
  vision_execution:
    summary: "全景 spec + spec 先行 + TDD 约束 + 稳定生成；以本仓库为第一战场，自举通过作为体系有效的主证明"
    repository_first: |
      vibex-workbench 是本愿景的第一落地载体：从属链、生成器、工作台 UI、Agent 集成均优先在此仓库闭环。
      未在本仓库通过「编辑 specs → 校验 → 生成 → 可运行」之前，不对外宣称「任意仓库即插即用」。
    self_bootstrap_proof: |
      自举不仅是「能生成」，更是证明：规格语言足以描述工作台自身、生成管线可信、约束（lint/validate/drift）可执行。
      最小验收（持续强化）：在本仓库内维护 specs → make lint-specs / validate / generate 绿 → 前端与约定流程可演示。
      milestone M7（自举闭环验证）视为该证明的正式收官门槛；未完成则愿景仍属「进行中」。
    outward_scale: |
      其他新旧项目：在共享同一套 spec 层级与工具链的前提下，通过 WORKSPACE_DIR / 模板与 Agent 技能渐进接入；
      不作为首阶段阻塞项。

  # ── L1 与 L2 的衔接（把项目讲清后，由谁落成「可实施架构」）────
  l1_l2_lineage:
    summary: |
      L1 负责把产品、约束、成功标准与价值边界写清；L2 负责把同一套意图落成
      技术栈、模块切分、集成方式与生成/自举策略，不重复写长文产品故事。
    l2_spec:
      path: "specs/architecture/vibex-workbench-skeleton.yaml"
      name: "vibex-workbench-skeleton"
    what_l1_owns:
      - "使命、用户、成功标准、约束 C1–C8、里程碑、产品价值三层、总目标可视化/切面叙事与治理规则"
    what_l2_owns:
      - "L1→L6 的 level_mapping、五模块（MOD）职责与典型技术、模块间 Event/集成契约、make generate 与自举分阶"
    traceability:
      - l1_concern: "治理、从属链、门禁与变更派生（C3/C7 等）"
        in_l2: "level_mapping + 与 spec-engine、validate 工具链相关的模块边界；见 integration_contracts 中发 spec/图 类事件"
      - l1_concern: "行为展示与 Canvas/SSE（C6）"
        in_l2: "MOD-dsl-visualizer + MOD-workbench-shell 的 io_contract；Canvas 细化在 feature/workbench-shell/*"
      - l1_concern: "变更路由 goal|feature|bug 与澄清闭环"
        in_l2: "MOD-router + routing-panel；路由细则在 feature 层展开，骨架只锁模块位置与集成"
      - l1_concern: "自举与生成证明（C4、M7）"
        in_l2: "MOD-code-generator + 生成流水线/自举段落；验收仍以 L1 里程碑为准"
      - l1_concern: "Local-first / 会话与数据边界（C5 等）"
        in_l2: "落在 workbench-shell、IndexedDB 等 feature；骨架声明模块边界而非实现细节"

  target_users:
    - name: "Spec 工程实践者"
      description: "需要用 spec 驱动方式管理复杂项目的开发者"
    - name: "AI 原生应用团队"
      description: "需要 Agent 工作台 + 画布可视化的团队"
    - name: "全栈产品开发者"
      description: "希望从需求到交付全链路自动化的工程师"

  # ── 核心约束 ─────────────────────────────────────────
  constraints:
    - id: "C1"
      name: "全产品自动化"
      rule: "所有产品变更都通过 spec 输入→spec 输出→Canvas 行为展示的闭环落地"
    - id: "C2"
      name: "输入输出确认制"
      rule: "每个 spec 的 input/output/boundary 必须经用户最终确认，未经确认不得进入下一阶段"
    - id: "C3"
      name: "从属链完整"
      rule: "每个 spec 必须声明 parent，找不到来源 = 违规，阻断生成"
    - id: "C4"
      name: "自举验证（证明）"
      rule: |
        vibex-workbench 的 specs 须能驱动自身代码生成；自举通过即规格体系有效性的主证明。
        优先在本仓库完成可验收的自举闭环（与 milestone M7 对齐），再扩展到其他项目。
    - id: "C5"
      name: "Local-first"
      rule: "无 backend 也能完整使用，数据存 IndexedDB"
    - id: "C6"
      name: "行为展示驱动"
      rule: "每轮对话的中间过程（迭代/测试/修复）通过 Canvas SSE 流可视化"
    - id: "C7"
      name: "分层门禁与变更派生 todo"
      rule: |
        最小 spec 工作单元：L5d_test（test-spec）——迭代、TDD、RED/GREEN 均以该粒度为下限。
        总聚合单元：validate——全仓 lint-specs + validate_chain 通过，表示 spec 树整体一致可生成。
        任意层级 spec 一旦发生实质性变更，必须派生一条新的「todo-spec」待办（登记于 todo/backlog，
        含受影响 spec 路径、变更摘要、须关闭的门禁：自下而上至少覆盖相关 test，直至汇总 validate）。
    - id: "C8"
      name: "项目隔离的 todo_set 与全量 spec 校验"
      rule: |
        每个项目（WORKSPACE_DIR 仓库根）独立维护一组 todo_set 语义上的 backlog，禁止跨项目混用待办条目。
        每个项目均可且应在合并前或里程碑处对该项目的 specs 做全量 validate，并按需 generate 更新产物。

  # ── 规格单元与门禁分层（与 C7 对照）──────────────────────
  spec_workflow_units:
    summary: "最小单元 = test（L5d）；总单元 = validate；任意 spec 改动 → 新 todo-spec"
    minimal_unit:
      level: "L5d_test"
      meaning: "最小可验证增量：对应该 feature/模块下的 test-spec；Agent TDD 与局部 RED/GREEN 对齐此层"
    aggregate_gate:
      name: "validate"
      meaning: "整仓聚合门禁：语法校验 + 从属链深度校验；通过表示当前 spec 全集可作为生成与集成的输入"
    change_triggers_todo:
      rule: |
        任意 spec（L1–L5）内容或结构变更后，必须追加一条 todo-spec 待办（可用 todo_set 或等价 backlog），
        直至关联门禁关闭；禁止「改了 spec 却无明示后续任务」的静默变更。
      note: |
        todo-spec 优先作为队列条目（路径 + 验收条件）；若流程需要可追溯 YAML，可独立为 draft 级待办 spec，
        仍须挂 parent 链，并在完成后合并或废弃。
    project_scope:
      summary: "每个项目自有 todo_set；每项目均可全量跑 spec 验证并同步生成物"
      todo_per_project: |
        一个「项目」= Agent 的 WORKSPACE_DIR 所指向的仓库根目录。`todo_set` 描述的 backlog 仅归属该项目，
        不得在多个仓库之间混用同一批待办语义。切换项目须使用对应该工作区的上下文（会话/线程），
        必要时清空或重建 todo，避免跨项目串线。
      full_spec_validate_refresh: |
        在**项目根**对该项目 `specs/` 执行全量门禁：lint-specs + validate_chain（即 aggregate 层的 validate）。
        通过后按需运行 generate（及 drift 若启用），使前端/生成代码与规格一致——此即「全量跑 spec 验证更新」。
        Agent 侧可用 `make_validate`（依赖 make）或等价命令；与 C7 中最小单元 test、总单元 validate 的分层一致。

  # ── 产品价值分层（内核 / 证明 / 体验面）──────────────────
  # 将「Spec 治理 + Agent 迭代」与「可视化吸引力」写成可评审语义，避免自举证明与产品体验混为一谈。
  product_value_layers:
    summary: |
      三条腿支撑同一产品：① 治理与迭代内核 ② 自举作为体系证明 ③ 可视化作为人机协同面。
      验收维度分离：M7 证明「规格语言 + 管线可信」；M5/M6 等证明「行为与 spec 的可视化与控制到位」。
    kernel_governance_and_agent:
      meaning: |
        内核层：分层 Spec 治理（从属链、lint/validate/generate 门禁、变更→todo-spec）与在约束下执行的
        「spec→代码」迭代主体（Agent：对话对齐 spec、生成/修改、按 IO 契约与 TDD 收敛）。
        「迭代大脑」的行为契约应落在 feature 规格、集成契约与路由规范中展开，本层只定义价值边界。
      maps_to_constraints: ["C1", "C3", "C7"]
      related_specs_hint:
        - "specs/feature/**（各模块行为与路由）"
        - "specs/architecture/vibex-workbench-skeleton.yaml（模块与生成步骤）"
    proof_self_bootstrap:
      meaning: |
        证明层：本仓库自举闭环（里程碑 M7）——用自身 specs 驱动自身生成——验证规格语言足以描述工作台、
        生成管线与 drift/门禁可执行。自举是**验证手段**，不单独承担「产品好用」的全部定义。
      maps_to_constraints: ["C4"]
      milestone: "M7"
      clarifies: |
        自举通过 ≠ 可视化与 IDE 级 spec 操控已做到极致；二者验收标准不同，可并行推进但不可互相替代。
    experience_visualization:
      meaning: |
        体验层：把抽象治理与 Agent 中间过程翻译成可跟进、可信、可操作的产品面——包括
        （1）Canvas + SSE 的输入→迭代/测试/修复→输出行为序列；（2）与本 L1 里程碑/路线图对齐的自循环进度呈现，
        使用户能对照总目标观察落地闭环；（3）spec 的结构化浏览、diff、生命周期状态与细分面板控制（见各 feature spec）。
      maps_to_constraints: ["C6"]
      milestones_primary: ["M5", "M6"]
      related_feature_specs_hint:
        - "specs/feature/workbench-shell/**（壳层、会话状态、Dock/面板）"
        - "dsl-visualizer / spec-editor 相关 feature（图形化与编辑体验）"
    agent_behavior_contract_placement:
      rule: |
        「Agent 如何把 spec 映射为代码」的细则（工具序列、SSE 事件名、失败重试）不得在 L1 重复堆砌；
        须在对应 MOD（workbench-shell、router、integration_contracts）与 feature spec 中单点维护，L1 仅保留本分层的语义锚点。

  # ── 规格层级先行：产品写清，治理有据 ───────────────────
  spec_hierarchy_as_governance_basis:
    summary: |
      当前阶段的首要投入：用既有 spec 层级（L1 目标 → L2 骨架 → feature/test 等下层）把产品意图、边界、模块职责与契约写清楚、写一致。
      后续门禁（lint/validate）、变更派生 todo、自举与可视化验收，均以「可被引用、可 diff 的规格文本」为裁判依据；
      规格缺席、矛盾或含糊时，治理规则无法判定对错，只能退化为口头约定。
    priority_order:
      - "先在各层级把『产品是什么、不是什么、模块如何协作』落到 YAML 与 io_contract"
      - "再同步收紧自动化校验与生成覆盖面（避免无文本可依的 enforcement）"
      - "治理动作（todo-spec、生命周期迁移）须能指向具体 spec 路径与段落，可追溯"
    relates_to_constraints: ["C2", "C3", "C7"]

  # ── L1 总目标可视化（中心卡片 + 思维导图式切面 + 钻取）────────
  goal_spec_visualization:
    summary: |
      选中「总目标」spec 时，以中心卡片表述产品内核；周围以思维导图（或等价有向图）展开与总目标关联的「切面卡片」，
      每张卡片绑定一类规格关注点；点击卡片即钻取到下游 spec 文件或嵌入式详情面板。可视层是规范的导航与摘要，
      不与仓库内 YAML 争抢唯一真相来源（truth 仍在 spec 文本与从属链）。
    center_card:
      role: "锚定：产品命名 + 一句话描述 + 关键约束/里程碑摘要"
      naming_and_tagline:
        agent_assisted: |
          Agent 可根据 L1 mission、里程碑与约束生成「产品名称候选 + 简短描述」，用户可选用、改写或否决；
          最终以用户确认的文本为准（对齐 C2）。
      detail_panel:
        trigger: "点击中心卡片展开/侧栏详情面板，可编辑 YAML 或通过表单写回同一 spec"
        note: "编辑器与只读图谱并存，避免仅图谱可写导致漂移"
    aspect_graph:
      layout_metaphor: "思维导图式径向扩展；可实现为力导向图 + 切面分组色带（实现细节见 feature uiux）"
      drill_down_behavior: |
        单击切面卡片 → 首选打开该切面默认绑定的下游 spec（如 L2 骨架、feature、integration_contract）；
        若无独立文件则展开该切面在总目标内的折叠段落或打开「待补齐」占位 todo-spec。
      default_depth_levels_suggested:
        overview: "L1 中心：仅摘要与切面入口"
        one_click: "进入该切面默认绑定的第一层子 spec（多为 L2 或对应 feature）"
        deep: "沿用 parent 链与模块图，上限由工作台设置「最大图谱深度」避免海量节点"
      aspect_card_inventory:
        summary: |
          下列切面为「地图」条目，不要求一次全开；可按里程碑阶段开关显示。每张卡片映射一类工程关注点，
          具体字段在对应层级 spec 维护，此处不重复堆砌。
        groups:
          - id: product_and_demo
            label: "产品与演示"
            cards_hint:
              - "愿景 / 路线图与里程碑对齐"
              - "原型与演示切片（goal 路由 HTML 原型等）"
              - "体验与信息架构（壳层、面板、会话）"
          - id: domain_ddd
            label: "领域与上下文"
            cards_hint:
              - "限界上下文与通用语言"
              - "核心实体 / 聚合 / 不变式（与 ER 可对照但语义角度不同）"
          - id: architecture_and_code
            label: "架构与代码向"
            cards_hint:
              - "模块划分与依赖方向（骨架 MOD）"
              - "代码层级、集成契约、生成与校验门禁"
              - "横切：安全、配置、可观测性"
          - id: data_and_consistency
            label: "数据与一致性"
            cards_hint:
              - "持久化模型、迁移策略"
              - "强一致 vs 最终一致、幂等与补偿"
              - "ER：实体—关系视图（可作为独立切面或并入领域/数据）"
          - id: narrative_and_flow
            label: "叙事与动态行为"
            cards_hint:
              - "用户故事 / 场景验收"
              - "主流程 / 异常流"
              - "时序（人机 Agent、SSE、工具调用）— 可与 Canvas 协议交叉引用"
          - id: platform_infra
            label: "底层基座（基础设施）"
            cards_hint:
              - "数据库 / 缓存 / 队列 / 存储分层"
              - "Local-first 与离线边界（对齐 C5）"
            distinction: "与三方接入区分：基座多为项目自有或宿主环境能力；三方为外部服务边界"
          - id: integrations_external
            label: "三方与外部能力"
            cards_hint:
              - "OAuth、支付、推送等外部 SaaS"
              - "模型与 AI API（密钥、配额、降级）— 独立卡片以免与内核业务混淆"
          - id: quality_and_gates
            label: "质量与门禁"
            cards_hint:
              - "测试层级与覆盖策略（对齐 L5d / validate）"
              - "性能与兼容性预算"
              - "与本仓 milestone、success_metrics 对齐的验收刻度"
      open_questions_placeholder: |
        切面集合可演进；新增切面须声明 parent（L1）或在 L2/feature 单列，避免图谱孤儿节点。
    # 本仓库（vibex-workbench）按「总目标图谱」落地的分阶段路径；实现细节在对应 feature spec 展开。
    rollout_in_current_product:
      summary: |
        现状：工作台主界面以 Thread / Canvas / Artifact / Composer 为主，尚未把「左侧选 L1 → 中央目标图谱」做成一等公民。
        原则：先打通数据与导航（能选中、能读 YAML、能钻取），再美化布局与 Agent 命名；原型可参考 prototypes/vibex-ide-chrome-r2.html 的信息架构，不必一次等同最终实现。
      phase_0_binding_table:
        goal: "为每个 aspect group 约定默认钻取路径（本仓示例见下），单独维护小表以免写死在 TS 里难以同步"
        example_paths_vibex_workbench:
          architecture_and_code: "specs/architecture/vibex-workbench-skeleton.yaml"
          product_and_demo: "specs/feature/workbench-shell/（多文件；可按里程碑再细分默认入口）"
          quality_and_gates: "specs/project-goal/vibex-workbench-goal.yaml#success_metrics"
          narrative_and_flow: "specs/feature/workbench-shell/workbench-conversation_feature.yaml"
          domain_ddd: "待补：独立 domain spec 或暂挂 L2 段落占位"
          data_and_consistency: "待补：IndexedDB/Dexie 若有专门 feature 则绑定；否则占位 todo-spec"
          platform_infra: "agent 侧部署与配置见 agent/；亦可挂 README 段落直至独立 spec"
          integrations_external: "agent/internal/common/config.go + models.yaml 等（契约级）直至抽出 integration spec"
      phase_1_shell_slot:
        goal: "在工作台壳层为「Spec 导航」留出区域：左侧 specs 树或顶栏 Tab（Goal 图谱 | 对话画布）二选一，避免与现有 Canvas 抢同一心智"
        depends_on_modules: ["MOD-workbench-shell", "MOD-spec-engine（list/read）"]
      phase_2_static_goal_canvas:
        goal: "选中 vibex-workbench-goal.yaml 时主区渲染静态中心卡片 + 径向切面卡（文案来自 YAML 解析）；点击切面 → readSpec 打开下游文件或滚动到锚点"
        reuse_frontend: "frontend 已有 readSpec/listSpecs 契约；需对接真实 FileService 或 workspace 静态服务"
        partial_implementation_vibex_workbench:
          summary: "主区 Tab「总目标图谱」+ GoalSpecCanvas；绑定表 specs/meta/goal-aspect-bindings.yaml；本地读 specs 经由 GET /api/workspace/specs/read（WORKSPACE_ROOT 未设时默认 frontend 上一级仓库根）。"
      phase_3_interaction_polish:
        goal: "力导向/分组色带、最大深度、窄屏折叠；与 workbench-layout_resize_feature 一致"
      phase_4_agent_display_name:
        goal: "Composer 或专用动作请求 Agent 生成命名/标语草案，写入待确认区，用户确认后写回 L1（对齐 C2）"
      phase_5_miu_bridge:
        goal: "从某切面或 Thread 派生 todo-spec / MIU 清单，与 thread-store 或 backlog 联动（对齐 C7）"
    minimum_implementable_unit:
      summary: |
        「最小可实现单元」不等于「最小功能切片」 alone：在同一迭代里应能指向可交付、可验证的一组规格与产物，
        跨越产品、领域、架构、数据、集成与质量门禁中的必要子集；具体门禁仍以 test-spec / validate 为准。
      facets_non_exhaustive:
        - name: design
          artifacts_hint: ["DESIGN.md 或等价设计说明 spec 段落"]
        - name: product_surface
          artifacts_hint: ["原型或演示路径", "UI/UX feature spec"]
        - name: behavior_contract
          artifacts_hint: ["测试规格", "RED/GREEN 对齐的 IO 契约"]
        - name: implementation_trace
          artifacts_hint: ["实现与生成物（或手写代码变更）可追溯回 spec"]
        - name: architecture_touch
          artifacts_hint: ["触及的模块/层级/约束说明", "必要时骨架或 ADR 片段"]
        - name: persistence_and_infra_touch
          artifacts_hint: ["若涉及存储/队列/缓存则含模型或迁移切片"]
        - name: integration_touch
          artifacts_hint: ["若触及外部 API 则含密钥/降级/契约草案"]
      note: |
        不要求每个 MIU 面面俱到；但一旦某切面被本次变更触动，须在派生 todo-spec 或下级 spec 中写明，
        避免「改了代码却无对应切面记录」的静默漂移（对齐 C7）。

  # ── Spec 生命周期状态 ────────────────────────────────
  spec_lifecycle:
    summary: "每个 spec 必须包含 spec.status + lifecycle 字段；Agent 自维护 + 用户手动调整"
    status_values:
      - value: "proposal"
        color: "🔵"
        meaning: "刚提出，未进入正式工作流"
        transitions: ["draft"]
      - value: "draft"
        color: "🟡"
        meaning: "起草中，内容不完整/未确认"
        transitions: ["review", "abandoned"]
      - value: "review"
        color: "🟠"
        meaning: "评审中，等待确认"
        transitions: ["confirmed", "draft", "delicate"]
      - value: "delicate"
        color: "🔴"
        meaning: "歧义/冲突/风险高，需审慎处理"
        transitions: ["review", "done"]
      - value: "confirmed"
        color: "⬜"
        meaning: "已确认，待实施"
        transitions: ["todo"]
      - value: "todo"
        color: "⬜"
        meaning: "已确认，待实施"
        transitions: ["doing"]
      - value: "doing"
        color: "🔵"
        meaning: "实施中"
        transitions: ["conditional-done", "done"]
      - value: "conditional-done"
        color: "🟣"
        meaning: "条件完成（测试通过但有未就绪依赖）"
        transitions: ["done"]
      - value: "done"
        color: "🟢"
        meaning: "完成"
        transitions: []
      - value: "abandoned"
        color: "⚫"
        meaning: "废弃/搁置"
        transitions: []

    lifecycle_schema:
      required_fields:
        - "current"          # 等于 spec.status
        - "updated"          # ISO 时间戳
        - "history"          # 变更历史数组
      history_entry_fields:
        - "status"           # 变更后的状态
        - "at"               # ISO 时间戳
        - "by"               # 谁（hermes / 用户名）
        - "trigger"          # "user:manual" | "agent:auto"
        - "note"             # 变更说明

    agent_auto_maintenance:
      summary: "Agent 完成工作时必须自动更新 status + 追加 history，trigger='agent:auto'"
      rules:
        - trigger: "创建 spec 骨架（首次创建文件）"
          new_status: "draft"
          note: "创建 spec 文件骨架"
        - trigger: "用户确认 spec 内容（澄清循环终止）"
          new_status: "confirmed"
          note: "用户确认 spec，澄清循环终止"
        - trigger: "开始写代码/测试（进入迭代）"
          new_status: "doing"
          note: "进入实施阶段"
        - trigger: "所有测试通过 + lint-specs 通过"
          new_status: "done"
          note: "门禁全部关闭，spec 完成"
        - trigger: "发现歧义/冲突/高风险点"
          new_status: "delicate"
          note: "发现风险点，暂停等待人工介入"
        - trigger: "delicate 问题修复完成，重新提交"
          new_status: "review"
          note: "delicate 问题已修复，重新进入评审"
        - trigger: "测试通过但依赖未就绪"
          new_status: "conditional-done"
          note: "条件完成，依赖缺失：<列出缺失项>"
        - trigger: "明确放弃该 spec"
          new_status: "abandoned"
          note: "废弃该 spec"

    user_manual_override:
      summary: "用户可随时手动修改 spec.status 和 lifecycle.history"
      override_rule: "用户手动修改的 entry，trigger 字段必须为 'user:manual'"
      canvas_integration: "Canvas 卡片支持点击状态图标弹出状态切换菜单，触发即为 user:manual"

    canvas_card_integration:
      summary: "DSL Canvas 卡片树展示规格状态"
      card_display:
        - "左上角：状态图标 + 颜色"
        - "conditional-done：显示缺失依赖列表"
        - "delicate：高亮边框 + 警告图标"
      filters:
        - "status == doing（显示所有实施中的规格）"
        - "status in [review, delicate]（显示所有评审/风险中的规格）"
        - "status == todo（显示待实施清单）"
        - "status == conditional-done（显示条件完成清单）"
      tree_rendering: "按从属关系父子缩进，颜色与状态对应，形成完整的规格树状视图"

  # ── IO 契约（所有 spec 必须遵循）────────────────────
  io_contract:
    summary: "所有 spec（L1-L4）的 content 层必须包含以下 5 个结构化字段"
    fields:
      - name: "input"
        description: "该 spec 的输入条件——什么触发了这个功能/变更？用户说了什么？API 传入什么？"
        required: true
      - name: "output"
        description: "该 spec 的输出结果——用户得到什么？生成了什么文件？API 返回什么？"
        required: true
      - name: "boundary"
        description: "边界条件——什么情况走这个路径？什么情况不归这个 spec 管？前置/后置条件"
        required: true
      - name: "behavior"
        description: "行为——这个 spec 内部是怎么工作的？有哪些子流程？状态机怎么流转？"
        required: true
      - name: "changelog"
        description: "变更日志——该 spec 的所有历史版本、每次变更的内容摘要"
        required: true

  # ── 工作台 UI 能力与追溯（spec 先行登记）────────────────
  workbench_traced_features:
    - id: "F-ide-001"
      spec_path: "specs/feature/workbench-shell/workbench-ide-chrome_feature.yaml"
      summary: "Cursor 式 IDE 壳层（顶栏/左活动栏+侧栏/中央画布与文档/右侧 AI/底部 Dock）区域职责唯一定义"
    - id: "F-layout-001"
      spec_path: "specs/feature/workbench-shell/workbench-layout_resize_feature.yaml"
      summary: "布局尺寸契约 v2（sidebarLeftPx、panelRightPx、aiComposerBarPx、bottomDockPx；LS v2）"
    - id: "F-conv-001"
      spec_path: "specs/feature/workbench-shell/workbench-conversation_feature.yaml"
      summary: "SSE message.delta → 右侧 AI 栏对话区；bridge 手改 sse.ts；对齐 ide-chrome v1.1"

  routing_paths:
    new_goal:
      trigger: "用户描述一个全新的产品或功能方向，不是对现有功能的修改"
      route_to: "spec-goal 技能"
      clarification_loop: "澄清循环（循环）：agent提问(方向/风格/范围/优先级) -> user回答并给方向 -> agent提供选项建议 -> user确认方向。终止：user说出确认语句"
      output: "HTML原型 + goal-spec YAML"
      output_confirmed: "user对原型截图确认后，goal-spec进入confirmed状态"
      behavior_preview: "Canvas展示：输入 -> spec-designer生成原型 -> 用户确认 -> 节点变绿(验证门通过) -> 输出"
      example: "用户说「我想做一个AI写作助手」-> spec-goal生成产品原型 -> user确认方向 -> 进入spec-feature"

    new_feature:
      trigger: "用户对现有产品提出新功能需求，不是全新的产品方向"
      route_to: "spec-feature 技能"
      clarification_loop: "澄清循环（循环）：agent提问(功能细节/交互/数据/边界) -> user回答 -> agent给出spec变更建议 -> user确认spec内容。终止：user说出确认语句"
      output: "更新的feature-spec + 对应的test-spec"
      output_confirmed: "user确认spec内容后，feature-spec进入active状态"
      behavior_preview: "Canvas展示：输入 -> spec变更 -> 涉及spec连线 -> 迭代循环 -> 验证门 -> 输出"
      example: "用户说「加一个导出PDF功能」-> spec-feature更新 -> 触发make generate -> Canvas展示生成过程"

    bug_fix:
      trigger: "用户报告一个bug或问题"
      route_to: "spec-bug 技能"
      clarification_loop: "澄清循环（循环）：agent复现问题(输入/步骤) -> user补充细节 -> agent定位到对应的feature-spec -> user确认bug描述和根因。终止：user确认bug描述"
      output: "bug-changelog记录 + 修复后的feature-spec + 修复验证测试"
      output_confirmed: "user确认bug已修复 + 测试通过"
      behavior_preview: "Canvas展示：输入(bug描述) -> 根因分析 -> spec变更 -> 修复 -> 测试验证 -> 输出(fixed)"
      example: "用户说「点击保存按钮没反应」-> 定位到spec-editor -> 修复spec-editor -> 验证通过 -> bug-changelog记录"

  # ── spec-designer 进化定位 ──────────────────────────
  spec_designer_evolution:
    role_in_workbench: |
      spec-designer 是 spec-goal 路由的核心执行者。
      在新需求路由中，spec-designer 接收用户方向，生成产品 HTML 原型，
      用户通过截图确认方向后，原型成为 goal-spec 的 output。
    clarification_protocol: |
      spec-designer 在澄清循环中：
      - agent 提供风格选项建议（基于 DESIGN.md 知识库）
      - user 最终拍板方向
      - 禁止 agent 替用户做方向决策
    output_format: "HTML 原型（单文件，CSS+HTML+JS 内联，可截图确认）"
    consistency: "所有原型使用进化后的 spec-designer 统一设计风格"

  # ── Canvas 行为展示协议 ─────────────────────────────
  canvas_behavior_protocol:
    architecture: "松耦合（方案1）+ 只读画布（方案4）"
    event_bus: |
      对话 Store 通过 Event Bus 广播 SSE 事件
      Canvas Store 订阅事件，渲染成节点序列图
      两者独立开发，不知道对方存在
    click_to_switch: "点击旧对话切换行为展示：对话面板侧选择 thread → 重放该 thread 的 SSE 事件流到 Canvas"
    canvas_readonly: "Canvas 单向只读，不需要反向控制对话"
    node_types:
      - type: "input"
        icon: "→"
        color: "#3b82f6"
        description: "输入节点——用户原始需求/bug描述"
      - type: "sequence"
        icon: "→"
        color: "#6b7280"
        description: "顺序连线——流程顺序"
      - type: "iteration"
        icon: "↻"
        color: "#f59e0b"
        description: "迭代循环——澄清/修复循环"
      - type: "branch"
        icon: "◇"
        color: "#8b5cf6"
        description: "分支路由——条件分支"
      - type: "subagent"
        icon: "⚙"
        color: "#06b6d4"
        description: "子代理/子流程——agent 委托"
      - type: "gate"
        icon: "✓"
        color: "#22c55e"
        description: "验证门——用户确认/测试通过"
      - type: "output"
        icon: "★"
        color: "#10b981"
        description: "输出节点——最终交付物"
    sse_event_mapping:
      "dialog.started": "input"
      "dialog.clarification": "iteration"
      "route.determined": "branch"
      "spec.changed": "sequence"
      "test.written": "sequence"
      "test.passed": "gate"
      "test.failed": "iteration"
      "spec.confirmed": "gate"
      "dialog.completed": "output"
      "generation.started": "subagent"
      "generation.step": "sequence"
      "generation.completed": "output"
      "bug.reproduced": "gate"
      "bug.fixed": "gate"

  # ── TDD 内嵌要求 ────────────────────────────────────
  tdd_requirement:
    summary: "迭代/测试验证/修复是手段，spec 最终确认是结果"
    loop: |
      spec input/output/boundary/behavior → 设计测试案例 →
      Canvas 展示迭代过程 → 验证门（测试通过） →
      spec 进入 confirmed 状态 → 输出
    test_case_format: |
      每个 test-spec 必须包含：
        - given: 输入条件
        - when: 触发动作
        - then: 期望输出
        - boundary: 边界条件
    test_driven: |
      必须先写测试案例，再实现代码
      测试失败 → 迭代修复 → 再次测试
      Canvas 实时展示测试通过/失败的节点状态

  # ── 9 层规格路径（核心创新）──────────────────────────
  spec_levels:
    - level: 1
      name: "目标 (Goal)"
      description: "产品愿景、使命、成功指标、约束边界、全局路由规范"
      parent_required: false
      example: "vibex-workbench-goal: 全产品自动化 + 三条路由路径 + Canvas 协议"
      io_contract:
        input: "用户的原始需求描述（自然语言）"
        output: "HTML 原型（用户截图确认）+ goal-spec YAML"
        boundary: "全新产品方向 vs 现有产品变更"
        behavior: "spec-goal 技能：澄清循环 → spec-designer 生成原型 → 用户确认 → goal-spec confirmed"
        changelog: "goal 级别的重大方向变更"

    - level: 2
      name: "骨架 (Skeleton)"
      description: "技术选型 + 项目框架 + 5个模块划分 + 生成流水线"
      parent_required: true
      parent_level: 1
      io_contract:
        input: "goal-spec 确认的产品方向"
        output: "技术选型决策 + 5个模块职责定义 + 集成契约"
        boundary: "框架选型 vs 业务功能"
        behavior: "从 goal 推导出骨架结构，定义模块边界和集成协议"
        changelog: "技术栈重大变更、模块增减"

    - level: 3
      name: "组织 (Organization)"
      description: "模块划分（按业务领域，不按技术层）"
      parent_required: true
      parent_level: 2
      io_contract:
        input: "skeleton 定义的模块"
        output: "每个模块的 public_api + data_ownership"
        boundary: "模块 A 职责 vs 模块 B 职责"
        behavior: "定义每个模块对外暴露的 API 和数据所有权"
        changelog: "模块职责调整、公共 API 变更"

    - level: 4
      name: "功能 (Function)"
      description: "具体业务功能 + 用户故事 + IO确认"
      parent_required: true
      parent_level: 3
      io_contract:
        input: "用户故事 + 路由类型（goal/feature/bug）"
        output: "feature-spec + 4个子规格（uiux/service/data/test）"
        boundary: "这个功能做什么 vs 不做什么"
        behavior: "spec-feature/spec-bug 技能：澄清 → 确认 IO → 更新 spec → 验证"
        changelog: "功能新增、功能变更、Bug 修复记录"

    - level: "5a"
      name: "行为 (Behavior)"
      description: "UX 交互流程、状态流转、SSE 事件协议"
      parent_required: true
      parent_level: 4
      io_contract:
        input: "feature-spec 的 behavior 定义"
        output: "state_machine + sse_events[] + interactions[]"
        boundary: "前端行为 vs 后端逻辑"
        behavior: "SSE 事件流驱动 Canvas 行为展示"
        changelog: "交互流程变更"

    - level: "5b"
      name: "皮肤 (Skin)"
      description: "UI 视觉设计、组件状态、设计 token"
      parent_required: true
      parent_level: 4
      io_contract:
        input: "设计方向（spec-designer 生成的原型风格）"
        output: "design_tokens + components 的 states[]"
        boundary: "遵循设计系统 vs 局部变体"
        behavior: "design_tokens 应用到所有组件"
        changelog: "设计系统 token 变更"

    - level: "5c"
      name: "应用 (Application)"
      description: "完整可运行的前端/后端代码（80% 生成）"
      parent_required: true
      parent_level: 4
      io_contract:
        input: "feature-spec + 子规格（uiux/service/data）"
        output: "生成的组件代码 + Store 代码"
        boundary: "生成代码 vs 手写胶水代码"
        behavior: "make generate 触发，Canvas 展示生成过程"
        changelog: "生成器配置变更"

    - level: "5d"
      name: "细节迭代 (Glue Code)"
      description: "胶水代码、手写业务逻辑（20% 手写）"
      parent_required: true
      parent_level: 4
      io_contract:
        input: "生成代码 + 业务特殊逻辑"
        output: "手写的 spec-parser + 生成器模板"
        boundary: "生成覆盖 vs 手动维护"
        behavior: "手动编写生成器无法处理的特殊逻辑"
        changelog: "胶水代码变更"

    - level: 6
      name: "本地部署 (Deployment)"
      description: "工程化产出：VSCode extension / PWA / Tauri"
      parent_required: true
      parent_level: 1
      io_contract:
        input: "所有 L4/L5 specs 确认完毕"
        output: "可安装的 .vsix / Tauri 可执行文件"
        boundary: "开发环境 vs 生产环境"
        behavior: "make build 发布"
