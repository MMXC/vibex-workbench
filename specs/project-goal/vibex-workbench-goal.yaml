  # ── 成功指标 ────────────────────────────────────────
  success_metrics:
    summary: |
      SM1–SM7 编号不变，对外引用以此为准；分层 alignment 仅用于对照 content.product_value_layers（内核 / 证明 / 体验）。
    alignment_with_product_value_layers:
      kernel_governance_and_agent:
        ids: ["SM1", "SM3", "SM6"]
        note: "治理纪律、契约字段、路由与 Agent 澄清闭环（迭代大脑的外围规则）"
      proof_self_bootstrap:
        ids: ["SM2", "SM7"]
        note: "管线可执行性与性能（SM2）+ 里程碑 M7 自举收官（SM7）；二者均为「体系可信」维度，不等同于可视化体验验收"
      experience_visualization:
        ids: ["SM4", "SM5"]
