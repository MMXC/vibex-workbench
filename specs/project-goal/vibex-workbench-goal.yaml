# ============================================================
# Level 1 — VibeX Workbench 项目目标规格
# Project Goal Specification
#
# 使命：全产品自动化。spec治理工作台。
#       所有对话遵循：输入 → 输出 → 行为展示。
#       自举闭环是验证手段，不是目标。
# ============================================================

spec:
  version: "2.0"
  level: "1_project-goal"
  name: "vibex-workbench-goal"
  status: "done"

meta:
  project: "vibex-workbench"
  owner: "hermes"
  created: "2026-04-20"
  updated: "2026-04-21"

lifecycle:
  current: "done"
  updated: "2026-04-21T20:00:00"
  history:
    - status: "proposal"
      at: "2026-04-20T09:00:00"
      by: "hermes"
      trigger: "user:manual"
      note: "初始提出 vibex-workbench 全产品自动化工作台"
    - status: "draft"
      at: "2026-04-20T10:00:00"
      by: "hermes"
      trigger: "agent:auto"
      note: "完成 L1 goal spec 初稿"
    - status: "review"
      at: "2026-04-20T12:00:00"
      by: "hermes"
      trigger: "user:manual"
      note: "提交评审"
    - status: "confirmed"
      at: "2026-04-20T14:00:00"
      by: "hermes"
      trigger: "user:manual"
      note: "评审通过，确认目标规格"
    - status: "doing"
      at: "2026-04-20T15:00:00"
      by: "hermes"
