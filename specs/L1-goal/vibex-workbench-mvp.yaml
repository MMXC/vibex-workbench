    # IDE chrome L4（独立演进）
    FEAT-ide-titlebar: {status: proposal}
    FEAT-ide-activity-sidebar: {status: proposal}
    FEAT-ide-editor-tabs: {status: proposal}
    FEAT-ide-agent-panel: {status: proposal}
