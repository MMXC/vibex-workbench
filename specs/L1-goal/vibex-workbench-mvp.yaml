    SLICE-agent-spec-write-api-contract: {status: done, phase: P2, note: "已实现，confirmedSpecDraft payload+parentGuard+validation分类+/api/agent/spec-write"}

    # L4 Feature — 其余（无代码实现依赖，可并行）
    FEAT-state-detection: {status: proposal}
    FEAT-workspace-selector: {status: proposal}
