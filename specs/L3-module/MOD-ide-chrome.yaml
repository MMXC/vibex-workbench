  status: "proposal"

meta:
  type: "module"
  module: "frontend"
  owner: "hermes"
  created: "2026-04-26"
  updated: "2026-04-26"

lifecycle:
  current: "proposal"
  updated: "2026-04-26"

display:
  title: ide chrome
  summary: 一个单层 WebView IDE chrome：
  description: 一个单层 WebView IDE chrome：

structure:
  parent: vibex-workbench-skeleton
  children: []
  dependencies:
  - 'Wails runtime: 窗口控制、目录选择、事件桥'
  - 'specExplorerStore: 左侧 activity、选中 spec、中心视图状态'
  - 'workbenchLayoutStore: 侧栏、右栏、底部 dock 尺寸'
  - 'workspace-output-store: run-make 输出在底部 dock 中展示'
  impacted_files: []

io:
  input:
  - '用户打开 VibeX Workbench 桌面应用或 /workbench 路由。

    当前目标是把参考截图中的 Cursor/VS Code 式 IDE 外壳作为产品主框架。'
  output:
  - '一个单层 WebView IDE chrome：

    - 顶部内层 titlebar/command center/window controls

    - 左侧 activity bar + explorer panel

    - 中央 editor tabs / canvas / spec viewer

    - 右侧 AI Agent panel

    - 底部 dock + terminal/problems/output

