lifecycle:
  current: proposal
  updated: "2026-04-27"
  history:
    - status: proposal
      at: "2026-04-27T00:00:00"
      by: hermes
      trigger: mvp-评估
      note: 修复 scaffolder.py 路径依赖 os.Args[0]，改用 GENERATORS_DIR 环境变量

io_contract:
  input: |
    workspace_handlers.go 调用 scaffolder.py 或 state_detector.py。
  output: |
    通过 GENERATORS_DIR 环境变量（绝对路径）定位脚本，而非 os.Args[0]。
    Fallback: 仍支持基于 os.Args[0] 的相对路径推导（向后兼容）。
  boundary: |
    只修改 backend Go 代码的路径推导逻辑。
    不修改 Python 脚本。

content:
  file_path: agent/cmd/web/workspace_handlers.go

  bug_description: |
    当前实现：
      scriptPath := filepath.Join(filepath.Dir(os.Args[0]), "..", "generators", "scaffolder.py")
    问题：
    - dev 时：Go binary 在 backend/ 目录下跑 → 路径 = backend/../generators/scaffolder.py（错误）
    - Tauri 打包后：Go binary 在 app 目录下 → 路径 = app/../generators/scaffolder.py（错误）
    - 只有在特定目录（vibex-workbench repo root）执行 make 或 go run 才对

    正确做法：用 WORKSPACE_ROOT 环境变量 + 相对路径推导，或用 GENERATORS_DIR 环境变量。

  fix_strategy:
    primary: |
      通过 WORKSPACE_ROOT 推导：
      scriptPath = WORKSPACE_ROOT/generators/scaffolder.py
      scriptPath = WORKSPACE_ROOT/generators/state_detector.py
      scriptPath = WORKSPACE_ROOT/generators/validate_specs.py

      原理：用户指定的 WORKSPACE_ROOT 就是项目根，generators/ 目录在其下。
      这是 MVP 最简洁的方案，无需额外环境变量。

    fallback: |
      如果 WORKSPACE_ROOT 未设置，fallback 到当前目录推导：
      cwd, _ := os.Getwd()
      scriptPath = filepath.Join(cwd, "generators", "scaffolder.py")

  changes:
    - file: agent/cmd/web/workspace_handlers.go
      function: workspaceDetectStateHandler
      current: |
        scriptPath := filepath.Join(filepath.Dir(os.Args[0]), "..", "generators", "state_detector.py")
      fix: |
        // 优先用 WORKSPACE_ROOT，次选 cwd
        wsRoot := resolveRoot  // 已在函数开头解析
        var scriptPath string
        if wsRoot != "" {
            scriptPath = filepath.Join(wsRoot, "generators", "state_detector.py")
        } else {
            cwd, _ := os.Getwd()
            scriptPath = filepath.Join(cwd, "generators", "state_detector.py")
        }
        scriptPath, _ = filepath.Abs(scriptPath)

    - file: agent/cmd/web/workspace_handlers.go
      function: workspaceScaffoldHandler
      current: |
        scriptPath := filepath.Join(filepath.Dir(os.Args[0]), "..", "generators", "scaffolder.py")
      fix: |
        wsRoot := req.WorkspaceRoot  // 已解析
        if wsRoot == "" {
            wsRoot = cfg.WorkspaceDir
        }
        if wsRoot == "" {
            wsRoot = os.Getenv("WORKSPACE_ROOT")
        }
        var scriptPath string
        if wsRoot != "" {
            scriptPath = filepath.Join(wsRoot, "generators", "scaffolder.py")
        } else {
            cwd, _ := os.Getwd()
            scriptPath = filepath.Join(cwd, "generators", "scaffolder.py")
        }
        scriptPath, _ = filepath.Abs(scriptPath)

  test_scenarios:
    - id: TC-path-1
      scenario: "WORKSPACE_ROOT 存在时"
      given: "WORKSPACE_ROOT=/home/user/my-project"
      when: "backend 启动，调用 /api/workspace/detect-state"
      then: "scriptPath = /home/user/my-project/generators/state_detector.py"
      evaluation: "脚本正确执行"
    - id: TC-path-2
      scenario: "WORKSPACE_ROOT 为空时 fallback"
      given: "WORKSPACE_ROOT 未设置，cwd=/home/user/my-project"
      when: "backend 调用 /api/workspace/scaffold"
      then: "scriptPath = /home/user/my-project/generators/scaffolder.py"
      evaluation: "cwd 推导出正确的项目根"
    - id: TC-path-3
      scenario: "跨目录执行 backend"
      given: "backend binary 在 /opt/vibex/bin/vibex-backend，cwd=/tmp"
      when: "backend 调用 /api/workspace/detect-state，WORKSPACE_ROOT=/projects/myapp"
      then: "scriptPath = /projects/myapp/generators/state_detector.py"
      evaluation: "不依赖 binary 位置，只依赖 WORKSPACE_ROOT"
