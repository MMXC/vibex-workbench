---
spec:
  version: "0.1"
  level: "5_slice"
  name: "SLICE-spec-explorer-workspace-awareness"
  parent: "FEAT-workspace-selector"
  status: "ready"

meta:
  type: "slice"
  module: "frontend"
  owner: "hermes"
  created: "2026-04-29"
  updated: "2026-04-30"
  description: |
    SpecExplorer（资源管理器文件树）感知当前 workspace 根目录，
    workspace 切换或启动恢复时重新扫描对应 workspace 的 specs/ 目录。

lifecycle:
  current: "ready"
  updated: "2026-04-30"

display:
  title: spec explorer workspace awareness
  summary: SpecExplorer 头部显示当前 workspace 名称，列表刷新为当前 workspace 的 specs/ 内容；
  description: SpecExplorer 头部显示当前 workspace 名称，列表刷新为当前 workspace 的 specs/ 内容；

structure:
  parent: FEAT-workspace-selector
  children: []
  dependencies:
  - 'frontend/src/lib/stores/spec-explorer-store.ts: workspaceRoot/specs/loading/error/setWorkspaceRoot/loadList/workspaceDisplayName'
  - 'frontend/src/lib/components/workbench/SpecExplorer.svelte: 资源管理器 UI 消费 store 状态'
  - 'frontend/src/routes/workbench/+page.svelte: localStorage 恢复和 workspace:selected 同步到 store'
  - 'frontend/src/lib/wails-filesystem.ts: wailsListSpecs Wails/HTTP fallback'
  - 'agent/cmd/web/workspace_handlers.go: HTTP fallback specs/list 支持 workspaceRoot 参数'
  impacted_files:
  - frontend/src/lib/stores/spec-explorer-store.ts

io:
  input:
  - '用户通过 /workspace 进入 Workbench、从 localStorage 恢复 workspaceRoot，

    或在 Workbench 内通过 workspace:selected/menu:open-project 切换 workspace。'
  output:
  - 'SpecExplorer 头部显示当前 workspace 名称，列表刷新为当前 workspace 的 specs/ 内容；

    无 workspace 时显示空态，加载失败时显示错误态。'
  boundary: '只管 SpecExplorer 的 workspace 感知与 specs 列表刷新。

    不负责图谱刷新、不实现全量文件资源管理器、不处理多 workspace 并行。'

constraints:
  rules: []
  forbidden:
  - 在 SpecExplorer 组件内重复实现 HTTP specs/list 扫描逻辑
  - 跨 workspace 保留旧 selectedSpecPath
  - workspaceRoot 为空时请求 specs/list
  - workspaceRoot 仅目录名（如 vibex-workbench）时继续进入 store/loadList
  - 在本 slice 中实现图谱数据刷新或文件系统 watch
  - 在本 slice 中执行 scaffold、make、git 操作

prototype:
  file: ''
  validates: []
  status: none

io_contract:
  input: |
    用户通过 /workspace 进入 Workbench、从 localStorage 恢复 workspaceRoot，
    或在 Workbench 内通过 workspace:selected/menu:open-project 切换 workspace。
  output: |
    SpecExplorer 头部显示当前 workspace 名称，列表刷新为当前 workspace 的 specs/ 内容；
    无 workspace 时显示空态，加载失败时显示错误态。
  boundary: |
    只管 SpecExplorer 的 workspace 感知与 specs 列表刷新。
    不负责图谱刷新、不实现全量文件资源管理器、不处理多 workspace 并行。

content:
  file_path: "frontend/src/lib/stores/spec-explorer-store.ts"
  file_type: "typescript"
  related_files:
    - "frontend/src/lib/components/workbench/SpecExplorer.svelte"
    - "frontend/src/routes/workbench/+page.svelte"
    - "frontend/src/lib/wails-filesystem.ts"
    - "agent/cmd/web/workspace_handlers.go"

  implementation_boundary:
    allowed:
      - "specExplorerStore 增加 workspaceRoot、specs、specsLoading、specsError"
      - "setWorkspaceRoot(root) 清空 selectedSpecPath 并触发 loadList(root)"
      - "loadList(workspaceRoot?) 通过 wailsListSpecs(root) 加载 specs"
      - "workspaceDisplayName derived store 显示 workspaceRoot 路径末段"
      - "SpecExplorer.svelte 订阅 store 并渲染 workspace 名称、loading/error/empty/list 状态"
      - "SpecExplorer 刷新按钮调用 specExplorerStore.loadList(currentWorkspaceRoot)"
      - "workbench/+page.svelte 启动恢复 localStorage 时仅在 saved 为完整路径时调用 specExplorerStore.setWorkspaceRoot(saved)"
      - "workbench/+page.svelte workspace:selected 时仅在 path 为完整路径时调用 specExplorerStore.setWorkspaceRoot(path)"
    forbidden:
      - "在 SpecExplorer 组件内重复实现 HTTP specs/list 扫描逻辑"
      - "跨 workspace 保留旧 selectedSpecPath"
      - "workspaceRoot 为空时请求 specs/list"
      - "workspaceRoot 仅目录名（如 vibex-workbench）时继续进入 store/loadList"
      - "在本 slice 中实现图谱数据刷新或文件系统 watch"
      - "在本 slice 中执行 scaffold、make、git 操作"

  generation_rules:
    - rule: "Store owns list loading"
      detail: "SpecExplorer.svelte 只订阅和渲染 store；列表加载统一通过 specExplorerStore.loadList。"
    - rule: "Wails first, HTTP fallback"
      detail: "loadList 调用 wailsListSpecs(root)；Wails 环境只允许 Go binding，HTTP fallback 仅浏览器开发模式可用。"
    - rule: "Workspace root full-path guard"
      detail: "localStorage 与 workspace:selected 输入必须为完整路径；非法值应忽略并清理，不得继续发请求。"
    - rule: "Workspace switch clears selection"
      detail: "setWorkspaceRoot(root) 必须将 selectedSpecPath 置空，避免旧 workspace 的 spec 仍被选中。"
    - rule: "Display name"
      detail: "workspaceDisplayName 取 workspaceRoot 最后一段；为空显示 '—'。"
    - rule: "No duplicate loading paths"
      detail: "组件内不得再维护 paths/loading/loadErr 或直接 fetch /api/workspace/specs/list。"

  behaviors:
    - id: "B1"
      trigger: "启动 /workbench 且 localStorage 存在 vibex-workspace-root"
      action: "workspaceRoot=saved；specExplorerStore.setWorkspaceRoot(saved)；detectWorkspaceState(saved)"
      expected_result: "SpecExplorer 头部显示 saved 的目录名，列表加载该目录 specs"
      error_handling: "saved 非完整路径时忽略并清理 localStorage；loadList 失败时 specsError 显示错误，列表为空"
    - id: "B2"
      trigger: "用户通过 menu:open-project 或 workspace:selected 切换目录"
      action: "specExplorerStore.setWorkspaceRoot(path)"
      expected_result: "旧选中 spec 清空，列表刷新为新 workspace specs"
      error_handling: "用户取消目录选择或 path 非完整路径时不触发 setWorkspaceRoot"
    - id: "B3"
      trigger: "用户点击 SpecExplorer 右上角 ↻"
      action: "specExplorerStore.loadList(currentWorkspaceRoot)"
      expected_result: "重新读取当前 workspace 的 specs 列表"
      error_handling: "currentWorkspaceRoot 为空时不发请求"
    - id: "B4"
      trigger: "workspaceRoot 为空"
      action: "SpecExplorer 渲染空态"
      expected_result: "显示「未设置工作区」或等价提示"
      error_handling: "不显示旧 workspace 的 specs 列表"

  verification:
    commands:
      - "npm --prefix frontend run build"
      - "make validate"
    manual_checks:
      - "启动时无 workspace：SpecExplorer 显示未设置工作区"
      - "从 /workspace 进入 Workbench：SpecExplorer 显示当前 workspace 名称和 specs 列表"
      - "切换 workspace 后：旧 selectedSpecPath 清空，列表刷新"
      - "点击 ↻：重新加载当前 workspace specs"
      - "HTTP fallback 请求包含 workspaceRoot query 参数"
      - "localStorage 中若存在仅目录名脏值，启动后应被清理且不会触发 specs 请求"
    failure_conditions:
      - "切换 workspace 后仍显示旧目录 specs"
      - "组件内出现第二套 paths/loading/loadErr 状态"
      - "workspaceRoot 为空时仍调用 specs/list"
      - "workspaceRoot 为目录名时仍调用 specs/list"
      - "selectedSpecPath 指向旧 workspace 文件"

  dependencies:
    - file: "frontend/src/lib/stores/spec-explorer-store.ts"
      reason: "workspaceRoot/specs/loading/error/setWorkspaceRoot/loadList/workspaceDisplayName"
    - file: "frontend/src/lib/components/workbench/SpecExplorer.svelte"
      reason: "资源管理器 UI 消费 store 状态"
    - file: "frontend/src/routes/workbench/+page.svelte"
      reason: "localStorage 恢复和 workspace:selected 同步到 store"
    - file: "frontend/src/lib/wails-filesystem.ts"
      reason: "wailsListSpecs Wails/HTTP fallback"
    - file: "agent/cmd/web/workspace_handlers.go"
      reason: "HTTP fallback specs/list 支持 workspaceRoot 参数"

changelog:
  - version: "0.1"
    date: "2026-04-29"
    author: "hermes"
    changes:
      - "新增 SpecExplorer workspace 感知与切换刷新规格"
  - version: "0.2"
    date: "2026-04-30"
    author: "hermes"
    changes:
      - "合并 Wails filesystem store 驱动实现与 workspace awareness 说明"
      - "明确禁止组件内重复 fetch 列表逻辑"
  - version: "0.3"
    date: "2026-04-30"
    author: "hermes"
    changes:
      - "补充路径完整性防线：localStorage/workspace:selected 仅接受完整路径，拒绝目录名脏值"
      - "对齐 Wails binding 约束：Wails 环境下不允许 HTTP fallback 伪成功"
