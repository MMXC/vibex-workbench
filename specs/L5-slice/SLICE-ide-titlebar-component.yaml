io_contract:
  input: '用户点击 WebView 内层 titlebar 菜单、命令中心、状态 chip、设置或窗口按钮。

    '
  output: 'WorkbenchTitlebar.svelte 渲染唯一 IDE 顶部导航，并调用 Wails runtime 完成窗口控制。

    '
  boundary: '只管 WorkbenchTitlebar.svelte。菜单具体弹层、command palette 和设置页可为占位。

    '
  behavior_summary: 共 4 个行为步骤，详见 content.behaviors
content:
  file_path: frontend/src/lib/components/workbench/WorkbenchTitlebar.svelte
  file_type: svelte
  implementation_boundary:
    allowed:
    - titlebar markup / style
    - menu button labels and click handlers
    - window control handlers
    - drag/no-drag CSS
    forbidden:
    - 直接访问 filesystem
    - 发起 spec read/write 请求
    - 在 titlebar 内实现完整 command palette
  generation_rules:
  - rule: Visible controls
    detail: 必须包含菜单：文件、编辑、视图、终端、帮助
  - rule: Window buttons
    detail: 必须包含最小化、最大化/还原、关闭按钮
  - rule: Wails drag
    detail: '根 titlebar 使用 --wails-draggable: drag；菜单、按钮、命令中心使用 no-drag'
  - rule: Wails event channel constraint ⚠
    detail: |
      Wails 事件系统有两个独立 channel，不得混用：
      • runtime.EventsEmit（frontend → backend）：frontend 发出事件，Go 端接收。
      • runtime.EventsOn（backend → frontend）：Go backend 发出事件，frontend 监听。
      前者发到 backend，后者监听 backend 发的，两条路不通。
      因此：
      (1) titlebar UI 交互 → 目录选择/窗口控制 → 直接调用 wails-runtime API，
          不得通过 eventsEmit → eventsOn 绕转。
      (2) eventsOn 只用于监听 Go backend 主动发来的事件（如 buildAppMenu 的 menu:*
          回调触发 runtime.EventsEmit，frontend 的 eventsOn 接收）。
      (3) menu 下拉项的 openProject() 必须调用 openDirectoryNativeFirst('titlebar')，
          禁止 eventsEmit('menu:open-project') 与直接走旧 wrapper 作为 Wails 首选路径。
  - rule: Runtime fallback ⚠
    detail: |
      ⚠ 2026-04-30 架构变更：Wails 环境下已废弃 openDirectoryDialog() wrapper，改用直接绑定。
      新路径（优先级）：
      ① 直接绑 `window.go.main.App.OpenDirectoryDialog()` — Go 侧使用 github.com/sqweek/dialog（native Win32 API，返回完整路径）
      ② Fallback: openDirectoryDialog() wrapper（showDirectoryPicker / webkitdirectory）仅用于浏览器开发模式（Vite dev server）
  verification:
    commands:
    - npm --prefix frontend run build
    manual_checks:
    - 菜单和按钮能点击，不会拖动窗口
    - titlebar 空白区域可拖动 Wails 窗口
    - 关闭按钮 hover 为红色
    failure_conditions:
    - 窗口按钮点击抛出未捕获异常
    - 命令中心无法点击或被拖拽区域吞掉
    - titlebar 高度破坏 IDE 主布局
  dependencies:
  - file: main.go
    reason: Wails frameless + CSSDragProperty 配置
  - file: frontend/src/app.html
    reason: 不能存在外层 duplicate titlebar
  - file: specs/L5-slice/SLICE-wails-binding-guard.yaml
    reason: 菜单类业务调用守卫（Wails 仅 go binding，禁止 Wails 内 fallback）
  behaviors:
  - id: B1
    trigger: 步骤1
    action: 渲染品牌、workspace 标识、菜单、命令中心、状态 chip、窗口按钮
    expected_result: 内容正确渲染
    error_handling: 出错时显示 toast 提示，不阻塞其他交互
  - id: B2
    trigger: 步骤2
    action: titlebar 空白区域可拖动窗口
    expected_result: 正确执行，无异常
    error_handling: 出错时显示 toast 提示，不阻塞其他交互
  - id: B3
    trigger: 步骤3
    action: 可点击区域 no-drag
    expected_result: 视图/状态正确切换
    error_handling: 出错时显示 toast 提示，不阻塞其他交互
  - id: B4
    trigger: 步骤4
    action: 窗口按钮调用 runtime API
    expected_result: 正确执行，无异常
    error_handling: 出错时显示 toast 提示，不阻塞其他交互
