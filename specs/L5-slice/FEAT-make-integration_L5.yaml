spec:
  version: '0.1'
  level: 5_implementation
  name: FEAT-make-integration_L5
  parent: FEAT-make-integration
  status: proposal
meta:
  type: implementation
  module: frontend
  owner: hermes
  created: '2026-04-26'
  updated: '2026-04-30'
io_contract:
  input: '用户点击 titlebar「lint-specs」或「generate」按钮，或在 Output tab 点击「重新运行」。

    POST /api/workspace/run-make { target: "lint-specs"|"generate"|"validate" }

    '
  output: 'Backend 在 WORKSPACE_ROOT 执行 make {target}，

    stdout/stderr 追加到 workspace_output_store，

    Output tab 实时展示，结束后显示 exit code 摘要。

    '
  boundary: '本 feature 只定义 UI 触发、API 调用、输出展示闭环，不实现 make 本身。

    '
content:
  file_path: agent/cmd/web/workspace_handlers.go
  file_type: go
  implementation_boundary:
    allowed:
    - workspaceRunMakeHandler (workspace_handlers.go)：接收 target，spawn make 进程
    - workspace_output_store.ts：写入 stdout/stderr 行，触发 SSE 推送
    - R2Dock.svelte 或 OutputDock.svelte：订阅 workspace_output_store，实时展示
    - TitlebarMenu.svelte：lint-specs / generate 按钮触发 POST
    forbidden:
    - 禁止在前端直接执行 make 命令
    - 禁止忽略 exit code（make 失败需展示错误）
    - 禁止跳过 workspace_root 验证（target 必须在 WORKSPACE_ROOT 执行）
  generation_rules:
  - rule: make 执行 API
    detail: 'POST /api/workspace/run-make { target: "lint-specs"|"generate"|"validate" }

      backend: exec.Command("make", target) in WORKSPACE_ROOT

      stdout/stderr 通过 SSE 或轮询推送到前端

      '
  - rule: Wails binding guard
    detail: |
      菜单触发可以继续通过 runtime events 传递，但业务 binding 调用判定必须遵循
      SLICE-wails-binding-guard：Wails 环境仅允许 window.go.main.App.*，禁止 Wails 内 fallback。
  - rule: Output tab 实时展示
    detail: 'workspace_output_store.ts 维护输出行数组

      每收到一行追加到数组，触发 Svelte store 更新

      Output tab 订阅 store，自动滚动到底部

      '
  - rule: 完成后摘要
    detail: 'make 结束后：

      - exit_code === 0 → 显示绿色「✓ {target} 通过」

      - exit_code !== 0 → 显示红色「✗ {target} 失败 (exit {code})」+ Problems tab 更新

      '
  behaviors:
  - id: L5-B1
    behavior: 触发 make 命令
    implementation: 'TitlebarMenu 点击 → POST /api/workspace/run-make { target }

      backend 在 WORKSPACE_ROOT 执行 make target

      '
  - id: L5-B2
    behavior: 实时推送输出
    implementation: 'make stdout/stderr 行：

      - 通过 SSE stream /workspace/{threadId}/output 推送

      - 或通过 websocket

      - workspace_output_store 追加行

      '
  - id: L5-B3
    behavior: 完成后状态更新
    implementation: 'make exit → 更新 workspace_output_store:

      - append exit_code

      - set status: ''pass''|''fail''

      - Problems tab 读取失败行高亮

      '
  verification:
    commands:
    - cd /root/v-test && make lint-specs 2>&1 | tail -10
    - cd /root/v-test && make validate 2>&1 | tail -5
    - 'cd /root/v-test && curl -s -X POST ''http://localhost:33338/api/workspace/run-make'' -H ''Content-Type: application/json'' -d ''{"target":"lint-specs"}'' 2>/dev/null | head -20'
    manual_checks:
    - Titlebar 有 lint-specs 和 generate 按钮
    - 点击 lint-specs 后 Output tab 显示 make 输出
    - make 失败时 Output tab 显示红色错误
    - Output tab 支持「重新运行」按钮
    failure_conditions:
    - make 在非 WORKSPACE_ROOT 目录执行
    - make 失败但 UI 未显示红色错误
    - Output tab 未实时刷新
    - exit code 为 0 时仍显示失败
  dependencies:
  - file: backend/router/workspace_make.go
    reason: Go backend 的 make 执行路由（如果使用 Go backend）
  - file: frontend/src/lib/stores/workspace-output-store.ts
    reason: 存储 make 输出的 Svelte store
  - file: frontend/src/lib/components/workbench/R2Dock.svelte
    reason: Output tab 展示组件，订阅 workspace_output_store
  - file: Makefile
    reason: lint-specs / generate / validate targets 的实际实现
  - file: specs/L5-slice/SLICE-wails-binding-guard.yaml
    reason: 菜单触发链的 Wails binding 判定与 fallback 边界约束
