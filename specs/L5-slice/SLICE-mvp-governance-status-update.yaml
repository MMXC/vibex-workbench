---
spec:
  version: "0.1"
  level: "5_slice"
  name: SLICE-mvp-governance-status-update
  parent: FEAT-mvp-governance

meta:
  type: slice
  module: governance
  owner: hermes
  created: "2026-04-29"
  updated: "2026-04-29"

lifecycle:
  current: proposal
  updated: "2026-04-29"

display:
  title: mvp governance status update
  summary: spec YAML 的 lifecycle.status 字段从 proposal -> implementation -> done。
  description: spec YAML 的 lifecycle.status 字段从 proposal -> implementation -> done。

structure:
  parent: FEAT-mvp-governance
  children: []
  dependencies:
  - 'agent/cmd/web/governance_status.go: status update handler'
  - 'specs/L4-feature/FEAT-state-detection-fix.yaml: 首个完成 implementation 的 spec'
  - 'specs/L5-slice/SLICE-spec-history-api.yaml: changelog 读写 API'
  impacted_files:
  - agent/cmd/web/governance_status.go

io:
  input:
  - 'coord agent 完成一个 P0/P1/P2 spec 的代码实现，或用户在评审中接受了某个 spec。

    触发条件：team-tasks 任务标记为 done，或用户在 governance UI 点击「标记完成」。'
  output:
  - 'spec YAML 的 lifecycle.status 字段从 proposal -> implementation -> done。

    changelog[] 追加状态变更记录（at, by, trigger, note）。

    governance-viewer UI 实时反映新状态。'
  boundary: '只更新 MVP 涉及的 6 个 MOD 的 spec，不处理外部项目 spec。

    状态变更通过写 spec YAML 实现，不使用独立数据库表。'

constraints:
  rules: []
  forbidden:
  - 独立 governance 数据库
  - 修改非 MVP spec

prototype:
  file: ''
  validates: []
  status: none

io_contract:
  input: |
    coord agent 完成一个 P0/P1/P2 spec 的代码实现，或用户在评审中接受了某个 spec。
    触发条件：team-tasks 任务标记为 done，或用户在 governance UI 点击「标记完成」。
  output: |
    spec YAML 的 lifecycle.status 字段从 proposal -> implementation -> done。
    changelog[] 追加状态变更记录（at, by, trigger, note）。
    governance-viewer UI 实时反映新状态。
  boundary: |
    只更新 MVP 涉及的 6 个 MOD 的 spec，不处理外部项目 spec。
    状态变更通过写 spec YAML 实现，不使用独立数据库表。

content:
  file_path: agent/cmd/web/governance_status.go
  file_type: go
  implementation_boundary:
    allowed:
      - "spec YAML 读写（lifecycle.status + changelog[]）"
      - "team-tasks done 事件监听"
      - "governance-viewer SSE 推送新状态"
      - "P0/P1/P2 priority filter"
    forbidden:
      - "独立 governance 数据库"
      - "修改非 MVP spec"

  status_flow:
    proposal:
      description: 初始状态，spec 刚创建或正在编写
      exit: lifecycle.acceptance_criteria 全部通过
    implementation:
      description: 代码实现进行中
      exit: 代码合并到 main，UI 验收通过
    done:
      description: 实现完成并验收
      exit: 永不退出（终态）

  changelog_entry:
    fields:
      - at: ISO8601 timestamp
      - by: '"user" | "coord" | "agent"'
      - trigger: '"user:manual" | "agent:spec-write" | "system:code-merged"'
      - note: string (变更原因)

  event_listeners:
    team_tasks_done:
      trigger: team-tasks 任务状态变为 done
      action: |
        1. 从任务 metadata 提取 spec_path
        2. 读取 spec YAML
        3. 更新 lifecycle.status
        4. 追加 changelog[]
        5. 写回 spec YAML
        6. SSE push governance.refresh
    user_accept:
      trigger: 用户在 governance-viewer 点击 spec 行「标记完成」
      action: 同上，但 by='user', trigger='user:manual'

  test_scenarios:
    - id: TC-1
      given: FEAT-state-detection-fix 实现完成
      when: coord 更新 L1 spec_status
      then: FEAT-state-detection-fix.status='done'，L1 changelog 有记录
      evaluation: |
        Bash: python3 -c "import yaml; d=yaml.safe_load(open('specs/.../FEAT-state-detection-fix.yaml')); print(d['lifecycle']['current'])" == "done"
        Bash: python3 -c "import yaml; d=yaml.safe_load(open('specs/.../FEAT-state-detection-fix.yaml')); print(len(d['lifecycle']['history']))" >= 2

  dependencies:
    - file: agent/cmd/web/governance_status.go
      reason: status update handler
    - file: specs/L4-feature/FEAT-state-detection-fix.yaml
      reason: 首个完成 implementation 的 spec
    - file: specs/L5-slice/SLICE-spec-history-api.yaml
      reason: changelog 读写 API

  verification:
    commands:
      - "make validate"
    manual_checks:
      - governance-viewer 显示 spec 状态
      - changelog 有完整历史

  acceptance_criteria:
    - id: AC-GOV-SU1
      description: spec status 变更写入 YAML changelog[]，不丢失历史
    - id: AC-GOV-SU2
      description: governance-viewer 实时反映状态变更（SSE 推送）
    - id: AC-GOV-SU3
      description: 只处理 MVP 6 MOD 内的 spec，不影响外部 spec
