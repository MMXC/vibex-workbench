spec:
  version: '0.1'
  level: 5_implementation
  name: FEAT-workspace-selector_L5
  parent: FEAT-workspace-selector
  status: proposal
meta:
  type: implementation
  module: frontend
  owner: hermes
  created: '2026-04-26'
  updated: '2026-04-29'
io_contract:
  input: |
    /workspace 路由上的路径输入框、按钮点击事件，以及 /workbench 路由中 Wails 菜单事件：
    - 输入框 Enter 或「检测」按钮
    - state=empty 时的「初始化脚手架」按钮
    - state=partial|ready 时的「校验 Spec」「生成代码」「进入 Workbench」按钮
    - menu:open-project 事件触发的 OpenDirectoryDialog
  output: |
    - detect-state 返回的 { state, signals, suggestions } 渲染到状态卡片
    - run-make/scaffold 输出渲染到 error/output 区
    - 进入 Workbench 时 localStorage['vibex-workspace-root'] 持久化
    - Workbench StatusBar 显示 workspaceRoot、backendStatus、workspaceState
  boundary: |
    本 slice 精确描述当前前端入口页面和 Workbench 菜单 wiring。
    不实现 path guard、不实现 scaffolder、不实现 make runner、不实现 agent context injection。
content:
  file_path: frontend/src/routes/workspace/+page.svelte
  file_type: svelte
  # ── 用户可见 UI 元素（2026-04-30 新增：用于定位 spec 与实现落差的根因）────────
  ui_elements:
    - id: UE-WORKSPACE-PAGE
      location: /workspace 页面（selector-wrap 区域）
      css_selector: ".ws-input, .btn-detect, .btn-browse, .state-card, .btn-primary, .btn-enter, .btn-secondary"
      elements:
        - selector: ".ws-input"
          label: 路径输入框
          type: text input
          placeholder: "/path/to/your/project"
          events: onkeydown(Enter) → detectState()
        - selector: ".btn-detect"
          label: "🔍 检测 按钮"
          condition: always visible when workspaceRoot non-empty
          events: onclick → detectState()
        - selector: ".btn-browse"
          label: "📁 浏览… 按钮"
          events: onclick → openDirectoryDialog() → workspaceRoot=dir → detectState()
          note: 2026-04-30 新增，无需手输路径
        - selector: ".state-card"
          label: 状态卡片（条件渲染：detectState 完成后显示）
          shows:
            - ".state-badge": state badge (⬜空仓库 / 🟨半成品 / 🟩就绪)
            - ".sig-row": signals 列表（✅/❌ + 路径 + 原因）
            - ".sug": suggestions 列表
        - selector: ".btn-primary"
          label: "📦 初始化脚手架 按钮"
          condition: state=empty
          events: onclick → scaffold(confirm=true)
        - selector: ".btn-secondary"
          label: "✅ 校验 Spec / ⚙️ 生成代码 按钮"
          condition: state=partial 或 state=ready
          events: onclick → runMake(target)
        - selector: ".btn-enter"
          label: "→ 进入 Workbench 按钮"
          condition: state=partial 或 state=ready
          events: onclick → localStorage.setItem → goto('/workbench')
    - id: UE-TITLEBAR-FILE-MENU
      location: WorkbenchTitlebar.svelte（顶栏菜单条 .menu-strip）
      css_selector: ".menu-strip .menu-item-wrapper"
      elements:
        - selector: ".menu-btn"
          label: "文件 按钮"
          events: onclick → toggle fileMenuOpen dropdown
        - selector: ".dropdown-item"
          label: "📂 打开项目… (⌘O)"
          events: onclick → eventsEmit('menu:open-project')
          note: |
            触发后由 +layout.svelte 全局监听器处理：
            openDirectoryDialog() → localStorage → eventsEmit('workspace:selected') → goto('/workbench')
        - selector: ".menu-btn:nth-child(n+3)"
          label: 编辑 / 视图 / 终端 / 帮助
          disabled: true
    - id: UE-STATUSBAR
      location: StatusBar.svelte（workbench 底栏）
      css_selector: ".status-bar"
      shows:
        - field: workspaceRoot
          example: "/home/user/my-project"
        - field: backendStatus
          values: connecting | ready | error
        - field: workspaceState
          values: empty | partial | ready
          colors: 橙 | 黄 | 绿
  related_files:
  - frontend/src/routes/+layout.svelte
  - frontend/src/routes/workspace/+page.svelte
  - frontend/src/routes/workbench/+page.svelte
  - frontend/src/lib/components/workbench/WorkbenchTitlebar.svelte
  - frontend/src/lib/components/workbench/StatusBar.svelte
  - frontend/src/lib/wails-runtime.ts
  implementation_boundary:
    allowed:
    - "/workspace 页面：workspaceRoot 输入框绑定、Enter 检测、按钮 disabled 状态"
    - "POST /api/workspace/detect-state { workspace_root }"
    - "POST /api/workspace/scaffold { workspace_root, confirm: true }"
    - "POST /api/workspace/run-make { target, workspace_root }"
    - "localStorage.setItem('vibex-workspace-root', workspaceRoot)"
    - "goto('/workbench')"
    - "/workbench 页面：menu:open-project → openDirectoryDialog → detectWorkspaceState → eventsEmit('workspace:selected')"
    - "StatusBar 读取 workspaceRoot/workspaceState/backendStatus props"
    forbidden:
    - "在路径输入或目录选择时自动 scaffold"
    - "在 selector 内实现 path traversal 判断"
    - "在 selector 内实现 make target allowlist"
    - "在 selector 内直接读写 specs 文件"
    - "把 Git commit/push/pull 纳入 workspace selector"
  generation_rules:
  - rule: "/workspace 检测按钮"
    detail: |
      点击「检测」或输入框 Enter：
      - loading=true，error=''
      - POST /api/workspace/detect-state，body 使用 workspace_root
      - 返回数据写入 state
      - loading=false
  - rule: "状态驱动按钮"
    detail: |
      state=null：只显示提示「输入路径后点击『检测』查看项目状态」
      state=empty：显示「初始化脚手架」
      state=partial 或 state=ready：显示「校验 Spec」「生成代码」「进入 Workbench」
  - rule: "进入 Workbench"
    detail: |
      点击「进入 Workbench」：
      - localStorage.setItem('vibex-workspace-root', workspaceRoot)
      - goto('/workbench')
      当前实现不在进入前强制 validate/generate 成功。
  - rule: "Workbench 菜单打开项目"
    detail: |
      收到 menu:open-project：
      - 调用 openDirectoryDialog()
      - 用户取消则 return
      - workspaceRoot=dir
      - detectWorkspaceState(dir)，POST /api/workspace/detect-state，body 使用 workspaceRoot
      - eventsEmit('workspace:selected', dir)
  behaviors:
  - id: L5-B1
    behavior: "用户检测 workspace root"
    implementation: |
      1. 用户在 /workspace 输入路径
      2. 点击「检测」或按 Enter
      3. 调用 POST /api/workspace/detect-state { workspace_root }
      4. 渲染 state badge、signals、suggestions
  - id: L5-B2
    behavior: "空目录初始化入口"
    implementation: |
      1. detect-state 返回 empty
      2. 页面显示「初始化脚手架」
      3. 点击后 POST /api/workspace/scaffold { workspace_root, confirm: true }
      4. 成功后重新 detectState；失败时显示 output/error
  - id: L5-B3
    behavior: "partial/ready 后进入 Workbench"
    implementation: |
      1. detect-state 返回 partial 或 ready
      2. 页面显示「校验 Spec」「生成代码」「进入 Workbench」
      3. validate/generate 调用 POST /api/workspace/run-make { target, workspace_root }
      4. 点击「进入 Workbench」保存 localStorage 并跳转 /workbench
  - id: L5-B4
    behavior: "Workbench 内菜单切换项目"
    implementation: |
      1. 监听 menu:open-project
      2. 调用 openDirectoryDialog()（frontend 侧优先 showDirectoryPicker；Go 侧使用 native dialog）
      3. 选中目录后更新 workspaceRoot（必须为完整绝对路径，不能只有文件夹名）
      4. 重新 detectWorkspaceState 并 emit workspace:selected
  verification:
    commands:
    - npm --prefix frontend run build
    - make validate
    manual_checks:
    - "/workspace 页面有路径输入框和「检测」按钮"
    - "empty 状态只显示「初始化脚手架」，不显示「进入 Workbench」"
    - "partial/ready 状态显示「校验 Spec」「生成代码」「进入 Workbench」"
    - "点击「进入 Workbench」后 localStorage 出现 vibex-workspace-root"
    - "Workbench 内 menu:open-project 选择目录后 StatusBar 路径更新"
    failure_conditions:
    - "/workspace 编译失败或按钮事件报错"
    - "detect-state 返回 empty 时仍显示进入 Workbench"
    - "只检测路径就触发 scaffold 写盘"
    - "选择目录取消后覆盖了现有 workspaceRoot"
    - "StatusBar 状态与 detect-state 返回不一致"
  dependencies:
  - file: frontend/src/routes/workspace/+page.svelte
    reason: "当前真实入口页按钮和状态卡片实现"
  - file: frontend/src/routes/workbench/+page.svelte
    reason: "Workbench 内 menu:open-project wiring 和 StatusBar props 来源"
  - file: frontend/src/lib/wails-runtime.ts
    reason: "openDirectoryDialog / eventsOn / eventsEmit wrapper"
  - file: frontend/src/lib/components/workbench/StatusBar.svelte
    reason: "展示 workspaceRoot、backendStatus、workspaceState"
  - file: agent/cmd/web/workspace_handlers.go
    reason: "detect-state / scaffold / run-make workspace API"
lifecycle:
  current: proposal
  updated: '2026-04-29'
changelog:
- version: '0.1'
  date: '2026-04-26'
  author: hermes
  changes:
  - 初始版本，含 behaviors + verification + constraints
- version: '0.2'
  date: '2026-04-29'
  author: hermes
  changes:
  - 按当前 /workspace 页面按钮和 /workbench menu:open-project 实际 wiring 重写 L5 边界
- version: '0.3'
  date: '2026-04-30'
  author: hermes
  changes:
  - 补充 ui_elements 章节：定义 /workspace 页面、TitleBar 文件菜单、StatusBar 可见元素
  - 修复 B3 run-make body 字段名：workspace → workspace_root（与 Go handler 对齐）
  - 移除 related_files 中未使用的 WorkspaceSelector.svelte
  - 新增依赖文件：+layout.svelte（全局 menu:open-project 监听器）、WorkbenchTitlebar.svelte（文件下拉菜单）
- version: '0.4'
  date: '2026-04-30'
  author: hermes
  changes:
  - SLICE-ide-titlebar-component: 修正 Runtime fallback 规则——showDirectoryPicker 应为首选（完整路径），Wails runtime OpenDirectoryDialog 为备选（Windows 只返回文件夹名）
  - B4 行为更新：强调 workspaceRoot 必须是完整绝对路径，Go 侧需用 native dialog（github.com/sqweek/dialog）替代 Wails 内置 dialog
