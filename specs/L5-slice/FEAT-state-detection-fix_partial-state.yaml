  level: 5_implementation
  name: FEAT-state-detection-fix_partial-state
  parent: FEAT-state-detection-fix
  status: proposal

meta:
  type: implementation
  module: generators
  owner: hermes
  created: "2026-04-27"
  updated: "2026-04-27"

lifecycle:
  current: proposal
  updated: "2026-04-27"
  history:
    - status: proposal
      at: "2026-04-27T00:00:00"
      by: hermes
      trigger: bugfix:mvp-评估
      note: 修复 state_detector.py 返回 "half" 与 spec/frontend 期望 "partial" 不一致的 bug

io_contract:
  input: |
    WORKSPACE_ROOT 路径（字符串），通过 GET /api/workspace/detect-state 接收。
  output: |
    JSON: {state: "empty"|"partial"|"ready", signals: [...], suggestions: [...], workspaceRoot: "..."}
    注意：不再返回 "half"，统一用 "partial"。
  boundary: |
    只读目录，不写任何文件。
    本次修改只修状态名，不改探测逻辑。

content:
  bug_description: |
    state_detector.py 在 partial 状态时返回 "half"，但：
    - L3 MOD-state-detection.yaml 定义的状态名为 "partial"
    - L5 FEAT-state-detection_L5.yaml 定义的输出为 "partial"
    - frontend/src/routes/workspace/+page.svelte 用 stateIcons["partial"] 和 state?.state === 'partial' 做判断
    导致半成品状态（partial）时，✅校验 ⚙️生成 → 进入 Workbench 按钮全部不展示。

  fix_items:
    - file: generators/state_detector.py
      line: 59
      bug: state = "half"
      fix: state = "partial"
      note: 函数 detect_state() 内部返回值
    - file: generators/state_detector.py
      line: 61
      bug: "'half' 作为 key 在 suggestions dict 中不存在，导致 KeyError 或空 suggestions"
      fix: "用 'partial' 作为 key 访问 suggestions['partial']"
      note: 内部变量名不变，只修返回值和 dict key
    - file: generators/state_detector.py
      line: 68
      bug: suggestions dict key 为 "half"
      fix: suggestions dict key 为 "partial"
      note: 同步修改 suggestions 定义

  expected_behavior_after_fix:
    empty:
      state: "empty"
      signals: [specs/不存在, generators/gen.py不存在]
      suggestions: ["点击「初始化脚手架」开始搭建项目"]
    partial:
      state: "partial"
      signals: [specs/存在, generators/gen.py不存在]
      suggestions: ["运行「生成脚手架」补全目录结构", "或手动创建 generators/gen.py 和 Makefile"]
    ready:
      state: "ready"
      signals: [specs/存在, generators/gen.py存在, Makefile含lint-specs]
      suggestions: ["在 spec 编辑器中打开或新建规格文件", "运行「校验」检查 spec 质量"]

  frontend_impact:
    file: frontend/src/routes/workspace/+page.svelte
    line: 80
    current: let ready = $derived(state?.state === 'ready' || state?.state === 'partial');
    expected_after: 无需修改（frontend 原本就期望 "partial"，只是 Python 返回了 "half"）

  test_scenarios:
    - id: TC-fix-1
      scenario: "半成品仓库检测"
      given: "specs/ 存在但 generators/gen.py 不存在"
      when: "python3 state_detector.py /path/to/partial/repo --json"
      then: "返回 state === 'partial'"
      evaluation: "jq '.state' 输出为 'partial'"
      mvp_gate_relevance: "G3 (empty->scaffold->ready chain) requires this fix — without it, partial state never unlocks spec write and make buttons"
    - id: TC-fix-2
      scenario: "frontend ready 按钮在 partial 态展示"
      given: "仓库为 partial 状态"
      when: "前端 workspace/+page.svelte 渲染"
      then: "✅校验 ⚙️生成 → 进入 Workbench 按钮可见"
      evaluation: "ready === true（因为 state === 'partial'）"
