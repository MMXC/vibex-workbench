spec:
  version: "0.1"
  level: "5_slice"
  name: "SLICE-workspace-path-safety-contract"
  parent: "FEAT-workspace-runtime-safety"
  status: "proposal"

meta:
  type: "slice"
  module: "backend"
  owner: "hermes"
  created: "2026-04-27"
  updated: "2026-04-27"

lifecycle:
  current: "proposal"
  updated: "2026-04-27"

display:
  title: workspace path safety contract
  summary: 安全规范化后的 root/path/cwd，或结构化错误。
  description: 安全规范化后的 root/path/cwd，或结构化错误。

structure:
  parent: FEAT-workspace-runtime-safety
  children: []
  dependencies:
  - 'agent/cmd/web/workspace_handlers.go: workspace API handler'
  - 'agent/internal/common/config.go: workspace root config 来源'
  - 'frontend/src/lib/stores/workspace-store.ts: 前端 workspaceRoot 来源'
  impacted_files:
  - agent/cmd/web/workspace_handlers.go + agent/internal/common/config.go

io:
  input:
  - workspaceRoot 参数、spec relative path、make target。
  output:
  - 安全规范化后的 root/path/cwd，或结构化错误。
  boundary: 只管 workspace path normalize/guard，不管具体业务 handler 内容。

constraints:
  rules: []
  forbidden:
  - 硬编码 /root/v-test 或 C:\project\vibex-workbench
  - 允许 specs/write 写出 workspace
  - 忽略 workspaceRoot 参数回退到进程 cwd

prototype:
  file: ''
  validates: []
  status: none

io_contract:
  input: |
    workspaceRoot 参数、spec relative path、make target。
  output: |
    安全规范化后的 root/path/cwd，或结构化错误。
  boundary: |
    只管 workspace path normalize/guard，不管具体业务 handler 内容。

content:
  file_path: "agent/cmd/web/workspace_handlers.go + agent/internal/common/config.go"
  file_type: "go"

  implementation_boundary:
    allowed:
      - "workspace root normalize helper"
      - "spec relative path guard"
      - "run-make cwd guard"
      - "structured path error response"
    forbidden:
      - "硬编码 /root/v-test 或 C:\\project\\vibex-workbench"
      - "允许 specs/write 写出 workspace"
      - "忽略 workspaceRoot 参数回退到进程 cwd"

  error_codes:
    - code: "workspace_root_missing"
      when: "请求和配置均没有 workspace root"
    - code: "workspace_root_not_directory"
      when: "workspace root 不存在或不是目录"
    - code: "path_traversal"
      when: "相对路径规范化后逃逸 workspace/specs"
    - code: "invalid_make_target"
      when: "target 不在允许列表"

  generation_rules:
    - rule: "Normalize once"
      detail: "每个 request 入口先 normalize workspaceRoot，再传给业务逻辑"
    - rule: "Relative specs path"
      detail: "spec path 参数必须是 specs/... 相对路径，不接受绝对 path"
    - rule: "Make allowlist"
      detail: "run-make target 仅允许 lint-specs、validate、generate、mvp-gate"

  verification:
    commands:
      - "make validate"
      - "go test ./agent/..."
    manual_checks:
      - "Windows C:/path 与 Git Bash /c/path 指向同一目录"
      - "specs/write path=../x.yaml 返回 path_traversal"
      - "run-make 使用用户选择目录作为 cwd"
    failure_conditions:
      - "任一 handler 使用硬编码 workspace"
      - "path traversal 可读写 workspace 外文件"
      - "make target 可执行任意 shell 字符串"

  dependencies:
    - file: "agent/cmd/web/workspace_handlers.go"
      reason: "workspace API handler"
    - file: "agent/internal/common/config.go"
      reason: "workspace root config 来源"
    - file: "frontend/src/lib/stores/workspace-store.ts"
      reason: "前端 workspaceRoot 来源"

changelog:
  - version: "0.1"
    date: "2026-04-27"
    author: "hermes"
    changes:
      - "新增 workspace path 安全与 Windows 兼容 L5"
