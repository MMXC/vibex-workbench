  updated: '2026-04-26'
lifecycle:
  current: proposal
  updated: '2026-04-26'

display:
  title: ide agent panel component
  summary: AiChatColumn.svelte 将右侧 Agent 区域拆成 header、ThreadList、ConversationPanel、Composer。
  description: AiChatColumn.svelte 将右侧 Agent 区域拆成 header、ThreadList、ConversationPanel、Composer。

structure:
  parent: FEAT-ide-agent-panel
  children: []
  dependencies:
  - 'frontend/src/lib/components/workbench/ThreadList.svelte: 线程列表'
  - 'frontend/src/lib/components/workbench/ConversationPanel.svelte: 消息显示'
  - 'frontend/src/lib/components/workbench/Composer.svelte: 输入与提交'
  - 'frontend/src/lib/stores/workbench-layout-store.ts: 右侧 composer 高度状态'
  impacted_files:
  - frontend/src/lib/components/workbench/AiChatColumn.svelte

io:
  input:
  - 当前 thread store、message store、composer submit handler、layout dimensions。
  output:
  - AiChatColumn.svelte 将右侧 Agent 区域拆成 header、ThreadList、ConversationPanel、Composer。
  boundary: 只管右侧 panel 布局和 composer resize。消息渲染和提交逻辑由子组件/页面 handler 负责。

constraints:
  rules: []
  forbidden:
  - 在 AiChatColumn 中直接调用 /api/chat
  - 在 AiChatColumn 中修改 threadStore 消息内容
  - 在 AiChatColumn 中实现 agent tool 逻辑

prototype:
  file: ''
  validates: []
  status: none

io_contract:
  input: '当前 thread store、message store、composer submit handler、layout dimensions。

    '
  output: 'AiChatColumn.svelte 将右侧 Agent 区域拆成 header、ThreadList、ConversationPanel、Composer。

    '
  boundary: '只管右侧 panel 布局和 composer resize。消息渲染和提交逻辑由子组件/页面 handler 负责。

    '
  behavior_summary: 共 5 个行为步骤，详见 content.behaviors
content:
  file_path: frontend/src/lib/components/workbench/AiChatColumn.svelte
  file_type: svelte
  implementation_boundary:
    allowed:
    - 右侧 panel layout
    - header 文案与状态点
    - composer resize handle
    - ThreadList/ConversationPanel/Composer 的组合
    forbidden:
    - 在 AiChatColumn 中直接调用 /api/chat
    - 在 AiChatColumn 中修改 threadStore 消息内容
    - 在 AiChatColumn 中实现 agent tool 逻辑
  generation_rules:
  - rule: Composer anchored
    detail: Composer 必须保持在右侧 panel 底部，并可按 aiComposerBarPx 调整高度
  - rule: Resize bounds
    detail: resize 通过 workbenchLayoutStore 处理，不直接写 DOM style
  - rule: Child ownership
    detail: ThreadList、ConversationPanel、Composer 内部行为不在本 slice 修改
  verification:
    commands:
    - npm --prefix frontend run build
    manual_checks:
    - 右侧 header 显示 AI Agent 与状态点
    - 拖拽 composer 分隔条可调整输入区高度
    - 窗口缩放时 ConversationPanel 和 Composer 不重叠
    failure_conditions:
    - Composer 被挤出可视区
    - 右侧 resize 后出现空白或滚动异常
  dependencies:
  - file: frontend/src/lib/components/workbench/ThreadList.svelte
    reason: 线程列表
  - file: frontend/src/lib/components/workbench/ConversationPanel.svelte
    reason: 消息显示
  - file: frontend/src/lib/components/workbench/Composer.svelte
    reason: 输入与提交
  - file: frontend/src/lib/stores/workbench-layout-store.ts
    reason: 右侧 composer 高度状态
  behaviors:
  - id: B1
    trigger: 步骤1
    action: 顶部展示 AI Agent header 与 backend dot
    expected_result: 内容正确展示
    error_handling: 出错时显示 toast 提示，不阻塞其他交互
  - id: B2
    trigger: 步骤2
    action: 上方显示 ThreadList
    expected_result: 正确执行，无异常
    error_handling: 出错时显示 toast 提示，不阻塞其他交互
  - id: B3
    trigger: 步骤3
    action: 中间显示 ConversationPanel
    expected_result: 正确执行，无异常
    error_handling: 出错时显示 toast 提示，不阻塞其他交互
  - id: B4
    trigger: 步骤4
    action: 底部显示可调整高度的 Composer
    expected_result: 正确执行，无异常
    error_handling: 出错时显示 toast 提示，不阻塞其他交互
  - id: B5
    trigger: 步骤5
    action: 拖动 split-ai 更新 aiComposerBarPx
    expected_result: 正确执行，无异常
    error_handling: 出错时显示 toast 提示，不阻塞其他交互
changelog:
- version: '0.1'
