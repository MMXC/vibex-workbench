---
spec:
  version: "0.1"
  level: "5_slice"
  name: SLICE-spec-living-preview-engine
  parent: FEAT-spec-living-preview
  status: proposal

meta:
  type: slice
  module: frontend
  owner: hermes
  created: "2026-04-27"
  updated: "2026-04-27"

lifecycle:
  current: proposal
  updated: "2026-04-27"

io_contract:
  input: |
    spec file path、spec content text、spec level、preview_trigger。
  output: |
    preview artifact（mermaid.svg | skeleton.txt | preview.png）+ artifact_type + duration + preview_id。
  boundary: |
    只实现 spec → preview artifact 的生成管道。
    不实现 AI 图像生成（调用外部服务），不实现骨架文件的真实写入。

content:
  file_path: generators/spec_preview.py
  file_type: python

  implementation_boundary:
    allowed:
      - "读取 spec YAML 内容"
      - "根据 level 路由到对应预览生成器"
      - "L1/L2/L3: 生成 mermaid 图表文本"
      - "L4: 生成行为描述文本（读取 io_contract + content）"
      - "L5: 读取 content.file_path 和 implementation_boundary 输出骨架摘要"
      - "输出 preview artifact + metadata JSON"
      - "写 preview_snapshot（用户确认后）"
    forbidden:
      - "执行 make generate（只读不写）"
      - "修改 specs/ 目录（snapshot 除外且仅确认后）"
      - "调用外部 AI 图像生成 API"
      - "读取非 spec 文件"

  preview_generators:
    level_l1_l2:
      artifact: mermaid
      input: io_contract + l1_l2_lineage
      output: mermaid flowchart text
      example: |
        ```mermaid
        graph LR
          A[用户意图] --> B[spec-driven]
          B --> C[spec 生成]
          C --> D[校验]
          D --> E[代码生成]
        ```
    level_l3:
      artifact: module_description
      input: io_contract + content
      output: 文字描述模块边界和 public API
    level_l4:
      artifact: behavior_preview
      input: io_contract + content
      output: 行为描述 + 关键交互步骤
    level_l5:
      artifact: skeleton_preview
      input: content.file_path + implementation_boundary
      output: 骨架文件内容摘要（allowed/forbidden）

  api_contract:
    preview_endpoint: |
      POST /api/workspace/specs/preview
      body: { path: string, content: string, level: string, trigger: string }
      response: {
        preview_id: string,
        artifact_type: "mermaid | skeleton | behavior",
        artifact_content: string,
        preview_hash: string,
        generated_at: string
      }
    snapshot_endpoint: |
      POST /api/workspace/specs/preview/snapshot
      body: { path: string, preview_id: string, artifact_type: string, artifact_content: string }
      response: { snapshot_path: string }

  generation_rules:
    - rule: "Pure function"
      detail: |
        同一 spec content + level + trigger 两次调用结果必须完全一致。
        不依赖时间、随机数或外部状态。
    - rule: "Level appropriate"
      detail: |
        L1/L2 只读 io_contract，不读 implementation_boundary。
        L4/L5 只读 content，不读 behavior 的所有细节。
    - rule: "Snapshot after confirm"
      detail: |
        preview_snapshot 只在用户确认后才写入。
        写入路径: specs/<level>/<name>/preview_snapshot.<ext>

  verification:
    commands:
      - "python3 generators/spec_preview.py --spec specs/L4-feature/FEAT-spec-editor.yaml"
    manual_checks:
      - "L1 spec preview 输出 mermaid 图表"
      - "L4 spec preview 输出行为描述"
      - "L5 spec preview 输出骨架摘要（不执行 make generate）"
    failure_conditions:
      - "preview 生成结果包含 spec 未描述的内容"
      - "L4 preview 泄露 L5 实现细节"
      - "preview_snapshot 在确认前被写入"

  dependencies:
    - file: specs/L4-feature/FEAT-spec-living-preview.yaml
      reason: feature contract
    - file: specs/L4-feature/FEAT-spec-write-refresh-and-conflict.yaml
      reason: preview_snapshot 写入走 spec write API
    - file: specs/L4-feature/FEAT-scaffold-preview-recovery.yaml
      reason: scaffold preview 可复用 spec_preview.py 的 mermaid 渲染逻辑

  changelog:
    - version: "0.1"
      date: "2026-04-27"
      author: hermes
      changes:
        - "新增 spec 活预览引擎 L5 slice——spec_preview.py + preview/snapshot endpoint"
