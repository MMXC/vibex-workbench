  summary: memplace/memlace memory record，用于按 spec、file、failure category 检索。
  description: memplace/memlace memory record，用于按 spec、file、failure category 检索。

structure:
  parent: FEAT-agent-implementation-memory
  children: []
  dependencies:
  - 'specs/L4-feature/FEAT-agent-implementation-memory.yaml: memory role contract'
  - 'agent/internal/common/config.go: memlace/memplace 配置来源'
