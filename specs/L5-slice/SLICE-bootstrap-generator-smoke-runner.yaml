  title: bootstrap generator smoke runner
  summary: smoke report：created_files、missing_files、command_results、idempotency_result。
  description: smoke report：created_files、missing_files、command_results、idempotency_result。

structure:
  parent: FEAT-bootstrap-generator-smoke
  children: []
  dependencies:
  - 'generators/scaffolder.py: 实际脚手架写入逻辑'
  - 'spec-templates/: 模板来源'
