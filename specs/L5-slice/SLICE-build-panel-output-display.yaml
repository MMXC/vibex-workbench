---
spec:
  version: "0.1"
  level: "5_slice"
  name: SLICE-build-panel-output-display
  parent: FEAT-build-panel

meta:
  type: slice
  module: frontend
  owner: hermes
  created: "2026-04-29"
  updated: "2026-04-29"

lifecycle:
  current: proposal
  updated: "2026-04-29"

io_contract:
  input: |
    POST /api/workspace/run-make {workspace, target} 返回 {exitCode, stdout, stderr}。
    前端展示 stdout/stderr，失败时红色 badge + 错误摘要浮层。
  output: |
    成功：绿色 badge，stdout 显示前 500 字符。
    失败：红色浮层，stderr 前 500 字符 + 错误摘要。
    超时：显示「执行超时，请检查目录」。
  boundary: |
    不处理 make 命令本身（backend 职责）。
    不截断文件名路径（只截断 stdout/stderr 文本）。

content:
  file_path: frontend/src/lib/components/workbench/BuildPanel.svelte
  file_type: svelte
  implementation_boundary:
    allowed:
      - "BuildPanel.svelte 组件：按钮 + 结果显示区"
      - "exitCode badge（绿色/红色）"
      - "stdout/stderr 文本显示（前 500 字符）"
      - "超时错误提示"
      - "「查看终端」链接（打开系统 terminal）"
    forbidden:
      - "超过 500 字符的输出显示"
      - "执行 make 命令（backend 职责）"
      - "持久化 build 输出"

  output_display:
    max_chars: 500
    truncation_indicator: "..."
    overflow_action: "显示 '...' + '完整输出请查看终端'"
    escape_html: true (防止 XSS)

  badge_styles:
    success:
      color: green (#22c55e)
      label: "✅ 通过"
    failure:
      color: red (#ef4444)
      label: "❌ 失败"
    timeout:
      color: orange (#f97316)
      label: "⏱ 执行超时"

  test_scenarios:
    - id: TC-1
      given: specs/ 下有 YAML 语法错误文件
      target: lint-specs
      then: 返回 exit_code=1 + stderr 含错误位置，前端显示红色 badge + 错误摘要
      evaluation: |
        playwright-cli eval "document.querySelector('.build-badge')?.className.includes('failure')" == true
        playwright-cli eval "document.querySelector('.build-output')?.textContent.includes('YAML')" == true

    - id: TC-2
      given: spec 有 parent 指向不存在的文件
      target: validate
      then: 返回 exit_code=1 + 错误摘要，前端红色浮层
      evaluation: |
        playwright-cli eval "document.querySelector('.build-output')?.textContent.includes('parent')" == true

  dependencies:
    - file: specs/L5-slice/FEAT-make-integration_L5.yaml
      reason: run-make API backend 已实现
    - file: frontend/src/lib/components/workbench/GoalSpecCanvas.svelte
      reason: Action bar 中集成 BuildPanel

  verification:
    commands:
      - "npm --prefix frontend run build"
    manual_checks:
      - lint-specs 失败 -> 红色 badge + 错误摘要
      - 超时 -> 橙色 badge + 超时提示

  acceptance_criteria:
    - id: AC-BP-OD1
      description: 成功时绿色 badge，失败时红色 badge，超时时橙色 badge
    - id: AC-BP-OD2
      description: 输出超过 500 字符时截断，显示 "..."
    - id: AC-BP-OD3
      description: 超时时显示「执行超时，请检查目录」
    - id: AC-BP-OD4
      description: 点击「查看终端」打开系统 terminal
