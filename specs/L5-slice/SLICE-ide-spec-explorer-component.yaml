spec:
  version: '0.1'
  level: 5_slice
  name: SLICE-ide-spec-explorer-component
  parent: FEAT-ide-activity-sidebar
  status: proposal
meta:
  type: slice
  module: frontend
  owner: hermes
  created: '2026-04-26'
  updated: '2026-04-26'
lifecycle:
  current: proposal
  updated: '2026-04-26'
io_contract:
  input: '/api/workspace/specs/list 返回的 spec 路径列表，以及 spec-directory-convention 元数据。

    '
  output: '左侧资源管理器展示 workspace 名、specs section、文件列表、层级 badge 和选中态。

    '
  boundary: '只管 SpecExplorer.svelte 的列表读取和选中交互。

    不负责读取文件内容、编辑保存或图谱渲染。

    '
  behavior_summary: 共 4 个行为步骤，详见 content.behaviors
content:
  file_path: frontend/src/lib/components/workbench/SpecExplorer.svelte
  file_type: svelte
  implementation_boundary:
    allowed:
    - fetch /api/workspace/specs/list
    - fetch /api/workspace/specs/convention
    - 文件树展示、层级 badge、选中态
    - specExplorerStore.selectSpec(path)
    forbidden:
    - fetch /api/workspace/specs/read
    - 写入 spec 文件
    - 在组件内做 YAML parse
  generation_rules:
  - rule: Relative path only
    detail: 文件路径必须保持 specs/... 相对路径
  - rule: Convention optional
    detail: convention 加载失败时仍可展示文件列表，只是不显示 type badge
  - rule: Refresh
    detail: 刷新按钮只重新调用 list，不清空 selectedSpecPath
  verification:
    commands:
    - npm --prefix frontend run build
    manual_checks:
    - 左侧显示 VIBEX-WORKBENCH 和 specs section
    - 点击 YAML 后中央区打开对应 spec
    - 接口失败时展示错误文本且页面不崩溃
    failure_conditions:
    - 选中 spec 后路径不是相对路径
    - convention 失败导致整个 explorer 空白
  dependencies:
  - file: frontend/src/lib/workbench/spec-convention.ts
    reason: 推断 spec type badge
  - file: frontend/src/lib/stores/spec-explorer-store.ts
    reason: 保存 selectedSpecPath
  behaviors:
  - id: B1
    trigger: 步骤1
    action: 加载 convention 与 spec paths
    expected_result: 内容正确展示
    error_handling: 出错时显示 toast 提示，不阻塞其他交互
  - id: B2
    trigger: 步骤2
    action: 展示 loading/error/tree 三态
    expected_result: 显示 loading 态，不卡死
    error_handling: 出错时显示 toast 提示，不阻塞其他交互
  - id: B3
    trigger: 步骤3
    action: 点击刷新重新加载 paths
    expected_result: 视图/状态正确切换
    error_handling: 出错时显示 toast 提示，不阻塞其他交互
  - id: B4
    trigger: 步骤4
    action: 点击文件 selectSpec(path)
    expected_result: 视图/状态正确切换
    error_handling: 出错时显示 toast 提示，不阻塞其他交互
changelog:
- version: '0.1'
  date: '2026-04-26'
  author: hermes
  changes:
  - 新增 SpecExplorer 文件级边界与验证条件
