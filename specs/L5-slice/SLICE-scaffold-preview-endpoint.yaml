  current: proposal
  updated: "2026-04-27"

display:
  title: scaffold preview endpoint
  summary: confirmed_preview_id、每个文件的 action=create|skip|conflict 列表、模板摘要。
  description: confirmed_preview_id、每个文件的 action=create|skip|conflict 列表、模板摘要。

structure:
  parent: FEAT-scaffold-preview-recovery
  children: []
  dependencies:
  - 'specs/L4-feature/FEAT-scaffold-preview-recovery.yaml: feature contract，定义 preview_schema 和 action 语义'
  - 'generators/scaffolder.py: 模板定义来源，preview 从 scaffolder 的 required_canonical_paths 计算 action'
  - 'specs/L5-slice/SLICE-workspace-path-safety-contract.yaml: workspace root 必须通过 path safety 检查'
