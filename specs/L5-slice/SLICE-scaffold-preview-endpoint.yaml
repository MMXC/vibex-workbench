io:
  input:
  - workspace root（来自 normalizeWorkspaceRoot）、scaffold options（template/overwrite/skip）。
  output:
  - confirmed_preview_id、每个文件的 action=create|skip|conflict 列表、模板摘要。
  boundary: '只生成预览，不写入磁盘。不执行 scaffold 本身。

    不改变 workspace 状态（scaffold 确认后才改）。'

constraints:
  rules: []
  forbidden:
  - 确认前写入磁盘
  - 返回完整模板文件内容
  - 缓存 preview 结果超过 10 分钟
  - 缓存 preview 结果超过 10 分钟

prototype:
  file: ''
  validates: []
  status: none

io_contract:
  input: |
    workspace root（来自 normalizeWorkspaceRoot）、scaffold options（template/overwrite/skip）。    
  output: |
    confirmed_preview_id、每个文件的 action=create|skip|conflict 列表、模板摘要。
  boundary: |
    只生成预览，不写入磁盘。不执行 scaffold 本身。
    不改变 workspace 状态（scaffold 确认后才改）。

content:
  file_path: agent/cmd/web/workspace_handlers.go
  file_type: go

  endpoint: |
    GET /api/workspace/scaffold/preview?workspace_root=<normalized>&template=default

  implementation_boundary:
    allowed:
      - "计算每个 canonical path 的 action（create/skip/conflict）"
      - "生成 confirmed_preview_id（随机 UUID）并缓存 preview 结果"
      - "返回 action=skip 时说明 reason（file exists / already matches）"
      - "action=conflict 时说明冲突类型（content diff / mtime mismatch）"
      - "模板摘要：每个文件一行 summary，不含完整模板内容"
    forbidden:
      - "确认前写入磁盘"
      - "返回完整模板文件内容"
      - "缓存 preview 结果超过 10 分钟"
      - "缓存 preview 结果超过 10 分钟"

  preview_response:
    confirmed_preview_id: string  # UUID，10分钟内有效
    workspace_root: string
    workspace_state: empty | partial | ready
    items:
      - path: string
        action: create | skip | conflict
        reason: string
        template_source: string
        summary: string  # 一行说明，不含完整内容
    stats:
      to_create: number
      to_skip: number
      conflicts: number

  generation_rules:
    - rule: "Stateless preview"
      detail: |
        预览基于模板定义和磁盘当前状态计算，不依赖会话状态。
        confirmed_preview_id 只用于防止"预览过期后确认"。
    - rule: "Action determinism"
      detail: |
        同一 workspace_root + 同一模板，两次调用 preview 结果应一致（幂等）。
        除非用户在两次调用之间写入了文件。
    - rule: "No full content leak"
      detail: |
        summary 字段只描述文件用途（如 "Makefile with validate/generate targets"），
        不包含模板完整内容。

  verification:
    commands:
      - "go build ./cmd/web/"
      - "make validate"
    manual_checks:
      - "空目录 preview 的 to_create == 7，to_skip == 0"
      - "已有 Makefile 的目录 preview 的 Makefile action == skip"
      - "confirmed_preview_id 在 10 分钟后失效，重新 preview 产生新 id"
    failure_conditions:
      - "preview 返回完整模板文件内容"
      - "confirmed_preview_id 永不失效"
      - "幂等调用返回不同结果"

  dependencies:
    - file: specs/L4-feature/FEAT-scaffold-preview-recovery.yaml
      reason: feature contract，定义 preview_schema 和 action 语义
    - file: generators/scaffolder.py
      reason: 模板定义来源，preview 从 scaffolder 的 required_canonical_paths 计算 action
    - file: specs/L5-slice/SLICE-workspace-path-safety-contract.yaml
      reason: workspace root 必须通过 path safety 检查
    - file: specs/L4-feature/FEAT-command-output-problems-panel.yaml
      reason: "dependency: scaffold preview 完成后写入 last_scaffold_result，供 awareness 注入"

  changelog:
    - version: "0.1"
      date: "2026-04-27"
      author: hermes
      changes:
        - "新增 scaffold preview endpoint API 规格（GET /api/workspace/scaffold/preview）"
